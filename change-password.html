<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>パスワード変更｜ビズもん</title>
  <style>
    :root { --blue:#2563eb; --blue-dark:#1d4ed8; --bg:#f5f7fb; --text:#1f2937; --muted:#6b7280; --border:#d1d5db; --error:#dc2626; --success:#15803d; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); margin:0; color:var(--text); }
    .container { max-width:520px; margin:48px auto; background:#fff; border-radius:16px; padding:32px; box-shadow:0 8px 24px rgba(0,0,0,.08); }
    h1 { font-size:24px; margin:0 0 8px; }
    .lead { font-size:14px; color:var(--muted); margin:0 0 24px; line-height:1.7; }
    .policy-box { background:#f0f7ff; border:1px solid #bfdcff; border-radius:12px; padding:16px; font-size:14px; line-height:1.8; margin-bottom:24px; white-space:pre-line; }
    label { display:block; font-weight:700; margin-top:16px; margin-bottom:6px; font-size:14px; }
    input { width:100%; box-sizing:border-box; padding:12px; border:1px solid var(--border); border-radius:10px; font-size:15px; background:#fff; }
    input:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.12); }
    .count { font-size:13px; margin-top:6px; color:var(--muted); }
    .error { color:var(--error); font-size:14px; margin-top:12px; min-height:20px; line-height:1.6; white-space:pre-line; }
    .success { color:var(--success); font-size:14px; margin-top:12px; min-height:20px; line-height:1.6; white-space:pre-line; }
    button { width:100%; margin-top:24px; padding:13px; background:var(--blue); color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; }
    button:hover { background:var(--blue-dark); }
    button:disabled { background:#9ca3af; cursor:not-allowed; }
    .link-row { text-align:center; margin-top:20px; }
    .link-row a { color:var(--blue); text-decoration:none; font-size:14px; }
    .link-row a:hover { text-decoration:underline; }
</style>
</head>
<body>
  <main class="container">
    <h1>パスワード変更</h1>
    <p class="lead">セキュリティ向上のため、新しいパスワードは以下の条件で設定してください。</p>
    <div id="passwordPolicy" class="policy-box"></div>
    <form id="changePasswordForm" novalidate>
      <label for="currentPassword">現在のパスワード</label>
      <input type="password" id="currentPassword" autocomplete="current-password" required />
      <label for="newPassword">新しいパスワード</label>
      <input type="password" id="newPassword" autocomplete="new-password" maxlength="128" required />
      <div id="passwordCount" class="count">0 / 128文字</div>
      <label for="confirmPassword">新しいパスワード（確認）</label>
      <input type="password" id="confirmPassword" autocomplete="new-password" maxlength="128" required />
      <div id="errorMessage" class="error" aria-live="polite"></div>
      <div id="successMessage" class="success" aria-live="polite"></div>
      <button type="submit" id="submitButton">パスワードを変更する</button>
    </form>
    <div class="link-row"><a href="index.html">トップへ戻る</a></div>
  </main>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, EmailAuthProvider, reauthenticateWithCredential, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { PASSWORD_POLICY_TEXT, validateBizmonPassword, getPasswordLengthMessage, getPasswordLengthStatus } from "./password-policy.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",
  authDomain: "bizmon-31ffc.firebaseapp.com",
  databaseURL: "https://bizmon-31ffc-default-rtdb.firebaseio.com",
  projectId: "bizmon-31ffc",
  storageBucket: "bizmon-31ffc.firebasestorage.app",
  messagingSenderId: "535364592474",
  appId: "1:535364592474:web:1f60b1eb2ad804b1a28963",
  measurementId: "G-CE1ZDBSVM6"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const passwordPolicy = document.getElementById("passwordPolicy");
    const form = document.getElementById("changePasswordForm");
    const currentPasswordInput = document.getElementById("currentPassword");
    const newPasswordInput = document.getElementById("newPassword");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const passwordCount = document.getElementById("passwordCount");
    const errorMessage = document.getElementById("errorMessage");
    const successMessage = document.getElementById("successMessage");
    const submitButton = document.getElementById("submitButton");
    passwordPolicy.textContent = PASSWORD_POLICY_TEXT;
    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      if (!user) { location.href = "login.html"; return; }
      currentUser = user;
    });

    function updatePasswordCount() {
      const password = newPasswordInput.value;
      const status = getPasswordLengthStatus(password);
      passwordCount.textContent = getPasswordLengthMessage(password);
      if (status === "empty") passwordCount.style.color = "#6b7280";
      if (status === "short" || status === "over") passwordCount.style.color = "#dc2626";
      if (status === "ok") passwordCount.style.color = "#15803d";
    }
    newPasswordInput.addEventListener("input", updatePasswordCount);

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMessage.textContent = "";
      successMessage.textContent = "";
      if (!currentUser) { errorMessage.textContent = "ログイン状態を確認できません。再度ログインしてください。"; return; }
      const currentPassword = currentPasswordInput.value;
      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      if (!currentPassword) { errorMessage.textContent = "現在のパスワードを入力してください。"; return; }
      const validationError = validateBizmonPassword(newPassword);
      if (validationError) { errorMessage.textContent = validationError; return; }
      if (newPassword !== confirmPassword) { errorMessage.textContent = "新しいパスワードと確認用パスワードが一致していません。"; return; }
      if (!currentUser.email) { errorMessage.textContent = "メールアドレス認証のユーザーではないため、この画面では変更できません。"; return; }

      try {
        submitButton.disabled = true;
        submitButton.textContent = "変更中...";
        const credential = EmailAuthProvider.credential(currentUser.email, currentPassword);
        await reauthenticateWithCredential(currentUser, credential);
        await updatePassword(currentUser, newPassword);
        successMessage.textContent = "パスワードを変更しました。次回ログイン時から新しいパスワードをご利用ください。";
        currentPasswordInput.value = "";
        newPasswordInput.value = "";
        confirmPasswordInput.value = "";
        updatePasswordCount();
      } catch (error) {
        console.error(error);
        if (error.code === "auth/wrong-password" || error.code === "auth/invalid-credential") errorMessage.textContent = "現在のパスワードが正しくありません。";
        else if (error.code === "auth/weak-password") errorMessage.textContent = "新しいパスワードが弱すぎます。15文字以上のパスフレーズを設定してください。";
        else if (error.code === "auth/requires-recent-login") errorMessage.textContent = "安全のため、再度ログインしてからパスワードを変更してください。";
        else errorMessage.textContent = "パスワード変更に失敗しました。時間をおいて再度お試しください。";
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "パスワードを変更する";
      }
    });
  </script>
</body>
</html>
