d}.rank-sub{font-size:12px;color:#6b7280}.progress{height:8px;background:#e5e7eb;border-radius:999px;margin-top:6px;overflow:hidden}.progress-bar{height:100%;background:#16a34a;border-radius:999px}.note{font-size:12px;color:#6b7280;line-height:1.7;margin-top:10px}.badge{display:inline-block;border-radius:999px;padding:4px 10px;font-weight:bold;font-size:13px;white-space:nowrap}.badge.ok{background:#dcfce7;color:#166534}.badge.ng{background:#fee2e2;color:#991b1b}.badge.none{background:#f3f4f6;color:#6b7280}.page-loading{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#eef2f7;color:#1f2937;font-weight:bold}.page-loading.hidden{display:none!important}.loading-box{display:flex;flex-direction:column;align-items:center;gap:12px;background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:24px 28px;box-shadow:0 4px 12px rgba(0,0,0,.08)}.loading-spinner{width:42px;height:42px;border:5px solid #dbeafe;border-top-color:#2563eb;border-radius:50%;animation:spin .9s linear infinite}.loading-text{font-size:14px;color:#374151}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:980px){.wrap{padding:20px}.cards.top-cards,.cards.bottom-cards{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}}@media(max-width:640px){body{padding:14px}.header{align-items:flex-start}h1{font-size:24px}.btn{width:100%}.btn-row{display:grid}.card-value{font-size:24px}}

<script type="module" onerror="window.bizmonHideDashboardLoading&&window.bizmonHideDashboardLoading()">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";import{getAuth,onAuthStateChanged,setPersistence,browserLocalPersistence}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";import{getFirestore,collection,query,where,getDocs,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",databaseURL:"https://bizmon-31ffc-default-rtdb.firebaseio.com",projectId:"bizmon-31ffc",storageBucket:"bizmon-31ffc.firebasestorage.app",messagingSenderId:"535364592474",appId:"1:535364592474:web:1f60b1eb2ad804b1a28963",measurementId:"G-CE1ZDBSVM6"};
const CATEGORY_ORDER=["コミュニケーション・ビジネススキル","読解力・思考力","キャリア・自己管理","IT・デジタル","情報管理・セキュリティ","データ分析・活用","プロジェクト管理","業務改善・品質管理","経営・戦略","顧客理解・マーケティング","会計・財務・税務","税金・年末調整","社会保険","勤怠管理","労務・雇用","法務・コンプライアンス","組織・マネジメント","リスク管理・危機対応","サステナビリティ・ESG","グローバル・ダイバーシティ","心理・行動"];
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);setPersistence(auth,browserLocalPersistence).catch(console.warn);let currentUserData=null,allUsers=[],allResults=[],dailyRows=[];const $=id=>document.getElementById(id);const CHART_W=1120;
function showLoading(t){if(window.bizmonShowDashboardLoading)window.bizmonShowDashboardLoading(t||'ダッシュボードを読み込み中...')}function hideLoading(){if(window.bizmonHideDashboardLoading)window.bizmonHideDashboardLoading()}function setStatus(msg,type){const e=$('status');e.textContent=msg||'';e.className='status '+(type||'');if(type==='error'){e.style.display='block';hideLoading()}else e.style.display='none'}
function escapeHtml(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}function pad2(n){return String(n).padStart(2,'0')}function dateKey(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())}function todayKey(){return dateKey(new Date())}function parseDateKey(s){const p=String(s||'').split('-');return new Date(Number(p[0]),Number(p[1])-1,Number(p[2]))}function addDays(k,n){const d=parseDateKey(k);d.setDate(d.getDate()+n);return dateKey(d)}function dateRange(start,end){const arr=[];let cur=start,guard=0;while(cur&&end&&cur<=end&&guard<370){arr.push(cur);cur=addDays(cur,1);guard++}return arr}function presetRange(p){const d=new Date();if(p==='prevMonth')return{start:dateKey(new Date(d.getFullYear(),d.getMonth()-1,1)),end:dateKey(new Date(d.getFullYear(),d.getMonth(),0))};return{start:dateKey(new Date(d.getFullYear(),d.getMonth(),1)),end:todayKey()}}function applyPreset(){const r=presetRange($('periodPreset').value);$('startDate').value=r.start;$('endDate').value=r.end;$('periodHelp').textContent='※ダッシュボード画面で確認できるデータは active ユーザー の「今月」または「前月」のみです。'}
function first(){for(let i=0;i<arguments.length;i++){const v=arguments[i];if(v!==undefined&&v!==null&&String(v).trim()!=='')return String(v).trim()}return ''}function isActive(d){if(d.active===false)return false;const st=String(d.status||'').toLowerCase();if(st==='inactive'||st==='disabled'||st==='退職')return false;if(st==='active')return true;return true}function normalizeUser(ds){const d=ds.data()||{};return{uid:ds.id,employeeCode:first(d.employeeCode,d.employeeId,d.staffCode),name:first(d.name,d.displayName),department:first(d.department),position:first(d.position),role:first(d.role,'user'),companyId:first(d.companyId),active:isActive(d)}}function isCorrect(d){if(d.isCorrect===true)return true;if(d.isCorrect===false)return false;const x=String(d.result||d.judgement||d.resultText||'').toLowerCase();if(x.includes('incorrect')||x.includes('wrong')||x.includes('不正解')||x.includes('×'))return false;if(x.includes('correct')||x.includes('正解')||x.includes('○'))return true;const s=first(d.selectedChoice,d.selectedAnswer,d.userAnswer).toUpperCase(),c=first(d.correctChoice,d.correctAnswer).toUpperCase();return !!(s&&c&&s===c)}function normalizeResult(ds){const d=ds.data()||{};return{id:ds.id,uid:first(d.uid),dateKey:first(d.dateKey,d.date),employeeCode:first(d.employeeCode,d.staffCode),name:first(d.name,d.displayName),department:first(d.department),position:first(d.position),category1:first(d.category1,d.largeCategory,d.mainCategory,'未分類'),isCorrect:isCorrect(d),companyId:first(d.companyId)}}async function loadCurrentUser(user){const snap=await getDoc(doc(db,'users',user.uid));if(!snap.exists())throw new Error('users/'+user.uid+' が見つかりません。');const data=snap.data()||{};if(data.role!=='admin')throw new Error('このダッシュボードは管理者のみ利用できます。現在のrole：'+(data.role||'未設定'));if(!data.companyId)throw new Error('users/'+user.uid+' に companyId がありません。');currentUserData=data;return data}
function activeUsers(){return allUsers.filter(u=>u.active)}function unique(list,key){return[...new Set(list.map(x=>String(x[key]||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ja'))}function setSelectOptions(id,values,keep){const s=$(id),cur=keep?s.value:'all';s.innerHTML='<option value="all">すべて</option>'+values.map(v=>'<option value="'+escapeHtml(v)+'">'+escapeHtml(v)+'</option>').join('');s.value=values.includes(cur)?cur:'all'}function populateFilters(keep){setSelectOptions('departmentFilter',unique(activeUsers(),'department'),keep);setSelectOptions('positionFilter',unique(activeUsers(),'position'),keep)}function filteredUsers(){const dept=$('departmentFilter').value,pos=$('positionFilter').value;return activeUsers().filter(u=>(dept==='all'||u.department===dept)&&(pos==='all'||u.position===pos))}function filteredResults(){const map={};filteredUsers().forEach(u=>map[u.uid]=u);return allResults.filter(r=>map[r.uid]).map(r=>Object.assign({},r,{employeeCode:r.employeeCode||map[r.uid].employeeCode,name:r.name||map[r.uid].name,department:r.department||map[r.uid].department,position:r.position||map[r.uid].position}))}
async function loadData(){applyPreset();const companyId=currentUserData.companyId,start=$('startDate').value,end=$('endDate').value;showLoading('ダッシュボードを読み込み中...');setStatus('',null);try{const usQ=query(collection(db,'users'),where('companyId','==',companyId));const rsQ=query(collection(db,'quizResults'),where('companyId','==',companyId),where('dateKey','>=',start),where('dateKey','<=',end));const[usSnap,rsSnap]=await Promise.all([getDocs(usQ),getDocs(rsQ)]);allUsers=usSnap.docs.map(normalizeUser);allResults=rsSnap.docs.map(normalizeResult);populateFilters(true);renderDashboard();['filterBox','unansweredPanel','dailyPanel'].forEach(id=>$(id).style.display='block');$('summaryCardsTop').style.display='grid';$('summaryCardsBottom').style.display='grid';$('mainGrid').style.display='grid';setStatus('',null);hideLoading()}catch(e){console.error(e);let msg='ダッシュボードデータの取得に失敗しました。\n'+(e.code||e.message||e);if(e.code==='failed-precondition')msg+='\n\nFirestoreの複合インデックスが未作成です。quizResults の companyId 昇順 + dateKey 昇順 を作成してください。';setStatus(msg,'error')}}
function buildDaily(){const users=filteredUsers(),count=users.length,results=filteredResults(),dates=dateRange($('startDate').value,$('endDate').value);dailyRows=dates.map(dk=>{const by={};results.forEach(r=>{if(r.dateKey===dk)by[r.uid]=r});const ids=Object.keys(by);let c=0,n=0;ids.forEach(uid=>by[uid].isCorrect?c++:n++);return{dateKey:dk,registered:count,answered:ids.length,correct:c,incorrect:n,unanswered:Math.max(count-ids.length,0),answerRate:count?ids.length/count*100:0,correctRate:ids.length?c/ids.length*100:0}})}function renderDashboard(){buildDaily();renderSummary();renderCountChart();renderRateNumbers();renderUnanswered();renderDailyTable();renderCategories()}function renderSummary(){const users=filteredUsers(),results=filteredResults(),answered={};results.forEach(r=>answered[r.uid]=true);const answerTotal=results.length,correctTotal=results.filter(r=>r.isCorrect).length,incorrectTotal=results.filter(r=>r.isCorrect===false).length,avgAns=dailyRows.length?dailyRows.reduce((a,b)=>a+b.answerRate,0)/dailyRows.length:0,avgCor=answerTotal?correctTotal/answerTotal*100:0;$('registeredTotal').textContent=users.length;$('answeredUsersTotal').textContent=Object.keys(answered).length;$('averageAnswerRate').textContent=(Math.round(avgAns*10)/10)+'%';$('answerTotal').textContent=answerTotal;$('correctTotal').textContent=correctTotal;$('incorrectTotal').textContent=incorrectTotal;$('averageCorrectRate').textContent=(Math.round(avgCor*10)/10)+'%'}
function renderCountChart(){const rows=dailyRows,w=CHART_W,h=430,top=30,bottom=128,left=54,right=24,ch=h-top-bottom,cw=w-left-right,max=Math.max(1,...rows.map(r=>r.registered)),y=v=>top+ch-(v/max)*ch,gw=cw/Math.max(rows.length,1),bw=Math.min(34,Math.max(10,gw*.52));let svg='<svg class="svg-chart" width="100%" height="'+h+'" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none"><rect width="'+w+'" height="'+h+'" fill="#fff"/>';for(let i=0;i<=4;i++){const val=Math.round(max*i/4),yy=y(val);svg+='<line x1="'+left+'" y1="'+yy+'" x2="'+(w-right)+'" y2="'+yy+'" stroke="#e5e7eb"/><text x="'+(left-8)+'" y="'+(yy+4)+'" text-anchor="end" font-size="11" fill="#6b7280">'+val+'</text>'}rows.forEach((r,i)=>{const gx=left+i*gw+gw/2,x=gx-bw/2,base=top+ch,cH=(r.correct/max)*ch,iH=(r.incorrect/max)*ch,uH=(r.unanswered/max)*ch,yC=base-cH,yI=yC-iH,yU=yI-uH,ansRate=Math.round(r.answerRate*10)/10,corRate=Math.round(r.correctRate*10)/10;svg+='<rect x="'+x+'" y="'+yU+'" width="'+bw+'" height="'+Math.max(0,uH)+'" fill="#f59e0b"></rect><rect x="'+x+'" y="'+yI+'" width="'+bw+'" height="'+Math.max(0,iH)+'" fill="#ef4444"></rect><rect x="'+x+'" y="'+yC+'" width="'+bw+'" height="'+Math.max(0,cH)+'" fill="#22c55e"></rect><rect x="'+x+'" y="'+yU+'" width="'+bw+'" height="'+(base-yU)+'" fill="transparent" stroke="#6b7280"></rect><text x="'+gx+'" y="'+(h-86)+'" text-anchor="middle" font-size="10" fill="#374151" transform="rotate(-45 '+gx+' '+(h-86)+')">'+r.dateKey.substring(5)+'</text><text x="'+gx+'" y="'+(h-38)+'" text-anchor="middle" font-size="9" fill="#2563eb">回 '+ansRate+'%</text><text x="'+gx+'" y="'+(h-22)+'" text-anchor="middle" font-size="9" fill="#f97316">正 '+corRate+'%</text>'});svg+='<line x1="'+left+'" y1="'+(top+ch)+'" x2="'+(w-right)+'" y2="'+(top+ch)+'" stroke="#9ca3af"/><text x="'+left+'" y="18" font-size="12" fill="#6b7280">人数</text></svg>';$('countChartArea').innerHTML=svg}
function renderRateNumbers(){const rows=dailyRows.slice().sort((a,b)=>String(b.dateKey).localeCompare(String(a.dateKey)));if(!rows.length){$('rateBody').innerHTML='<tr><td colspan="3" class="empty">データがありません。</td></tr>';return}$('rateBody').innerHTML=rows.map(r=>'<tr><td>'+escapeHtml(r.dateKey)+'</td><td class="rate-answer">'+(Math.round(r.answerRate*10)/10)+'%</td><td class="rate-correct">'+(Math.round(r.correctRate*10)/10)+'%</td></tr>').join('')}
function resultBadge(r){if(r.isCorrect===true)return'<span class="badge ok">○ 正解</span>';if(r.isCorrect===false)return'<span class="badge ng">× 不正解</span>';return'<span class="badge none">-</span>'}function renderDailyTable(){const rows=filteredResults().slice().sort((a,b)=>{const d=String(b.dateKey).localeCompare(String(a.dateKey));if(d!==0)return d;return String(b.employeeCode||'').localeCompare(String(a.employeeCode||''),'ja',{numeric:true})});if(!rows.length){$('dailyBody').innerHTML='<tr><td colspan="7" class="empty">回答データがありません。</td></tr>';return}$('dailyBody').innerHTML=rows.map(r=>'<tr><td>'+escapeHtml(r.dateKey)+'</td><td>'+escapeHtml(r.employeeCode)+'</td><td>'+escapeHtml(r.name)+'</td><td>'+escapeHtml(r.department)+'</td><td>'+escapeHtml(r.position)+'</td><td>'+escapeHtml(r.category1)+'</td><td>'+resultBadge(r)+'</td></tr>').join('')}
function renderUnanswered(){const dates=dateRange($('startDate').value,$('endDate').value),users=filteredUsers(),results=filteredResults(),answerMap={};results.forEach(r=>{if(!answerMap[r.dateKey])answerMap[r.dateKey]={};answerMap[r.dateKey][r.uid]=true});const rows=[];users.forEach(u=>{let cnt=0;dates.forEach(d=>{if(!(answerMap[d]&&answerMap[d][u.uid]))cnt++});if(cnt>0)rows.push(Object.assign({},u,{unansweredCount:cnt}))});rows.sort((a,b)=>{const c=(b.unansweredCount||0)-(a.unansweredCount||0);if(c!==0)return c;return String(b.employeeCode||'').localeCompare(String(a.employeeCode||''),'ja',{numeric:true})});if(!rows.length){$('unansweredBody').innerHTML='<tr><td colspan="5" class="empty">未実施者はいません。</td></tr>';return}$('unansweredBody').innerHTML=rows.map(u=>'<tr><td>'+escapeHtml(u.employeeCode)+'</td><td>'+escapeHtml(u.name)+'</td><td>'+escapeHtml(u.department)+'</td><td>'+escapeHtml(u.position)+'</td><td>'+u.unansweredCount+'</td></tr>').join('')}
function catSort(a,b){const ia=CATEGORY_ORDER.indexOf(a),ib=CATEGORY_ORDER.indexOf(b);if(ia>=0&&ib>=0)return ia-ib;if(ia>=0)return-1;if(ib>=0)return 1;return a.localeCompare(b,'ja')}function renderCategories(){const map={};filteredResults().forEach(r=>{const k=r.category1||'未分類';if(!map[k])map[k]={total:0,correct:0};map[k].total++;if(r.isCorrect)map[k].correct++});const keys=Object.keys(map).sort(catSort);if(!keys.length){$('categoryRanking').innerHTML='<div class="empty">カテゴリー別データがありません。</div>';return}$('categoryRanking').innerHTML=keys.map(k=>{const m=map[k],rate=m.total?Math.round(m.correct/m.total*1000)/10:0;return '<div class="rank-item"><div><div class="rank-name">'+escapeHtml(k)+'</div><div class="rank-sub">正解 '+m.correct+' / 回答 '+m.total+'</div><div class="progress"><div class="progress-bar" style="width:'+rate+'%"></div></div></div><div><strong>'+rate+'%</strong></div></div>'}).join('')}
$('periodPreset').addEventListener('change',loadData);$('applyBtn').addEventListener('click',loadData);$('reloadBtn').addEventListener('click',loadData);['departmentFilter','positionFilter'].forEach(id=>$(id).addEventListener('change',renderDashboard));applyPreset();setStatus('',null);onAuthStateChanged(auth,async user=>{if(!user){location.href='login.html';return}try{showLoading('ダッシュボードを読み込み中...');await loadCurrentUser(user);await loadData()}catch(e){console.error(e);setStatus('ダッシュボードの読み込みに失敗しました。\n'+(e.message||e),'error')}});
</script>
