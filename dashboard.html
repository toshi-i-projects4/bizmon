<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ビズもん 管理ダッシュボード</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#e5e7eb;
      --blue:#2563eb;
      --blue-hover:#1d4ed8;
      --orange:#f97316;
      --green:#16a34a;
      --red:#dc2626;
      --gray:#9ca3af;
      --shadow:0 8px 24px rgba(15,23,42,.08);
      --radius:16px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Yu Gothic",YuGothic,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
      line-height:1.6;
    }

    .page{
      width:100%;
      max-width:1200px;
      margin:0 auto;
      padding:20px;
    }

    .header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
    }

    .title-block h1{
      margin:0;
      font-size:26px;
      letter-spacing:.02em;
    }

    .title-block p{
      margin:4px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
      gap:10px;
    }

    .select,
    .input{
      height:38px;
      border:1px solid var(--border);
      border-radius:10px;
      background:#fff;
      color:var(--text);
      padding:0 10px;
      font-size:14px;
    }

    .btn{
      height:38px;
      border:1px solid var(--border);
      border-radius:10px;
      background:#fff;
      color:var(--text);
      padding:0 14px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:.15s ease;
      white-space:nowrap;
    }

    .btn:hover{filter:brightness(.98)}

    /* 「再読み込み」を青色にする */
    #reloadBtn,
    .reload-btn,
    button[data-action="reload"]{
      background:var(--blue) !important;
      border-color:var(--blue) !important;
      color:#fff !important;
    }

    #reloadBtn:hover,
    .reload-btn:hover,
    button[data-action="reload"]:hover{
      background:var(--blue-hover) !important;
      border-color:var(--blue-hover) !important;
    }

    /* 「表示読込」は不要なので非表示 */
    #displayLoadBtn,
    .display-load-btn,
    button[data-action="display-load"]{
      display:none !important;
    }

    .status{
      margin:0 0 14px;
      padding:10px 12px;
      background:#eef2ff;
      border:1px solid #dbeafe;
      color:#1e3a8a;
      border-radius:12px;
      font-size:14px;
    }

    .status.error{
      background:#fef2f2;
      border-color:#fecaca;
      color:#991b1b;
    }

    .summary-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
      margin-bottom:16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
    }

    .metric-label{
      color:var(--muted);
      font-size:13px;
      margin-bottom:4px;
    }

    .metric-value{
      font-size:28px;
      font-weight:800;
      line-height:1.2;
    }

    .metric-sub{
      color:var(--muted);
      font-size:12px;
      margin-top:4px;
    }

    section.card{
      margin-bottom:16px;
    }

    .section-header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }

    .section-header h2{
      margin:0;
      font-size:19px;
    }

    .section-note{
      margin:2px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    /* 日別推移グラフを31日分・画面幅100%に収める */
    .daily-trend-chart-wrap{
      width:100%;
      max-width:100%;
      overflow:hidden;
    }

    .daily-trend-chart-inner{
      width:100%;
      max-width:100%;
      height:360px;
    }

    .daily-trend-chart-inner canvas,
    #dailyTrendChart{
      width:100% !important;
      max-width:100% !important;
      height:360px !important;
    }

    .chart-wrap{
      width:100%;
      max-width:100%;
      height:340px;
      overflow:hidden;
    }

    .chart-wrap canvas{
      width:100% !important;
      height:340px !important;
    }

    /* カテゴリー別 正解率は日別推移の直下 */
    #categoryAccuracySection{
      margin-top:0;
      margin-bottom:16px;
    }

    .table-wrap{
      width:100%;
      overflow:auto;
      border:1px solid var(--border);
      border-radius:12px;
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:720px;
    }

    th,td{
      padding:10px 12px;
      border-bottom:1px solid var(--border);
      text-align:left;
      font-size:13px;
      white-space:nowrap;
    }

    th{
      background:#f9fafb;
      color:#374151;
      font-weight:800;
    }

    tr:last-child td{border-bottom:none}

    .small-muted{
      color:var(--muted);
      font-size:12px;
    }

    @media (max-width:900px){
      .summary-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
      .header{display:block;}
      .toolbar{justify-content:flex-start;margin-top:12px;}
    }

    @media (max-width:768px){
      .page{padding:14px;}
      .title-block h1{font-size:22px;}
      .summary-grid{grid-template-columns:1fr;}
      .daily-trend-chart-inner{height:300px;}
      .daily-trend-chart-inner canvas,#dailyTrendChart{height:300px !important;}
      .chart-wrap{height:300px;}
      .chart-wrap canvas{height:300px !important;}
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div class="title-block">
        <h1>ビズもん 管理ダッシュボード</h1>
        <p>回答状況・正解率・カテゴリー別傾向を確認できます。</p>
      </div>

      <div class="toolbar">
        <select id="rangeSelect" class="select" aria-label="表示期間">
          <option value="31" selected>直近31日</option>
          <option value="14">直近14日</option>
          <option value="7">直近7日</option>
        </select>
        <button id="displayLoadBtn" class="btn display-load-btn" type="button">表示読込</button>
        <button id="reloadBtn" class="btn reload-btn" data-action="reload" type="button">再読み込み</button>
      </div>
    </header>

    <p id="status" class="status">ダッシュボードを読み込み中...</p>

    <div class="summary-grid">
      <div class="card">
        <div class="metric-label">対象者数</div>
        <div id="totalUsersMetric" class="metric-value">-</div>
        <div class="metric-sub">会社内ユーザー</div>
      </div>
      <div class="card">
        <div class="metric-label">本日の回答者数</div>
        <div id="todayAnsweredMetric" class="metric-value">-</div>
        <div class="metric-sub">本日分の回答</div>
      </div>
      <div class="card">
        <div class="metric-label">本日の回答率</div>
        <div id="todayAnswerRateMetric" class="metric-value">-</div>
        <div class="metric-sub">回答者数 ÷ 対象者数</div>
      </div>
      <div class="card">
        <div class="metric-label">本日の正解率</div>
        <div id="todayCorrectRateMetric" class="metric-value">-</div>
        <div class="metric-sub">正解数 ÷ 回答数</div>
      </div>
    </div>

    <section id="dailyTrendSection" class="card">
      <div class="section-header">
        <div>
          <h2>日別推移：人数内訳＋回答率・正解率</h2>
          <p class="section-note">31日分を画面幅100%内に収めて表示します。</p>
        </div>
      </div>
      <div class="daily-trend-chart-wrap">
        <div class="daily-trend-chart-inner">
          <canvas id="dailyTrendChart"></canvas>
        </div>
      </div>
    </section>

    <!-- ここを日別推移の直下に配置 -->
    <section id="categoryAccuracySection" class="card">
      <div class="section-header">
        <div>
          <h2>カテゴリー別 正解率</h2>
          <p class="section-note">カテゴリーごとの弱点・強みを確認できます。</p>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="categoryAccuracyChart"></canvas>
      </div>
    </section>

    <section id="dailyTableSection" class="card">
      <div class="section-header">
        <div>
          <h2>日別明細</h2>
          <p class="section-note">日ごとの人数内訳、回答率、正解率です。</p>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>出題ID</th>
              <th>大項目</th>
              <th>対象者数</th>
              <th>回答者数</th>
              <th>未回答者数</th>
              <th>回答率</th>
              <th>正解率</th>
            </tr>
          </thead>
          <tbody id="dailyTableBody">
            <tr><td colspan="8" class="small-muted">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module">
    /********************************************************************
     * Firebase設定
     * 既存のビズもんで使用している firebaseConfig に差し替えてください。
     ********************************************************************/
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      collection,
      collectionGroup,
      doc,
      getDoc,
      getDocs,
      query,
      where,
      orderBy,
      limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const statusEl = document.getElementById("status");
    const reloadBtn = document.getElementById("reloadBtn");
    const rangeSelect = document.getElementById("rangeSelect");

    const totalUsersMetric = document.getElementById("totalUsersMetric");
    const todayAnsweredMetric = document.getElementById("todayAnsweredMetric");
    const todayAnswerRateMetric = document.getElementById("todayAnswerRateMetric");
    const todayCorrectRateMetric = document.getElementById("todayCorrectRateMetric");
    const dailyTableBody = document.getElementById("dailyTableBody");

    let dailyTrendChart = null;
    let categoryAccuracyChart = null;
    let currentUser = null;
    let currentCompanyId = null;

    function setStatus(message, isError = false){
      statusEl.textContent = message;
      statusEl.classList.toggle("error", Boolean(isError));
    }

    function toYmd(date){
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function shortDateLabel(ymd){
      const parts = String(ymd).split("-");
      if(parts.length === 3){
        return `${Number(parts[1])}/${Number(parts[2])}`;
      }
      return ymd;
    }

    function percent(numerator, denominator){
      if(!denominator) return 0;
      return Math.round((numerator / denominator) * 1000) / 10;
    }

    function getLastDates(days){
      const result = [];
      const today = new Date();
      for(let i = days - 1; i >= 0; i--){
        const d = new Date(today);
        d.setDate(today.getDate() - i);
        result.push(toYmd(d));
      }
      return result;
    }

    function normalizeBool(value){
      return value === true || value === "true" || value === 1 || value === "1";
    }

    async function getLoginUserProfile(user){
      // 想定1: users/{uid}
      const directRef = doc(db, "users", user.uid);
      const directSnap = await getDoc(directRef);
      if(directSnap.exists()){
        return { id: directSnap.id, ...directSnap.data() };
      }

      // 想定2: collectionGroup users where uid == user.uid
      const q = query(collectionGroup(db, "users"), where("uid", "==", user.uid), limit(1));
      const snap = await getDocs(q);
      if(!snap.empty){
        const d = snap.docs[0];
        return { id: d.id, ...d.data() };
      }

      return null;
    }

    async function resolveCompanyId(user){
      const profile = await getLoginUserProfile(user);
      const cid = profile?.companyId || profile?.companyID || profile?.company || user?.companyId;
      if(!cid){
        throw new Error("companyIdを取得できませんでした。users/{uid} に companyId があるか確認してください。");
      }
      return cid;
    }

    async function loadCompanyUsers(companyId){
      // 推奨: users コレクションに companyId を持たせる
      const q = query(collection(db, "users"), where("companyId", "==", companyId));
      const snap = await getDocs(q);
      return snap.docs
        .map(d => ({ id:d.id, ...d.data() }))
        .filter(u => u.active !== false && u.disabled !== true);
    }

    async function loadAssignments(companyId, dates){
      // 想定: dailyQuizAssignments/{companyId_YYYY-MM-DD} または doc内に companyId/date
      const start = dates[0];
      const end = dates[dates.length - 1];
      const q = query(
        collection(db, "dailyQuizAssignments"),
        where("companyId", "==", companyId),
        where("date", ">=", start),
        where("date", "<=", end),
        orderBy("date", "asc")
      );
      const snap = await getDocs(q);
      const map = new Map();
      snap.docs.forEach(d => {
        const data = { id:d.id, ...d.data() };
        if(data.date) map.set(data.date, data);
      });
      return map;
    }

    async function loadAnswers(companyId, dates){
      // 想定: quizAnswers に companyId/date/isCorrect/category1 等がある
      const start = dates[0];
      const end = dates[dates.length - 1];
      const q = query(
        collection(db, "quizAnswers"),
        where("companyId", "==", companyId),
        where("date", ">=", start),
        where("date", "<=", end),
        orderBy("date", "asc")
      );
      const snap = await getDocs(q);
      return snap.docs.map(d => ({ id:d.id, ...d.data() }));
    }

    function buildDailyRows(dates, users, assignmentMap, answers){
      const totalUsers = users.length;
      const answersByDate = new Map();

      for(const ans of answers){
        const date = ans.date || ans.answeredDate || ans.ymd;
        if(!date) continue;
        if(!answersByDate.has(date)) answersByDate.set(date, []);
        answersByDate.get(date).push(ans);
      }

      return dates.map(date => {
        const dayAnswers = answersByDate.get(date) || [];
        const answeredUserIds = new Set();
        let correctCount = 0;

        for(const ans of dayAnswers){
          const uid = ans.userId || ans.uid || ans.userID;
          if(uid) answeredUserIds.add(uid);
          if(normalizeBool(ans.isCorrect ?? ans.correct)) correctCount++;
        }

        const answeredCount = answeredUserIds.size || dayAnswers.length;
        const unansweredCount = Math.max(totalUsers - answeredCount, 0);
        const assignment = assignmentMap.get(date) || {};

        return {
          date,
          questionId: assignment.questionId || assignment.id || assignment.questionID || "-",
          category1: assignment.category1 || assignment.category || "-",
          totalUsers,
          answeredCount,
          unansweredCount,
          answerRate: percent(answeredCount, totalUsers),
          correctRate: percent(correctCount, dayAnswers.length),
          answerCountRaw: dayAnswers.length,
          correctCount
        };
      });
    }

    function buildCategoryRows(answers){
      const map = new Map();
      for(const ans of answers){
        const category = ans.category1 || ans.category || ans.largeCategory || "未分類";
        if(!map.has(category)) map.set(category, { category, total:0, correct:0 });
        const row = map.get(category);
        row.total++;
        if(normalizeBool(ans.isCorrect ?? ans.correct)) row.correct++;
      }
      return [...map.values()]
        .map(r => ({ ...r, correctRate: percent(r.correct, r.total) }))
        .sort((a,b) => b.total - a.total || a.category.localeCompare(b.category, "ja"));
    }

    function renderSummary(rows, totalUsers){
      const today = toYmd(new Date());
      const todayRow = rows.find(r => r.date === today) || rows[rows.length - 1];
      totalUsersMetric.textContent = `${totalUsers}`;
      todayAnsweredMetric.textContent = `${todayRow?.answeredCount ?? 0}`;
      todayAnswerRateMetric.textContent = `${todayRow?.answerRate ?? 0}%`;
      todayCorrectRateMetric.textContent = `${todayRow?.correctRate ?? 0}%`;
    }

    function renderDailyChart(rows){
      const ctx = document.getElementById("dailyTrendChart");
      const labels = rows.map(r => shortDateLabel(r.date));

      if(dailyTrendChart) dailyTrendChart.destroy();

      dailyTrendChart = new Chart(ctx, {
        data: {
          labels,
          datasets: [
            {
              label: "回答者数",
              data: rows.map(r => r.answeredCount),
              type: "bar",
              backgroundColor: "rgba(59, 130, 246, 0.35)",
              borderColor: "#3b82f6",
              borderWidth: 1,
              yAxisID: "yCount",
              order: 2
            },
            {
              label: "未回答者数",
              data: rows.map(r => r.unansweredCount),
              type: "bar",
              backgroundColor: "rgba(156, 163, 175, 0.35)",
              borderColor: "#9ca3af",
              borderWidth: 1,
              yAxisID: "yCount",
              order: 2
            },
            {
              label: "回答率",
              data: rows.map(r => r.answerRate),
              type: "line",
              borderColor: "#2563eb",
              backgroundColor: "rgba(37, 99, 235, 0.12)",
              borderWidth: 3,
              tension: 0.25,
              pointRadius: 2.5,
              pointHoverRadius: 5,
              yAxisID: "yRate",
              order: 1
            },
            {
              label: "正解率",
              data: rows.map(r => r.correctRate),
              type: "line",
              borderColor: "#f97316",
              backgroundColor: "rgba(249, 115, 22, 0.12)",
              borderWidth: 3,
              tension: 0.25,
              pointRadius: 2.5,
              pointHoverRadius: 5,
              yAxisID: "yRate",
              order: 1
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { position: "top" },
            tooltip: {
              callbacks: {
                label: function(context){
                  const label = context.dataset.label || "";
                  const value = context.raw;
                  return label.includes("率") ? `${label}: ${value}%` : `${label}: ${value}人`;
                }
              }
            }
          },
          scales: {
            x: {
              ticks: {
                autoSkip: false,
                maxRotation: 45,
                minRotation: 0,
                font: { size: 10 }
              },
              grid: { display: false }
            },
            yCount: {
              type: "linear",
              position: "left",
              beginAtZero: true,
              stacked: false,
              title: { display: true, text: "人数" },
              ticks: { precision: 0 }
            },
            yRate: {
              type: "linear",
              position: "right",
              beginAtZero: true,
              max: 100,
              title: { display: true, text: "率" },
              ticks: { callback: value => value + "%" },
              grid: { drawOnChartArea: false }
            }
          }
        }
      });
    }

    function renderCategoryChart(categoryRows){
      const ctx = document.getElementById("categoryAccuracyChart");
      const rows = categoryRows.length ? categoryRows : [{ category:"データなし", correctRate:0, total:0, correct:0 }];

      if(categoryAccuracyChart) categoryAccuracyChart.destroy();

      categoryAccuracyChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: rows.map(r => r.category),
          datasets: [{
            label: "正解率",
            data: rows.map(r => r.correctRate),
            backgroundColor: "rgba(22, 163, 74, 0.35)",
            borderColor: "#16a34a",
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: function(context){
                  const row = rows[context.dataIndex];
                  return `正解率: ${row.correctRate}%（${row.correct}/${row.total}問）`;
                }
              }
            }
          },
          scales: {
            x: {
              ticks: { autoSkip:false, maxRotation:45, minRotation:0, font:{ size:11 } },
              grid: { display:false }
            },
            y: {
              beginAtZero:true,
              max:100,
              ticks:{ callback:value => value + "%" },
              title:{ display:true, text:"正解率" }
            }
          }
        }
      });
    }

    function renderDailyTable(rows){
      if(!rows.length){
        dailyTableBody.innerHTML = `<tr><td colspan="8" class="small-muted">表示できるデータがありません。</td></tr>`;
        return;
      }

      dailyTableBody.innerHTML = rows.map(r => `
        <tr>
          <td>${r.date}</td>
          <td>${r.questionId}</td>
          <td>${r.category1}</td>
          <td>${r.totalUsers}</td>
          <td>${r.answeredCount}</td>
          <td>${r.unansweredCount}</td>
          <td>${r.answerRate}%</td>
          <td>${r.correctRate}%</td>
        </tr>
      `).join("");
    }

    async function loadDashboard(){
      if(!currentUser) return;

      try{
        reloadBtn.disabled = true;
        setStatus("ダッシュボードを読み込み中...");

        if(!currentCompanyId){
          currentCompanyId = await resolveCompanyId(currentUser);
        }

        const days = Number(rangeSelect.value || 31);
        const dates = getLastDates(days);

        const [users, assignmentMap, answers] = await Promise.all([
          loadCompanyUsers(currentCompanyId),
          loadAssignments(currentCompanyId, dates),
          loadAnswers(currentCompanyId, dates)
        ]);

        const dailyRows = buildDailyRows(dates, users, assignmentMap, answers);
        const categoryRows = buildCategoryRows(answers);

        renderSummary(dailyRows, users.length);
        renderDailyChart(dailyRows);
        renderCategoryChart(categoryRows);
        renderDailyTable(dailyRows);

        setStatus(`読み込み完了：${currentCompanyId} / 直近${days}日`);
      }catch(error){
        console.error(error);
        setStatus(`読み込みに失敗しました。 ${error.message || error}`, true);
      }finally{
        reloadBtn.disabled = false;
      }
    }

    reloadBtn.addEventListener("click", loadDashboard);
    rangeSelect.addEventListener("change", loadDashboard);

    onAuthStateChanged(auth, async user => {
      if(!user){
        setStatus("ログインしていません。ログイン後に再度開いてください。", true);
        return;
      }
      currentUser = user;
      await loadDashboard();
    });
  </script>
</body>
</html>
