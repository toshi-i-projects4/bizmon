<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>回答結果</title><style>

const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);const params=new URLSearchParams(location.search);const targetDate=params.get('date')||'';const statusEl=document.getElementById('status'),content=document.getElementById('content');document.getElementById('dateText').textContent=targetDate;function show(r){document.getElementById('questionBox').textContent='問題：'+(r.questionText||r.question||'');document.getElementById('choicesBox').textContent='選択肢
