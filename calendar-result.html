<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回答結果</title>
<style>
body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:#eef2f7;color:#111827;padding:24px;box-sizing:border-box}.wrap{max-width:900px;margin:30px auto;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:32px;box-sizing:border-box}.header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}h1{margin:0}.top-link,.bottom-link{color:#2563eb;text-decoration:none;font-weight:bold;font-size:14px}.bottom-link{display:inline-block;margin-top:20px}.status,.box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:14px;line-height:1.7;white-space:pre-wrap}.error{color:#dc2626}.ok{color:#166534}.sub{color:#6b7280;font-size:14px;margin:6px 0 20px}.question-box{background:#eff6ff;border-left:4px solid #2563eb;font-size:20px}.answer-box{background:#f0fdf4;border-left:4px solid #22c55e;color:#166534;font-weight:bold}.explanation-box{background:#fff7ed;border-left:4px solid #f97316;color:#7c2d12}.blocked{background:#fff7ed;border:1px solid #fed7aa;border-left:5px solid #f97316;color:#7c2d12}.daily-info-view{display:none;margin-top:18px;background:#f8fafc;border:1px solid #374151;border-radius:16px;padding:18px;line-height:1.75;text-align:left}.daily-info-title{font-size:20px;font-weight:800;color:#111827;margin:0 0 14px}.daily-info-stack{display:grid;grid-template-columns:1fr;gap:14px}.daily-info-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:15px 16px;text-align:left;box-shadow:0 1px 4px rgba(15,23,42,.04)}.daily-info-card-title{font-size:15px;font-weight:800;color:#1e40af;margin:0 0 9px;padding-bottom:5px;border-bottom:1px solid #e5e7eb}.result-date-line{font-size:13px;font-weight:700;color:#374151;line-height:1.55}.weather-period{font-size:14px;font-weight:800;color:#1d4ed8;margin-bottom:6px}.weather-main{display:flex;align-items:center;gap:9px;margin-bottom:5px}.weather-icon{width:42px!important;height:42px!important;object-fit:contain;flex:0 0 42px}.weather-icon-fallback{width:42px;height:42px;display:none;align-items:center;justify-content:center;font-size:30px;flex:0 0 42px}.weather-place{font-size:13px;font-weight:800;color:#111827;line-height:1.4}.weather-text,.weather-temp{font-size:13px;color:#374151;line-height:1.5}.weather-temp strong{color:#1d4ed8;font-weight:800}.weather-pops{font-size:12px;color:#374151;line-height:1.5;margin-top:4px}.weather-source{font-size:10px;color:#6b7280;text-align:right;margin-top:4px}.weather-note-bottom{font-size:11.5px;color:#64748b;line-height:1.55;text-align:left;margin-top:4px}.almanac-list{display:grid;gap:8px}.almanac-item{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px 12px;font-size:13px;line-height:1.6;color:#374151}.almanac-one-line{font-size:13px;line-height:1.6;color:#374151;word-break:break-word}.almanac-label{font-weight:800;color:#111827}.almanac-desc,.almanac-other{color:#374151}.daily-info-empty{background:#fff7ed;border:1px solid #fed7aa;border-left:5px solid #f97316;border-radius:10px;padding:12px 14px;color:#7c2d12;font-size:13px;line-height:1.7}@media(max-width:640px){.header{flex-direction:column;align-items:flex-start}.wrap{padding:24px}}
</style>
</head>
<body>
<div class="wrap"><div class="header"><h1>回答結果</h1><a class="top-link" href="index.html">← マイページへ戻る</a></div><div id="dateText" class="sub"></div><div id="status" class="status">結果を読み込み中...</div><div id="content" style="display:none"><div id="q" class="box question-box"></div><div id="choices" class="box"></div><div id="ans" class="box answer-box"></div><div id="exp" class="box explanation-box"></div><div id="dailyInfoView" class="daily-info-view"><div class="daily-info-title">今日の情報</div><div id="dailyInfoBody" class="daily-info-stack"></div></div></div><a class="bottom-link" href="index.html">← マイページへ戻る</a></div>
<script>
var firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",projectId:"bizmon-31ffc"};var auth=null;var db=null;function setStatus(msg,type){var el=document.getElementById('status');if(!el)return;el.textContent=msg;el.className='status '+(type||'')}function loadScript(src,label,callback){var s=document.createElement('script');var done=false;var timer=setTimeout(function(){if(done)return;done=true;callback(new Error(label+' の読込がタイムアウトしました。'))},12000);s.onload=function(){if(done)return;done=true;clearTimeout(timer);callback(null)};s.onerror=function(){if(done)return;done=true;clearTimeout(timer);callback(new Error(label+' の読込に失敗しました。'))};s.src=src+'?v='+Date.now();document.head.appendChild(s)}function loadFirebase(callback){setStatus('Firebase SDKを読み込み中...');loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js','firebase-app-compat',function(e){if(e)return callback(e);loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js','firebase-auth-compat',function(e){if(e)return callback(e);loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js','firebase-firestore-compat',function(e){if(e)return callback(e);try{if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);auth=firebase.auth();db=firebase.firestore();callback(null)}catch(err){callback(err)}})})})}function requireLogin(callback){auth.onAuthStateChanged(function(user){if(!user){location.href='login.html';return}callback(user)})}function pad2(n){return String(n).padStart(2,'0')}function todayKey(){var d=new Date();return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())}function prevMonthStartKey(){var d=new Date();return d.getFullYear()+'-'+pad2(d.getMonth())+'-01'}function normalizeDateKey(s){s=String(s||'').trim();var m=s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);return m?m[1]+'-'+pad2(m[2])+'-'+pad2(m[3]):s}function canOpenDetail(dateKey){dateKey=normalizeDateKey(dateKey);return /^\d{4}-\d{2}-\d{2}$/.test(dateKey)&&dateKey>=prevMonthStartKey()&&dateKey<=todayKey()}function blockedMessage(){return 'この日の問題・解説の詳細表示期間は終了しています。\n詳細表示できるのは「前月1日以降」のデータです。\nカレンダー上の○×履歴は確認できますが、過去の問題・解説が必要な場合は管理者へお問い合わせください。'}function parseCsvLine(line){var out=[],cur='',q=false;for(var i=0;i<line.length;i++){var ch=line.charAt(i);if(ch==='"'){if(q&&line.charAt(i+1)==='"'){cur+='"';i++}else q=!q}else if(ch===','&&!q){out.push(cur);cur=''}else cur+=ch}out.push(cur);return out}function normalizeText(v){return String(v||'').replace(/^問題\s*[:：]\s*/,'').replace(/\s+/g,'').trim()}function loadQuestionRows(callback){var xhr=new XMLHttpRequest();xhr.open('GET','questions.csv?v='+Date.now(),true);xhr.overrideMimeType('text/plain; charset=UTF-8');xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status!==200){callback(null,[]);return}try{var text=xhr.responseText||'';if(text.length>0&&text.charCodeAt(0)===65279)text=text.substring(1);var lines=text.split(/\r?\n/).filter(function(l){return l.trim()!==''});if(lines.length<=1){callback(null,[]);return}var header=parseCsvLine(lines[0]).map(function(v){return v.trim().toLowerCase()});var idx={id:header.indexOf('id'),category1:header.indexOf('category1'),category2:header.indexOf('category2'),question:header.indexOf('question'),a:header.indexOf('a'),b:header.indexOf('b'),c:header.indexOf('c'),answer:header.indexOf('answer'),explanation:header.indexOf('explanation'),active:header.indexOf('active')};var rows=[];for(var i=1;i<lines.length;i++){var cols=parseCsvLine(lines[i]);rows.push({id:idx.id>=0?cols[idx.id]:'',category1:idx.category1>=0?cols[idx.category1]:'',category2:idx.category2>=0?cols[idx.category2]:'',question:idx.question>=0?cols[idx.question]:'',a:idx.a>=0?cols[idx.a]:'',b:idx.b>=0?cols[idx.b]:'',c:idx.c>=0?cols[idx.c]:'',answer:idx.answer>=0?String(cols[idx.answer]||'').trim().toUpperCase():'',explanation:idx.explanation>=0?cols[idx.explanation]:''})}callback(null,rows)}catch(e){callback(null,[])}};xhr.onerror=function(){callback(null,[])};xhr.send()}function findQuestionInCsv(saved,rows){if(!rows||!rows.length)return null;var qid=String(saved.questionId||saved.id||'').trim();if(qid){for(var i=0;i<rows.length;i++)if(String(rows[i].id||'').trim()===qid)return rows[i]}var qt=normalizeText(saved.questionText||saved.question||saved.quizQuestion||saved.title||saved.text||saved.q||'');if(qt){for(var j=0;j<rows.length;j++)if(normalizeText(rows[j].question)===qt)return rows[j]}return null}function pick(data,keys){for(var i=0;i<keys.length;i++){var k=keys[i];if(data&&data[k]!==undefined&&data[k]!==null&&String(data[k]).trim()!=='')return data[k]}return ''}function isCorrectValue(saved){if(saved&&saved.isCorrect===true)return true;if(saved&&saved.isCorrect===false)return false;var v=String(pick(saved,['result','judgement','judge','resultText'])).toLowerCase();if(v.indexOf('incorrect')>=0||v.indexOf('wrong')>=0||v.indexOf('不正解')>=0||v.indexOf('×')>=0)return false;if(v.indexOf('correct')>=0||v.indexOf('正解')>=0||v.indexOf('○')>=0)return true;var s=String(pick(saved,['selectedChoice','userAnswer','selectedAnswer'])).trim().toUpperCase(),c=String(pick(saved,['correctChoice','correctAnswer','answer'])).trim().toUpperCase();return !!(s&&c&&s===c)}function resultTextFromSaved(saved){if(saved&&saved.resultText)return saved.resultText;return isCorrectValue(saved)?'正解':'不正解'}var targetDate=normalizeDateKey(new URLSearchParams(location.search).get('date')||'');document.getElementById('dateText').textContent=targetDate;
function showDailyInfo(snapshot){var view=document.getElementById('dailyInfoView'),body=document.getElementById('dailyInfoBody');if(!view||!body)return;view.style.display='block';if(!snapshot){body.innerHTML='<div class="daily-info-empty">この日の「今日の情報」は保存されていません。今後の回答分から、回答時点の情報が表示されます。</div>';return}body.innerHTML='<div class="daily-info-card"><div class="daily-info-card-title">今日の日付</div><div class="result-date-line"></div></div><div class="daily-info-card"><div class="daily-info-card-title">天気</div><div class="weather-view"></div></div><div class="daily-info-card"><div class="daily-info-card-title">今日はこんな日</div><div class="almanac-list"></div></div>';body.querySelector('.result-date-line').textContent=snapshot.dateText||targetDate;body.querySelector('.weather-view').innerHTML=snapshot.weatherHtml||'<div class="daily-info-empty">天気情報は保存されていません。</div>';body.querySelector('.almanac-list').innerHTML=snapshot.almanacHtml||'<div class="daily-info-empty">暦情報は保存されていません。</div>'}
function show(saved,csvRow){var question=pick(saved,['questionText','question','quizQuestion','title','text','q'])||(csvRow?csvRow.question:'');var choiceA=pick(saved,['choiceA','answerA','a'])||(csvRow?csvRow.a:'');var choiceB=pick(saved,['choiceB','answerB','b'])||(csvRow?csvRow.b:'');var choiceC=pick(saved,['choiceC','answerC','c'])||(csvRow?csvRow.c:'');var selected=pick(saved,['selectedChoice','userAnswer','selectedAnswer','selected','answerText','userAnswerText','yourAnswer']);var correct=pick(saved,['correctChoice','correctAnswer','correct','correctText','rightAnswer','answer'])||(csvRow?csvRow.answer:'');var judgement=resultTextFromSaved(saved);var category1=pick(saved,['category1'])||(csvRow?csvRow.category1:'');var category2=pick(saved,['category2'])||(csvRow?csvRow.category2:'');var explanation=pick(saved,['explanation','commentary','kaisetsu','description','comment'])||(csvRow?csvRow.explanation:'');document.getElementById('q').textContent='問題：'+question;document.getElementById('choices').textContent='選択肢\nA：'+choiceA+'\nB：'+choiceB+'\nC：'+choiceC;document.getElementById('ans').textContent='判定：'+judgement+'\nあなたの回答：'+selected+'\n正解：'+correct+'\nカテゴリー：'+category1+' ＞ '+category2;document.getElementById('exp').textContent='解説：'+explanation;showDailyInfo(saved.dailyInfoSnapshot||null);document.getElementById('content').style.display='block';document.getElementById('status').style.display='none'}function loadCurrentUserData(user){return db.collection('users').doc(user.uid).get().then(function(snap){if(!snap.exists)throw new Error('users/'+user.uid+' が見つかりません。');return snap.data()||{}})}function loadResultByDocId(user){return db.collection('quizResults').doc(user.uid+'_'+targetDate).get().then(function(snap){if(!snap.exists)return null;var data=snap.data()||{};data.resultId=data.resultId||snap.id;return data})}function loadResultByDateKey(user,userData){var q=db.collection('quizResults').where('uid','==',user.uid).where('dateKey','==',targetDate).limit(1);if(userData&&userData.companyId)q=db.collection('quizResults').where('companyId','==',userData.companyId).where('uid','==',user.uid).where('dateKey','==',targetDate).limit(1);return q.get().then(function(qs){if(qs.empty)return null;var data=qs.docs[0].data()||{};data.resultId=data.resultId||qs.docs[0].id;return data})}function loadResultByDate(user,userData){var q=db.collection('quizResults').where('uid','==',user.uid).where('date','==',targetDate).limit(1);if(userData&&userData.companyId)q=db.collection('quizResults').where('companyId','==',userData.companyId).where('uid','==',user.uid).where('date','==',targetDate).limit(1);return q.get().then(function(qs){if(qs.empty)return null;var data=qs.docs[0].data()||{};data.resultId=data.resultId||qs.docs[0].id;return data})}function loadResult(user){if(!targetDate){setStatus('日付が指定されていません。','error');return}if(!canOpenDetail(targetDate)){setStatus(blockedMessage()+'\n\n対象日：'+targetDate,'error');return}setStatus('結果を読み込み中...\n対象日：'+targetDate);loadCurrentUserData(user).then(function(userData){return loadResultByDocId(user).then(function(saved){if(saved)return saved;return loadResultByDateKey(user,userData)}).then(function(saved){if(saved)return saved;return loadResultByDate(user,userData)})}).then(function(saved){if(!saved)throw new Error('この日の結果が見つかりませんでした。対象日：'+targetDate);loadQuestionRows(function(e,rows){show(saved,findQuestionInCsv(saved,rows))})}).catch(function(err){setStatus('結果の読み込みに失敗しました。\n'+err.message,'error')})}loadFirebase(function(e){if(e){setStatus(e.message,'error');return}requireLogin(function(user){loadResult(user)})});
</script>
</body>
