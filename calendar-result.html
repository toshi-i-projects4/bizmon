<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回答結果</title>
<style>
body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:#eef2f7;color:#111827;padding:24px;box-sizing:border-box}.page{max-width:760px;margin:30px auto}.header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}h1{margin:0;font-size:26px}.back-link,.top-link{color:#2563eb;text-decoration:none;font-weight:bold;font-size:14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:32px;box-sizing:border-box}.status{font-size:14px;color:#6b7280;white-space:pre-wrap;line-height:1.7}.date-text{color:#6b7280;font-size:14px;margin-bottom:18px}.box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:14px;line-height:1.7;white-space:pre-wrap;font-size:15px}.question-box{background:#eff6ff;border-left:4px solid #2563eb;font-size:18px;color:#1f2937}.choices-box{background:#fff;border-left:4px solid #2563eb;color:#1f2937}.answer-box{background:#f0fdf4;border-left:4px solid #22c55e;color:#166534;font-weight:bold}.explanation-box{background:#fff7ed;border-left:4px solid #f97316;color:#7c2d12}.bottom-link{margin-top:20px}@media(max-width:720px){body{padding:18px}.header{flex-direction:column;align-items:flex-start}.card{padding:24px}}
</style>
</head>
<body>
<div class="page">
  <div class="header"><h1>回答結果</h1><a class="back-link" href="index.html">← マイページへ戻る</a></div>
  <div class="card">
    <div id="dateText" class="date-text"></div>
    <div id="status" class="status">結果を読み込み中...</div>
    <div id="content" style="display:none;">
      <div id="questionBox" class="box question-box"></div>
      <div id="choicesBox" class="box choices-box"></div>
      <div id="answerBox" class="box answer-box"></div>
      <div id="explanationBox" class="box explanation-box"></div>
    </div>
    <div class="bottom-link"><a class="top-link" href="index.html">← マイページへ戻る</a></div>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";import{getFirestore,doc,getDoc,collection,query,where,getDocs,limit}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",projectId:"bizmon-31ffc"};
const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);
const params=new URLSearchParams(location.search);const targetDate=params.get("date")||"";
const statusEl=document.getElementById("status");const contentEl=document.getElementById("content");const dateTextEl=document.getElementById("dateText");
const questionBox=document.getElementById("questionBox");const choicesBox=document.getElementById("choicesBox");const answerBox=document.getElementById("answerBox");const explanationBox=document.getElementById("explanationBox");
function fmtDate(d){const p=String(d||"").split("-");return p.length===3?`${p[0]}年${Number(p[1])}月${Number(p[2])}日`:d}
function pick(data,keys){for(const k of keys){if(data&&data[k]!==undefined&&data[k]!==null&&String(data[k]).trim()!=="")return data[k]}return""}
function parseCsvLine(line){const result=[];let current="";let inQuotes=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(inQuotes&&line[i+1]==='"'){current+='"';i++}else{inQuotes=!inQuotes}}else if(ch===","&&!inQuotes){result.push(current);current=""}else{current+=ch}}result.push(current);return result}
async function loadQuestionCsv(dateKey){try{const res=await fetch("questions.csv?v="+Date.now(),{cache:"no-store"});if(!res.ok)return null;let text=await res.text();if(text.charCodeAt(0)===65279)text=text.slice(1);const lines=text.split(/\r?\n/).filter(l=>l.trim()!=="");if(lines.length<=1)return null;const header=parseCsvLine(lines[0]).map(v=>v.trim().replace(/^\uFEFF/,"").toLowerCase());const idx={date:header.indexOf("date"),question:header.indexOf("question"),a:header.indexOf("a"),b:header.indexOf("b"),c:header.indexOf("c"),answer:header.indexOf("answer"),explanation:header.indexOf("explanation")};if(idx.date<0)return null;const rows=lines.slice(1).map(parseCsvLine);const row=rows.find(cols=>String(cols[idx.date]||"").trim()===dateKey);if(!row)return null;return{question:idx.question>=0?row[idx.question]||"":"",a:idx.a>=0?row[idx.a]||"":"",b:idx.b>=0?row[idx.b]||"":"",c:idx.c>=0?row[idx.c]||"":"",answer:idx.answer>=0?row[idx.answer]||"":"",explanation:idx.explanation>=0?row[idx.explanation]||"":""}}catch(e){console.error(e);return null}}
function resultText(v){if(v==="correct")return"正解";if(v==="incorrect")return"不正解";return v||""}
function render(saved,csv){const question=pick(saved,["question","questionText","quizQuestion","title","text","q"])||(csv&&csv.question)||"";const selected=pick(saved,["userAnswer","selectedChoice","selectedAnswer","selected","answerText","userAnswerText","yourAnswer"]);const correct=pick(saved,["correctAnswer","correctChoice","correct","correctText","rightAnswer","answer"])||(csv&&csv.answer)||"";const result=resultText(pick(saved,["result","judgement","judge"]));const a=pick(saved,["choiceA","answerA","a"])||(csv&&csv.a)||"";const b=pick(saved,["choiceB","answerB","b"])||(csv&&csv.b)||"";const c=pick(saved,["choiceC","answerC","c"])||(csv&&csv.c)||"";const explanation=pick(saved,["explanation","commentary","kaisetsu","description","comment"])||(csv&&csv.explanation)||"";if(!question&&!a&&!b&&!c&&!correct&&!explanation){statusEl.textContent="この日の問題・解答データを取得できませんでした。対象日："+targetDate;return}questionBox.textContent="問題："+question;choicesBox.textContent="選択肢\nA："+a+"\nB："+b+"\nC："+c;let ans="";if(result)ans+="判定："+result+"\n";if(selected)ans+="あなたの回答："+selected+"\n";ans+="正解："+correct;answerBox.textContent=ans.trim();explanationBox.textContent="解説："+explanation;statusEl.style.display="none";contentEl.style.display=""}
async function load(user){if(!targetDate){statusEl.textContent="日付が指定されていません。カレンダーの○または×から開いてください。";return}dateTextEl.textContent=fmtDate(targetDate);try{statusEl.textContent="結果を読み込み中...";let data={};let snap=await getDoc(doc(db,"quizResults",user.uid+"_"+targetDate));if(snap.exists()){data=snap.data()}else{const q=query(collection(db,"quizResults"),where("uid","==",user.uid),where("date","==",targetDate),limit(1));const qs=await getDocs(q);if(!qs.empty)data=qs.docs[0].data()}const csv=await loadQuestionCsv(targetDate);if(!data&&!csv){statusEl.textContent="この日の結果が見つかりませんでした。対象日："+targetDate;return}render(data||{},csv||{})}catch(error){console.error(error);statusEl.textContent="結果の読み込みに失敗しました。Firestoreのルールを確認してください。\n"+String(error.message||error)}}
onAuthStateChanged(auth,function(user){if(!user){location.href="login.html";return}load(user)});
</script>
</body>
</html>
