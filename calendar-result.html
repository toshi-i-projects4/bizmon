
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回答結果</title>
<style>
body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:#fff;color:#111827;padding:28px;box-sizing:border-box}.page{max-width:900px;margin:0 auto}.header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}h1{margin:0;font-size:28px}.back-link{color:#2563eb;text-decoration:none;font-weight:bold;font-size:14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:28px;box-sizing:border-box;margin-bottom:18px}.status{font-size:14px;color:#6b7280;white-space:pre-wrap;line-height:1.7}.result-mark{font-size:54px;font-weight:bold;line-height:1;text-align:center;margin:10px 0}.result-mark.correct{color:#16a34a}.result-mark.incorrect{color:#dc2626}.result-title{text-align:center;font-size:22px;font-weight:bold;margin-bottom:20px}.detail-grid{display:grid;grid-template-columns:180px 1fr;gap:12px 16px;align-items:start}.label{font-weight:bold;color:#374151;font-size:14px}.value{font-size:15px;line-height:1.7;white-space:pre-wrap;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:12px}.raw{font-size:13px;color:#4b5563;white-space:pre-wrap;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:12px;overflow:auto}.empty-note{background:#fffbeb;border-left:4px solid #f59e0b;border-radius:10px;padding:14px 16px;color:#92400e;font-size:14px;line-height:1.7}.btn-row{display:flex;justify-content:center;gap:12px;margin-top:20px}.btn{display:inline-block;text-decoration:none;border-radius:12px;padding:12px 20px;font-size:15px;font-weight:bold}.btn.primary{background:#2563eb;color:white}.btn.secondary{background:#f3f4f6;color:#111827}@media(max-width:720px){body{padding:18px}.header{flex-direction:column;align-items:flex-start}.detail-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="page">
<div class="header"><h1>回答結果</h1><a class="back-link" href="index.html">← マイページへ戻る</a></div>
<div class="card"><div id="status" class="status">結果を読み込み中...</div><div id="content" style="display:none;"></div></div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";import{getFirestore,doc,getDoc,collection,query,where,getDocs,limit}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",projectId:"bizmon-31ffc"};
const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);const statusEl=document.getElementById("status");const contentEl=document.getElementById("content");const params=new URLSearchParams(location.search);const targetDate=params.get("date")||"";
function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]})}
function pick(data,keys){for(const key of keys){if(data&&data[key]!==undefined&&data[key]!==null&&String(data[key]).trim()!=="")return data[key]}return ""}
function formatResult(result){if(result==="correct")return {mark:"○",text:"正解",cls:"correct"};if(result==="incorrect")return {mark:"×",text:"不正解",cls:"incorrect"};return {mark:"•",text:"結果",cls:""}}
function render(data){const resultInfo=formatResult(data.result||"");const question=pick(data,["question","questionText","title","text"]);const userAnswer=pick(data,["userAnswer","selectedAnswer","selected","answerText","userAnswerText"]);const correctAnswer=pick(data,["correctAnswer","correct","correctText","rightAnswer"]);const explanation=pick(data,["explanation","commentary","kaisetsu","description"]);const savedAt=pick(data,["date","answeredDate"]);let html="";html+='<div class="result-mark '+resultInfo.cls+'">'+resultInfo.mark+'</div>';html+='<div class="result-title">'+esc(targetDate||savedAt)+' の結果：'+resultInfo.text+'</div>';html+='<div class="detail-grid">';html+='<div class="label">日付</div><div class="value">'+esc(targetDate||savedAt||"-")+'</div>';html+='<div class="label">結果</div><div class="value">'+esc(resultInfo.text)+'</div>';if(question)html+='<div class="label">問題</div><div class="value">'+esc(question)+'</div>';if(userAnswer)html+='<div class="label">あなたの回答</div><div class="value">'+esc(userAnswer)+'</div>';if(correctAnswer)html+='<div class="label">正解</div><div class="value">'+esc(correctAnswer)+'</div>';if(explanation)html+='<div class="label">解説</div><div class="value">'+esc(explanation)+'</div>';html+='</div>';if(!question&&!userAnswer&&!correctAnswer&&!explanation){html+='<div class="empty-note" style="margin-top:18px;">この日の正誤結果は保存されていますが、問題文・回答・解説などの詳細項目は保存されていません。今後、result.html側でこれらの項目を保存するようにすると、この画面に表示できます。</div>'}html+='<div class="btn-row"><a class="btn secondary" href="index.html">マイページへ戻る</a><a class="btn primary" href="question.html">本日のクイズへ</a></div>';html+='<details style="margin-top:18px;"><summary style="cursor:pointer;color:#6b7280;font-size:13px;">保存データを確認する</summary><pre class="raw">'+esc(JSON.stringify(data,null,2))+'</pre></details>';contentEl.innerHTML=html;contentEl.style.display="";statusEl.style.display="none"}
async function load(user){if(!targetDate){statusEl.textContent="日付が指定されていません。カレンダーの○または×から開いてください。";return}try{statusEl.textContent="結果を読み込み中...";let snap=await getDoc(doc(db,"quizResults",user.uid+"_"+targetDate));let data=null;if(snap.exists()){data=snap.data()}else{const q=query(collection(db,"quizResults"),where("uid","==",user.uid),where("date","==",targetDate),limit(1));const qs=await getDocs(q);if(!qs.empty)data=qs.docs[0].data()}if(!data){statusEl.textContent="この日の結果が見つかりませんでした。対象日："+targetDate;return}render(data)}catch(error){console.error(error);statusEl.textContent="結果の読み込みに失敗しました。Firestoreのルールを確認してください。\n"+String(error.message||error)}}
onAuthStateChanged(auth,function(user){if(!user){location.href="login.html";return}load(user)});
</script>
</body>
</html>
