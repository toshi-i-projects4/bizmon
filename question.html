function parseCsvLine(line){
  var out=[];
  var cur='';
  var q=false;

  for(var i=0;i<line.length;i++){
    var ch=line.charAt(i);
    if(ch==='"'){
      if(q && line.charAt(i+1)==='"'){
        cur+='"';
        i++;
      }else{
        q=!q;
      }
    }else if(ch===',' && !q){
      out.push(cur);
      cur='';
    }else{
      cur+=ch;
    }
  }

  out.push(cur);
  return out;
}

function todayKey(){
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function tomorrowKey(){
  var d=new Date();
  d.setDate(d.getDate()+1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function keyOf(c){
  return c.category1+'Ôľě'+c.category2;
}

function hash(str){
  var h=2166136261;
  for(var i=0;i<str.length;i++){
    h^=str.charCodeAt(i);
    h+=(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24);
  }
  return Math.abs(h>>>0);
}

function firstNonEmpty(){
  for(var i=0;i<arguments.length;i++){
    var v=arguments[i];
    if(v!==undefined && v!==null && String(v).trim()!==''){
      return String(v).trim();
    }
  }
  return '';
}

function loadQuestionRows(callback){
  var xhr=new XMLHttpRequest();
  xhr.open('GET','questions.csv?v='+new Date().getTime(),true);
  xhr.overrideMimeType('text/plain; charset=UTF-8');

  xhr.onreadystatechange=function(){
    if(xhr.readyState!==4)return;

    if(xhr.status!==200){
      callback(new Error('questions.csv„āíŚŹĖŚĺó„Āß„Āć„Āĺ„Āõ„āď„ÄāHTTP='+xhr.status));
      return;
    }

    try{
      var text=xhr.responseText||'';
      if(text.length>0 && text.charCodeAt(0)===65279){
        text=text.substring(1);
      }

      var lines=text.split(/\r?\n/).filter(function(l){
        return l.trim()!=='';
      });

      if(lines.length<=1){
        throw new Error('questions.csv„Āę„Éá„Éľ„āŅ„ĀĆ„Āā„āä„Āĺ„Āõ„āď„Äā');
      }

      var header=parseCsvLine(lines[0]).map(function(v){
        return v.trim().toLowerCase();
      });

      var idx={
        id:header.indexOf('id'),
        category1:header.indexOf('category1'),
        category2:header.indexOf('category2'),
        question:header.indexOf('question'),
        a:header.indexOf('a'),
        b:header.indexOf('b'),
        c:header.indexOf('c'),
        answer:header.indexOf('answer'),
        explanation:header.indexOf('explanation'),
        active:header.indexOf('active')
      };

      var req=['id','category1','category2','question','a','b','c','answer','explanation','active'];

      for(var r=0;r<req.length;r++){
        if(idx[req[r]]<0){
          throw new Error('questions.csv„Āę„ÄĆ'+req[r]+'„ÄćŚąó„ĀĆ„Āā„āä„Āĺ„Āõ„āď„Äā');
        }
      }

      var rows=[];

      for(var i=1;i<lines.length;i++){
        var cols=parseCsvLine(lines[i]);

        var obj={
          id:firstNonEmpty(cols[idx.id]),
          category1:firstNonEmpty(cols[idx.category1]),
          category2:firstNonEmpty(cols[idx.category2]),
          question:firstNonEmpty(cols[idx.question]),
          a:firstNonEmpty(cols[idx.a]),
          b:firstNonEmpty(cols[idx.b]),
          c:firstNonEmpty(cols[idx.c]),
          answer:firstNonEmpty(cols[idx.answer]).toUpperCase(),
          explanation:firstNonEmpty(cols[idx.explanation]),
          active:firstNonEmpty(cols[idx.active] || 'true').toLowerCase()
        };

        if(obj.active!=='false'){
          rows.push(obj);
        }
      }

      callback(null,rows);
    }catch(e){
      callback(e);
    }
  };

  xhr.onerror=function(){
    callback(new Error('questions.csv„ĀģťÄöšŅ°„ĀęŚ§Īśēó„Āó„Āĺ„Āó„Āü„Äā'));
  };

  xhr.send();
}

function categoriesFromRows(rows){
  var m={};

  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    if(r.category1 && r.category2){
      m[keyOf(r)]={category1:r.category1,category2:r.category2};
    }
  }

  var arr=[];
  for(var k in m){
    arr.push(m[k]);
  }

  arr.sort(function(a,b){
    return keyOf(a).localeCompare(keyOf(b),'ja');
  });

  return arr;
}

}

      'ÁĶźśěúÁĒĽťĚĘ„Āę„ĀĮÁßĽŚčē„Āó„Ā¶„ĀĄ„Āĺ„Āõ„āď„Äā\n\n' +
      'ÁĘļŤ™ć„Āó„Ā¶„ĀŹ„Ā†„Āē„ĀĄÔľö\n' +
      '1. Firestore „Āģ users/' + currentUser.uid + ' „ĀĆŚ≠ėŚú®„Āô„āč„Āč\n' +
      '2. users/' + currentUser.uid + ' „Āę companyId „ĀĆ„Āā„āč„Āč\n' +
      '3. quizResults „Āł„Āģśõł„ĀćŤĺľ„ĀŅś®©ťôź„ĀĆ„Āā„āč„Āč\n\n' +
      '„ā®„É©„ÉľŚÜÖŚģĻÔľö\n' + err.message,

function loadAndDisplayQuestion(){
  setStatus('STEP3Ôľöquestions.csv„āíŤ™≠„ĀŅŤĺľ„ĀŅšł≠...');

  loadQuestionRows(function(e,rows){
    if(e){
      setStatus('Ť™≠„ĀŅŤĺľ„ĀŅ„ĀęŚ§Īśēó„Āó„Āĺ„Āó„Āü„Äā\n'+e.message,'error');
      return;
    }

    var allCats=categoriesFromRows(rows);

    setStatus('STEP4ÔľöŚáļť°Ć„āę„ÉÜ„āī„É™„ÉľŤ®≠Śģö„āíÁĘļŤ™ćšł≠...');

    enabledCats(allCats,function(e,cats){
      if(e){
        setStatus('Śáļť°Ć„āę„ÉÜ„āī„É™„ÉľŤ®≠Śģö„ĀģÁĘļŤ™ć„ĀęŚ§Īśēó„Āó„Āĺ„Āó„Āü„Äā\n'+e.message,'error');
        return;
      }

      var set={};

      for(var i=0;i<cats.length;i++){
        set[keyOf(cats[i])]=true;
      }

      var candidates=[];

      for(var j=0;j<rows.length;j++){
        if(set[keyOf(rows[j])]){
          candidates.push(rows[j]);
        }
      }

      if(!candidates.length){
        setStatus('Śáļť°ĆŚĮĺŤĪ°„ĀģŚēŹť°Ć„ĀĆ„Āā„āä„Āĺ„Āõ„āď„ÄāŚáļť°Ć„āę„ÉÜ„āī„É™„ÉľŤ®≠Śģö„āíÁĘļŤ™ć„Āó„Ā¶„ĀŹ„Ā†„Āē„ĀĄ„Äā','error');
        return;
      }

      candidates.sort(function(a,b){
        return String(a.id).localeCompare(String(b.id),'ja');
      });

      var keys=Object.keys(set).sort().join('|');
      currentQuestion=candidates[hash(todayKey()+'|'+keys)%candidates.length];

      document.getElementById('categoryText').textContent=currentQuestion.category1+' Ôľě '+currentQuestion.category2;
      document.getElementById('questionText').textContent='ŚēŹť°ĆÔľö'+currentQuestion.question;

      document.getElementById('btnA').textContent='AÔľö'+currentQuestion.a;
      document.getElementById('btnB').textContent='BÔľö'+currentQuestion.b;
      document.getElementById('btnC').textContent='CÔľö'+currentQuestion.c;

      document.getElementById('btnA').onclick=function(){answer('A');};
      document.getElementById('btnB').onclick=function(){answer('B');};
      document.getElementById('btnC').onclick=function(){answer('C');};

      document.getElementById('quizArea').style.display='block';
      document.getElementById('answeredArea').style.display='none';

      setStatus('STEP5Ôľöśú¨śó•„ĀģŚēŹť°Ć„āíŤ°®Á§ļ„Āó„Āĺ„Āó„Āü„Äā','ok');
    });
  });
}

function start(){
  document.getElementById('todayText').textContent='śú¨śó•„Āģśó•šĽėÔľö'+todayKey();

  setStatus(
    'STEP2Ôľöśú¨śó•„ĀģŚõěÁ≠Ēśłą„ĀŅÁä∂ś≥Ā„āíÁĘļŤ™ćšł≠...\n' +
    'ÁĘļŤ™ćŚÖąÔľöquizResults / ' + currentUser.uid + '_' + todayKey()
  );

  checkTodayAlreadyAnswered(currentUser).then(function(info){
    if(info.answered){
      showAlreadyAnswered(info);
      return;
    }

    addStatus('STEP2-1Ôľöśú¨śó•„ĀĮśú™ŚõěÁ≠Ē„Āß„Āô„ÄāŚēŹť°Ć„āíŤ™≠„ĀŅŤĺľ„ĀŅ„Āĺ„Āô„Äā');
    loadAndDisplayQuestion();
  }).catch(function(err){
    setStatus(
      'śú¨śó•„ĀģŚõěÁ≠Ēśłą„ĀŅÁä∂ś≥Ā„ĀģÁĘļŤ™ć„ĀęŚ§Īśēó„Āó„Āĺ„Āó„Āü„Äā\n' +
      'Firestore „ĀģŤ™≠Ťĺľś®©ťôź„Āĺ„Āü„ĀĮťÄöšŅ°Áä∂śÖč„āíÁĘļŤ™ć„Āó„Ā¶„ĀŹ„Ā†„Āē„ĀĄ„Äā\n\n' +
      '„ā®„É©„ÉľŚÜÖŚģĻÔľö\n' + err.message,
      'error'
    );
  });
}

loadFirebase(function(e){

  requireLogin(function(){

});
