<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日の問題</title>
<style>
body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:#eef2f7;color:#111827;padding:24px;box-sizing:border-box}.wrap{max-width:900px;margin:30px auto;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:32px;box-sizing:border-box}.header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}h1{margin:0}.top-link,.bottom-link{color:#2563eb;text-decoration:none;font-weight:bold;font-size:14px}.bottom-link{display:inline-block;margin-top:20px}.status,.box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:14px;line-height:1.7;white-space:pre-wrap}.error{color:#dc2626}.ok{color:#166534}.warn{color:#92400e;background:#fffbeb;border-color:#fde68a}.sub{color:#6b7280;font-size:14px;margin:6px 0 20px}.question-box{background:#eff6ff;border-left:4px solid #2563eb;font-size:20px}.choices{display:grid;gap:12px}.choice-btn{width:100%;border:none;border-radius:10px;background:#2563eb;color:#fff;padding:14px 16px;font-size:16px;cursor:pointer;text-align:left}.choice-btn:disabled{opacity:.6;cursor:not-allowed}.answered-box{background:#f0fdf4;border:1px solid #bbf7d0;border-left:4px solid #22c55e;border-radius:12px;padding:18px;margin:16px 0;line-height:1.7;color:#166534}.answered-title{font-weight:bold;font-size:18px;margin-bottom:8px}.result-link{display:inline-block;margin-top:12px;background:#2563eb;color:#fff;text-decoration:none;border-radius:12px;padding:12px 18px;font-weight:bold}@media(max-width:640px){.header{flex-direction:column;align-items:flex-start}.wrap{padding:24px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header"><h1>今日の問題</h1><a class="top-link" href="index.html">← マイページへ戻る</a></div>
  <div id="todayText" class="sub"></div>
  <div id="status" class="status">HTML読込完了。JavaScript起動待ち...</div>
  <div id="answeredArea" class="answered-box" style="display:none"><div class="answered-title">本日は回答済みです</div><div id="answeredText"></div><a class="result-link" href="result.html">結果を確認する</a></div>
  <div id="quizArea" style="display:none"><div id="categoryText" class="sub"></div><div id="questionText" class="question-box box"></div><div class="choices"><button id="btnA" class="choice-btn" type="button"></button><button id="btnB" class="choice-btn" type="button"></button><button id="btnC" class="choice-btn" type="button"></button></div></div>
  <a class="bottom-link" href="index.html">← マイページへ戻る</a>
</div>
<script>
var firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",projectId:"bizmon-31ffc"};
var auth=null,db=null,currentUser=null,currentUserData=null,currentQuestion=null,isSavingAnswer=false;
function setStatus(msg,type){var el=document.getElementById('status');if(!el)return;el.textContent=msg;el.className='status '+(type||'')}
function addStatus(msg){var el=document.getElementById('status');if(!el)return;el.textContent=(el.textContent?el.textContent+'\n':'')+msg}
function setChoiceButtonsDisabled(disabled){['btnA','btnB','btnC'].forEach(function(id){var b=document.getElementById(id);if(b)b.disabled=disabled})}
function loadScript(src,label,callback){var s=document.createElement('script'),done=false;var timer=setTimeout(function(){if(done)return;done=true;callback(new Error(label+' の読込がタイムアウトしました。'))},15000);s.onload=function(){if(done)return;done=true;clearTimeout(timer);callback(null)};s.onerror=function(){if(done)return;done=true;clearTimeout(timer);callback(new Error(label+' の読込に失敗しました。'))};s.src=src.indexOf('http')===0?src:(src+'?v='+Date.now());document.head.appendChild(s)}
function loadFirebase(callback){setStatus('Firebase SDKを読み込み中...');loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js','firebase-app-compat',function(e){if(e)return callback(e);loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js','firebase-auth-compat',function(e){if(e)return callback(e);loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js','firebase-firestore-compat',function(e){if(e)return callback(e);try{if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);auth=firebase.auth();db=firebase.firestore();callback(null)}catch(err){callback(err)}})})})}
function firstNonEmpty(){for(var i=0;i<arguments.length;i++){var v=arguments[i];if(v!==undefined&&v!==null&&String(v).trim()!=='')return String(v).trim()}return''}
function todayKey(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function getResultId(user,dateKey){return user.uid+'_'+dateKey}
function requireLogin(callback){auth.onAuthStateChanged(function(user){if(!user){location.href='login.html';return}currentUser=user;callback(user)})}
function saveLocalResult(r){try{localStorage.setItem('currentQuizResult',JSON.stringify(r))}catch(e){console.warn(e)}}
function parseCsvLine(line){var out=[],cur='',q=false;for(var i=0;i<line.length;i++){var ch=line.charAt(i);if(ch==='"'){if(q&&line.charAt(i+1)==='"'){cur+='"';i++}else q=!q}else if(ch===','&&!q){out.push(cur);cur=''}else cur+=ch}out.push(cur);return out}
function category1Of(c){if(typeof c==='string')return c.trim();return firstNonEmpty(c.category1,c.name,c.value,c.label)}
function loadCurrentUserData(){return db.collection('users').doc(currentUser.uid).get().then(function(s){if(!s.exists)throw new Error('users/'+currentUser.uid+' が見つかりません。');currentUserData=s.data()||{};if(!currentUserData.companyId)throw new Error('users/'+currentUser.uid+' に companyId がありません。');return currentUserData})}
function normalizeAssignmentToQuestion(d){return{id:firstNonEmpty(d.questionId,d.id),category1:firstNonEmpty(d.category1),category2:firstNonEmpty(d.category2),question:firstNonEmpty(d.question,d.questionText),a:firstNonEmpty(d.choiceA,d.answerA,d.a),b:firstNonEmpty(d.choiceB,d.answerB,d.b),c:firstNonEmpty(d.choiceC,d.answerC,d.c),answer:firstNonEmpty(d.correctAnswer,d.correctChoice,d.answer).toUpperCase(),explanation:firstNonEmpty(d.explanation,d.commentary,d.kaisetsu),source:'dailyQuizAssignments'}}
function loadTodayAssignment(){var dateKey=todayKey();var companyId=currentUserData&&currentUserData.companyId;if(!companyId)return Promise.resolve(null);var docId=companyId+'_'+dateKey;return db.collection('dailyQuizAssignments').doc(docId).get().then(function(s){if(!s.exists)return null;var d=s.data()||{};if(d.companyId!==companyId)return null;return normalizeAssignmentToQuestion(d)}).catch(function(e){console.warn('dailyQuizAssignments 読み込み失敗。従来ロジックへフォールバックします。',e);return null})}
function loadQuestionRows(callback){var xhr=new XMLHttpRequest();xhr.open('GET','questions.csv?v='+Date.now(),true);xhr.overrideMimeType('text/plain; charset=UTF-8');xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status!==200){callback(new Error('questions.csvを取得できません。HTTP='+xhr.status));return}try{var text=xhr.responseText||'';if(text.length>0&&text.charCodeAt(0)===65279)text=text.substring(1);var lines=text.split(/\r?\n/).filter(function(l){return l.trim()!==''});if(lines.length<=1)throw new Error('questions.csvにデータがありません。');var header=parseCsvLine(lines[0]).map(function(v){return v.trim().toLowerCase()});var idx={id:header.indexOf('id'),category1:header.indexOf('category1'),category2:header.indexOf('category2'),question:header.indexOf('question'),a:header.indexOf('a'),b:header.indexOf('b'),c:header.indexOf('c'),answer:header.indexOf('answer'),explanation:header.indexOf('explanation'),active:header.indexOf('active')};var req=['id','category1','category2','question','a','b','c','answer','explanation','active'];for(var r=0;r<req.length;r++){if(idx[req[r]]<0)throw new Error('questions.csvに「'+req[r]+'」列がありません。')}var rows=[];for(var i=1;i<lines.length;i++){var cols=parseCsvLine(lines[i]);var obj={id:firstNonEmpty(cols[idx.id]),category1:firstNonEmpty(cols[idx.category1]),category2:firstNonEmpty(cols[idx.category2]),question:firstNonEmpty(cols[idx.question]),a:firstNonEmpty(cols[idx.a]),b:firstNonEmpty(cols[idx.b]),c:firstNonEmpty(cols[idx.c]),answer:firstNonEmpty(cols[idx.answer]).toUpperCase(),explanation:firstNonEmpty(cols[idx.explanation]),active:firstNonEmpty(cols[idx.active]||'true').toLowerCase()};if(obj.active!=='false')rows.push(obj)}callback(null,rows)}catch(e){callback(e)}};xhr.onerror=function(){callback(new Error('questions.csvの通信に失敗しました。'))};xhr.send()}
function categoriesFromRows(rows){var m={};for(var i=0;i<rows.length;i++){var c=firstNonEmpty(rows[i].category1);if(c)m[c]=true}var arr=[];for(var k in m)arr.push(k);arr.sort(function(a,b){return a.localeCompare(b,'ja')});return arr}
function enabledCats(allCategory1List,callback){function normalizeSetting(d){d=d||{};var configured=[];if(d.nextApplyDate&&d.nextCategories&&todayKey()>=d.nextApplyDate){configured=d.nextCategories}else if(d.activeCategories&&d.activeCategories.length){configured=d.activeCategories}else{configured=allCategory1List}var category1List=[];for(var i=0;i<configured.length;i++){var c=category1Of(configured[i]);if(c&&category1List.indexOf(c)<0)category1List.push(c)}return category1List.length?category1List:allCategory1List}function loadLegacy(){return db.collection('companySettings').doc('quiz').get().then(function(s){if(!s.exists)return allCategory1List;return normalizeSetting(s.data()||{})})}db.collection('companyQuizSettings').doc(currentUserData.companyId).get().then(function(settingDoc){if(settingDoc.exists)return normalizeSetting(settingDoc.data()||{});return loadLegacy()}).then(function(list){callback(null,list)}).catch(function(e){console.warn('会社別カテゴリー設定取得エラー。全カテゴリーで続行します。',e);callback(null,allCategory1List)})}
function displayQuestion(q,sourceLabel){currentQuestion=q;document.getElementById('categoryText').textContent=q.category1+' ＞ '+q.category2;document.getElementById('questionText').textContent='問題：'+q.question;document.getElementById('btnA').textContent='A：'+q.a;document.getElementById('btnB').textContent='B：'+q.b;document.getElementById('btnC').textContent='C：'+q.c;document.getElementById('btnA').onclick=function(){answer('A')};document.getElementById('btnB').onclick=function(){answer('B')};document.getElementById('btnC').onclick=function(){answer('C')};document.getElementById('quizArea').style.display='block';document.getElementById('answeredArea').style.display='none';setStatus('本日の問題を表示しました。\n出題元：'+sourceLabel,'ok')}
function loadAndDisplayQuestionFallback(){setStatus('dailyQuizAssignments が未作成のため、従来ロジックで問題を読み込み中...','warn');loadQuestionRows(function(e,rows){if(e){setStatus('読み込みに失敗しました。\n'+e.message,'error');return}var allCategory1=categoriesFromRows(rows);enabledCats(allCategory1,function(e,enabledCategory1){if(e){setStatus('出題カテゴリー設定の確認に失敗しました。\n'+e.message,'error');return}var set={};for(var i=0;i<enabledCategory1.length;i++){var c=category1Of(enabledCategory1[i]);if(c)set[c]=true}var candidates=[];for(var j=0;j<rows.length;j++){if(set[firstNonEmpty(rows[j].category1)])candidates.push(rows[j])}if(!candidates.length){setStatus('出題対象の問題がありません。出題カテゴリー設定を確認してください。\n有効カテゴリー：'+enabledCategory1.join('、'),'error');return}function sortVal(q){var s=String(q&&q.id!=null?q.id:''),n=Number(s);if(!isNaN(n))return n;var m=s.match(/\d+/);return m?parseInt(m[0],10):Number.MAX_SAFE_INTEGER}function daysFromStart(dateKey){var parts=String(dateKey||'').split('-');var d=new Date(Number(parts[0]),Number(parts[1])-1,Number(parts[2]));var start=new Date(2026,5,20);var diff=Math.floor((d.getTime()-start.getTime())/86400000);return diff<0?0:diff}candidates.sort(function(a,b){var na=sortVal(a),nb=sortVal(b);if(na!==nb)return na-nb;return String(a.id).localeCompare(String(b.id),'ja')});var quizIndex=daysFromStart(todayKey())%candidates.length;displayQuestion(candidates[quizIndex],'従来ロジック（dailyQuizAssignments未作成時の保険）')})})}
function loadAndDisplayQuestion(){setStatus('本日の出題スナップショットを確認中...');loadTodayAssignment().then(function(q){if(q){displayQuestion(q,'dailyQuizAssignments');return}loadAndDisplayQuestionFallback()}).catch(function(e){console.warn(e);loadAndDisplayQuestionFallback()})}
function makeResultData(choice){var correct=String(currentQuestion.answer||'').trim().toUpperCase();var selected=String(choice||'').trim().toUpperCase();var isCorrect=selected===correct;var dateKey=todayKey();return{date:dateKey,dateKey:dateKey,questionId:currentQuestion.id,questionText:currentQuestion.question,question:currentQuestion.question,category1:currentQuestion.category1,category2:currentQuestion.category2,choiceA:currentQuestion.a,choiceB:currentQuestion.b,choiceC:currentQuestion.c,selectedChoice:selected,selectedAnswer:selected,userAnswer:selected,correctChoice:correct,correctAnswer:correct,isCorrect:isCorrect,result:isCorrect?'correct':'incorrect',resultText:isCorrect?'正解':'不正解',explanation:currentQuestion.explanation}}
function buildQuizResultSaveData(user,userData,resultData){var resultId=user.uid+'_'+resultData.dateKey;return{resultId:resultId,uid:user.uid,email:user.email||userData.email||'',companyId:userData.companyId||'',companyName:userData.companyName||'',name:userData.name||'',employeeCode:userData.employeeCode||'',department:userData.department||'',position:userData.position||'',role:userData.role||'user',date:resultData.date,dateKey:resultData.dateKey,questionId:resultData.questionId,questionText:resultData.questionText,question:resultData.question,category1:resultData.category1,category2:resultData.category2,choiceA:resultData.choiceA,choiceB:resultData.choiceB,choiceC:resultData.choiceC,selectedChoice:resultData.selectedChoice,selectedAnswer:resultData.selectedAnswer,userAnswer:resultData.userAnswer,correctChoice:resultData.correctChoice,correctAnswer:resultData.correctAnswer,isCorrect:resultData.isCorrect,result:resultData.result,resultText:resultData.resultText,explanation:resultData.explanation,savedFrom:'question.html',savedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()}}
function saveQuizResultBeforeResultPage(user,resultData){var resultId=user.uid+'_'+resultData.dateKey;var saveData=buildQuizResultSaveData(user,currentUserData||{},resultData);return db.collection('quizResults').doc(resultId).set(saveData,{merge:true}).then(function(){return{resultId:resultId,companyId:currentUserData.companyId,employeeCode:currentUserData.employeeCode||'',savedData:saveData}})}
function checkTodayAlreadyAnswered(user){var dateKey=todayKey(),resultId=getResultId(user,dateKey);return db.collection('quizResults').doc(resultId).get().then(function(doc){if(!doc.exists)return{answered:false,resultId:resultId};var data=doc.data()||{};data.resultId=data.resultId||resultId;data.dateKey=data.dateKey||data.date||dateKey;data.date=data.date||data.dateKey||dateKey;return{answered:true,resultId:resultId,data:data}})}
function showAlreadyAnswered(info){var data=info.data||{};var answeredArea=document.getElementById('answeredArea'),answeredText=document.getElementById('answeredText'),quizArea=document.getElementById('quizArea');if(quizArea)quizArea.style.display='none';saveLocalResult(data);var resultText=firstNonEmpty(data.resultText,data.result==='correct'?'正解':'',data.result==='incorrect'?'不正解':'');var selected=firstNonEmpty(data.selectedChoice,data.selectedAnswer,data.userAnswer,'未取得');var correct=firstNonEmpty(data.correctChoice,data.correctAnswer,'未取得');var category='';if(firstNonEmpty(data.category1)||firstNonEmpty(data.category2))category='\nカテゴリー：'+firstNonEmpty(data.category1)+' ＞ '+firstNonEmpty(data.category2);answeredText.textContent='回答日：'+firstNonEmpty(data.dateKey,data.date,todayKey())+'\n判定：'+firstNonEmpty(resultText,'取得済み')+'\nあなたの回答：'+selected+'\n正解：'+correct+category+'\n\n結果を確認する場合は、下のボタンを押してください。';answeredArea.style.display='block';setStatus('本日は既に回答済みです。\n保存先：quizResults / '+info.resultId+'\n再回答はできません。','ok')}
function answer(choice){if(isSavingAnswer)return;if(!currentUser){setStatus('ログイン情報を確認できません。再ログインしてください。','error');return}if(!currentQuestion){setStatus('問題情報を確認できません。画面を再読み込みしてください。','error');return}isSavingAnswer=true;setChoiceButtonsDisabled(true);var resultData=makeResultData(choice);saveLocalResult(resultData);setStatus('回答結果を保存中...\n保存予定ID：'+currentUser.uid+'_'+resultData.dateKey);saveQuizResultBeforeResultPage(currentUser,resultData).then(function(info){setStatus('回答結果を保存しました。結果画面へ移動します。\n保存先：quizResults / '+info.resultId,'ok');setTimeout(function(){location.href='result.html'},350)}).catch(function(err){console.error(err);isSavingAnswer=false;setChoiceButtonsDisabled(false);setStatus('回答結果の保存に失敗しました。\n結果画面には移動していません。\n\nエラー内容：\n'+err.message,'error')})}
function start(){document.getElementById('todayText').textContent='本日の日付：'+todayKey();setStatus('ユーザー情報を確認中...');loadCurrentUserData().then(function(){setStatus('本日の回答済み状況を確認中...\n確認先：quizResults / '+currentUser.uid+'_'+todayKey());return checkTodayAlreadyAnswered(currentUser)}).then(function(info){if(info.answered){showAlreadyAnswered(info);return}loadAndDisplayQuestion()}).catch(function(err){console.error(err);setStatus('読み込みに失敗しました。\n'+err.message,'error')})}
loadFirebase(function(e){if(e){setStatus(e.message,'error');return}requireLogin(function(){start()})});
</script>
</body>
</html>
