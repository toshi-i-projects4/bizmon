<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>今日の問題</title><style>
body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:#eef2f7;color:#111827;padding:24px;box-sizing:border-box}.wrap{max-width:900px;margin:30px auto;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:32px;box-sizing:border-box}.header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}h1{margin:0;color:#111827}.top-link,.bottom-link{display:inline-block;color:#2563eb;text-decoration:none;font-size:14px;font-weight:bold;white-space:nowrap}.bottom-link{margin-top:20px}.sub{color:#6b7280;font-size:14px;margin:6px 0 20px}.box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:14px;line-height:1.7;white-space:pre-wrap}.question-box{background:#eff6ff;border-left:4px solid #2563eb;font-size:20px;color:#1f2937}.choices{display:grid;gap:12px}.choice-btn{width:100%;border:none;border-radius:10px;background:#2563eb;color:#fff;padding:14px 16px;font-size:16px;cursor:pointer;text-align:left}.choice-btn:hover{background:#1d4ed8}.status{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:14px;color:#374151;white-space:pre-wrap;line-height:1.7}.ok{color:#166534}.error{color:#dc2626}.note{color:#374151}.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px;margin-bottom:16px}.section-title{font-size:18px;font-weight:bold;margin:0 0 12px}.cat-group{border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-bottom:12px;background:#fff}.cat-parent{font-weight:bold;color:#111827;margin-bottom:10px}.cat-children{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px}.cat-item{display:flex;gap:8px;align-items:center;background:#f9fafb;border:1px solid #e5e7eb;border-radius:999px;padding:8px 10px;font-size:14px}.btn-row{display:flex;justify-content:flex-end;gap:12px;flex-wrap:wrap;margin-top:18px}.primary-btn,.secondary-btn{border:none;border-radius:12px;padding:12px 22px;font-size:15px;font-weight:bold;cursor:pointer}.primary-btn{background:#2563eb;color:#fff}.secondary-btn{background:#f3f4f6;color:#111827}.info-box{background:#eff6ff;border-left:4px solid #2563eb;border-radius:10px;padding:14px 16px;color:#1e3a8a;font-size:14px;line-height:1.7;margin-bottom:18px}.warning-box{background:#fffbeb;border-left:4px solid #f59e0b;border-radius:10px;padding:14px 16px;color:#92400e;font-size:14px;line-height:1.7;margin-top:12px}@media(max-width:640px){.header{flex-direction:column;align-items:flex-start}.wrap{padding:24px}.btn-row{flex-direction:column}.primary-btn,.secondary-btn{width:100%}}
</style></head>
<body><div class="wrap"><div class="header"><h1>今日の問題</h1><a class="top-link" href="index.html">← マイページへ戻る</a></div><div id="todayText" class="sub"></div><div id="status" class="status">読み込み中...</div><div id="quizArea" style="display:none;"><div id="categoryText" class="sub"></div><div id="questionText" class="question-box box"></div><div class="choices"><button id="btnA" class="choice-btn" type="button"></button><button id="btnB" class="choice-btn" type="button"></button><button id="btnC" class="choice-btn" type="button"></button></div></div><a href="index.html" class="bottom-link">← マイページへ戻る</a></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",
  authDomain: "bizmon-31ffc.firebaseapp.com",
  projectId: "bizmon-31ffc"
};

const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);let currentQuestion=null;
function parseCsvLine(line){const out=[];let cur='';let q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++}else q=!q}else if(ch===','&&!q){out.push(cur);cur=''}else cur+=ch}out.push(cur);return out}
function today(){const d=new Date();return {display:d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日',key:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}}
function keyOf(c){return c.category1+'＞'+c.category2}
function hash(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h+= (h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24)}return Math.abs(h>>>0)}
async function loadSettings(allCats){const snap=await getDoc(doc(db,'companySettings','quiz'));if(!snap.exists())return allCats;const s=snap.data();const t=today().key;if(s.nextApplyDate&&s.nextCategories&&t>=s.nextApplyDate)return s.nextCategories;return s.activeCategories&&s.activeCategories.length?s.activeCategories:allCats}
async function loadQuestions(){const res=await fetch('questions.csv?v='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('questions.csvが見つかりません。');let text=await res.text();if(text.charCodeAt(0)===65279)text=text.slice(1);const lines=text.split(/?
/).filter(l=>l.trim()!=='');const header=parseCsvLine(lines[0]).map(v=>v.trim().toLowerCase());const idx={id:header.indexOf('id'),category1:header.indexOf('category1'),category2:header.indexOf('category2'),question:header.indexOf('question'),a:header.indexOf('a'),b:header.indexOf('b'),c:header.indexOf('c'),answer:header.indexOf('answer'),explanation:header.indexOf('explanation'),active:header.indexOf('active')};if(Object.values(idx).some(v=>v<0))throw new Error('CSVの見出しは id,category1,category2,question,a,b,c,answer,explanation,active が必要です。');return lines.slice(1).map(parseCsvLine).map(cols=>({id:cols[idx.id],category1:cols[idx.category1],category2:cols[idx.category2],question:cols[idx.question],a:cols[idx.a],b:cols[idx.b],c:cols[idx.c],answer:String(cols[idx.answer]||'').trim(),explanation:cols[idx.explanation],active:String(cols[idx.active]||'true').toLowerCase()})).filter(q=>q.active!=='false');}
function answer(choice){const correct=currentQuestion.answer;const result=choice===correct?'correct':'incorrect';const resultText=choice===correct?'正解':'不正解';const payload={date:today().key,questionId:currentQuestion.id,category1:currentQuestion.category1,category2:currentQuestion.category2,questionText:currentQuestion.question,choiceA:currentQuestion.a,choiceB:currentQuestion.b,choiceC:currentQuestion.c,selectedChoice:choice,correctChoice:correct,result:result,resultText:resultText,explanation:currentQuestion.explanation};localStorage.setItem('currentQuizResult',JSON.stringify(payload));location.href='result.html';}
async function start(){const t=today();document.getElementById('todayText').textContent='本日の日付：'+t.display;const questions=await loadQuestions();const allMap=new Map();questions.forEach(q=>allMap.set(keyOf(q),{category1:q.category1,category2:q.category2}));const enabled=await loadSettings(Array.from(allMap.values()));const enabledSet=new Set(enabled.map(keyOf));const candidates=questions.filter(q=>enabledSet.has(keyOf(q)));if(candidates.length===0)throw new Error('出題対象カテゴリーに該当する問題がありません。');candidates.sort((a,b)=>String(a.id).localeCompare(String(b.id),'ja'));const seed=t.key+'|'+Array.from(enabledSet).sort().join('|');currentQuestion=candidates[hash(seed)%candidates.length];document.getElementById('categoryText').textContent=currentQuestion.category1+' ＞ '+currentQuestion.category2;document.getElementById('questionText').textContent='問題：'+currentQuestion.question;document.getElementById('btnA').textContent='A：'+currentQuestion.a;document.getElementById('btnB').textContent='B：'+currentQuestion.b;document.getElementById('btnC').textContent='C：'+currentQuestion.c;document.getElementById('btnA').onclick=()=>answer('A');document.getElementById('btnB').onclick=()=>answer('B');document.getElementById('btnC').onclick=()=>answer('C');document.getElementById('status').textContent='';document.getElementById('quizArea').style.display='block';}
onAuthStateChanged(auth,user=>{if(!user){location.href='login.html';return}start().catch(e=>{console.error(e);document.getElementById('status').textContent='読み込みに失敗しました。
'+e.message;document.getElementById('status').className='status error';})});
</script></body></html>
