<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>回答レポート</title>
<style>
body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:#eef2f7;color:#111827;padding:24px;box-sizing:border-box}.wrap{max-width:1280px;margin:30px auto;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:28px;box-sizing:border-box}.header{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px}h1{margin:0;font-size:26px}.top-link,.bottom-link{color:#2563eb;text-decoration:none;font-weight:bold;font-size:14px}.bottom-link{display:inline-block;margin-top:22px}.status{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:16px;line-height:1.7;white-space:pre-wrap}.ok{color:#166534}.error{color:#dc2626}.info-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}.info-card{background:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;padding:12px 14px}.info-label{font-size:12px;color:#6b7280;margin-bottom:4px}.info-value{font-size:18px;font-weight:bold}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}.tab-btn{border:1px solid #d1d5db;border-radius:999px;padding:10px 18px;font-weight:bold;cursor:pointer;background:#f3f4f6;color:#374151}.tab-btn.active{background:#2563eb;color:#fff;border-color:#2563eb}.filter-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:14px;padding:16px;margin:16px 0}.filter-title{font-weight:bold;margin-bottom:12px;color:#374151}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;align-items:end}.control-item label{display:block;font-size:12px;color:#6b7280;font-weight:bold;margin-bottom:5px}input,select{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:10px;padding:10px 12px;font-size:14px;background:#fff}.btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.btn{border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:bold;cursor:pointer;background:#2563eb;color:#fff;min-height:40px}.btn.secondary{background:#f3f4f6;color:#111827;border:1px solid #d1d5db}.table-wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:12px;margin-top:14px}table{width:100%;border-collapse:collapse;min-width:1080px;background:#fff}th,td{border-bottom:1px solid #e5e7eb;padding:10px 12px;text-align:left;vertical-align:top;font-size:14px;white-space:nowrap}th{background:#f3f4f6;font-weight:bold;color:#374151;position:sticky;top:0;z-index:1}tr:hover td{background:#f9fafb}.question-cell{white-space:normal;min-width:280px;max-width:440px;line-height:1.5}.badge{display:inline-block;border-radius:999px;padding:4px 10px;font-weight:bold;font-size:13px}.badge.ok{background:#dcfce7;color:#166534}.badge.ng{background:#fee2e2;color:#991b1b}.badge.warn{background:#fef3c7;color:#92400e}.empty{text-align:center;padding:28px;color:#6b7280}.note{font-size:12px;color:#6b7280;margin-top:10px;line-height:1.6}.hidden{display:none!important}@media(max-width:640px){body{padding:14px}.wrap{padding:20px;margin:12px auto}h1{font-size:22px}.btn-row{display:grid}.btn{width:100%}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header"><h1>回答レポート</h1><a class="top-link" href="index.html">← マイページへ戻る</a></div>
  <div id="status" class="status">レポートを読み込み中...</div>

  <div class="info-row" id="summary" style="display:none;">
    <div class="info-card"><div class="info-label">企業</div><div class="info-value" id="companyName">-</div></div>
    <div class="info-card"><div class="info-label" id="countLabel">表示件数</div><div class="info-value" id="totalCount">0</div></div>
    <div class="info-card"><div class="info-label" id="subCountLabel">正解数</div><div class="info-value" id="correctCount">0</div></div>
    <div class="info-card"><div class="info-label" id="rateLabel">正解率</div><div class="info-value" id="correctRate">0%</div></div>
  </div>

  <div class="tabs" id="tabs" style="display:none;">
    <button class="tab-btn active" id="answeredTab" type="button">回答結果一覧</button>
    <button class="tab-btn" id="unansweredTab" type="button">未回答者一覧</button>
  </div>

  <section id="answeredSection">
    <div class="filter-box" id="answeredFilterBox" style="display:none;">
      <div class="filter-title">回答結果の絞り込み条件</div>
      <div class="controls">
        <div class="control-item"><label for="startDate">開始日</label><input id="startDate" type="date"></div>
        <div class="control-item"><label for="endDate">終了日</label><input id="endDate" type="date"></div>
        <div class="control-item"><label for="departmentFilter">部署</label><select id="departmentFilter"><option value="all">すべて</option></select></div>
        <div class="control-item"><label for="positionFilter">役職</label><select id="positionFilter"><option value="all">すべて</option></select></div>
        <div class="control-item"><label for="resultFilter">判定</label><select id="resultFilter"><option value="all">すべて</option><option value="correct">正解のみ</option><option value="incorrect">不正解のみ</option></select></div>
        <div class="control-item"><label for="searchInput">検索</label><input id="searchInput" type="text" placeholder="社員コード・氏名・問題で検索"></div>
        <div class="control-item"><label>&nbsp;</label><div class="btn-row"><button class="btn" id="applyBtn" type="button">表示更新</button><button class="btn secondary" id="clearBtn" type="button">条件クリア</button><button class="btn secondary" id="reloadBtn" type="button">再読み込み</button><button class="btn" id="csvBtn" type="button">CSVダウンロード</button></div></div>
      </div>
    </div>
    <div class="table-wrap" id="answeredTableWrap" style="display:none;">
      <table><thead><tr><th>回答日</th><th>社員コード</th><th>氏名</th><th>部署</th><th>役職</th><th>カテゴリー</th><th>問題</th><th>回答</th><th>正解</th><th>判定</th></tr></thead><tbody id="resultBody"></tbody></table>
    </div>
  </section>

  <section id="unansweredSection" class="hidden">
    <div class="filter-box" id="unansweredFilterBox">
      <div class="filter-title">未回答者の絞り込み条件</div>
      <div class="controls">
        <div class="control-item"><label for="targetDate">対象日</label><input id="targetDate" type="date"></div>
        <div class="control-item"><label for="unansweredDepartmentFilter">部署</label><select id="unansweredDepartmentFilter"><option value="all">すべて</option></select></div>
        <div class="control-item"><label for="unansweredPositionFilter">役職</label><select id="unansweredPositionFilter"><option value="all">すべて</option></select></div>
        <div class="control-item"><label for="unansweredSearchInput">検索</label><input id="unansweredSearchInput" type="text" placeholder="社員コード・氏名・メールで検索"></div>
        <div class="control-item"><label>&nbsp;</label><div class="btn-row"><button class="btn" id="unansweredApplyBtn" type="button">表示更新</button><button class="btn secondary" id="unansweredClearBtn" type="button">条件クリア</button><button class="btn secondary" id="unansweredReloadBtn" type="button">再読み込み</button><button class="btn" id="unansweredCsvBtn" type="button">CSVダウンロード</button></div></div>
      </div>
      <div class="note">※対象日の quizResults に回答が存在しない active ユーザーを未回答者として表示します。</div>
    </div>
    <div class="table-wrap" id="unansweredTableWrap">
      <table><thead><tr><th>対象日</th><th>社員コード</th><th>氏名</th><th>メール</th><th>部署</th><th>役職</th><th>権限</th><th>状態</th></tr></thead><tbody id="unansweredBody"></tbody></table>
    </div>
  </section>

  <a class="bottom-link" href="index.html">← マイページへ戻る</a>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,query,where,getDocs,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",projectId:"bizmon-31ffc"};
const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);
let currentUserData=null, allResults=[], filteredResults=[], allUsers=[], filteredUnanswered=[], currentMode='answered';
const $=id=>document.getElementById(id);
function setStatus(msg,type){const el=$('status');el.textContent=msg;el.className='status '+(type||'');}
function escapeHtml(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function formatDateValue(value,fallback){if(value&&typeof value.toDate==='function'){const d=value.toDate();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}return fallback||'';}
function toDateKeyFromTimestamp(value,fallback){if(value&&typeof value.toDate==='function'){const d=value.toDate();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}return fallback||'';}
function firstNonEmpty(){for(let i=0;i<arguments.length;i++){const v=arguments[i];if(v!==undefined&&v!==null&&String(v).trim()!=='')return String(v).trim();}return '';}
function normalizeChoice(v){return firstNonEmpty(v).toUpperCase();}
function judgeCorrect(d){
  d=d||{};
  if(d.isCorrect===true)return true;
  if(d.isCorrect===false)return false;

  const result=String(firstNonEmpty(d.result,d.resultText,d.judgement,d.judge)).toLowerCase();
  if(result.includes('incorrect')||result.includes('wrong')||result.includes('不正解')||result.includes('×'))return false;
  if(result.includes('correct')||result.includes('正解')||result.includes('○'))return true;

  const selected=normalizeChoice(d.selectedChoice||d.selectedAnswer||d.userAnswer||d.selected||d.answerText||d.userAnswerText||d.yourAnswer);
  const correct=normalizeChoice(d.correctChoice||d.correctAnswer||d.correct||d.rightAnswer);
  return !!(selected&&correct&&selected===correct);
}
function resultTextOf(d){return judgeCorrect(d)?'正解':'不正解';}
function normalizeResult(ds){
  const d=ds.data()||{};
  const dateKey=firstNonEmpty(d.dateKey,d.date,toDateKeyFromTimestamp(d.savedAt,''));
  const isCorrect=judgeCorrect(d);
  return {
    id:ds.id,
    uid:d.uid||'',
    dateKey,
    savedAtText:formatDateValue(d.savedAt,dateKey),
    employeeCode:d.employeeCode||'',
    name:d.name||'',
    department:d.department||'',
    position:d.position||'',
    category:(d.category1||'')+(d.category2?' ＞ '+d.category2:''),
    question:d.questionText||d.question||'',
    selectedAnswer:firstNonEmpty(d.selectedAnswer,d.selectedChoice,d.userAnswer,d.selected,d.answerText,d.userAnswerText,d.yourAnswer),
    correctAnswer:firstNonEmpty(d.correctAnswer,d.correctChoice,d.correct,d.rightAnswer),
    isCorrect:isCorrect,
    result:d.result || (isCorrect?'correct':'incorrect'),
    resultText:d.resultText || resultTextOf(d),
    companyId:d.companyId||'',
    companyName:d.companyName||''
  };
}
function normalizeUser(ds){const d=ds.data()||{};return {uid:ds.id,employeeCode:d.employeeCode||d.employeeId||'',name:d.name||'',email:d.email||'',department:d.department||'',position:d.position||'',role:d.role||'user',status:d.status||'active',companyId:d.companyId||'',companyName:d.companyName||''};}
async function loadCurrentUser(user){const snap=await getDoc(doc(db,'users',user.uid));if(!snap.exists())throw new Error('users/'+user.uid+' が見つかりません。');const data=snap.data()||{};if(data.role!=='admin')throw new Error('このレポート画面は管理者のみ利用できます。現在のrole：'+(data.role||'未設定'));if(!data.companyId)throw new Error('users/'+user.uid+' に companyId がありません。');currentUserData=data;return data;}
async function loadReportData(){setStatus('回答結果とユーザー情報を読み込み中...');const companyId=currentUserData.companyId;const [rs,us]=await Promise.all([getDocs(query(collection(db,'quizResults'),where('companyId','==',companyId))),getDocs(query(collection(db,'users'),where('companyId','==',companyId)))]);allResults=[];rs.forEach(ds=>allResults.push(normalizeResult(ds)));allResults.sort((a,b)=>String(b.dateKey).localeCompare(String(a.dateKey),'ja')||String(a.employeeCode).localeCompare(String(b.employeeCode),'ja'));allUsers=[];us.forEach(ds=>allUsers.push(normalizeUser(ds)));allUsers.sort((a,b)=>String(a.employeeCode).localeCompare(String(b.employeeCode),'ja')||String(a.name).localeCompare(String(b.name),'ja'));populateSelects();applyFilters();applyUnansweredFilters();$('summary').style.display='grid';$('tabs').style.display='flex';$('answeredFilterBox').style.display='block';$('answeredTableWrap').style.display='block';setStatus('回答結果とユーザー情報を読み込みました。','ok');}
function uniqueValues(list,key){const set={};list.forEach(r=>{const v=(r[key]||'').trim();if(v)set[v]=true;});return Object.keys(set).sort((a,b)=>a.localeCompare(b,'ja'));}
function setSelectOptions(id,values){const s=$(id);const cur=s.value;s.innerHTML='<option value="all">すべて</option>'+values.map(v=>'<option value="'+escapeHtml(v)+'">'+escapeHtml(v)+'</option>').join('');s.value=values.includes(cur)?cur:'all';}
function populateSelects(){setSelectOptions('departmentFilter',uniqueValues(allResults,'department'));setSelectOptions('positionFilter',uniqueValues(allResults,'position'));setSelectOptions('unansweredDepartmentFilter',uniqueValues(allUsers,'department'));setSelectOptions('unansweredPositionFilter',uniqueValues(allUsers,'position'));if(!$('targetDate').value)$('targetDate').value=todayKey();}
function applyFilters(){const keyword=($('searchInput').value||'').trim().toLowerCase();const resultFilter=$('resultFilter').value, department=$('departmentFilter').value, position=$('positionFilter').value, startDate=$('startDate').value, endDate=$('endDate').value;filteredResults=allResults.filter(r=>{const text=[r.employeeCode,r.name,r.department,r.position,r.category,r.question,r.selectedAnswer,r.correctAnswer,r.resultText,r.result].join(' ').toLowerCase();return (!keyword||text.includes(keyword))&&(resultFilter==='all'||(resultFilter==='correct'?r.isCorrect===true:r.isCorrect===false))&&(department==='all'||r.department===department)&&(position==='all'||r.position===position)&&(!startDate||String(r.dateKey)>=startDate)&&(!endDate||String(r.dateKey)<=endDate);});renderTable();if(currentMode==='answered')renderSummary();}
function clearFilters(){$('startDate').value='';$('endDate').value='';$('departmentFilter').value='all';$('positionFilter').value='all';$('resultFilter').value='all';$('searchInput').value='';applyFilters();}
function getAnsweredUidSetForDate(dateKey){const set={};allResults.forEach(r=>{if(r.dateKey===dateKey&&r.uid)set[r.uid]=true;});return set;}
function applyUnansweredFilters(){const target=$('targetDate').value||todayKey();const department=$('unansweredDepartmentFilter').value, position=$('unansweredPositionFilter').value, keyword=($('unansweredSearchInput').value||'').trim().toLowerCase();const answeredSet=getAnsweredUidSetForDate(target);filteredUnanswered=allUsers.filter(u=>{const text=[u.employeeCode,u.name,u.email,u.department,u.position,u.role,u.status].join(' ').toLowerCase();return u.status==='active'&&!answeredSet[u.uid]&&(department==='all'||u.department===department)&&(position==='all'||u.position===position)&&(!keyword||text.includes(keyword));});renderUnansweredTable();if(currentMode==='unanswered')renderSummary();}
function clearUnansweredFilters(){$('targetDate').value=todayKey();$('unansweredDepartmentFilter').value='all';$('unansweredPositionFilter').value='all';$('unansweredSearchInput').value='';applyUnansweredFilters();}
function renderSummary(){$('companyName').textContent=currentUserData.companyName||currentUserData.companyId||'-';if(currentMode==='answered'){const total=filteredResults.length;const correct=filteredResults.filter(r=>r.isCorrect===true).length;const rate=total?Math.round(correct/total*100):0;$('countLabel').textContent='表示件数';$('subCountLabel').textContent='正解数';$('rateLabel').textContent='正解率';$('totalCount').textContent=String(total);$('correctCount').textContent=String(correct);$('correctRate').textContent=rate+'%';}else{const target=$('targetDate').value||todayKey();const activeUsers=allUsers.filter(u=>u.status==='active');const answeredSet=getAnsweredUidSetForDate(target);const answeredCount=Object.keys(answeredSet).filter(uid=>activeUsers.some(u=>u.uid===uid)).length;const denominator=activeUsers.length;const answerRate=denominator?Math.round(answeredCount/denominator*100):0;$('countLabel').textContent='未回答者数';$('subCountLabel').textContent='対象activeユーザー';$('rateLabel').textContent='回答率';$('totalCount').textContent=String(filteredUnanswered.length);$('correctCount').textContent=String(denominator);$('correctRate').textContent=answerRate+'%';}}
function renderTable(){const body=$('resultBody');if(!filteredResults.length){body.innerHTML='<tr><td colspan="10" class="empty">表示できる回答結果がありません。</td></tr>';return;}body.innerHTML=filteredResults.map(r=>'<tr><td>'+escapeHtml(r.savedAtText||r.dateKey)+'</td><td>'+escapeHtml(r.employeeCode)+'</td><td>'+escapeHtml(r.name)+'</td><td>'+escapeHtml(r.department)+'</td><td>'+escapeHtml(r.position)+'</td><td>'+escapeHtml(r.category)+'</td><td class="question-cell">'+escapeHtml(r.question)+'</td><td>'+escapeHtml(r.selectedAnswer)+'</td><td>'+escapeHtml(r.correctAnswer)+'</td><td><span class="badge '+(r.isCorrect?'ok':'ng')+'">'+escapeHtml(r.resultText)+'</span></td></tr>').join('');}
function renderUnansweredTable(){const body=$('unansweredBody');const target=$('targetDate').value||todayKey();if(!filteredUnanswered.length){body.innerHTML='<tr><td colspan="8" class="empty">未回答者はいません。</td></tr>';return;}body.innerHTML=filteredUnanswered.map(u=>'<tr><td>'+escapeHtml(target)+'</td><td>'+escapeHtml(u.employeeCode)+'</td><td>'+escapeHtml(u.name)+'</td><td>'+escapeHtml(u.email)+'</td><td>'+escapeHtml(u.department)+'</td><td>'+escapeHtml(u.position)+'</td><td>'+escapeHtml(u.role==='admin'?'管理者':'一般')+'</td><td><span class="badge warn">未回答</span></td></tr>').join('');}
function csvEscape(v){const s=String(v==null?'':v);return '"'+s.replace(/"/g,'""')+'"';}
function downloadCsv(filename,header,rows){const csv=[header].concat(rows).map(row=>row.map(csvEscape).join(',')).join('\r\n');const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);}
function downloadCsvAnswered(){const header=['回答日','社員コード','氏名','部署','役職','カテゴリー','問題','回答','正解','判定'];const rows=filteredResults.map(r=>[r.savedAtText||r.dateKey,r.employeeCode,r.name,r.department,r.position,r.category,r.question,r.selectedAnswer,r.correctAnswer,r.resultText]);downloadCsv('quiz_report_'+(currentUserData.companyId||'company')+'_'+todayKey().replaceAll('-','')+'.csv',header,rows);}
function downloadCsvUnanswered(){const target=$('targetDate').value||todayKey();const header=['対象日','社員コード','氏名','メール','部署','役職','権限','状態'];const rows=filteredUnanswered.map(u=>[target,u.employeeCode,u.name,u.email,u.department,u.position,u.role==='admin'?'管理者':'一般','未回答']);downloadCsv('quiz_unanswered_'+(currentUserData.companyId||'company')+'_'+target.replaceAll('-','')+'.csv',header,rows);}
function switchMode(mode){currentMode=mode;$('answeredTab').classList.toggle('active',mode==='answered');$('unansweredTab').classList.toggle('active',mode==='unanswered');$('answeredSection').classList.toggle('hidden',mode!=='answered');$('unansweredSection').classList.toggle('hidden',mode!=='unanswered');renderSummary();}
$('answeredTab').addEventListener('click',()=>switchMode('answered'));$('unansweredTab').addEventListener('click',()=>switchMode('unanswered'));$('applyBtn').addEventListener('click',applyFilters);$('clearBtn').addEventListener('click',clearFilters);$('reloadBtn').addEventListener('click',()=>loadReportData().catch(e=>setStatus('レポートの再読み込みに失敗しました。\n'+e.message,'error')));$('csvBtn').addEventListener('click',downloadCsvAnswered);$('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')applyFilters();});['resultFilter','departmentFilter','positionFilter','startDate','endDate'].forEach(id=>$(id).addEventListener('change',applyFilters));$('unansweredApplyBtn').addEventListener('click',applyUnansweredFilters);$('unansweredClearBtn').addEventListener('click',clearUnansweredFilters);$('unansweredReloadBtn').addEventListener('click',()=>loadReportData().catch(e=>setStatus('未回答者一覧の再読み込みに失敗しました。\n'+e.message,'error')));$('unansweredCsvBtn').addEventListener('click',downloadCsvUnanswered);$('unansweredSearchInput').addEventListener('keydown',e=>{if(e.key==='Enter')applyUnansweredFilters();});['targetDate','unansweredDepartmentFilter','unansweredPositionFilter'].forEach(id=>$(id).addEventListener('change',applyUnansweredFilters));
onAuthStateChanged(auth,async user=>{if(!user){location.href='login.html';return;}try{await loadCurrentUser(user);await loadReportData();}catch(e){setStatus('レポートの読み込みに失敗しました。\n'+e.message,'error');}});
</script>
</body>
</html>
