<script>
(function(){try{var h=new Date().getHours(),imgFile='',altText='';if(h>=5&&h<=10){imgFile='Good morning.png';altText='おはようございます'}else if(h>=11&&h<=15){imgFile='Good afternoon.png';altText='こんにちは'}else if(h>=16&&h<=17){imgFile='Hello.png';altText='おつかれさまです'}else if(h>=18&&h<=21){imgFile='Good evening.png';altText='こんばんは'}else{imgFile='Hello.png';altText='おつかれさまです'}var el=document.getElementById('greetingMessage');if(el){el.textContent='';var img=document.createElement('img');img.src=imgFile;img.alt=altText;img.style.height='52px';img.style.width='auto';img.style.maxWidth='100%';img.style.display='inline-block';img.style.verticalAlign='middle';el.appendChild(img)}}catch(e){console.error(e)}})();

<script>
(function(){function parseCsvLine(line){var out=[],cur='',q=false;for(var i=0;i<line.length;i++){var ch=line.charAt(i);if(ch==='"'){if(q&&line.charAt(i+1)==='"'){cur+='"';i++}else q=!q}else if(ch===','&&!q){out.push(cur);cur=''}else cur+=ch}out.push(cur);return out}
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]})}
var BASE_DATE=new Date(2026,5,20);
function daysSinceBase(){var now=new Date(),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());return Math.floor((today-BASE_DATE)/86400000)}
function idNumber(id){var m=String(id||'').match(/(\d+)/);return m?Number(m[1]):999999}
function mulberry32(a){return function(){var t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function hashSeed(str){var h=1779033703^str.length;for(var i=0;i<str.length;i++){h=Math.imul(h^str.charCodeAt(i),3432918353);h=h<<13|h>>>19}return(h^h>>>16)>>>0}
function shuffledOrder(n,cycle){var rng=mulberry32(hashSeed('bizmon-tip-'+cycle)),arr=[];for(var i=0;i<n;i++)arr.push(i);for(var j=n-1;j>0;j--){var k=Math.floor(rng()*(j+1)),tmp=arr[j];arr[j]=arr[k];arr[k]=tmp}return arr}
function renderTip(text){var area=document.querySelector('.business-message-area');if(!area)return;area.innerHTML='<div class="business-message-line"><span class="business-message-label">ビジネス豆知識：</span><span id="businessTipText">'+escapeHtml(text||'毎日の学び')+'</span></div>'}
function loadBusinessTip(){var xhr=new XMLHttpRequest();xhr.open('GET','business-tips.csv?v=20260707b',true);xhr.overrideMimeType('text/plain; charset=UTF-8');xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status!==200){renderTip('毎日の学び');return}try{var text=xhr.responseText||'';if(text.length>0&&text.charCodeAt(0)===65279)text=text.substring(1);var lines=text.split(/\r?\n/).filter(function(l){return l.trim()!==''});if(lines.length<=1){renderTip('毎日の学び');return}var header=parseCsvLine(lines[0]).map(function(v){return v.trim().toLowerCase()}),idx={id:header.indexOf('id'),body:header.indexOf('body'),active:header.indexOf('active')},rows=[];for(var i=1;i<lines.length;i++){var c=parseCsvLine(lines[i]),active=idx.active>=0?String(c[idx.active]||'true').toLowerCase():'true';if(active==='false')continue;var body=idx.body>=0?String(c[idx.body]||'').trim():'';if(!body)continue;rows.push({id:idx.id>=0?c[idx.id]:'',body:body})}rows.sort(function(a,b){return idNumber(a.id)-idNumber(b.id)||String(a.id).localeCompare(String(b.id),'ja')});if(!rows.length){renderTip('毎日の学び');return}var n=rows.length,day=daysSinceBase(),cycle=Math.floor(day/n),pos=((day%n)+n)%n,order=shuffledOrder(n,cycle),index=order[pos];renderTip(rows[index].body)}catch(e){console.warn(e);renderTip('毎日の学び')}};xhr.onerror=function(){renderTip('毎日の学び')};xhr.send()}
loadBusinessTip();
})();
</script>
<script>
(function(){
  var calendarYear=new Date().getFullYear(),calendarMonth=new Date().getMonth();
  function pad2(n){return String(n).padStart(2,"0")}
  function toDateKey(y,m,d){var x=new Date(y,m,d);return x.getFullYear()+"-"+pad2(x.getMonth()+1)+"-"+pad2(x.getDate())}
  function renderCalendar(){
    var grid=document.getElementById("calendarGrid"),title=document.getElementById("calendarTitle");
    if(!grid||!title)return;
    grid.innerHTML="";
    title.textContent=calendarYear+"年"+(calendarMonth+1)+"月";
    ["日","月","火","水","木","金","土"].forEach(function(w){var c=document.createElement("div");c.className="calendar-weekday";c.textContent=w;grid.appendChild(c)});
    var fw=new Date(calendarYear,calendarMonth,1).getDay(),last=new Date(calendarYear,calendarMonth+1,0).getDate();
    for(var i=0;i<fw;i++){var e=document.createElement("div");e.className="calendar-day empty";grid.appendChild(e)}
    var t=new Date(),tk=toDateKey(t.getFullYear(),t.getMonth(),t.getDate());
    for(var day=1;day<=last;day++){
      var dk=toDateKey(calendarYear,calendarMonth,day),cell=document.createElement("div");
      cell.className="calendar-day"+(dk===tk?" today":"");
      var num=document.createElement("div");num.className="day-number";num.textContent=day;cell.appendChild(num);
      grid.appendChild(cell);
    }
  }
  document.getElementById("prevMonthBtn").addEventListener("click",function(){calendarMonth--;if(calendarMonth<0){calendarMonth=11;calendarYear--}renderCalendar()});
  document.getElementById("nextMonthBtn").addEventListener("click",function(){calendarMonth++;if(calendarMonth>11){calendarMonth=0;calendarYear++}renderCalendar()});
  renderCalendar();
})();
</script>
<script>
(function(){
  function pad2(n){return String(n).padStart(2,"0")}
  function todayKey(){var d=new Date();return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate())}
  function normalizeDateKey(v){var s=String(v||"").trim().replace(/^\uFEFF/,"");var m=s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);return m?m[1]+"-"+pad2(m[2])+"-"+pad2(m[3]):s}
  function parseCsv(txt){var rows=[],row=[],cur="",q=false;for(var i=0;i<txt.length;i++){var ch=txt.charAt(i),nx=txt.charAt(i+1);if(ch==='"'){if(q&&nx==='"'){cur+='"';i++}else q=!q}else if(ch===","&&!q){row.push(cur);cur=""}else if((ch==="\n"||ch==="\r")&&!q){if(ch==="\r"&&nx==="\n")i++;row.push(cur);if(row.some(function(v){return String(v).trim()!==""}))rows.push(row);row=[];cur=""}else cur+=ch}row.push(cur);if(row.some(function(v){return String(v).trim()!==""}))rows.push(row);return rows}
  function escapeHtml(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]})}
  function setLine(html){var e=document.getElementById("todayInfoLine");if(e)e.innerHTML=html}
  async function loadTodayInfo(){
    try{
      var res=await fetch("almanac.csv?v=20260707b");
      if(!res.ok)throw new Error("almanac.csv "+res.status);
      var txt=await res.text();
      if(txt&&txt.charCodeAt(0)===65279)txt=txt.substring(1);
      var rows=parseCsv(txt);
      if(rows.length<2)throw new Error("empty csv");
      var hd=rows[0].map(function(v){return String(v||"").replace(/^\uFEFF/,"").trim().toLowerCase()});
      var di=hd.indexOf("date"),oi=hd.indexOf("other");
      if(di<0||oi<0)throw new Error("column not found");
      var target=todayKey(),row=null;
      for(var i=1;i<rows.length;i++){if(normalizeDateKey(rows[i][di])===target){row=rows[i];break}}
      if(!row)throw new Error("no row");
      var val=String(row[oi]||"").trim();
      if(!val||val.toLowerCase()==="nan"){setLine("対象日の情報はありません。");return}
      setLine('<span class="today-info-label">たとえば：</span>'+escapeHtml(val));
    }catch(e){
      console.warn(e);
      setLine("今日の情報を取得できませんでした。");
    }
  }
  loadTodayInfo();
})();
</script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",databaseURL:"https://bizmon-31ffc-default-rtdb.firebaseio.com",projectId:"bizmon-31ffc",storageBucket:"bizmon-31ffc.firebasestorage.app",messagingSenderId:"535364592474",appId:"1:535364592474:web:1f60b1eb2ad804b1a28963",measurementId:"G-CE1ZDBSVM6"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);
function hideLoading(){const l=document.getElementById("pageLoading");if(l){l.classList.add("hidden");l.style.display="none"}}
function setStatus(msg){const e=document.getElementById("status");if(!msg){e.className="status";e.textContent="";return}e.textContent=msg;e.className="status show"}
function escapeHtml(v){return String(v==null?"":v).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}
onAuthStateChanged(auth,async user=>{
  if(!user){location.href="login.html";return}
  try{
    const snap=await getDoc(doc(db,"users",user.uid));
    if(!snap.exists()){
      setStatus("このアカウントは利用できません。ログアウトします。");
      try{await signOut(auth)}catch(e){console.warn(e)}
      setTimeout(()=>{location.href="login.html?notice=account_removed"},1200);
      hideLoading();
      return;
    }
    const data=snap.data();
    const hasOperatorPermission=data.role==="operator"||data.isOperator===true;
    if(!hasOperatorPermission){
      setStatus("この画面は運営（オペレーター）権限が必要です。マイページへ戻ります。");
      setTimeout(()=>{location.href="index.html"},1200);
      hideLoading();
      return;
    }
    document.getElementById("userInfo").innerHTML="ログイン中："+escapeHtml(user.email)+"<br>権限：運営（オペレーター）"+(data.role!=="operator"?"（企業側登録との兼務）":"")+(data.name?"　氏名："+escapeHtml(data.name):"")+(data.companyId?"　所属企業："+escapeHtml(data.companyName||data.companyId):"");
    if(data.companyId){const toMyPage=document.getElementById("toMyPageLink");if(toMyPage)toMyPage.style.display="block"}
  }catch(e){
    console.error(e);
    setStatus("権限確認に失敗しました。もう一度ログインしてください。\n"+(e.message||e));
  }finally{
    hideLoading();
  }
});
document.getElementById("logoutBtn").addEventListener("click",async()=>{
  try{await signOut(auth);location.href="login.html"}catch(e){console.error(e);alert("ログアウトに失敗しました。")}
});
</script>
