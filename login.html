<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Hiragino Maru Gothic ProN", "BIZ UDPGothic", "Yu Gothic UI", "Meiryo", sans-serif;
      background: #eef2f7;
      color: #111827;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
      padding: 34px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 24px;
      text-align: center;
      font-size: 28px;
      color: #111827;
    }
    .field-label {
      display: block;
      margin: 16px 0 8px;
      font-size: 14px;
      font-weight: bold;
      color: #374151;
    }
    .text-input {
      width: 100%;
      height: 46px;
      padding: 0 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 15px;
      outline: none;
      background: #ffffff;
    }
    .text-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }
    .password-wrap {
      position: relative;
    }
    .password-wrap .text-input {
      padding-right: 48px;
    }
    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      padding: 0;
    }
    .password-toggle:hover {
      background: #f3f4f6;
      color: #111827;
    }
    .password-toggle svg {
      width: 22px;
      height: 22px;
      display: block;
    }
    .login-btn {
      width: 100%;
      margin-top: 24px;
      height: 48px;
      border: none;
      border-radius: 12px;
      background: #2563eb;
      color: #ffffff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .login-btn:hover {
      background: #1d4ed8;
    }
    .status-message {
      min-height: 22px;
      margin-top: 16px;
      font-size: 14px;
      color: #dc2626;
      line-height: 1.5;
      white-space: pre-wrap;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>ログイン</h1>

    <label class="field-label" for="email">メールアドレス</label>
    <input id="email" class="text-input" type="email" autocomplete="username" placeholder="メールアドレスを入力">

    <label class="field-label" for="password">パスワード</label>
    <div class="password-wrap">
      <input id="password" class="text-input" type="password" autocomplete="current-password" placeholder="パスワードを入力">
      <button type="button" id="togglePassword" class="password-toggle" aria-label="パスワードを表示" title="パスワードを表示">
        <svg id="eyeOpenIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <svg id="eyeClosedIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none;">
          <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.8 21.8 0 0 1 5.06-5.94"></path>
          <path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-3.22 4.31"></path>
          <path d="M14.12 14.12A3 3 0 0 1 9.88 9.88"></path>
          <path d="M1 1l22 22"></path>
        </svg>
      </button>
    </div>

    <button type="button" id="loginBtn" class="login-btn">ログイン</button>
    <div id="statusMessage" class="status-message"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",
      authDomain: "bizmon-31ffc.firebaseapp.com",
      projectId: "bizmon-31ffc"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const statusMessage = document.getElementById("statusMessage");
    const togglePassword = document.getElementById("togglePassword");
    const eyeOpenIcon = document.getElementById("eyeOpenIcon");
    const eyeClosedIcon = document.getElementById("eyeClosedIcon");

    togglePassword.addEventListener("click", function () {
      const isHidden = passwordInput.type === "password";
      passwordInput.type = isHidden ? "text" : "password";
      eyeOpenIcon.style.display = isHidden ? "none" : "block";
      eyeClosedIcon.style.display = isHidden ? "block" : "none";
      togglePassword.setAttribute("aria-label", isHidden ? "パスワードを非表示" : "パスワードを表示");
      togglePassword.setAttribute("title", isHidden ? "パスワードを非表示" : "パスワードを表示");
      passwordInput.focus();
    });

    async function login() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      statusMessage.textContent = "";

      if (!email || !password) {
        statusMessage.textContent = "メールアドレスとパスワードを入力してください。";
        return;
      }

      try {
        loginBtn.disabled = true;
        loginBtn.textContent = "ログイン中...";
        await signInWithEmailAndPassword(auth, email, password);
        location.href = "index.html";
      } catch (error) {
        console.error(error);
        statusMessage.textContent = "ログインに失敗しました。メールアドレスまたはパスワードを確認してください。";
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "ログイン";
      }
    }

    loginBtn.addEventListener("click", login);
    passwordInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        login();
      }
    });

    onAuthStateChanged(auth, function (user) {
      if (user) {
        location.href = "index.html";
      }
    });
  </script>
</body>
</html>
