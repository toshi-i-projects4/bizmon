<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>ユーザー新規登録</title><style>body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:#fff;color:#111827;padding:28px;box-sizing:border-box}.page{max-width:980px;margin:0 auto}.header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}h1{margin:0;font-size:28px}.back-link,.bottom-back-link{color:#2563eb;text-decoration:none;font-weight:bold;font-size:14px}.bottom-back-link{display:inline-block;margin-top:20px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:28px;box-sizing:border-box;margin-bottom:18px}.section-title{font-size:18px;font-weight:bold;margin:0 0 14px}.description{font-size:14px;line-height:1.7;color:#6b7280;margin:0 0 18px}.info-box{background:#eff6ff;border-left:4px solid #2563eb;border-radius:10px;padding:14px 16px;color:#1e3a8a;font-size:14px;line-height:1.7;margin-bottom:18px}.warning-box{background:#fffbeb;border-left:4px solid #f59e0b;border-radius:10px;padding:14px 16px;color:#92400e;font-size:14px;line-height:1.7;margin-top:16px}.form-grid{display:grid;grid-template-columns:220px 1fr;gap:16px 18px;align-items:center}.label{font-size:14px;font-weight:bold;color:#374151}input,select,textarea{width:100%;border:1px solid #d1d5db;border-radius:10px;padding:11px 12px;font-size:15px;box-sizing:border-box;background:#fff;color:#111827}textarea{min-height:110px;resize:vertical;line-height:1.6}.button-row{display:flex;justify-content:flex-end;gap:12px;margin-top:22px;flex-wrap:wrap}.primary-btn,.secondary-btn,.danger-btn{border:none;border-radius:12px;padding:12px 22px;font-size:15px;font-weight:bold;cursor:pointer}.primary-btn{background:#2563eb;color:#fff}.secondary-btn{background:#f3f4f6;color:#111827}.danger-btn{background:#dc2626;color:#fff}.status{min-height:24px;margin-top:16px;font-size:14px;line-height:1.6;white-space:pre-wrap}.status.ok{color:#166534}.status.error{color:#dc2626}.status.note{color:#374151}.table-wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:12px}.data-table{width:100%;border-collapse:collapse;font-size:14px;min-width:760px}.data-table th,.data-table td{border-bottom:1px solid #e5e7eb;padding:10px 12px;text-align:left;vertical-align:top}.data-table th{background:#f9fafb;color:#374151;font-weight:bold}.badge{display:inline-block;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:bold}.badge.active{background:#dcfce7;color:#166534}.badge.inactive{background:#fee2e2;color:#991b1b}.badge.admin{background:#dbeafe;color:#1e40af}.badge.user{background:#f3f4f6;color:#374151}.toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}.toolbar input,.toolbar select{max-width:260px}.confirm-box,.preview-box{background:#fff7ed;border-left:4px solid #f97316;border-radius:10px;padding:14px 16px;color:#7c2d12;font-size:14px;line-height:1.7;margin-top:16px;white-space:pre-wrap}.preview-box{background:#eff6ff;border-left-color:#2563eb;color:#1e3a8a}.hidden{display:none!important}@media(max-width:720px){body{padding:18px}.header{flex-direction:column;align-items:flex-start}.form-grid{grid-template-columns:1fr;gap:8px 0}.button-row{flex-direction:column}.primary-btn,.secondary-btn,.danger-btn{width:100%}.toolbar input,.toolbar select{max-width:none}}</style></head><body><div class="page"><div class="header"><h1>ユーザー新規登録</h1><a class="back-link" href="index.html">← マイページへ戻る</a></div><div class="card"><p class="section-title">新規ユーザー情報</p><p class="description">外部認証サービスは使用せず、ブラウザ内の保存領域にユーザー情報を登録します。削除ではなく、有効・無効で管理します。</p><div class="info-box">社員番号またはメールアドレスが既存ユーザーと重複する場合は登録できません。</div><div class="form-grid"><div class="label">社員番号</div><input id="employeeId" placeholder="例：GC001"><div class="label">氏名</div><input id="name" placeholder="例：山田 太郎"><div class="label">メールアドレス</div><input id="email" type="email" placeholder="例：user@example.com"><div class="label">部署</div><input id="department" placeholder="例：総務人事部"><div class="label">権限</div><select id="role"><option value="user">一般</option><option value="admin">管理者</option></select><div class="label">状態</div><select id="statusSelect"><option value="active">有効</option><option value="inactive">無効</option></select><div class="label">備考</div><textarea id="note"></textarea></div><div class="button-row"><button class="secondary-btn" id="clearBtn" type="button">入力をクリア</button><button class="primary-btn" id="registerBtn" type="button">登録する</button></div><div id="status" class="status"></div></div><div class="card"><p class="section-title">登録済みユーザー</p><div class="toolbar"><button class="secondary-btn" id="exportBtn" type="button">CSVダウンロード</button></div><div class="table-wrap"><table class="data-table"><thead><tr><th>社員番号</th><th>氏名</th><th>メール</th><th>部署</th><th>権限</th><th>状態</th></tr></thead><tbody id="userTbody"></tbody></table></div></div><a class="bottom-back-link" href="index.html">← マイページへ戻る</a></div><script>
const USER_KEY="enterpriseUsers_v1";
const LOG_KEY="enterpriseUserLogs_v1";
function nowText(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")+":"+String(d.getSeconds()).padStart(2,"0")}
function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]})}
function loadUsers(){try{return JSON.parse(localStorage.getItem(USER_KEY)||"[]")}catch(e){return []}}
function saveUsers(users){localStorage.setItem(USER_KEY,JSON.stringify(users))}
function loadLogs(){try{return JSON.parse(localStorage.getItem(LOG_KEY)||"[]")}catch(e){return []}}
function addLog(action,detail){const logs=loadLogs();logs.unshift({time:nowText(),action:action,detail:detail});localStorage.setItem(LOG_KEY,JSON.stringify(logs.slice(0,300)))}
function normalizeEmail(v){return String(v||"").trim().toLowerCase()}
function normalizeId(v){return String(v||"").trim()}
function makeUserId(){return "U"+Date.now()+String(Math.floor(Math.random()*1000)).padStart(3,"0")}
function findUserIndex(users,employeeId,email){const eid=normalizeId(employeeId);const em=normalizeEmail(email);return users.findIndex(function(u){return (eid&&normalizeId(u.employeeId)===eid)||(em&&normalizeEmail(u.email)===em)})}
function statusBadge(status){return String(status)==="inactive"?'<span class="badge inactive">無効</span>':'<span class="badge active">有効</span>'}
function roleBadge(role){return String(role)==="admin"?'<span class="badge admin">管理者</span>':'<span class="badge user">一般</span>'}
function downloadText(filename,text,type){const blob=new Blob([text],{type:type||"text/plain;charset=utf-8"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
function csvCell(v){v=String(v==null?"":v);return /[",

]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v}
function usersToCsv(users){const header=["employeeId","name","email","department","role","status","note","createdAt","updatedAt"];const lines=[header.join(",")];users.forEach(function(u){lines.push(header.map(function(k){return csvCell(u[k]||"")}).join(","))});return "﻿"+lines.join("
")}
function parseCsvLine(line){const out=[];let cur="";let q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++}else q=!q}else if(ch===","&&!q){out.push(cur);cur=""}else cur+=ch}out.push(cur);return out}
function parseCsv(text){if(text.charCodeAt(0)===65279)text=text.slice(1);const lines=text.split(/
?
/).filter(function(l){return l.trim()!==""});if(lines.length===0)return{header:[],rows:[]};const header=parseCsvLine(lines[0]).map(function(h){return h.trim()});const rows=lines.slice(1).map(parseCsvLine).map(function(cols){const obj={};header.forEach(function(h,i){obj[h]=cols[i]||""});return obj});return{header:header,rows:rows}}

const E={employeeId:document.getElementById("employeeId"),name:document.getElementById("name"),email:document.getElementById("email"),department:document.getElementById("department"),role:document.getElementById("role"),statusSelect:document.getElementById("statusSelect"),note:document.getElementById("note"),status:document.getElementById("status"),tbody:document.getElementById("userTbody")};
function setStatus(msg,type){E.status.textContent=msg;E.status.className="status "+(type||"")}
function renderUsers(){const users=loadUsers();E.tbody.innerHTML=users.length?users.map(function(u){return '<tr><td>'+esc(u.employeeId)+'</td><td>'+esc(u.name)+'</td><td>'+esc(u.email)+'</td><td>'+esc(u.department)+'</td><td>'+roleBadge(u.role)+'</td><td>'+statusBadge(u.status)+'</td></tr>'}).join(""):'<tr><td colspan="6">登録済みユーザーはありません。</td></tr>'}
function clearForm(){[E.employeeId,E.name,E.email,E.department,E.note].forEach(function(e){e.value=""});E.role.value="user";E.statusSelect.value="active"}
document.getElementById("registerBtn").onclick=function(){const user={id:makeUserId(),employeeId:normalizeId(E.employeeId.value),name:E.name.value.trim(),email:normalizeEmail(E.email.value),department:E.department.value.trim(),role:E.role.value,status:E.statusSelect.value,note:E.note.value.trim(),createdAt:nowText(),updatedAt:nowText()};if(!user.employeeId||!user.name||!user.email){setStatus("社員番号、氏名、メールアドレスを入力してください。","error");return}const users=loadUsers();if(findUserIndex(users,user.employeeId,user.email)!==-1){setStatus("社員番号またはメールアドレスが既存ユーザーと重複しています。","error");return}users.push(user);saveUsers(users);addLog("新規登録",user.employeeId+" / "+user.name+" / "+user.email);setStatus("ユーザーを登録しました。","ok");clearForm();renderUsers()};
document.getElementById("clearBtn").onclick=clearForm;document.getElementById("exportBtn").onclick=function(){downloadText("users_utf8_bom.csv",usersToCsv(loadUsers()),"text/csv;charset=utf-8")};renderUsers();
</script></body></html>
