  function decodeUtf8Base64(b64){
    var bin=atob(b64), bytes=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  }
  function download(filename,text){
    var blob=new Blob([text],{type:'text/html;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
  }
  function earliestIndex(html, markers){
    var pos=-1;
    for(var i=0;i<markers.length;i++){
      var p=html.indexOf(markers[i]);
      if(p>=0&&(pos<0||p<pos))pos=p;
    }
    return pos;
  }
  function patchHtml(html){
    if(!html||html.indexOf('<!DOCTYPE html')<0)throw new Error('HTMLファイルとして認識できません。index.htmlを選択してください。');
    if(html.indexOf('weatherMini')<0)throw new Error('weatherMini が見つかりません。対象の index.html ではない可能性があります。');
    var patch=decodeUtf8Base64(PATCH_B64);
    var markers=[
      '<!-- BIZMON_WEATHER_TEMP_FIX_V22:',
      '<!-- BIZMON_WEATHER_TEMP_JMA_ORDER_FIX_V23:',
      '<!-- BIZMON_WEATHER_JMA_HP_TEMP_OVERRIDE_V24_START -->',
      '<!-- BIZMON_WEATHER_SAME_TEMP_DOM_FIX_V25_START -->',
      '<!-- BIZMON_WEATHER_SAME_TEMP_DOM_FIX_V26_START -->',
      '<!-- BIZMON_WEATHER_SAME_TEMP_DOM_FIX_V27_START -->',
      '<!-- BIZMON_WEATHER_SAME_TEMP_DOM_FIX_V28_START -->',
      '<!-- BIZMON_WEATHER_SAME_TEMP_DOM_FIX_V29_START -->',
      '<!-- BIZMON_WEATHER_SAME_TEMP_DOM_FIX_V30_START -->',
      '<!-- BIZMON_WEATHER_SAME_TEMP_DOM_FIX_V31_START -->'
    ];
    var cut=earliestIndex(html,markers);
    if(cut>=0)return html.slice(0,cut).replace(/\s*$/,'')+'

'+patch;
    var bodyPos=html.lastIndexOf('</body>');
    if(bodyPos<0)throw new Error('</body> が見つかりません。HTML末尾を確認してください。');
    return html.slice(0,bodyPos).replace(/\s*$/,'')+'

'+patch;
