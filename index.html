
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ</title>
</head>
<body>
  <h1>暦情報テスト</h1>
  <div id="status">読み込み中...</div>
  <div id="result"></div>

  <script>
  async function load(){
    try{
      const res = await fetch('almanac.csv');
      const text = await res.text();
      document.getElementById('status').textContent = '取得成功';
      document.getElementById('result').textContent = text.slice(0,300);
    }catch(e){
      document.getElementById('status').textContent = '取得失敗';
      console.error(e);
    }
  }
  load();
  </script>
</body>
</html>
