<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ</title>
  <style>
    body { margin:0; font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif; background:#eef2f7; color:#333; position:relative; }
    .page-logo { position:absolute; top:-80px; left:80px; width:120px; height:auto; }
    .today-date { position:absolute; top:-60px; right:60px; background:rgba(255,255,255,.95); padding:10px 14px; border-radius:14px; box-shadow:0 2px 8px rgba(0,0,0,.08); text-align:right; line-height:1.4; }
    .today-date .date-top { font-size:15px; color:#4b5563; font-weight:bold; }
    .today-date .date-bottom { font-size:20px; color:#111827; font-weight:bold; }
    .layout { max-width:1400px; margin:80px auto 40px; display:flex; gap:24px; align-items:flex-start; padding:0 20px; box-sizing:border-box; }
    .left-sidebar { width:240px; background:#2563eb; padding:24px; border-radius:16px; box-shadow:0 4px 12px rgba(0,0,0,.10); box-sizing:border-box; transform:translateY(30px); color:#fff; }
    .main-content { flex:1; background:#fff; padding:32px; border-radius:16px; box-shadow:0 4px 12px rgba(0,0,0,.08); box-sizing:border-box; text-align:center; min-height:420px; }
    .right-sidebar { width:240px; background:#f3f4f6; padding:24px; border-radius:16px; box-shadow:0 4px 12px rgba(0,0,0,.08); box-sizing:border-box; transform:translateY(30px); color:#374151; }
    h1 { margin-top:0; font-size:28px; color:#111827; }
    .left-sidebar h2, .right-sidebar h2 { margin-top:0; font-size:20px; margin-bottom:16px; }
    .left-sidebar h2 { color:#fff; } .right-sidebar h2 { color:#111827; }
    p { font-size:15px; line-height:1.6; }
    .guide-message { background:#eff6ff; border-left:4px solid #2563eb; padding:12px 14px; border-radius:8px; font-size:14px; color:#1e3a8a; margin-bottom:24px; text-align:left; }
    .quiz-button-image { width:140px; max-width:100%; height:auto; cursor:pointer; display:inline-block; margin-bottom:28px; }
    .left-sidebar .sidebar-box { background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.28); border-radius:10px; padding:12px 14px; margin-bottom:14px; }
    .left-sidebar .sidebar-box-title { font-size:14px; font-weight:bold; color:#fff; margin-bottom:6px; }
    .left-sidebar .sidebar-box-text { font-size:13px; color:#eaf2ff; line-height:1.6; }
    .logout-btn { margin-top:20px; padding:12px 24px; border:none; border-radius:10px; background:#111827; color:#fff; cursor:pointer; font-size:14px; }
    .user-info { margin-top:12px; font-size:14px; color:#4b5563; }
    .almanac-status { font-size:13px; color:#6b7280; margin-bottom:10px; white-space:pre-wrap; }
    .almanac-list { display:grid; gap:12px; }
    .almanac-item { background:#fff; border:1px solid #e5e7eb; border-radius:10px; padding:12px 14px; }
    .almanac-item-title { font-size:13px; font-weight:bold; color:#111827; margin-bottom:6px; }
    .almanac-item-text { font-size:13px; color:#6b7280; line-height:1.6; white-space:pre-wrap; }
    .debug { font-size:12px; color:#9ca3af; margin-top:10px; word-break:break-all; }
    @media (max-width:1000px){ .layout{flex-direction:column;} .left-sidebar,.main-content,.right-sidebar{width:100%; transform:none;} .today-date{position:static; margin:12px 20px 0 auto; width:fit-content;} .page-logo{position:static; display:block; margin:16px 0 0 20px;} }
  </style>
</head>
<body>
  <img src="logo.png" alt="ロゴ" class="page-logo">
  <div id="todayDate" class="today-date"><div class="date-top"></div><div class="date-bottom"></div></div>
  <div class="layout">
    <div class="left-sidebar">
      <h2>サイドバー</h2>
      <div class="sidebar-box"><div class="sidebar-box-title">お知らせ</div><div class="sidebar-box-text">ここにお知らせを表示できます。</div></div>
      <div class="sidebar-box"><div class="sidebar-box-title">設定変更</div><div class="sidebar-box-text">通知設定や表示設定などを配置できます。</div></div>
      <div class="sidebar-box"><div class="sidebar-box-title">メモ</div><div class="sidebar-box-text">自由に補足情報を入れられます。</div></div>
    </div>
    <div class="main-content">
      <h1>マイページ</h1>
      <p class="guide-message">▼ 下のボタンから本日のクイズに進めます</p>
      <a href="question.html"><img src="button_本日のクイズへ.png" alt="本日のクイズへ" class="quiz-button-image"></a>
      <div id="userInfo" class="user-info"></div>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
    <div class="right-sidebar" id="almanacSidebar">
      <h2 id="almanacTitle">暦情報</h2>
      <div id="almanacStatus" class="almanac-status">読み込み中...</div>
      <div id="almanacList" class="almanac-list"></div>
      <div id="almanacDebug" class="debug"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = { apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus", authDomain:"bizmon-31ffc.firebaseapp.com", projectId:"bizmon-31ffc" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function getTodayJstParts(){
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth()+1).padStart(2,'0');
      const d = String(now.getDate()).padStart(2,'0');
      return { key:`${y}-${m}-${d}`, year:y, month:Number(m), day:Number(d) };
    }

    function formatJapaneseDateTwoLines(){
      const today = getTodayJstParts();
      const reiwaYear = today.year - 2018;
      const reiwaText = reiwaYear === 1 ? '令和元年' : `令和${reiwaYear}年`;
      document.querySelector('#todayDate .date-top').textContent = `${today.year}年（${reiwaText}）`;
      document.querySelector('#todayDate .date-bottom').textContent = `${today.month}月${today.day}日`;
    }

    function parseCsvLine(line){
      const result = [];
      let current = '';
      let inQuotes = false;
      for(let i=0;i<line.length;i++){
        const ch = line[i];
        if(ch === '"'){
          if(inQuotes && line[i+1] === '"'){ current += '"'; i++; }
          else { inQuotes = !inQuotes; }
        } else if(ch === ',' && !inQuotes){
          result.push(current); current = '';
        } else {
          current += ch;
        }
      }
      result.push(current);
      return result;
    }

    async function fetchFirstAvailable(names){
      let lastError = null;
      for(const name of names){
        try{
          const res = await fetch(`${name}?v=${Date.now()}`);
          if(!res.ok) throw new Error(`${name}: HTTP ${res.status}`);
          const text = await res.text();
          return { name, text };
        }catch(err){ lastError = err; }
      }
      throw lastError || new Error('CSVを取得できませんでした。');
    }

    async function loadAlmanac(){
      const today = getTodayJstParts();
      const titleEl = document.getElementById('almanacTitle');
      const statusEl = document.getElementById('almanacStatus');
      const listEl = document.getElementById('almanacList');
      const debugEl = document.getElementById('almanacDebug');

      const labelMap = {
        holiday:'祝日', rokuyo:'六曜', gosekku:'五節句', senjitsu:'選日', nijushisekki:'二十四節気',
        shichijunikou:'七十二候', nikkanshi:'日干支', tsukikanshi:'月干支', nenkanshi:'年干支', other:'その他'
      };

      try{
        // 「lmanac.csv」と誤って置いた場合も読めるようにフォールバック
        const file = await fetchFirstAvailable(['almanac.csv', 'lmanac.csv']);
        let text = file.text.replace(/^﻿/, '');
        const lines = text.split(/?
/).filter(line => line.trim() !== '');
        if(lines.length <= 1){
          statusEl.textContent = `${file.name} にデータがありません。`;
          debugEl.textContent = `読込ファイル: ${file.name}`;
          return;
        }

        const header = parseCsvLine(lines[0]).map(v => v.trim().toLowerCase());
        const dateIndex = header.indexOf('date');
        if(dateIndex === -1){
          statusEl.textContent = `${file.name} の1行目に date 列が必要です。`;
          debugEl.textContent = `見出し: ${header.join(', ')}`;
          return;
        }

        const row = lines.slice(1).map(parseCsvLine).find(cols => String(cols[dateIndex] || '').trim() === today.key);
        debugEl.textContent = `読込ファイル: ${file.name} / 本日: ${today.key}`;

        if(!row){
          statusEl.textContent = `本日（${today.key}）の暦情報がありません。`;
          return;
        }

        const items = [];
        for(const [key, label] of Object.entries(labelMap)){
          const idx = header.indexOf(key);
          if(idx !== -1){
            const raw = row[idx];
            const value = raw == null ? '' : String(raw).trim();
            if(value && value.toLowerCase() !== 'nan') items.push({ label, value });
          }
        }

        if(items.length === 0){
          titleEl.style.display = 'none';
          statusEl.textContent = '';
          listEl.innerHTML = '';
          return;
        }

        titleEl.style.display = '';
        statusEl.textContent = '';
        listEl.innerHTML = items.map(item => `<div class="almanac-item"><div class="almanac-item-title">${item.label}</div><div class="almanac-item-text">${item.value}</div></div>`).join('');
      }catch(error){
        console.error(error);
        statusEl.textContent = '暦情報CSVの読み込みに失敗しました。almanac.csv（または lmanac.csv）が index.html と同じ階層にあるか確認してください。';
        debugEl.textContent = `エラー: ${error?.message || error}`;
      }
    }

    formatJapaneseDateTwoLines();
    onAuthStateChanged(auth, (user) => {
      if(!user){ location.href = 'login.html'; return; }
      document.getElementById('userInfo').textContent = `ログイン中：${user.email}`;
      loadAlmanac();
    });
    window.logout = async function(){ try{ await signOut(auth); location.href='login.html'; }catch(error){ console.error(error); alert('ログアウトに失敗しました。'); } };
  </script>
</body>
</html>
