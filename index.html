<script>
(function(){var statusEl=document.getElementById('almanacStatus'),listEl=document.getElementById('almanacList'),titleEl=document.getElementById('almanacTitle'),descText=document.getElementById('almanacDescriptionText');var defaultDescription='暦情報の項目名や内容にカーソルを合わせると、読み仮名と意味が表示されます。';if(!statusEl||!listEl||!titleEl)return;statusEl.textContent='ALMANAC_LAYOUT_TUNE_V5：JavaScript起動済み。CSV確認中...';var labelYomi={'たとえば':'たとえば','祝日':'しゅくじつ','六曜':'ろくよう','五節句':'ごせっく','選日':'せんじつ','二十四節気':'にじゅうしせっき','七十二候':'しちじゅうにこう','日干支':'ひかんし','月干支':'つきかんし','年干支':'としかんし'};var labelDesc={'祝日':'国民の祝日に関する法律で定められた休日です。','六曜':'先勝・友引・先負・仏滅・大安・赤口の6種類からなる暦注です。','五節句':'季節の節目として古くから行われてきた年中行事です。','選日':'暦の上で特定の意味を持つ日を示す暦注です。','二十四節気':'1年を24の時期に分け、季節の移り変わりを表したものです。','七十二候':'二十四節気をさらに約5日ごとに分け、自然や動植物の変化で季節を表したものです。','日干支':'その日に割り当てられる十干十二支の組み合わせです。','月干支':'その月に割り当てられる十干十二支の組み合わせです。','年干支':'その年に割り当てられる十干十二支の組み合わせです。'};var tenkanYomi={'甲':'きのえ','乙':'きのと','丙':'ひのえ','丁':'ひのと','戊':'つちのえ','己':'つちのと','庚':'かのえ','辛':'かのと','壬':'みずのえ','癸':'みずのと'};var junishiYomi={'子':'ね','丑':'うし','寅':'とら','卯':'う','辰':'たつ','巳':'み','午':'うま','未':'ひつじ','申':'さる','酉':'とり','戌':'いぬ','亥':'い'};var stemImage={'甲':'真っ直ぐ力強くそびえ立つ大木','乙':'しなやかに伸びる草花や蔓','丙':'暖かく、時に激しく照らす太陽','丁':'静かに灯る火やろうそくの光','戊':'どっしりとした山や大地','己':'田畑のように人や物を育む土','庚':'鋭く鍛えられた金属','辛':'宝石や刃物のように繊細で鋭い金属','壬':'大きく流れる川や海','癸':'静かに降る雨や湧き水'};var branchImage={'子':'冬の始まりに、次の芽吹きを内に秘める水の気配','丑':'冬の終わりに、芽吹きの準備を進める湿った大地','寅':'春の始まりに、力強く伸び出す若木','卯':'春の盛りに、草木が勢いよく広がる様子','辰':'春の終わりの肥沃な大地','巳':'初夏に熱を帯び、内側の力が高まる様子','午':'夏の始まりに、火の勢いが強まる様子','未':'夏の終わりに、熱を含んだ乾いた大地','申':'秋の始まりに、形が整い金属の気配が強まる様子','酉':'秋の盛りに、実りを収める金属の気配','戌':'秋の終わりに、物事を蓄える乾いた大地','亥':'冬の始まりに、静かに力を蓄える水の気配'};var valueYomi={'大安':'たいあん','仏滅':'ぶつめつ','友引':'ともびき','先勝':'せんしょう／さきがち','先負':'せんぶ／さきまけ','赤口':'しゃっこう／しゃっく','大明日':'だいみょうにち','一粒万倍日':'いちりゅうまんばいび','天赦日':'てんしゃにち','不成就日':'ふじょうじゅび','腐草為蛍':'くされたるくさほたるとなる','芒種':'ぼうしゅ','夏至':'げし','冬至':'とうじ'};var valueDesc={'大安':'六曜の一つで、一般に「大いに安し」とされ、祝い事や新しいことを始めるのに良い日とされます。','仏滅':'六曜の一つで、一般に物事を慎重に進める日とされます。','大明日':'天地が明るく照らされる日とされ、建築・移転・旅行などによい日とされることがあります。','一粒万倍日':'ひと粒の種が万倍に実るという意味から、物事を始めるのに良い日とされます。','腐草為蛍':'七十二候の一つで、腐った草が蛍になると表現される頃です。実際には、湿った草むらから蛍が現れ始める季節感を表しています。','芒種':'二十四節気の一つで、稲や麦など芒のある穀物の種をまく頃とされます。'};function parseCsvLine(line){var out=[],cur='',q=false;for(var i=0;i<line.length;i++){var ch=line.charAt(i);if(ch==='"'){if(q&&line.charAt(i+1)==='"'){cur+='"';i++;}else q=!q;}else if(ch===','&&!q){out.push(cur);cur='';}else cur+=ch;}out.push(cur);return out;}function cleanTerm(v){var s=String(v||'').trim(),p=s.indexOf('（');if(p>=0)s=s.substring(0,p);p=s.indexOf('(');if(p>=0)s=s.substring(0,p);return s.trim();}function kanshiYomi(term){if(term.length>=2&&tenkanYomi[term.charAt(0)]&&junishiYomi[term.charAt(1)])return tenkanYomi[term.charAt(0)]+'・'+junishiYomi[term.charAt(1)];return '';}function kanshiDesc(term){var a=term.charAt(0),b=term.charAt(1);if(stemImage[a]&&branchImage[b])return branchImage[b]+'（'+b+'）に、'+stemImage[a]+'（'+a+'）が重なるようなイメージです。';return term+'は、十干と十二支を組み合わせた暦の表し方です。';}function resetDescription(){if(descText)descText.textContent=defaultDescription;}function setDescription(title,yomi,text){if(descText)descText.textContent=(yomi?title+'（'+yomi+'）':title)+'：\n'+text;}function addHelp(el,title,yomi,text){if(!text)return;el.className=el.className+' almanac-help-target';el.onmouseenter=function(){setDescription(title,yomi,text);};el.onmouseleave=function(){resetDescription();};el.onclick=function(){setDescription(title,yomi,text);};}function splitValues(value,label){var s=String(value||'');if(label==='日干支'||label==='月干支'||label==='年干支'||label==='七十二候')return [s];var arr=[],cur='';for(var i=0;i<s.length;i++){var ch=s.charAt(i);if(ch==='、'||ch===','||ch==='・'||ch==='／'||ch==='/'||ch===' '||ch==='　'){if(cur){arr.push(cur);cur='';}}else cur+=ch;}if(cur)arr.push(cur);return arr;}function valueInfo(label,value){var term=cleanTerm(value);if(label==='日干支'||label==='月干支'||label==='年干支')return {yomi:kanshiYomi(term),desc:kanshiDesc(term)};return {yomi:valueYomi[term]||'',desc:valueDesc[term]||((label==='七十二候')?term+'は七十二候の一つで、自然や動植物の変化を表す季節の言葉です。':'')};}function renderItems(items){statusEl.textContent='';listEl.innerHTML='';for(var i=0;i<items.length;i++){var item=items[i],box=document.createElement('div'),line=document.createElement('div'),title=document.createElement('span'),colon=document.createElement('span'),text=document.createElement('span');box.className='almanac-item';line.className='almanac-line';title.className='almanac-item-title';title.textContent=item.label;addHelp(title,item.label,labelYomi[item.label]||'',labelDesc[item.label]);line.appendChild(title);colon.className='almanac-colon';colon.textContent='：';line.appendChild(colon);text.className='almanac-item-text';if(item.label==='たとえば'){text.textContent=item.value;}else{var values=splitValues(item.value,item.label);for(var v=0;v<values.length;v++){var term=cleanTerm(values[v]),chip=document.createElement('span');chip.className='almanac-value-chip';chip.textContent=term;var info=valueInfo(item.label,values[v]);addHelp(chip,term,info.yomi,info.desc);text.appendChild(chip);if(v<values.length-1)text.appendChild(document.createTextNode('・'));}}line.appendChild(text);box.appendChild(line);listEl.appendChild(box);}resetDescription();}function loadAlmanac(fileIndex){var files=['almanac.csv','calendar_other_yomigana_removed_utf8_bom.csv'],file=files[fileIndex]||files[0],now=new Date(),todayKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0'),labelMap={other:'たとえば',holiday:'祝日',rokuyo:'六曜',gosekku:'五節句',senjitsu:'選日',nijushisekki:'二十四節気',shichijunikou:'七十二候',nikkanshi:'日干支',tsukikanshi:'月干支',nenkanshi:'年干支'};var xhr=new XMLHttpRequest();xhr.open('GET',file+'?v='+new Date().getTime(),true);xhr.overrideMimeType('text/plain; charset=UTF-8');xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status!==200){if(fileIndex+1<files.length){loadAlmanac(fileIndex+1);return;}statusEl.textContent='暦情報CSVの取得に失敗しました。';return;}try{var text=xhr.responseText||'';if(text.length>0&&text.charCodeAt(0)===65279)text=text.substring(1);text=text.split(String.fromCharCode(13)).join('');var raw=text.split(String.fromCharCode(10)),lines=[];for(var i=0;i<raw.length;i++){if(raw[i]&&raw[i].trim()!=='')lines.push(raw[i]);}var headerRaw=parseCsvLine(lines[0]),header=[];for(var h=0;h<headerRaw.length;h++)header.push(headerRaw[h].trim().toLowerCase());var dateIndex=header.indexOf('date'),row=null;for(var r=1;r<lines.length;r++){var cols=parseCsvLine(lines[r]);if(String(cols[dateIndex]||'').trim()===todayKey){row=cols;break;}}if(!row){statusEl.textContent='本日の暦情報が見つかりません。対象日：'+todayKey;return;}var items=[],keys=Object.keys(labelMap);for(var k=0;k<keys.length;k++){var key=keys[k],idx=header.indexOf(key);if(idx!==-1){var value=String(row[idx]||'').trim();if(value&&value.toLowerCase()!=='nan')items.push({label:labelMap[key],value:value});}}renderItems(items);}catch(e){console.error(e);statusEl.textContent='暦情報の解析中にエラーが発生しました。';}};xhr.onerror=function(){if(fileIndex+1<files.length)loadAlmanac(fileIndex+1);else statusEl.textContent='暦情報CSVの通信に失敗しました。';};xhr.send();}loadAlmanac(0);})();

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";import{getFirestore,collection,query,where,getDocs}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",projectId:"bizmon-31ffc"};const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;let calendarYear=new Date().getFullYear();let calendarMonth=new Date().getMonth();function pad2(num){return String(num).padStart(2,"0")}function toDateKey(year,monthIndex,day){return year+"-"+pad2(monthIndex+1)+"-"+pad2(day)}function renderCalendarSkeleton(resultMap){const grid=document.getElementById("calendarGrid");const title=document.getElementById("calendarTitle");grid.innerHTML="";title.textContent=calendarYear+"年"+(calendarMonth+1)+"月";["日","月","火","水","木","金","土"].forEach(function(w){const cell=document.createElement("div");cell.className="calendar-weekday";cell.textContent=w;grid.appendChild(cell)});const firstWeekday=new Date(calendarYear,calendarMonth,1).getDay();const lastDate=new Date(calendarYear,calendarMonth+1,0).getDate();for(let i=0;i<firstWeekday;i++){const empty=document.createElement("div");empty.className="calendar-day empty";grid.appendChild(empty)}const today=new Date();const todayKey=toDateKey(today.getFullYear(),today.getMonth(),today.getDate());for(let day=1;day<=lastDate;day++){const dateKey=toDateKey(calendarYear,calendarMonth,day);const dayCell=document.createElement("div");dayCell.className="calendar-day";if(dateKey===todayKey)dayCell.className+=" today";const number=document.createElement("div");number.className="day-number";number.textContent=day;dayCell.appendChild(number);if(resultMap&&resultMap[dateKey]){const mark=document.createElement("a");mark.href="calendar-result.html?date="+encodeURIComponent(dateKey);mark.title=dateKey+" の回答結果を見る";if(resultMap[dateKey]==="correct"){mark.className="day-mark correct";mark.textContent="○"}else if(resultMap[dateKey]==="incorrect"){mark.className="day-mark incorrect";mark.textContent="×"}dayCell.appendChild(mark)}grid.appendChild(dayCell)}}async function loadCalendarResults(){const status=document.getElementById("calendarStatus");if(!currentUser){status.textContent="ログイン確認後に記録を読み込みます。";renderCalendarSkeleton({});return}try{status.textContent="回答記録を読み込み中...";const q=query(collection(db,"quizResults"),where("uid","==",currentUser.uid));const snapshot=await getDocs(q);const resultMap={};const monthPrefix=calendarYear+"-"+pad2(calendarMonth+1)+"-";snapshot.forEach(function(docSnap){const data=docSnap.data();if(data&&data.date&&String(data.date).indexOf(monthPrefix)===0)resultMap[data.date]=data.result||""});renderCalendarSkeleton(resultMap);status.textContent="回答記録を表示しています。○または×をクリックすると、その日の結果を確認できます。"}catch(error){console.error(error);renderCalendarSkeleton({});status.textContent="回答記録の読み込みに失敗しました。Firestoreのルールを確認してください。"}}document.getElementById("prevMonthBtn").addEventListener("click",function(){calendarMonth--;if(calendarMonth<0){calendarMonth=11;calendarYear--}loadCalendarResults()});document.getElementById("nextMonthBtn").addEventListener("click",function(){calendarMonth++;if(calendarMonth>11){calendarMonth=0;calendarYear++}loadCalendarResults()});onAuthStateChanged(auth,function(user){if(!user){location.href="login.html";return}currentUser=user;document.getElementById("userInfo").textContent="ログイン中："+user.email;loadCalendarResults()});document.getElementById("logoutBtn").addEventListener("click",async function(){try{await signOut(auth);location.href="login.html"}catch(error){console.error(error);alert("ログアウトに失敗しました。")}});renderCalendarSkeleton({});
