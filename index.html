div class="right-column"><div class="speech-title-wrap"><div id="almanacTitle" class="speech-title">今日はこんな日</div></div><div class="right-sidebar"><div id="almanacStatus" class="almanac-status">ALMANAC_INLINE_YOMI_V2：暦情報スクリプト起動待ち...</div><div id="almanacList" class="almanac-list"></div><div id="almanacDescription" class="almanac-description"><div class="almanac-description-title">説明</div><div id="almanacDescriptionText">暦情報の項目名や内容にカーソルを合わせると、読み仮名と意味が表示されます。</div></div></div></div></div>

<script>
(function(){var statusEl=document.getElementById("almanacStatus");var listEl=document.getElementById("almanacList");var titleEl=document.getElementById("almanacTitle");var descText=document.getElementById("almanacDescriptionText");try{if(!statusEl||!listEl||!titleEl)return;statusEl.textContent="ALMANAC_INLINE_YOMI_V2：JavaScript起動済み。CSV確認中...";var defaultDescription="暦情報の項目名や内容にカーソルを合わせると、読み仮名と意味が表示されます。";var labelYomi={"祝日":"しゅくじつ","六曜":"ろくよう","五節句":"ごせっく","選日":"せんじつ","二十四節気":"にじゅうしせっき","七十二候":"しちじゅうにこう","日干支":"ひかんし","月干支":"つきかんし","年干支":"としかんし"};var labelDescriptions={"祝日":"国民の祝日に関する法律で定められた休日です。","六曜":"先勝・友引・先負・仏滅・大安・赤口の6種類からなる暦注です。日ごとの吉凶の目安として、慣習的に使われてきました。","五節句":"季節の節目として古くから行われてきた年中行事です。","選日":"暦の上で特定の意味を持つ日を示す暦注です。一粒万倍日や不成就日などが含まれます。","二十四節気":"1年を24の時期に分け、季節の移り変わりを表したものです。","七十二候":"二十四節気をさらに約5日ごとに分け、自然や動植物の変化で季節を表したものです。","日干支":"その日に割り当てられる十干十二支の組み合わせです。","月干支":"その月に割り当てられる十干十二支の組み合わせです。","年干支":"その年に割り当てられる十干十二支の組み合わせです。"};var valueYomi={"先勝":"せんしょう／さきがち","友引":"ともびき","先負":"せんぶ／さきまけ","仏滅":"ぶつめつ","大安":"たいあん","赤口":"しゃっこう／しゃっく","一粒万倍日":"いちりゅうまんばいび","天赦日":"てんしゃにち","不成就日":"ふじょうじゅび","三隣亡":"さんりんぼう","寅の日":"とらのひ","巳の日":"みのひ","己巳の日":"つちのとみのひ","大明日":"だいみょうにち","母倉日":"ぼそうにち","月徳日":"つきとくにち","神吉日":"かみよしにち","鬼宿日":"きしゅくにち","天恩日":"てんおんにち","立春":"りっしゅん","雨水":"うすい","啓蟄":"けいちつ","春分":"しゅんぶん","清明":"せいめい","穀雨":"こくう","立夏":"りっか","小満":"しょうまん","芒種":"ぼうしゅ","夏至":"げし","小暑":"しょうしょ","大暑":"たいしょ","立秋":"りっしゅう","処暑":"しょしょ","白露":"はくろ","秋分":"しゅうぶん","寒露":"かんろ","霜降":"そうこう","立冬":"りっとう","小雪":"しょうせつ","大雪":"たいせつ","冬至":"とうじ","小寒":"しょうかん","大寒":"だいかん","腐草為蛍":"くされたるくさほたるとなる","丙辰":"ひのえたつ","甲午":"きのえうま","丙午":"ひのえうま"};var valueDescriptions={"先勝":"六曜の一つで、一般に午前は吉、午後は慎重に過ごすとされます。","友引":"六曜の一つで、勝負がつきにくい日とされます。","先負":"六曜の一つで、一般に午前は控えめに、午後は吉とされます。","仏滅":"六曜の一つで、一般に物事を慎重に進める日とされます。","大安":"六曜の一つで、一般に『大いに安し』とされ、祝い事や新しいことを始めるのに良い日とされます。","赤口":"六曜の一つで、一般に正午ごろを除き慎重に過ごす日とされます。","一粒万倍日":"ひと粒の種が万倍に実るという意味から、物事を始めるのに良い日とされます。","天赦日":"暦の上で特に吉日とされる日です。新しいことを始める日として扱われることがあります。","不成就日":"物事が成就しにくい日とされます。慣習的な目安であり、過度に気にしすぎないことも大切です。","三隣亡":"建築関係で慎重に扱われてきた選日の一つです。地域や業界の慣習により扱いが異なります。","大明日":"天地が明るく照らされる日とされ、建築・移転・旅行などによい日とされることがあります。","母倉日":"母が子を育てるように天が人を慈しむ日とされ、慶事によい日とされることがあります。","月徳日":"その月の福徳を得られる日とされ、物事を進めるのによい日とされることがあります。","神吉日":"神社参拝や祭礼など、神事に関することによい日とされます。","天恩日":"天の恩恵を受ける日とされ、慶事などによい日とされることがあります。","腐草為蛍":"七十二候の一つで、腐った草が蛍になると表現される頃です。実際には、湿った草むらから蛍が現れ始める季節感を表しています。","芒種":"二十四節気の一つで、稲や麦など芒のある穀物の種をまく頃とされます。","夏至":"二十四節気の一つで、1年のうち昼の時間が最も長くなる頃です。","冬至":"二十四節気の一つで、1年のうち昼の時間が最も短くなる頃です。"};function parseCsvLine(line){var result=[];var current="";var inQuotes=false;for(var i=0;i<line.length;i++){var ch=line.charAt(i);if(ch==='"'){if(inQuotes&&line.charAt(i+1)==='"'){current+='"';i++}else inQuotes=!inQuotes}else if(ch===","&&!inQuotes){result.push(current);current=""}else current+=ch}result.push(current);return result}function cleanTerm(value){var s=String(value||"").trim();var p=s.indexOf("（");if(p>=0)s=s.substring(0,p);p=s.indexOf("(");if(p>=0)s=s.substring(0,p);return s.trim()}function displayTitleWithYomi(title,yomi){return yomi?title+"（"+yomi+"）":title}function setDescription(title,yomi,text){if(descText)descText.textContent=displayTitleWithYomi(title,yomi)+"：\n"+text}function attachHelp(el,title,yomi,text){if(!text)return;el.className=el.className+" almanac-help-target";el.setAttribute("title",displayTitleWithYomi(title,yomi)+"："+text);el.onmouseenter=function(){setDescription(title,yomi,text)};el.onclick=function(){setDescription(title,yomi,text)}}function valueDescription(label,value){var term=cleanTerm(value);if(label==="その他")return "";if(valueDescriptions[term])return valueDescriptions[term];if(label==="日干支"||label==="月干支"||label==="年干支")return term+"は、十干と十二支を組み合わせた暦の表し方です。";if(label==="七十二候")return term+"は七十二候の一つで、自然や動植物の変化を表す季節の言葉です。";if(label==="祝日")return term+"は国民の祝日または休日として扱われる日です。";return ""}function valueYomigana(value){return valueYomi[cleanTerm(value)]||""}function splitValues(value,label){var s=String(value||"");if(label==="日干支"||label==="月干支"||label==="年干支"||label==="七十二候")return [s];var arr=[];var cur="";for(var i=0;i<s.length;i++){var ch=s.charAt(i);if(ch==="、"||ch===","||ch==="・"||ch==="／"||ch==="/"||ch===" "||ch==="　"){if(cur){arr.push(cur);cur=""}}else cur+=ch}if(cur)arr.push(cur);return arr}function renderItems(items){titleEl.style.display="";statusEl.textContent="";listEl.innerHTML="";for(var i=0;i<items.length;i++){var item=items[i];var box=document.createElement("div");box.className="almanac-item";var line=document.createElement("div");line.className="almanac-line";var title=document.createElement("span");title.className="almanac-item-title";title.textContent=item.label;attachHelp(title,item.label,labelYomi[item.label]||"",labelDescriptions[item.label]);line.appendChild(title);var colon=document.createElement("span");colon.className="almanac-colon";colon.textContent="：";line.appendChild(colon);var text=document.createElement("span");text.className="almanac-item-text";if(item.label==="その他"){text.textContent=item.value}else{var values=splitValues(item.value,item.label);if(values.length<=1){var span=document.createElement("span");span.textContent=cleanTerm(item.value);attachHelp(span,cleanTerm(item.value),valueYomigana(item.value),valueDescription(item.label,item.value));text.appendChild(span)}else{for(var v=0;v<values.length;v++){var chip=document.createElement("span");chip.className="almanac-value-chip";chip.textContent=cleanTerm(values[v]);attachHelp(chip,cleanTerm(values[v]),valueYomigana(values[v]),valueDescription(item.label,values[v]));text.appendChild(chip);if(v<values.length-1)text.appendChild(document.createTextNode("・"))}}}line.appendChild(text);box.appendChild(line);listEl.appendChild(box)}if(descText)descText.textContent=defaultDescription}var now=new Date();var y=now.getFullYear();var m=String(now.getMonth()+1).padStart(2,"0");var d=String(now.getDate()).padStart(2,"0");var todayKey=y+"-"+m+"-"+d;var labelMap={holiday:"祝日",rokuyo:"六曜",gosekku:"五節句",senjitsu:"選日",nijushisekki:"二十四節気",shichijunikou:"七十二候",nikkanshi:"日干支",tsukikanshi:"月干支",nenkanshi:"年干支",other:"その他"};var xhr=new XMLHttpRequest();xhr.open("GET","almanac.csv?v="+new Date().getTime(),true);xhr.overrideMimeType("text/plain; charset=UTF-8");xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status!==200){statusEl.textContent="ALMANAC_INLINE_YOMI_V2：almanac.csv の取得に失敗しました。HTTP status="+xhr.status;return}try{var text=xhr.responseText||"";if(text.length>0&&text.charCodeAt(0)===65279)text=text.substring(1);text=text.split(String.fromCharCode(13)).join("");var rawLines=text.split(String.fromCharCode(10));var lines=[];for(var i=0;i<rawLines.length;i++){if(rawLines[i]&&rawLines[i].trim()!=="")lines.push(rawLines[i])}if(lines.length<=1){statusEl.textContent="ALMANAC_INLINE_YOMI_V2：almanac.csv にデータが入っていません。";return}var headerRaw=parseCsvLine(lines[0]);var header=[];for(var h=0;h<headerRaw.length;h++)header.push(headerRaw[h].trim().toLowerCase());var dateIndex=header.indexOf("date");if(dateIndex===-1){statusEl.textContent="ALMANAC_INLINE_YOMI_V2：almanac.csv の1行目に date 列が必要です。";return}var row=null;for(var r=1;r<lines.length;r++){var cols=parseCsvLine(lines[r]);if(String(cols[dateIndex]||"").trim()===todayKey){row=cols;break}}if(!row){statusEl.textContent="ALMANAC_INLINE_YOMI_V2：本日の暦情報が見つかりません。対象日："+todayKey;listEl.innerHTML="";return}var items=[];var keys=Object.keys(labelMap);for(var k=0;k<keys.length;k++){var key=keys[k];var index=header.indexOf(key);if(index!==-1){var value=String(row[index]||"").trim();if(value&&value.toLowerCase()!=="nan")items.push({label:labelMap[key],value:value})}}if(items.length===0){titleEl.style.display="none";statusEl.textContent="";listEl.innerHTML="";return}renderItems(items)}catch(error){console.error(error);statusEl.textContent="ALMANAC_INLINE_YOMI_V2：almanac.csv の解析中にエラーが発生しました。"}};xhr.onerror=function(){statusEl.textContent="ALMANAC_INLINE_YOMI_V2：almanac.csv の通信に失敗しました。"};xhr.send()}catch(e){if(statusEl)statusEl.textContent="ALMANAC_INLINE_YOMI_V2：暦情報スクリプト開始時にエラーが発生しました。"+e.message;console.error(e)}})();

import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";import{getFirestore,collection,query,where,getDocs}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",projectId:"bizmon-31ffc"};const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;let calendarYear=new Date().getFullYear();let calendarMonth=new Date().getMonth();function pad2(num){return String(num).padStart(2,"0")}function toDateKey(year,monthIndex,day){return year+"-"+pad2(monthIndex+1)+"-"+pad2(day)}function renderCalendarSkeleton(resultMap){const grid=document.getElementById("calendarGrid");const title=document.getElementById("calendarTitle");grid.innerHTML="";title.textContent=calendarYear+"年"+(calendarMonth+1)+"月";const weekdays=["日","月","火","水","木","金","土"];weekdays.forEach(function(w){const cell=document.createElement("div");cell.className="calendar-weekday";cell.textContent=w;grid.appendChild(cell)});const firstWeekday=new Date(calendarYear,calendarMonth,1).getDay();const lastDate=new Date(calendarYear,calendarMonth+1,0).getDate();for(let i=0;i<firstWeekday;i++){const empty=document.createElement("div");empty.className="calendar-day empty";grid.appendChild(empty)}const today=new Date();const todayKey=toDateKey(today.getFullYear(),today.getMonth(),today.getDate());for(let day=1;day<=lastDate;day++){const dateKey=toDateKey(calendarYear,calendarMonth,day);const dayCell=document.createElement("div");dayCell.className="calendar-day";if(dateKey===todayKey)dayCell.className+=" today";const number=document.createElement("div");number.className="day-number";number.textContent=day;dayCell.appendChild(number);if(resultMap&&resultMap[dateKey]){const mark=document.createElement("a");mark.href="calendar-result.html?date="+encodeURIComponent(dateKey);mark.title=dateKey+" の回答結果を見る";if(resultMap[dateKey]==="correct"){mark.className="day-mark correct";mark.textContent="○"}else if(resultMap[dateKey]==="incorrect"){mark.className="day-mark incorrect";mark.textContent="×"}dayCell.appendChild(mark)}grid.appendChild(dayCell)}}async function loadCalendarResults(){const status=document.getElementById("calendarStatus");if(!currentUser){status.textContent="ログイン確認後に記録を読み込みます。";renderCalendarSkeleton({});return}try{status.textContent="回答記録を読み込み中...";const q=query(collection(db,"quizResults"),where("uid","==",currentUser.uid));const snapshot=await getDocs(q);const resultMap={};const monthPrefix=calendarYear+"-"+pad2(calendarMonth+1)+"-";snapshot.forEach(function(docSnap){const data=docSnap.data();if(data&&data.date&&String(data.date).indexOf(monthPrefix)===0)resultMap[data.date]=data.result||""});renderCalendarSkeleton(resultMap);status.textContent="回答記録を表示しています。○または×をクリックすると、その日の結果を確認できます。"}catch(error){console.error(error);renderCalendarSkeleton({});status.textContent="回答記録の読み込みに失敗しました。Firestoreのルールを確認してください。"}}document.getElementById("prevMonthBtn").addEventListener("click",function(){calendarMonth--;if(calendarMonth<0){calendarMonth=11;calendarYear--}loadCalendarResults()});document.getElementById("nextMonthBtn").addEventListener("click",function(){calendarMonth++;if(calendarMonth>11){calendarMonth=0;calendarYear++}loadCalendarResults()});onAuthStateChanged(auth,function(user){if(!user){location.href="login.html";return}currentUser=user;document.getElementById("userInfo").textContent="ログイン中："+user.email;loadCalendarResults()});document.getElementById("logoutBtn").addEventListener("click",async function(){try{await signOut(auth);location.href="login.html"}catch(error){console.error(error);alert("ログアウトに失敗しました。")}});renderCalendarSkeleton({});
