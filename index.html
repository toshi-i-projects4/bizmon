play:inline-block;margin:2px 4px 2px 0;padding:1px 4px}.almanac-description{margin-top:14px;background:#fff;border:1px solid #dbeafe;border-left:4px solid #2563eb;border-radius:10px;padding:12px 14px;color:#1e3a8a;font-size:13px;line-height:1.7;white-space:pre-wrap}.almanac-description-title{font-weight:bold;color:#1e40af;margin-bottom:4px}.calendar-card{margin-top:8px;border:1px solid #e5e7eb;border-radius:14px;padding:12px;background:#f9fafb;text-align:left}.calendar-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}.calendar-title{font-size:18px;font-weight:bold;color:#111827;text-align:center;flex:1}.calendar-nav-btn{border:none;border-radius:9px;background:#2563eb;color:white;padding:7px 10px;cursor:pointer;font-size:12px}.calendar-status{font-size:12px;color:#6b7280;margin-bottom:6px;white-space:pre-wrap}.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.calendar-weekday{text-align:center;font-size:12px;font-weight:bold;color:#4b5563;padding:3px 0}.calendar-day{min-height:46px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:4px;box-sizing:border-box;position:relative}.calendar-day.empty{background:transparent;border:none}.calendar-day.today{border:2px solid #2563eb}.day-number{font-size:12px;color:#374151;font-weight:bold}.day-mark{position:absolute;right:6px;bottom:4px;font-size:20px;font-weight:bold;line-height:1;text-decoration:none;cursor:pointer}.day-mark.correct{color:#16a34a}.day-mark.incorrect{color:#dc2626}.day-mark:hover{transform:scale(1.12)}.calendar-legend{display:flex;gap:12px;align-items:center;font-size:12px;color:#4b5563;margin-top:6px}.legend-correct{color:#16a34a;font-weight:bold}.legend-incorrect{color:#dc2626;font-weight:bold}@media(max-width:1000px){body{padding-top:8px}.top-bar{grid-template-columns:1fr;row-gap:10px;justify-items:center;min-height:auto}.layout{flex-direction:column;margin-top:10px}.left-sidebar,.main-content,.right-column,.right-sideba <script>
(function(){
var statusEl=document.getElementById("almanacStatus");var listEl=document.getElementById("almanacList");var titleEl=document.getElementById("almanacTitle");var descText=document.getElementById("almanacDescriptionText");
if(!statusEl||!listEl||!titleEl)return;
statusEl.textContent="CSV確認中...";
var defaultDescription="暦情報の項目名や内容にカーソルを合わせると、意味が表示されます。";
var labelDescriptions={"祝日":"祝日とは、国民の祝日に関する法律で定められた休日です。季節の節目や歴史的・文化的な意味を持つ日が含まれます。","六曜":"六曜とは、先勝・友引・先負・仏滅・大安・赤口の6種類からなる暦注です。日ごとの吉凶の目安として、慣習的に使われてきました。","五節句":"五節句とは、季節の節目として古くから行われてきた年中行事です。人日・上巳・端午・七夕・重陽の5つがあります。","選日":"選日とは、暦の上で特定の意味を持つ日を示す暦注です。一粒万倍日や不成就日など、慣習的な目安として扱われます。","二十四節気":"二十四節気とは、1年を24の時期に分け、季節の移り変わりを表したものです。立春・春分・夏至・冬至などがあります。","七十二候":"七十二候とは、二十四節気をさらに約5日ごとに分け、自然や動植物の変化で季節を表したものです。","日干支":"日干支とは、その日に割り当てられる十干十二支の組み合わせです。暦や占い、年中行事の文脈で用いられてきました。","月干支":"月干支とは、その月に割り当てられる十干十二支の組み合わせです。暦の補足情報として使われます。","年干支":"年干支とは、その年に割り当てられる十干十二支の組み合わせです。一般には十二支の年として知られています。"};
var valueDescriptions={"先勝":"先勝は六曜の一つで、一般に午前は吉、午後は慎重に過ごすとされます。","友引":"友引は六曜の一つで、勝負がつきにくい日とされます。慣習上、葬儀を避ける地域もあります。","先負":"先負は六曜の一つで、一般に午前は控えめに、午後は吉とされます。","仏滅":"仏滅は六曜の一つで、一般に物事を慎重に進める日とされます。","大安":"大安は六曜の一つで、一般に『大いに安し』とされ、祝い事や新しいことを始めるのに良い日とされます。","赤口":"赤口は六曜の一つで、一般に正午ごろを除き慎重に過ごす日とされます。","一粒万倍日":"一粒万倍日は、ひと粒の種が万倍に実るという意味から、物事を始めるのに良い日とされます。","天赦日":"天赦日は、暦の上で特に吉日とされる日です。新しいことを始める日として扱われることがあります。","不成就日":"不成就日は、物事が成就しにくい日とされます。慣習的な目安であり、過度に気にしすぎないことも大切です。","立春":"立春は二十四節気の一つで、暦の上で春の始まりとされます。","雨水":"雨水は二十四節気の一つで、雪が雨に変わり、氷が解け始める頃とされます。","啓蟄":"啓蟄は二十四節気の一つで、冬ごもりしていた虫が動き出す頃とされます。","春分":"春分は二十四節気の一つで、昼と夜の長さがほぼ同じになる頃です。","清明":"清明は二十四節気の一つで、万物が清らかで明るく感じられる頃とされます。","穀雨":"穀雨は二十四節気の一つで、穀物を育てる春の雨が降る頃とされます。","立夏":"立夏は二十四節気の一つで、暦の上で夏の始まりとされます。","小満":"小満は二十四節気の一つで、草木が成長し、生命が満ち始める頃とされます。","芒種":"芒種は二十四節気の一つで、稲や麦など芒のある穀物の種をまく頃とされます。","夏至":"夏至は二十四節気の一つで、1年のうち昼の時間が最も長くなる頃です。","小暑":"小暑は二十四節気の一つで、暑さが本格的になり始める頃とされます。","大暑":"大暑は二十四節気の一つで、1年のうち暑さが最も厳しい頃とされます。","立秋":"立秋は二十四節気の一つで、暦の上で秋の始まりとされます。","処暑":"処暑は二十四節気の一つで、暑さが少しずつおさまる頃とされます。","白露":"白露は二十四節気の一つで、草花に露がつき始める頃とされます。","秋分":"秋分は二十四節気の一つで、昼と夜の長さがほぼ同じになる頃です。","寒露":"寒露は二十四節気の一つで、草木に冷たい露が宿る頃とされます。","霜降":"霜降は二十四節気の一つで、霜が降り始める頃とされます。","立冬":"立冬は二十四節気の一つで、暦の上で冬の始まりとされます。","小雪":"小雪は二十四節気の一つで、雪が降り始める頃とされます。","大雪":"大雪は二十四節気の一つで、雪が本格的に降る頃とされます。","冬至":"冬至は二十四節気の一つで、1年のうち昼の時間が最も短くなる頃です。","小寒":"小寒は二十四節気の一つで、寒さが厳しくなり始める頃とされます。","大寒":"大寒は二十四節気の一つで、1年のうち寒さが最も厳しい頃とされます。"};
function parseCsvLine(line){var result=[];var current="";var inQuotes=false;for(var i=0;i<line.length;i++){var ch=line.charAt(i);if(ch==='"'){if(inQuotes&&line.charAt(i+1)==='"'){current+='"';i++}else{inQuotes=!inQuotes}}else if(ch===","&&!inQuotes){result.push(current);current=""}else{current+=ch}}result.push(current);return result}
function setDescription(title,text){if(descText){descText.textContent=title+"：
"+text}}
function attachHelp(el,title,text){if(!text)return;el.classList.add("almanac-help-target");el.setAttribute("title",title+"："+text);el.addEventListener("mouseenter",function(){setDescription(title,text)});el.addEventListener("focus",function(){setDescription(title,text)});el.addEventListener("click",function(){setDescription(title,text)});}
function valueDescription(label,value){if(label==="その他")return "";if(valueDescriptions[value])return valueDescriptions[value];if(label==="日干支"||label==="月干支"||label==="年干支"){return value+"は、十干と十二支を組み合わせた暦の表し方です。暦や季節感を示す補足情報として使われます。"}if(label==="七十二候"){return value+"は七十二候の一つで、自然や動植物の変化を表す季節の言葉です。"}if(label==="祝日"){return value+"は国民の祝日または休日として扱われる日です。"}return "";}
function splitValues(value){var s=String(value||"");var arr=[];var cur="";for(var i=0;i<s.length;i++){var ch=s.charAt(i);if(ch==="、"||ch===","||ch==="・"||ch==="／"||ch==="/"||ch===" "||ch==="　"||ch==="	"){if(cur){arr.push(cur);cur=""}}else{cur+=ch}}if(cur)arr.push(cur);return arr;}
function renderItems(items){titleEl.style.display="";statusEl.textContent="";listEl.innerHTML="";for(var i=0;i<items.length;i++){var item=items[i];var box=document.createElement("div");box.className="almanac-item";var title=document.createElement("div");title.className="almanac-item-title";title.textContent=item.label;attachHelp(title,item.label,labelDescriptions[item.label]);box.appendChild(title);var text=document.createElement("div");text.className="almanac-item-text";if(item.label==="その他"){text.textContent=item.value}else{var values=splitValues(item.value);if(values.length<=1){var span=document.createElement("span");span.textContent=item.value;attachHelp(span,item.value,valueDescription(item.label,item.value));text.appendChild(span)}else{for(var v=0;v<values.length;v++){var chip=document.createElement("span");chip.className="almanac-value-chip";chip.textContent=values[v];attachHelp(chip,values[v],valueDescription(item.label,values[v]));text.appendChild(chip)}}}box.appendChild(text);listEl.appendChild(box)}if(descText)descText.textContent=defaultDescription}
var now=new Date();var y=now.getFullYear();var m=String(now.getMonth()+1).padStart(2,"0");var d=String(now.getDate()).padStart(2,"0");var todayKey=y+"-"+m+"-"+d;var labelMap={holiday:"祝日",rokuyo:"六曜",gosekku:"五節句",senjitsu:"選日",nijushisekki:"二十四節気",shichijunikou:"七十二候",nikkanshi:"日干支",tsukikanshi:"月干支",nenkanshi:"年干支",other:"その他"};var xhr=new XMLHttpRequest();xhr.open("GET","almanac.csv?v="+new Date().getTime(),true);xhr.overrideMimeType("text/plain; charset=UTF-8");xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status!==200){statusEl.textContent="almanac.csv の取得に失敗しました。HTTP status="+xhr.status;return}try{var text=xhr.responseText||"";if(text.length>0&&text.charCodeAt(0)===65279)text=text.substring(1);text=text.split(String.fromCharCode(13)).join("");var rawLines=text.split(String.fromCharCode(10));var lines=[];for(var i=0;i<rawLines.length;i++){if(rawLines[i]&&rawLines[i].trim()!=="")lines.push(rawLines[i])}if(lines.length<=1){statusEl.textContent="almanac.csv にデータが入っていません。";return}var headerRaw=parseCsvLine(lines[0]);var header=[];for(var h=0;h<headerRaw.length;h++)header.push(headerRaw[h].trim().toLowerCase());var dateIndex=header.indexOf("date");if(dateIndex===-1){statusEl.textContent="almanac.csv の1行目に date 列が必要です。";return}var row=null;for(var r=1;r<lines.length;r++){var cols=parseCsvLine(lines[r]);if(String(cols[dateIndex]||"").trim()===todayKey){row=cols;break}}if(!row){statusEl.textContent="本日の暦情報が見つかりません。対象日："+todayKey;listEl.innerHTML="";return}var items=[];var keys=Object.keys(labelMap);for(var k=0;k<keys.length;k++){var key=keys[k];var index=header.indexOf(key);if(index!==-1){var value=String(row[index]||"").trim();if(value&&value.toLowerCase()!=="nan")items.push({label:labelMap[key],value:value})}}if(items.length===0){titleEl.style.display="none";statusEl.textContent="";listEl.innerHTML="";return}renderItems(items)}catch(error){console.error(error);statusEl.textContent="almanac.csv の解析中にエラーが発生しました。"}};xhr.onerror=function(){statusEl.textContent="almanac.csv の通信に失敗しました。"};xhr.send()})();

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";import{getFirestore,collection,query,where,getDocs}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",projectId:"bizmon-31ffc"};const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;let calendarYear=new Date().getFullYear();let calendarMonth=new Date().getMonth();function pad2(num){return String(num).padStart(2,"0")}function toDateKey(year,monthIndex,day){return year+"-"+pad2(monthIndex+1)+"-"+pad2(day)}function renderCalendarSkeleton(resultMap){const grid=document.getElementById("calendarGrid");const title=document.getElementById("calendarTitle");grid.innerHTML="";title.textContent=calendarYear+"年"+(calendarMonth+1)+"月";const weekdays=["日","月","火","水","木","金","土"];weekdays.forEach(function(w){const cell=document.createElement("div");cell.className="calendar-weekday";cell.textContent=w;grid.appendChild(cell)});const firstWeekday=new Date(calendarYear,calendarMonth,1).getDay();const lastDate=new Date(calendarYear,calendarMonth+1,0).getDate();for(let i=0;i<firstWeekday;i++){const empty=document.createElement("div");empty.className="calendar-day empty";grid.appendChild(empty)}const today=new Date();const todayKey=toDateKey(today.getFullYear(),today.getMonth(),today.getDate());for(let day=1;day<=lastDate;day++){const dateKey=toDateKey(calendarYear,calendarMonth,day);const dayCell=document.createElement("div");dayCell.className="calendar-day";if(dateKey===todayKey)dayCell.className+=" today";const number=document.createElement("div");number.className="day-number";number.textContent=day;dayCell.appendChild(number);if(resultMap&&resultMap[dateKey]){const mark=document.createElement("a");mark.href="calendar-result.html?date="+encodeURIComponent(dateKey);mark.title=dateKey+" の回答結果を見る";if(resultMap[dateKey]==="correct"){mark.className="day-mark correct";mark.textContent="○"}else if(resultMap[dateKey]==="incorrect"){mark.className="day-mark incorrect";mark.textContent="×"}dayCell.appendChild(mark)}grid.appendChild(dayCell)}}async function loadCalendarResults(){const status=document.getElementById("calendarStatus");if(!currentUser){status.textContent="ログイン確認後に記録を読み込みます。";renderCalendarSkeleton({});return}try{status.textContent="回答記録を読み込み中...";const q=query(collection(db,"quizResults"),where("uid","==",currentUser.uid));const snapshot=await getDocs(q);const resultMap={};const monthPrefix=calendarYear+"-"+pad2(calendarMonth+1)+"-";snapshot.forEach(function(docSnap){const data=docSnap.data();if(data&&data.date&&String(data.date).indexOf(monthPrefix)===0)resultMap[data.date]=data.result||""});renderCalendarSkeleton(resultMap);status.textContent="回答記録を表示しています。○または×をクリックすると、その日の結果を確認できます。"}catch(error){console.error(error);renderCalendarSkeleton({});status.textContent="回答記録の読み込みに失敗しました。Firestoreのルールを確認してください。"}}document.getElementById("prevMonthBtn").addEventListener("click",function(){calendarMonth--;if(calendarMonth<0){calendarMonth=11;calendarYear--}loadCalendarResults()});document.getElementById("nextMonthBtn").addEventListener("click",function(){calendarMonth++;if(calendarMonth>11){calendarMonth=0;calendarYear++}loadCalendarResults()});onAuthStateChanged(auth,function(user){if(!user){location.href="login.html";return}currentUser=user;document.getElementById("userInfo").textContent="ログイン中："+user.email;loadCalendarResults()});document.getElementById("logoutBtn").addEventListener("click",async function(){try{await signOut(auth);location.href="login.html"}catch(error){console.error(error);alert("ログアウトに失敗しました。")}});renderCalendarSkeleton({});
