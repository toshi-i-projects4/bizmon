<script>
(function(){var statusEl=document.getElementById("almanacStatus"),listEl=document.getElementById("almanacList"),titleEl=document.getElementById("almanacTitle"),descText=document.getElementById("almanacDescriptionText");try{if(!statusEl||!listEl||!titleEl)return;statusEl.textContent="ALMANAC_ORDER_RESET_V1：JavaScript起動済み。CSV確認中...";var defaultDescription="暦情報の項目名や内容にカーソルを合わせると、読み仮名と意味が表示されます。";function parseCsvLine(line){var result=[],current="",inQuotes=false;for(var i=0;i<line.length;i++){var ch=line.charAt(i);if(ch==='"'){if(inQuotes&&line.charAt(i+1)==='"'){current+='"';i++}else inQuotes=!inQuotes}else if(ch===","&&!inQuotes){result.push(current);current=""}else current+=ch}result.push(current);return result}function resetDescription(){if(descText)descText.textContent=defaultDescription}function setDescription(title,text){if(descText)descText.textContent=title+"：\n"+text}function attachHelp(el,title,text){if(!text)return;el.className=el.className+" almanac-help-target";el.onmouseenter=function(){setDescription(title,text)};el.onmouseleave=function(){resetDescription()};el.onclick=function(){setDescription(title,text)}}function renderItems(items){titleEl.style.display="";statusEl.textContent="";listEl.innerHTML="";for(var i=0;i<items.length;i++){var item=items[i],box=document.createElement("div"),line=document.createElement("div"),title=document.createElement("span"),colon=document.createElement("span"),text=document.createElement("span");box.className="almanac-item";line.className="almanac-line";title.className="almanac-item-title";title.textContent=item.label;attachHelp(title,item.label,item.label+"に関する暦情報です。");line.appendChild(title);colon.className="almanac-colon";colon.textContent="：";line.appendChild(colon);text.className="almanac-item-text";text.textContent=item.value;line.appendChild(text);box.appendChild(line);listEl.appendChild(box)}resetDescription()}var now=new Date(),todayKey=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0"),labelMap={other:"たとえば",holiday:"祝日",rokuyo:"六曜",gosekku:"五節句",senjitsu:"選日",nijushisekki:"二十四節気",shichijunikou:"七十二候",nikkanshi:"日干支",tsukikanshi:"月干支",nenkanshi:"年干支"};var xhr=new XMLHttpRequest();xhr.open("GET","almanac.csv?v="+new Date().getTime(),true);xhr.overrideMimeType("text/plain; charset=UTF-8");xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status!==200){statusEl.textContent="almanac.csv の取得に失敗しました。HTTP status="+xhr.status;return}try{var text=xhr.responseText||"";if(text.length>0&&text.charCodeAt(0)===65279)text=text.substring(1);text=text.split(String.fromCharCode(13)).join("");var rawLines=text.split(String.fromCharCode(10)),lines=[];for(var i=0;i<rawLines.length;i++){if(rawLines[i]&&rawLines[i].trim()!=="")lines.push(rawLines[i])}var headerRaw=parseCsvLine(lines[0]),header=[];for(var h=0;h<headerRaw.length;h++)header.push(headerRaw[h].trim().toLowerCase());var dateIndex=header.indexOf("date"),row=null;for(var r=1;r<lines.length;r++){var cols=parseCsvLine(lines[r]);if(String(cols[dateIndex]||"").trim()===todayKey){row=cols;break}}if(!row){statusEl.textContent="本日の暦情報が見つかりません。対象日："+todayKey;return}var items=[],keys=Object.keys(labelMap);for(var k=0;k<keys.length;k++){var key=keys[k],idx=header.indexOf(key);if(idx!==-1){var value=String(row[idx]||"").trim();if(value&&value.toLowerCase()!=="nan")items.push({label:labelMap[key],value:value})}}renderItems(items)}catch(error){console.error(error);statusEl.textContent="almanac.csv の解析中にエラーが発生しました。"}};xhr.onerror=function(){statusEl.textContent="almanac.csv の通信に失敗しました。"};xhr.send()}catch(e){if(statusEl)statusEl.textContent="暦情報スクリプト開始時にエラーが発生しました。"+e.message;console.error(e)}})();
</script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";import{getFirestore,collection,query,where,getDocs}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",projectId:"bizmon-31ffc"};const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;let calendarYear=new Date().getFullYear();let calendarMonth=new Date().getMonth();function pad2(num){return String(num).padStart(2,"0")}function toDateKey(year,monthIndex,day){return year+"-"+pad2(monthIndex+1)+"-"+pad2(day)}function renderCalendarSkeleton(resultMap){const grid=document.getElementById("calendarGrid"),title=document.getElementById("calendarTitle");grid.innerHTML="";title.textContent=calendarYear+"年"+(calendarMonth+1)+"月";["日","月","火","水","木","金","土"].forEach(function(w){const cell=document.createElement("div");cell.className="calendar-weekday";cell.textContent=w;grid.appendChild(cell)});const firstWeekday=new Date(calendarYear,calendarMonth,1).getDay(),lastDate=new Date(calendarYear,calendarMonth+1,0).getDate();for(let i=0;i<firstWeekday;i++){const empty=document.createElement("div");empty.className="calendar-day empty";grid.appendChild(empty)}const today=new Date(),todayKey=toDateKey(today.getFullYear(),today.getMonth(),today.getDate());for(let day=1;day<=lastDate;day++){const dateKey=toDateKey(calendarYear,calendarMonth,day),dayCell=document.createElement("div");dayCell.className="calendar-day";if(dateKey===todayKey)dayCell.className+=" today";const number=document.createElement("div");number.className="day-number";number.textContent=day;dayCell.appendChild(number);if(resultMap&&resultMap[dateKey]){const mark=document.createElement("a");mark.href="calendar-result.html?date="+encodeURIComponent(dateKey);mark.title=dateKey+" の回答結果を見る";if(resultMap[dateKey]==="correct"){mark.className="day-mark correct";mark.textContent="○"}else if(resultMap[dateKey]==="incorrect"){mark.className="day-mark incorrect";mark.textContent="×"}dayCell.appendChild(mark)}grid.appendChild(dayCell)}}async function loadCalendarResults(){const status=document.getElementById("calendarStatus");if(!currentUser){status.textContent="ログイン確認後に記録を読み込みます。";renderCalendarSkeleton({});return}try{status.textContent="回答記録を読み込み中...";const q=query(collection(db,"quizResults"),where("uid","==",currentUser.uid)),snapshot=await getDocs(q),resultMap={},monthPrefix=calendarYear+"-"+pad2(calendarMonth+1)+"-";snapshot.forEach(function(docSnap){const data=docSnap.data();if(data&&data.date&&String(data.date).indexOf(monthPrefix)===0)resultMap[data.date]=data.result||""});renderCalendarSkeleton(resultMap);status.textContent="回答記録を表示しています。○または×をクリックすると、その日の結果を確認できます。"}catch(error){console.error(error);renderCalendarSkeleton({});status.textContent="回答記録の読み込みに失敗しました。Firestoreのルールを確認してください。"}}document.getElementById("prevMonthBtn").addEventListener("click",function(){calendarMonth--;if(calendarMonth<0){calendarMonth=11;calendarYear--}loadCalendarResults()});document.getElementById("nextMonthBtn").addEventListener("click",function(){calendarMonth++;if(calendarMonth>11){calendarMonth=0;calendarYear++}loadCalendarResults()});onAuthStateChanged(auth,function(user){if(!user){location.href="login.html";return}currentUser=user;document.getElementById("userInfo").textContent="ログイン中："+user.email;loadCalendarResults()});document.getElementById("logoutBtn").addEventListener("click",async function(){try{await signOut(auth);location.href="login.html"}catch(error){console.error(error);alert("ログアウトに失敗しました。")}});renderCalendarSkeleton({});
