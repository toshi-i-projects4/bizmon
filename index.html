<script>
(function(){
try{
var statusEl=document.getElementById('almanacStatus'),listEl=document.getElementById('almanacList'),descText=document.getElementById('almanacDescriptionText');
var defaultDescription='暦情報の項目名や内容にカーソルを合わせると、読み仮名と意味が表示されます。';
if(!statusEl||!listEl)return;
statusEl.textContent='暦情報を読み込み中...';
var labelMap={other:'たとえば',holiday:'祝日',rokuyo:'六曜',gosekku:'五節句',senjitsu:'選日',nijushisekki:'二十四節気',shichijunikou:'七十二候',nikkanshi:'日干支',tsukikanshi:'月干支',nenkanshi:'年干支'};
var labelToType={'祝日':'祝日','六曜':'六曜','五節句':'五節句','選日':'選日','二十四節気':'二十四節気','七十二候':'七十二候','日干支':'日干支','月干支':'月干支','年干支':'年干支'};
var descMap={};
function parseCsvLine(line){var out=[],cur='',q=false;for(var i=0;i<line.length;i++){var ch=line.charAt(i);if(ch==='"'){if(q&&line.charAt(i+1)==='"'){cur+='"';i++;}else q=!q;}else if(ch===','&&!q){out.push(cur);cur='';}else cur+=ch;}out.push(cur);return out;}
function csvToRows(text){if(text&&text.charCodeAt(0)===65279)text=text.substring(1);var lines=String(text||'').split(/\r?\n/).filter(function(l){return l.trim()!=='';});if(lines.length<2)return [];var header=parseCsvLine(lines[0]).map(function(v){return v.trim();});var rows=[];for(var i=1;i<lines.length;i++){var cols=parseCsvLine(lines[i]),obj={};header.forEach(function(h,idx){obj[h]=cols[idx]!==undefined?cols[idx]:'';});rows.push(obj);}return rows;}
function loadText(file,callback){var xhr=new XMLHttpRequest();xhr.open('GET',file+'?v='+new Date().getTime(),true);xhr.overrideMimeType('text/plain; charset=UTF-8');xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status===200)callback(null,xhr.responseText||'');else callback(new Error(file+' HTTP='+xhr.status));};xhr.onerror=function(){callback(new Error(file+' の通信に失敗しました。'));};xhr.send();}
function normalizeDisplayValue(v){return String(v||'').trim().replace(/[（(][^）)]*[）)]/g,'').trim();}
function splitAlmanacValues(value){var s=String(value||'').trim();if(!s)return [];var arr=[],cur='',depth=0;for(var i=0;i<s.length;i++){var ch=s.charAt(i);if(ch==='（'||ch==='('){depth++;cur+=ch;continue;}if(ch==='）'||ch===')'){depth=Math.max(0,depth-1);cur+=ch;continue;}if(depth===0&&(ch==='、'||ch===','||ch==='／'||ch==='/'||ch==='　'||ch===' ')){if(cur.trim())arr.push(cur.trim());cur='';}else cur+=ch;}if(cur.trim())arr.push(cur.trim());return arr;}
function resetDescription(){if(descText)descText.textContent=defaultDescription;}
function setDescription(title,text){if(!descText)return;var t=String(title||'').trim(),body=String(text||'').trim();if(t&&body.indexOf(t+'（')===0){descText.textContent=body;}else if(t&&body.indexOf(t+'：')===0){descText.textContent=body;}else{descText.textContent=t+'：\n'+body;}}
function addHelp(el,title,text){if(!el||!text)return;el.className=(el.className?el.className+' ':'')+'almanac-help-target';el.setAttribute('tabindex','0');el.setAttribute('title',text);el.onmouseenter=function(){setDescription(title,text);};el.onmouseleave=function(){resetDescription();};el.onfocus=function(){setDescription(title,text);};el.onblur=function(){resetDescription();};el.onclick=function(){setDescription(title,text);};}
function descKey(type,key){return String(type||'').trim()+'|'+normalizeDisplayValue(key);}
function findDesc(label,value){if(label==='たとえば')return '';var type=labelToType[label]||label;var key=normalizeDisplayValue(value);return descMap[descKey(type,key)]||descMap[descKey('項目',key)]||'';}
function renderItems(items){listEl.innerHTML='';if(!items.length){statusEl.textContent='本日の暦情報は空です。';return;}items.forEach(function(item){var box=document.createElement('div'),line=document.createElement('div'),title=document.createElement('span'),colon=document.createElement('span'),text=document.createElement('span');box.className='almanac-item';line.className='almanac-line';title.className='almanac-item-title';title.textContent=item.label;if(item.label!=='たとえば'){var itemDesc=descMap[descKey('項目',item.label)]||'';if(itemDesc)addHelp(title,item.label,itemDesc);}colon.className='almanac-colon';colon.textContent='：';text.className='almanac-item-text';
// 重要：たとえばは本文を分割しない。文章中の空白を「・」へ変換しない。
if(item.label==='たとえば'){
  var chip=document.createElement('span');
  chip.className='almanac-value-chip';
  chip.textContent=String(item.value||'').trim();
  text.appendChild(chip);
}else{
  splitAlmanacValues(item.value).forEach(function(raw,idx,arr){var display=normalizeDisplayValue(raw)||raw;var chip=document.createElement('span');chip.className='almanac-value-chip';chip.textContent=display;var d=findDesc(item.label,raw);if(d)addHelp(chip,display,d);text.appendChild(chip);if(idx<arr.length-1)text.appendChild(document.createTextNode('・'));});
}
line.appendChild(title);line.appendChild(colon);line.appendChild(text);box.appendChild(line);listEl.appendChild(box);});statusEl.textContent='';resetDescription();}
function fallbackToday(){var now=new Date(),w=['日','月','火','水','木','金','土'][now.getDay()];renderItems([{label:'たとえば',value:(now.getMonth()+1)+'月'+now.getDate()+'日（'+w+'）です。今日も1問ずつ 実務に役立つ学びを積み重ねましょう。'}]);statusEl.textContent='';}
function loadDescriptions(done){loadText('almanac_descriptions.csv',function(err,text){if(err){loadText('almanac_descriptions_utf8_bom.csv',function(err2,text2){if(err2){console.warn('説明CSVを読み込めません。説明なしで表示します。',err2);done();return;}buildDesc(text2);done();});return;}buildDesc(text);done();});}
function buildDesc(text){csvToRows(text).forEach(function(r){var enabled=String(r.enabled||'true').toLowerCase();if(enabled==='false')return;var type=String(r.type||'').trim(),key=normalizeDisplayValue(r.key||''),desc=String(r.description||'').trim();if(type&&key&&desc)descMap[descKey(type,key)]=desc;});}
function loadAlmanac(fileIndex){var files=['almanac.csv','calendar_other_yomigana_removed_utf8_bom.csv'],file=files[fileIndex]||files[0],now=new Date(),todayKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');loadText(file,function(err,text){if(err){if(fileIndex+1<files.length){loadAlmanac(fileIndex+1);return;}fallbackToday();return;}try{var rows=csvToRows(text);if(!rows.length){fallbackToday();return;}var row=null;for(var i=0;i<rows.length;i++){if(String(rows[i].date||'').trim()===todayKey){row=rows[i];break;}}if(!row){fallbackToday();return;}var items=[];Object.keys(labelMap).forEach(function(key){var value=String(row[key]||'').trim();if(value&&value.toLowerCase()!=='nan')items.push({label:labelMap[key],value:value});});renderItems(items);}catch(e){console.error('暦情報処理エラー',e);fallbackToday();}});}
loadDescriptions(function(){loadAlmanac(0);});
}catch(e){console.error('暦情報ブロック全体エラー',e);var s=document.getElementById('almanacStatus');if(s)s.textContent='暦情報の読み込みに失敗しました。';}
})();
</script>
