(function(){var BASE_DATE=new Date(2026,5,20);function parseCsvLine(line){var out=[],cur='',q=false;for(var i=0;i<line.length;i++){var ch=line.charAt(i);if(ch==='"'){if(q&&line.charAt(i+1)==='"'){cur+='"';i++;}else q=!q;}else if(ch===','&&!q){out.push(cur);cur='';}else cur+=ch;}out.push(cur);return out;}function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}function daysSinceBase(){var now=new Date();var today=new Date(now.getFullYear(),now.getMonth(),now.getDate());return Math.floor((today-BASE_DATE)/86400000);}function idNumber(id){var m=String(id||'').match(/(\d+)/);return m?Number(m[1]):999999;}function renderTip(text){var area=document.querySelector('.business-message-area');if(!area)return;area.innerHTML='<div class="business-message-line"><span class="business-message-label">ビジネス豆知識：</span><span id="businessTipText">'+escapeHtml(text||'毎日の学び')+'</span></div>';}function loadBusinessTip(){var xhr=new XMLHttpRequest();xhr.open('GET','business-tips.csv?v='+Date.now(),true);xhr.overrideMimeType('text/plain; charset=UTF-8');xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status!==200){renderTip('毎日の学び');return;}try{var text=xhr.responseText||'';if(text.length>0&&text.charCodeAt(0)===65279)text=text.substring(1);var lines=text.split(/\r?\n/).filter(function(l){return l.trim()!=='';});if(lines.length<=1){renderTip('毎日の学び');return;}var header=parseCsvLine(lines[0]).map(function(v){return v.trim().toLowerCase();});var idx={id:header.indexOf('id'),body:header.indexOf('body'),active:header.indexOf('active')};var rows=[];for(var i=1;i<lines.length;i++){var c=parseCsvLine(lines[i]);var active=idx.active>=0?String(c[idx.active]||'true').toLowerCase():'true';if(active==='false')continue;var body=idx.body>=0?String(c[idx.body]||'').trim():'';if(!body)continue;rows.push({id:idx.id>=0?c[idx.id]:'',body:body});}rows.sort(function(a,b){return idNumber(a.id)-idNumbe async function loadUserRole(user){try{const userDocSnap=await getDoc(doc(db,"users",user.uid));currentUserData=userDocSnap.exists()?userDocSnap.data():{};currentRole=currentUserData.role||"user";setAdminMenuVisible(currentRole);setApplicantMenuVisible(currentRole==="admin"&&currentUserData.isApplicant===true);let companyText="";currentCompanyData=null;if(currentUserData.companyId){try{const companySnap=await getDoc(doc(db,"companies",currentUserData.companyId));if(companySnap.exists()){currentCompanyData=companySnap.data();companyText="<br>企業："+(currentCompanyData.companyName||currentUserData.companyId)}else companyText="<br>企業：未登録"}catch(e){console.warn(e);companyText="<br>企業：確認失敗"}}document.getElementById("userInfo").innerHTML="ログイン中："+escapeHtml(user.email)+"<br>権限："+(currentRole==="admin"?"管理者":"一般ユーザー")+companyText;const availability=getCompanyAvailability(currentUserData,currentCompanyData);if(!availability.ok){if(availability.redirectToTerms){setServiceWarning('利用規約への同意が必要です。<br><a href="terms-agreement.html">利用規約ページへ進む</a>');setMainAvailable(false,availability.message,true);setTimeout(function(){location.href="terms-agreement.html"},900)}else{setServiceWarning(escapeHtml(availability.message));setMainAvailable(false,availability.message,false)}return false}setServiceWarning("");setMainAvailable(true,"",false);return true}catch(error){console.error(error);currentRole="user";setAdminMenuVisible("user");setApplicantMenuVisible(false);document.getElementById("userInfo").innerHTML="ログイン中："+escapeHtml(user.email)+"<br>権限：一般ユーザー<br>※権限確認に失敗しました。";setMainAvailable(false,"権限確認に失敗しました。もう一度ログインしてください。",false);return false}}
function renderCalendarSkeleton(resultMap){const grid=document.getElementById("calendarGrid"),title=document.getElementById("calendarTitle");if(!grid||!title)return;grid.innerHTML="";title.textContent=calendarYear+"年"+(calendarMonth+1)+"月";["日","月","火","水","木","金","土"].forEach(function(w){const cell=document.createElement("div");cell.className="calendar-weekday";cell.textContent=w;grid.appendChild(cell)});const firstWeekday=new Date(calendarYear,calendarMonth,1).getDay(),lastDate=new Date(calendarYear,calendarMonth+1,0).getDate();for(let i=0;i<firstWeekday;i++){const empty=document.createElement("div");empty.className="calendar-day empty";grid.appendChild(empty)}const today=new Date(),todayKey=toDateKey(today.getFullYear(),today.getMonth(),today.getDate());for(let day=1;day<=lastDate;day++){const dateKey=toDateKey(calendarYear,calendarMonth,day),dayCell=document.createElement("div");dayCell.className="calendar-day";if(dateKey===todayKey)dayCell.className+=" today";const number=document.createElement("div");number.className="day-number";number.textContent=day;dayCell.appendChild(number);if(resultMap&&resultMap[dateKey]){const mark=document.createElement("a");mark.href=canOpenDetail(dateKey)?"calendar-result.html?date="+encodeURIComponent(dateKey):"#";mark.title=canOpenDetail(dateKey)?dateKey+" の回答結果を見る":"詳細表示期間外です";mark.addEventListener("click",function(ev){if(!canOpenDetail(dateKey)){ev.preventDefault();alert(detailBlockedMessage())}});mark.className="day-mark "+(resultMap[dateKey]==="correct"?"correct":"incorrect");mark.textContent=resultMap[dateKey]==="correct"?"○":"×";dayCell.appendChild(mark)}grid.appendChild(dayCell)}}
async function loadCalendarResults(){const status=document.getElementById("calendarStatus");if(!serviceAvailable){if(status)status.textContent="会社の利用開始後に回答記録を表示します。";renderCalendarSkeleton({});return}if(!currentUser){if(status)status.textContent="ログイン確認後に記録を読み込みます。";renderCalendarSkeleton({});return}const startKey=toDateKey(calendarYear,calendarMonth,1),endKey=toDateKey(calendarYear,calendarMonth,new Date(calendarYear,calendarMonth+1,0).getDate());function collectFromSnapshot(snapshot){const resultMap={};snapshot.forEach(function(docSnap){const data=docSnap.data()||{},key=firstNonEmpty(data.dateKey,data.date);if(key>=startKey&&key<=endKey){const judged=judgeCalendarResult(data);if(judged)resultMap[key]=judged}});return resultMap}async function safeGet(label,q){try{if(status)status.textContent="表示月の回答記録を読み込み中...\n確認中："+label;const snapshot=await getDocs(q);return{label:label,map:collectFromSnapshot(snapshot),count:snapshot.size,error:null}}catch(e){console.warn("calendar query failed:",label,e);return{label:label,map:{},count:0,error:e}}}try{const results=[];if(currentUserData&&currentUserData.companyId){results.push(await safeGet("companyId + uid + dateKey範囲",query(collection(db,"quizResults"),where("companyId","==",currentUserData.companyId),where("uid","==",currentUser.uid),where("dateKey",">=",startKey),where("dateKey","<=",endKey))))}results.push(await safeGet("uid + dateKey範囲",query(collection(db,"quizResults"),where("uid","==",currentUser.uid),where("dateKey",">=",startKey),where("dateKey","<=",endKey))));results.push(await safeGet("uid + date範囲",query(collection(db,"quizResults"),where("uid","==",currentUser.uid),where("date",">=",startKey),where("date","<=",endKey))));if(results.every(function(r){return Object.keys(r.map).length===0})){results.push(await safeGet("uid全件走査（既存データ救済）",query(collection(db,"quizResults"),where("uid","==",currentUser.uid))))}const merged={};results.forEach(function(r){Object.keys(r.map).forEach(function(k){merged[k]=r.map[k]})});renderCalendarSkeleton(merged);const markCount=Object.keys(merged).length,used=results.filter(function(r){return Object.keys(r.map).length>0}).map(function(r){return r.label+"："+Object.keys(r.map).length+"件"});if(status){status.textContent=markCount?""":"表示月の回答記録はありません。\n取得範囲："+startKey+" ～ "+endKey+"\n既存データに dateKey / date / companyId が入っているか確認してください。"}}catch(error){console.error(error);renderCalendarSkeleton({});if(status)status.textContent="回答記録の読み込みに失敗しました。Firestoreのルールまたは複合インデックスを確認してください。"}}
document.getElementById("prevMonthBtn").addEventListener("click",function(){calendarMonth--;if(calendarMonth<0){calendarMonth=11;calendarYear--}loadCalendarResults()});document.getElementById("nextMonthBtn").addEventListener("click",function(){calendarMonth++;if(calendarMonth>11){calendarMonth=0;calendarYear++}loadCalendarResults()});
onAuthStateChanged(auth,async function(user){if(!user){location.href="login.html";return}currentUser=user;await loadUserRole(user);loadCalendarResults()});document.getElementById("logoutBtn").addEventListener("click",async function(){try{try{localStorage.removeItem("bizmonCurrentWeatherUserUid");window.bizmonCurrentWeatherUserUid=""}catch(e){}await signOut(auth);location.href="login.html"}catch(error){console.error(error);alert("ログアウトに失敗しました。")}});setAdminMenuVisible("user");setApplicantMenuVisible(false);setMainAvailable(false,"ログイン情報を確認しています。",false);renderCalendarSkeleton({});
