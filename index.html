async function syncWeatherSettingFromCloudForIndex(user){
  try{
    if(!user||!user.uid||typeof db==="undefined"||typeof getDoc==="undefined"||typeof doc==="undefined")return null;
    var setting=null;
    try{
      const userSnap=await getDoc(doc(db,"users",user.uid));
      if(userSnap.exists()){const data=userSnap.data()||{};if(data.weatherSettings&&data.weatherSettings.weatherOfficeCode&&data.weatherSettings.weatherAreaCode)setting=data.weatherSettings;}
    }catch(e){console.warn("users weatherSettings read failed",e);}
    if(!setting){
      try{
        const weatherSnap=await getDoc(doc(db,"weatherSettings",user.uid));
        if(weatherSnap.exists()){const data=weatherSnap.data()||{};if(data.weatherOfficeCode&&data.weatherAreaCode)setting=data;}
      }catch(e){console.warn("weatherSettings read failed",e);}
    }
    if(setting){
      localStorage.setItem("bizmonWeatherSettings_"+user.uid,JSON.stringify(setting));
      localStorage.setItem("bizmonCurrentWeatherUserUid",user.uid);
      localStorage.removeItem("bizmonWeatherSettings");
      return setting;
    }
  }catch(e){console.warn("weather cloud sync failed",e);}
  return null;
}


async function syncWeatherSettingFromUsersForIndex(user){
  try{
    if(!user||!user.uid||typeof db==="undefined"||typeof getDoc==="undefined"||typeof doc==="undefined")return null;
    const snap=await getDoc(doc(db,"users",user.uid));
    if(snap.exists()){
      const data=snap.data()||{};
      const setting=data.weatherSettings||null;
      if(setting&&setting.weatherOfficeCode&&setting.weatherAreaCode){
        localStorage.setItem("bizmonWeatherSettings_"+user.uid,JSON.stringify(setting));
        localStorage.setItem("bizmonCurrentWeatherUserUid",user.uid);
        localStorage.removeItem("bizmonWeatherSettings");
        return setting;
      }
    }
  }catch(e){console.warn("users.weatherSettings read failed",e);}
  return null;
}

<script>
(function(){
  if(window.BIZMON_WEATHER_STANDALONE_V7_LOADED)return;
  window.BIZMON_WEATHER_STANDALONE_V7_LOADED=true;
  var DEFAULT_SETTING={weatherOfficeCode:"130000",weatherOfficeName:"東京都",weatherAreaCode:"130010",weatherAreaName:"東京地方"};
  function pad2(n){return String(n).padStart(2,"0");}
  function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];});}
  function setting(){try{var uid="";try{uid=window.bizmonCurrentWeatherUserUid||localStorage.getItem("bizmonCurrentWeatherUserUid")||"";}catch(e){}if(uid){var s=JSON.parse(localStorage.getItem("bizmonWeatherSettings_"+uid)||"null");if(s&&s.weatherOfficeCode&&s.weatherAreaCode)return s;}}catch(e){}return DEFAULT_SETTING;}
  function icon(code){code=String(code||"");if(code.charAt(0)==="1")return "☀️";if(code.charAt(0)==="2")return "☁️";if(code.charAt(0)==="3")return "☔";if(code.charAt(0)==="4")return "❄️";return "🌤️";}
  function findArea(areas,code){if(!Array.isArray(areas)||!areas.length)return null;return areas.find(function(a){return a&&a.area&&String(a.area.code)===String(code);})||areas[0];}
  function target(){var now=new Date();var t=new Date(now.getFullYear(),now.getMonth(),now.getDate()+(now.getHours()>=18?1:0));return{index:now.getHours()>=18?1:0,label:now.getHours()>=18?"明日の天気":"今日の天気",key:t.getFullYear()+"-"+pad2(t.getMonth()+1)+"-"+pad2(t.getDate()),display:(t.getMonth()+1)+"月"+t.getDate()+"日"};}
  function pops(timeDefines,pops,targetInfo){var arr=[];(timeDefines||[]).forEach(function(x,i){var d=new Date(x);if(isNaN(d.getTime()))return;var key=d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());if(key!==targetInfo.key)return;var next=timeDefines[i+1]?new Date(timeDefines[i+1]):new Date(d.getTime()+21600000);var val=pops&&pops[i]!==undefined&&String(pops[i]).trim()!==""?String(pops[i]).trim()+"%":"--%";arr.push(pad2(d.getHours())+"-"+pad2(next.getHours())+"時 "+val);});return arr;}
  function temps(data,targetInfo){try{var ts=data&&data[0]&&data[0].timeSeries?data[0].timeSeries[2]:null;var area=ts&&ts.areas&&ts.areas[0]?ts.areas[0]:null;var td=ts&&Array.isArray(ts.timeDefines)?ts.timeDefines:[];var ar=area&&Array.isArray(area.temps)?area.temps:[];var nums=[];ar.forEach(function(v,i){if(String(v).trim()==="")return;var d=td[i]?new Date(td[i]):null;if(d&&!isNaN(d.getTime())){var key=d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());if(key!==targetInfo.key)return;}var n=Number(v);if(!isNaN(n))nums.push(n);});if(!nums.length)return{min:"--",max:"--"};return{min:String(Math.min.apply(null,nums)),max:String(Math.max.apply(null,nums))};}catch(e){return{min:"--",max:"--"};}}
  async function load(){var box=document.getElementById("weatherMini");if(!box)return;var st=setting();var tg=target();box.innerHTML='<div class="weather-mini-loading">天気予報を読み込み中...</div>';try{var ctl=new AbortController();var timer=setTimeout(function(){ctl.abort();},8000);var res=await fetch("https://www.jma.go.jp/bosai/forecast/data/forecast/"+encodeURIComponent(st.weatherOfficeCode)+".json?t="+Date.now(),{signal:ctl.signal,cache:"no-store"});clearTimeout(timer);if(!res.ok)throw new Error("weather fetch failed");var data=await res.json();var first=data&&data[0];var ts0=first&&first.timeSeries?first.timeSeries[0]:null;var ts1=first&&first.timeSeries?first.timeSeries[1]:null;var wa=findArea(ts0&&ts0.areas,st.weatherAreaCode);var pa=findArea(ts1&&ts1.areas,st.weatherAreaCode);var code=wa&&wa.weatherCodes&&wa.weatherCodes[tg.index]?wa.weatherCodes[tg.index]:(wa&&wa.weatherCodes&&wa.weatherCodes[0]?wa.weatherCodes[0]:"100");var wt=wa&&wa.weathers&&wa.weathers[tg.index]?wa.weathers[tg.index]:(wa&&wa.weathers&&wa.weathers[0]?wa.weathers[0]:"天気情報");var pp=pops(ts1&&ts1.timeDefines,pa&&pa.pops,tg);var tt=temps(data,tg);box.innerHTML='<div class="weather-period">'+esc(tg.label+'（'+tg.display+'）')+'</div><div class="weather-main"><span class="weather-icon-fallback">'+esc(icon(code))+'</span><img class="weather-icon" src="https://www.jma.go.jp/bosai/forecast/img/'+esc(code)+'.svg" alt="'+esc(wt)+'" onerror="this.style.display=&#39;none&#39;;this.previousElementSibling.style.display=&#39;flex&#39;;"><div><div class="weather-place">'+esc(st.weatherOfficeName||"")+" "+esc(st.weatherAreaName||"")+'</div><div class="weather-text">'+esc(wt)+'</div></div></div><div class="weather-temp">最高 <strong>'+esc(tt.max)+'℃</strong> / 最低 <strong>'+esc(tt.min)+'℃</strong></div><div class="weather-pops">降水確率：'+esc(pp.length?pp.join(" / "):"--")+'</div><div class="weather-source">提供：気象庁</div>'; }catch(e){console.warn(e);box.innerHTML='<div class="weather-mini-error">天気予報を取得できませんでした。<br>時間をおいて再度お試しください。<br>提供：気象庁</div>';}}
  window.bizmonStandaloneWeatherLoad=load;
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",load);else load();
  setTimeout(function(){var box=document.getElementById("weatherMini");if(box&&box.textContent.indexOf("読み込み中")>=0)load();},2000);
})();
</script>



<script>
(function(){
  if(window.BIZMON_ALMANAC_DESCRIPTION_BOTTOM_V14)return;
  window.BIZMON_ALMANAC_DESCRIPTION_BOTTOM_V14=true;
  function moveDescriptionToBottom(){
    var sidebar=document.querySelector(".right-sidebar");
    var desc=document.getElementById("almanacDescription");
    if(!sidebar||!desc)return;
    if(desc.parentElement!==sidebar || sidebar.lastElementChild!==desc){
      sidebar.appendChild(desc);
    }
  }
  function start(){
    moveDescriptionToBottom();
    var sidebar=document.querySelector(".right-sidebar");
    if(sidebar&&window.MutationObserver){
      var observer=new MutationObserver(function(){moveDescriptionToBottom();});
      observer.observe(sidebar,{childList:true,subtree:true});
    }
    var count=0;
    var timer=setInterval(function(){moveDescriptionToBottom();count++;if(count>=10)clearInterval(timer);},500);
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",start);else start();
})();
</script>
