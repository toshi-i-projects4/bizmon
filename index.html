<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ</title>
<style>
body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:#eef2f7;color:#333}
.top{display:flex;justify-content:space-between;max-width:1200px;margin:20px auto;padding:0 20px}
.today{background:#fff;padding:10px 14px;border-radius:10px;}
.layout{display:flex;gap:20px;max-width:1200px;margin:0 auto;padding:0 20px}
.right{width:260px;background:#f3f4f6;padding:16px;border-radius:10px}
.item{background:#fff;margin-bottom:10px;padding:10px;border-radius:8px}
</style>
</head>
<body>
<div class="top">
<div>ロゴ</div>
<div id="today" class="today"></div>
</div>
<div class="layout">
<div>マイページ</div>
<div class="right">
<h3>暦情報</h3>
<div id="status">読み込み中...</div>
<div id="list"></div>
</div>
</div>
<script>
const todayObj=new Date();
const y=todayObj.getFullYear();const m=String(todayObj.getMonth()+1).padStart(2,'0');const d=String(todayObj.getDate()).padStart(2,'0');
document.getElementById('today').textContent=`${y}年 ${Number(m)}月${Number(d)}日`;
async function load(){
const res=await fetch('almanac.csv');
const text=await res.text();
const lines=text.trim().split('
');
const head=lines[0].split(',');
const rows=lines.slice(1).map(l=>l.split(','));
const today=`${y}-${m}-${d}`;
const row=rows.find(r=>r[0]===today);
if(!row){document.getElementById('status').textContent='該当なし';return;}
let html='';
head.forEach((h,i)=>{if(row[i]&&h!=='date'){html+=`<div class="item"><b>${h}</b><br>${row[i]}</div>`}});
document.getElementById('list').innerHTML=html;
document.getElementById('status').textContent='';
}
load();
</script>
</body>
</html>
