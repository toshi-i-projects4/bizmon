<script>
(function(){
  var statusEl=document.getElementById('almanacStatus'),listEl=document.getElementById('almanacList'),descText=document.getElementById('almanacDescriptionText');
  var defaultDescription='暦情報の項目名や内容にカーソルを合わせると、読み仮名と意味が表示されます。';
  var descMaster={},labelMap={other:'たとえば',holiday:'祝日',rokuyo:'六曜',gosekku:'五節句',senjitsu:'選日',nijushisekki:'二十四節気',shichijunikou:'七十二候',nikkanshi:'日干支',tsukikanshi:'月干支',nenkanshi:'年干支'};
  if(!statusEl||!listEl)return;
  function parseCsv(text){var rows=[],row=[],cur='',q=false;for(var i=0;i<text.length;i++){var ch=text.charAt(i),nx=text.charAt(i+1);if(ch==='"'){if(q&&nx==='"'){cur+='"';i++;}else q=!q;}else if(ch===','&&!q){row.push(cur);cur='';}else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&nx==='\n')i++;row.push(cur);if(row.some(function(v){return String(v).trim()!=='';}))rows.push(row);row=[];cur='';}else cur+=ch;}row.push(cur);if(row.some(function(v){return String(v).trim()!=='';}))rows.push(row);return rows;}
  function normalizeDateKey(value){var s=String(value||'').trim().replace(/^\uFEFF/,'');var m=s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);return m?m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0'):s;}
  function normalizeDisplayValue(v){return String(v||'').trim().replace(/[（(][^）)]*[）)]/g,'').trim();}
  function splitAlmanacValues(value){var s=String(value||'').trim();if(!s)return[];var arr=[],cur='',depth=0;for(var i=0;i<s.length;i++){var ch=s.charAt(i);if(ch==='（'||ch==='('){depth++;cur+=ch;continue;}if(ch==='）'||ch===')'){depth=Math.max(0,depth-1);cur+=ch;continue;}if(depth===0&&(ch==='・'||ch==='、'||ch===','||ch==='／'||ch==='/')){if(cur.trim())arr.push(cur.trim());cur='';}else cur+=ch;}if(cur.trim())arr.push(cur.trim());return arr;}
  function key(type,name){return String(type||'')+'|'+String(name||'');}function getDesc(type,name){return descMaster[key(type,name)]||'';}function resetDescription(){if(descText)descText.textContent=defaultDescription;}function setDescription(title,text){if(descText)descText.textContent=String(text||title||'').trim();}
  function addHelp(el,title,text){if(!el||!text)return;el.className=(el.className?el.className+' ':'')+'almanac-help-target';el.tabIndex=0;el.title=text;el.onmouseenter=function(){setDescription(title,text)};el.onmouseleave=resetDescription;el.onfocus=function(){setDescription(title,text)};el.onblur=resetDescription;el.onclick=function(){setDescription(title,text)};}
  function fallbackToday(){listEl.innerHTML='';statusEl.textContent='本日の暦情報が見つかりません。almanac.csvの日付形式または本日分のデータを確認してください。';resetDescription();}
  function renderItems(items){listEl.innerHTML='';if(!items.length){statusEl.textContent='本日の暦情報は空です。';return;}items.forEach(function(item){var box=document.createElement('div'),line=document.createElement('div'),title=document.createElement('span'),colon=document.createElement('span'),text=document.createElement('span');box.className='almanac-item';line.className='almanac-line';title.className='almanac-item-title';title.textContent=item.label;if(item.label!=='たとえば')addHelp(title,item.label,getDesc('項目',item.label)||'暦に関する情報です。');colon.className='almanac-colon';colon.textContent='：';text.className='almanac-item-text';if(item.label==='たとえば'){text.textContent=String(item.value||'').trim();}else{var vals=splitAlmanacValues(item.value);vals.forEach(function(raw,idx){var display=normalizeDisplayValue(raw)||raw,chip=document.createElement('span');chip.className='almanac-value-chip';chip.textContent=display;var desc=getDesc(item.label,display);if(desc)addHelp(chip,display,desc);text.appendChild(chip);if(idx<vals.length-1)text.appendChild(document.createTextNode('・'));});}line.appendChild(title);line.appendChild(colon);line.appendChild(text);box.appendChild(line);listEl.appendChild(box);});statusEl.textContent='';resetDescription();}
  function loadText(file,success,fail){var xhr=new XMLHttpRequest();xhr.open('GET',file+'?v='+Date.now(),true);xhr.overrideMimeType('text/plain; charset=UTF-8');xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status===200||xhr.status===0)success(xhr.responseText||'');else if(fail)fail(new Error(file+' status '+xhr.status));};xhr.onerror=function(){if(fail)fail(new Error('network: '+file));};xhr.send();}
  function loadDescriptions(next){loadText('almanac_descriptions.csv',function(t){try{if(t&&t.charCodeAt(0)===65279)t=t.substring(1);var rows=parseCsv(t);if(rows.length>1){var h=rows[0].map(function(v){return String(v||'').trim().toLowerCase();}),ti=h.indexOf('type'),ni=h.indexOf('name'),di=h.indexOf('description');if(ti>=0&&ni>=0&&di>=0){for(var i=1;i<rows.length;i++){var type=String(rows[i][ti]||'').trim(),name=String(rows[i][ni]||'').trim(),desc=String(rows[i][di]||'').trim();if(type&&name&&desc)descMaster[key(type,name)]=desc;}}}}catch(e){console.warn(e)}next();},function(){next();});}
  function loadAlmanac(){var now=new Date(),todayKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');loadText('almanac.csv',function(t){try{if(t&&t.charCodeAt(0)===65279)t=t.substring(1);var rows=parseCsv(t);if(rows.length<2){fallbackToday();return;}var header=rows[0].map(function(v){return String(v||'').replace(/^\uFEFF/,'').trim().toLowerCase();}),dateIndex=header.indexOf('date');if(dateIndex<0){fallbackToday();return;}var row=null;for(var i=1;i<rows.length;i++){if(normalizeDateKey(rows[i][dateIndex])===todayKey){row=rows[i];break;}}if(!row){fallbackToday();return;}var items=[];Object.keys(labelMap).forEach(function(k){var idx=header.indexOf(k);if(idx>=0){var value=String(row[idx]||'').trim();if(value&&value.toLowerCase()!=='nan')items.push({label:labelMap[k],value:value});}});renderItems(items);}catch(e){console.error(e);fallbackToday();}},function(){fallbackToday();});}
  loadDescriptions(loadAlmanac);
})();
</script>

function setAdminMenuVisible(role){const adminMenu=document.getElementById("adminMenu");if(!adminMenu)return;role==="admin"?adminMenu.classList.add("admin-visible"):adminMenu.classList.remove("admin-visible")}function setApplicantMenuVisible(isVisible){const link=document.getElementById("termsMenuLink");if(!link)return;isVisible?link.classList.add("applicant-visible"):link.classList.remove("applicant-visible")}function setServiceWarning(message){const el=document.getElementById("serviceWarning");if(!el)return;if(message){el.style.display="block";el.innerHTML=message}else{el.style.display="none";el.innerHTML=""}}
function setMainAvailable(available,message,showTermsLink){serviceAvailable=available;const normal=document.getElementById("mainAvailableArea"),blocked=document.getElementById("mainBlockedArea"),quiz=document.getElementById("quizLink");if(normal)normal.style.display=available?"block":"none";if(quiz){if(available){quiz.classList.remove("disabled-link");quiz.href="question.html"}else{quiz.classList.add("disabled-link");quiz.removeAttribute("href")}}if(blocked){if(available)blocked.innerHTML="";else blocked.innerHTML='<div class="blocked-panel"><div class="blocked-panel-title">利用を開始できません</div><div>'+escapeHtml(message||"現在このサービスは利用できません。")+'</div><div class="blocked-actions">'+(showTermsLink?'<a href="terms-agreement.html">利用規約同意へ進む</a>':'')+'<a href="login.html">ログイン画面へ戻る</a></div></div>'}}
function firstNonEmpty(){for(let i=0;i<arguments.length;i++){const v=arguments[i];if(v!==undefined&&v!==null&&String(v).trim()!=="")return String(v).trim()}return ""}function normalizeChoice(v){return firstNonEmpty(v).toUpperCase()}function judgeCalendarResult(data){data=data||{};if(data.isCorrect===true)return "correct";if(data.isCorrect===false)return "incorrect";const result=String(firstNonEmpty(data.result,data.resultText,data.judgement,data.judge)).toLowerCase();if(result.includes("incorrect")||result.includes("wrong")||result.includes("不正解")||result.includes("×"))return "incorrect";if(result.includes("correct")||result.includes("正解")||result.includes("○"))return "correct";const selected=normalizeChoice(data.selectedChoice||data.selectedAnswer||data.userAnswer||data.selected||data.answerText||data.userAnswerText||data.yourAnswer),correct=normalizeChoice(data.correctChoice||data.correctAnswer||data.correct||data.rightAnswer);return selected&&correct&&selected===correct?"correct":""}
function getCompanyAvailability(userData,companyData){if(!userData||!userData.companyId)return{ok:false,reason:"no-company",message:"会社情報を確認できません。管理者にお問い合わせください。"};if(userData.status!=="active")return{ok:false,reason:"user-inactive",message:"このアカウントは現在利用できません。管理者にお問い合わせください。"};if(!companyData)return{ok:false,reason:"company-not-found",message:"会社情報が見つかりません。管理者にお問い合わせください。"};if(companyData.status!=="active")return{ok:false,reason:"company-inactive",message:"この企業の利用は現在停止されています。管理者にお問い合わせください。"};if(companyData.termsAccepted!==true){const isApplicantAdmin=userData.role==="admin"&&userData.isApplicant===true;return{ok:false,reason:"terms-not-accepted",redirectToTerms:isApplicantAdmin,showTermsLink:isApplicantAdmin,message:isApplicantAdmin?"利用開始には、企業の利用規約同意が必要です。利用規約同意画面へ移動します。":"会社の利用開始手続きが完了していません。管理者に確認してください。"}}if(companyData.serviceEnabled!==true)return{ok:false,reason:"service-disabled",message:"この企業のサービス利用は現在停止されています。管理者にお問い合わせください。"};return{ok:true,reason:"available",message:"利用可能です。"}}
async function loadUserRole(user){try{const userDocSnap=await getDoc(doc(db,"users",user.uid));currentUserData=userDocSnap.exists()?userDocSnap.data():{};currentRole=currentUserData.role||"user";setAdminMenuVisible(currentRole);setApplicantMenuVisible(currentRole==="admin"&&currentUserData.isApplicant===true);let companyText="";currentCompanyData=null;if(currentUserData.companyId){try{const companySnap=await getDoc(doc(db,"companies",currentUserData.companyId));if(companySnap.exists()){currentCompanyData=companySnap.data();companyText="<br>企業："+(currentCompanyData.companyName||currentUserData.companyId)}else companyText="<br>企業：未登録"}catch(e){console.warn(e);companyText="<br>企業：確認失敗"}}document.getElementById("userInfo").innerHTML="ログイン中："+escapeHtml(user.email)+"<br>権限："+(currentRole==="admin"?"管理者":"一般ユーザー")+companyText;const availability=getCompanyAvailability(currentUserData,currentCompanyData);if(!availability.ok){if(availability.redirectToTerms){setServiceWarning('利用規約への同意が必要です。<br><a href="terms-agreement.html">利用規約ページへ進む</a>');setMainAvailable(false,availability.message,true);setTimeout(function(){location.href="terms-agreement.html"},900)}else{setServiceWarning(escapeHtml(availability.message));setMainAvailable(false,availability.message,false)}return false}setServiceWarning("");setMainAvailable(true,"",false);return true}catch(error){console.error(error);currentRole="user";setAdminMenuVisible("user");setApplicantMenuVisible(false);document.getElementById("userInfo").innerHTML="ログイン中："+escapeHtml(user.email)+"<br>権限：一般ユーザー<br>※権限確認に失敗しました。";setMainAvailable(false,"権限確認に失敗しました。もう一度ログインしてください。",false);return false}}
function renderCalendarSkeleton(resultMap){const grid=document.getElementById("calendarGrid"),title=document.getElementById("calendarTitle");if(!grid||!title)return;grid.innerHTML="";title.textContent=calendarYear+"年"+(calendarMonth+1)+"月";["日","月","火","水","木","金","土"].forEach(function(w){const cell=document.createElement("div");cell.className="calendar-weekday";cell.textContent=w;grid.appendChild(cell)});const firstWeekday=new Date(calendarYear,calendarMonth,1).getDay(),lastDate=new Date(calendarYear,calendarMonth+1,0).getDate();for(let i=0;i<firstWeekday;i++){const empty=document.createElement("div");empty.className="calendar-day empty";grid.appendChild(empty)}const today=new Date(),todayKey=toDateKey(today.getFullYear(),today.getMonth(),today.getDate());for(let day=1;day<=lastDate;day++){const dateKey=toDateKey(calendarYear,calendarMonth,day),dayCell=document.createElement("div");dayCell.className="calendar-day";if(dateKey===todayKey)dayCell.className+=" today";const number=document.createElement("div");number.className="day-number";number.textContent=day;dayCell.appendChild(number);if(resultMap&&resultMap[dateKey]){const mark=document.createElement("a");mark.href=canOpenDetail(dateKey)?"calendar-result.html?date="+encodeURIComponent(dateKey):"#";mark.title=canOpenDetail(dateKey)?dateKey+" の回答結果を見る":"詳細表示期間外です";mark.addEventListener("click",function(ev){if(!canOpenDetail(dateKey)){ev.preventDefault();alert(detailBlockedMessage());}});mark.className="day-mark "+(resultMap[dateKey]==="correct"?"correct":"incorrect");mark.textContent=resultMap[dateKey]==="correct"?"○":"×";dayCell.appendChild(mark)}grid.appendChild(dayCell)}}
async function loadCalendarResults(){const status=document.getElementById("calendarStatus");if(!serviceAvailable){if(status)status.textContent="会社の利用開始後に回答記録を表示します。";renderCalendarSkeleton({});return}if(!currentUser){if(status)status.textContent="ログイン確認後に記録を読み込みます。";renderCalendarSkeleton({});return}const startKey=toDateKey(calendarYear,calendarMonth,1),endKey=toDateKey(calendarYear,calendarMonth,new Date(calendarYear,calendarMonth+1,0).getDate());function collectFromSnapshot(snapshot){const resultMap={};snapshot.forEach(function(docSnap){const data=docSnap.data()||{},key=firstNonEmpty(data.dateKey,data.date);if(key>=startKey&&key<=endKey){const judged=judgeCalendarResult(data);if(judged)resultMap[key]=judged}});return resultMap}async function safeGet(label,q){try{if(status)status.textContent="表示月の回答記録を読み込み中...\n確認中："+label;const snapshot=await getDocs(q);return{label:label,map:collectFromSnapshot(snapshot),count:snapshot.size,error:null}}catch(e){console.warn("calendar query failed:",label,e);return{label:label,map:{},count:0,error:e}}}try{const results=[];if(currentUserData&&currentUserData.companyId){results.push(await safeGet("companyId + uid + dateKey範囲",query(collection(db,"quizResults"),where("companyId","==",currentUserData.companyId),where("uid","==",currentUser.uid),where("dateKey",">=",startKey),where("dateKey","<=",endKey))))}results.push(await safeGet("uid + dateKey範囲",query(collection(db,"quizResults"),where("uid","==",currentUser.uid),where("dateKey",">=",startKey),where("dateKey","<=",endKey))));results.push(await safeGet("uid + date範囲",query(collection(db,"quizResults"),where("uid","==",currentUser.uid),where("date",">=",startKey),where("date","<=",endKey))));if(results.every(function(r){return Object.keys(r.map).length===0;})){results.push(await safeGet("uid全件走査（既存データ救済）",query(collection(db,"quizResults"),where("uid","==",currentUser.uid))))}const merged={};results.forEach(function(r){Object.keys(r.map).forEach(function(k){merged[k]=r.map[k]})});renderCalendarSkeleton(merged);const markCount=Object.keys(merged).length,used=results.filter(function(r){return Object.keys(r.map).length>0}).map(function(r){return r.label+"："+Object.keys(r.map).length+"件"});if(status){status.textContent=markCount?"回答記録を表示しています。○×は履歴として表示し、詳細表示は前月1日以降に制限しています。\n取得範囲："+startKey+" ～ "+endKey+"\n"+used.join(" / "):"表示月の回答記録はありません。\n取得範囲："+startKey+" ～ "+endKey+"\n既存データに dateKey / date / companyId が入っているか確認してください。"}}catch(error){console.error(error);renderCalendarSkeleton({});if(status)status.textContent="回答記録の読み込みに失敗しました。Firestoreのルールまたは複合インデックスを確認してください。"}}
document.getElementById("prevMonthBtn").addEventListener("click",function(){calendarMonth--;if(calendarMonth<0){calendarMonth=11;calendarYear--}loadCalendarResults()});document.getElementById("nextMonthBtn").addEventListener("click",function(){calendarMonth++;if(calendarMonth>11){calendarMonth=0;calendarYear++}loadCalendarResults()});
onAuthStateChanged(auth,async function(user){if(!user){location.href="login.html";return}currentUser=user;await loadUserRole(user);loadCalendarResults()});
document.getElementById("logoutBtn").addEventListener("click",async function(){try{await signOut(auth);location.href="login.html"}catch(error){console.error(error);alert("ログアウトに失敗しました。")}});setAdminMenuVisible("user");setApplicantMenuVisible(false);setMainAvailable(false,"ログイン情報を確認しています。",false);renderCalendarSkeleton({});
</script>
