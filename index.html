(function(){var BASE_DATE=new Date(2026,5,20);function parseCsvLine(line){var out=[],cur='',q=false;for(var i=0;i<line.length;i++){var ch=line.charAt(i);if(ch==='"'){if(q&&line.charAt(i+1)==='"'){cur+='"';i++;}else q=!q;}else if(ch===','&&!q){out.push(cur);cur='';}else cur+=ch;}out.push(cur);return out;}function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];});}function daysSinceBase(){var now=new Date();var today=new Date(now.getFullYear(),now.getMonth(),now.getDate());return Math.floor((today-BASE_DATE)/86400000);}function idNumber(id){var m=String(id||'').match(/(\d+)/);return m?Number(m[1]):999999;}function renderTip(text){var area=document.querySelector('.business-message-area');if(!area)return;area.innerHTML='<div class="business-message-line"><span class="business-message-label">ビジネス豆知識：</span><span id="businessTipText">'+escapeHtml(text||'毎日の学び')+'</span></div>';}function loadBusinessTip(){var xhr=new XMLHttpRequest();xhr.open('GET','business-tips.csv?v='+Date.now(),true);xhr.overrideMimeType('text/plain; charset=UTF-8');xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status!==200){renderTip('毎日の学び');return;}try{var text=xhr.responseText||'';if(text.length>0&&text.charCodeAt(0)===65279)text=text.substring(1);var lines=text.split(/\r?\n/).filter(function(l){return l.trim()!=='';});if(lines.length<=1){renderTip('毎日の学び');return;}var header=parseCsvLine(lines[0]).map(function(v){return v.trim().toLowerCase();});var idx={id:header.indexOf('id'),body:header.indexOf('body'),active:header.indexOf('active')};var rows=[];for(var i=1;i<lines.length;i++){var c=parseCsvLine(lines[i]);var active=idx.active>=0?String(c[idx.active]||'true').toLowerCase():'true';if(active==='false')continue;var body=idx.body>=0?String(c[idx.body]||'').trim():'';if(!body)continue;rows.push({id:idx.id>=0?c[idx.id]:'',body:body});}rows.sort(function(a,b){return idNumber(a.id)-idNumbe async function loadUserRole(user){try{const us=await getDoc(doc(db,"users",user.uid));currentUserData=us.exists()?us.data():{};currentRole=currentUserData.role||"user";setAdminMenuVisible(currentRole);setApplicantMenuVisible(currentRole==="admin"&&currentUserData.isApplicant===true);let companyText="";currentCompanyData=null;if(currentUserData.companyId){try{const cs=await getDoc(doc(db,"companies",currentUserData.companyId));if(cs.exists()){currentCompanyData=cs.data();companyText="<br>企業："+(currentCompanyData.companyName||currentUserData.companyId)}else companyText="<br>企業：未登録"}catch(e){console.warn(e);companyText="<br>企業：確認失敗"}}document.getElementById("userInfo").innerHTML="ログイン中："+escapeHtml(user.email)+"<br>権限："+(currentRole==="admin"?"管理者":"一般ユーザー")+companyText;const av=getCompanyAvailability(currentUserData,currentCompanyData);if(!av.ok){if(av.redirectToTerms){setServiceWarning('利用規約への同意が必要です。<br><a href="terms-agreement.html">利用規約ページへ進む</a>');setMainAvailable(false,av.message,true);setTimeout(function(){location.href="terms-agreement.html"},900)}else{setServiceWarning(escapeHtml(av.message));setMainAvailable(false,av.message,false)}return false}setServiceWarning("");setMainAvailable(true,"",false);return true}catch(e){console.error(e);currentRole="user";setAdminMenuVisible("user");setApplicantMenuVisible(false);document.getElementById("userInfo").innerHTML="ログイン中："+escapeHtml(user.email)+"<br>権限：一般ユーザー<br>※権限確認に失敗しました。";setMainAvailable(false,"権限確認に失敗しました。もう一度ログインしてください。",false);return false}}
function renderCalendarSkeleton(map){const grid=document.getElementById("calendarGrid"),title=document.getElementById("calendarTitle");if(!grid||!title)return;grid.innerHTML="";title.textContent=calendarYear+"年"+(calendarMonth+1)+"月";["日","月","火","水","木","金","土"].forEach(w=>{const c=document.createElement("div");c.className="calendar-weekday";c.textContent=w;grid.appendChild(c)});const fw=new Date(calendarYear,calendarMonth,1).getDay(),last=new Date(calendarYear,calendarMonth+1,0).getDate();for(let i=0;i<fw;i++){const e=document.createElement("div");e.className="calendar-day empty";grid.appendChild(e)}const t=new Date(),tk=toDateKey(t.getFullYear(),t.getMonth(),t.getDate());for(let day=1;day<=last;day++){const dk=toDateKey(calendarYear,calendarMonth,day),cell=document.createElement("div");cell.className="calendar-day"+(dk===tk?" today":"");const num=document.createElement("div");num.className="day-number";num.textContent=day;cell.appendChild(num);if(map&&map[dk]){const a=document.createElement("a");a.href=canOpenDetail(dk)?"calendar-result.html?date="+encodeURIComponent(dk):"#";a.title=canOpenDetail(dk)?dk+" の回答結果を見る":"詳細表示期間外です";a.addEventListener("click",ev=>{if(!canOpenDetail(dk)){ev.preventDefault();alert(detailBlockedMessage())}});a.className="day-mark "+(map[dk]==="correct"?"correct":"incorrect");a.textContent=map[dk]==="correct"?"○":"×";cell.appendChild(a)}grid.appendChild(cell)}}
async function loadCalendarResults(){const status=document.getElementById("calendarStatus");if(!serviceAvailable||!currentUser){if(status)status.textContent="";renderCalendarSkeleton({});return}const startKey=toDateKey(calendarYear,calendarMonth,1),endKey=toDateKey(calendarYear,calendarMonth,new Date(calendarYear,calendarMonth+1,0).getDate());function collect(snap){const m={};snap.forEach(ds=>{const d=ds.data()||{},k=firstNonEmpty(d.dateKey,d.date);if(k>=startKey&&k<=endKey){const j=judgeCalendarResult(d);if(j)m[k]=j}});return m}async function safeGet(label,q){try{if(status)status.textContent="";const snap=await getDocs(q);return{map:collect(snap)}}catch(e){console.warn("calendar query failed:",label,e);return{map:{}}}}try{const results=[];if(currentUserData&&currentUserData.companyId)results.push(await safeGet("companyId + uid + dateKey範囲",query(collection(db,"quizResults"),where("companyId","==",currentUserData.companyId),where("uid","==",currentUser.uid),where("dateKey",">=",startKey),where("dateKey","<=",endKey))));results.push(await safeGet("uid + dateKey範囲",query(collection(db,"quizResults"),where("uid","==",currentUser.uid),where("dateKey",">=",startKey),where("dateKey","<=",endKey))));results.push(await safeGet("uid + date範囲",query(collection(db,"quizResults"),where("uid","==",currentUser.uid),where("date",">=",startKey),where("date","<=",endKey))));if(results.every(r=>Object.keys(r.map).length===0))results.push(await safeGet("uid全件走査（既存データ救済）",query(collection(db,"quizResults"),where("uid","==",currentUser.uid))));const merged={};results.forEach(r=>Object.keys(r.map).forEach(k=>merged[k]=r.map[k]));renderCalendarSkeleton(merged);if(status)status.textContent=""}catch(e){console.error(e);renderCalendarSkeleton({});if(status)status.textContent=""}}
document.getElementById("prevMonthBtn").addEventListener("click",()=>{calendarMonth--;if(calendarMonth<0){calendarMonth=11;calendarYear--}loadCalendarResults()});document.getElementById("nextMonthBtn").addEventListener("click",()=>{calendarMonth++;if(calendarMonth>11){calendarMonth=0;calendarYear++}loadCalendarResults()});onAuthStateChanged(auth,async user=>{if(!user){location.href="login.html";return}currentUser=user;await loadUserRole(user);loadCalendarResults()});document.getElementById("logoutBtn").addEventListener("click",async()=>{try{try{localStorage.removeItem("bizmonCurrentWeatherUserUid");window.bizmonCurrentWeatherUserUid=""}catch(e){}await signOut(auth);location.href="login.html"}catch(e){console.error(e);alert("ログアウトに失敗しました。")}});setAdminMenuVisible("user");setApplicantMenuVisible(false);setMainAvailable(false,"ログイン情報を確認しています。",false);renderCalendarSkeleton({});
</script>
