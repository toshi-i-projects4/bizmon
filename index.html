<script>
(function(){var statusEl=document.getElementById('almanacStatus'),listEl=document.getElementById('almanacList');if(!statusEl||!listEl)return;function parseCsvLine(line){var out=[],cur='',q=false;for(var i=0;i<line.length;i++){var ch=line.charAt(i);if(ch==='"'){if(q&&line.charAt(i+1)==='"'){cur+='"';i++;}else q=!q;}else if(ch===','&&!q){out.push(cur);cur='';}else cur+=ch;}out.push(cur);return out;}function loadAlmanac(fileIndex){var files=['almanac.csv','calendar_other_yomigana_removed_utf8_bom.csv'],file=files[fileIndex]||files[0],now=new Date(),todayKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0'),labelMap={other:'たとえば',holiday:'祝日',rokuyo:'六曜',gosekku:'五節句',senjitsu:'選日',nijushisekki:'二十四節気',shichijunikou:'七十二候',nikkanshi:'日干支',tsukikanshi:'月干支',nenkanshi:'年干支'};statusEl.textContent='暦情報を読み込み中...';var xhr=new XMLHttpRequest();xhr.open('GET',file+'?v='+new Date().getTime(),true);xhr.overrideMimeType('text/plain; charset=UTF-8');xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status!==200){if(fileIndex+1<files.length){loadAlmanac(fileIndex+1);return;}statusEl.textContent='暦情報CSVの取得に失敗しました。';return;}try{var text=xhr.responseText||'';if(text.length>0&&text.charCodeAt(0)===65279)text=text.substring(1);text=text.replace(//g,'');var lines=text.split('
').filter(function(x){return x&&x.trim()!==''});var header=parseCsvLine(lines[0]).map(function(x){return x.trim().toLowerCase()});var dateIndex=header.indexOf('date'),row=null;for(var r=1;r<lines.length;r++){var cols=parseCsvLine(lines[r]);if(String(cols[dateIndex]||'').trim()===todayKey){row=cols;break;}}if(!row){statusEl.textContent='本日の暦情報が見つかりません。対象日：'+todayKey;return;}listEl.innerHTML='';Object.keys(labelMap).forEach(function(key){var idx=header.indexOf(key);if(idx!==-1){var value=String(row[idx]||'').trim();if(value&&value.toLowerCase()!=='nan'){var box=document.createElement('div');box.className='almanac-item';box.textContent=labelMap[key]+'：'+value;listEl.appendChild(box);}}});statusEl.textContent='';}catch(e){console.error(e);statusEl.textContent='暦情報の解析中にエラーが発生しました。';}};xhr.onerror=function(){if(fileIndex+1<files.length)loadAlmanac(fileIndex+1);else statusEl.textContent='暦情報CSVの通信に失敗しました。';};xhr.send();}loadAlmanac(0);})();
</script>

lassName="calendar-weekday";cell.textContent=w;grid.appendChild(cell)});const firstWeekday=new Date(calendarYear,calendarMonth,1).getDay();const lastDate=new Date(calendarYear,calendarMonth+1,0).getDate();for(let i=0;i<firstWeekday;i++){const empty=document.createElement("div");empty.className="calendar-day empty";grid.appendChild(empty)}const today=new Date();const todayKey=toDateKey(today.getFullYear(),today.getMonth(),today.getDate());for(let day=1;day<=lastDate;day++){const dateKey=toDateKey(calendarYear,calendarMonth,day);const dayCell=document.createElement("div");dayCell.className="calendar-day";if(dateKey===todayKey)dayCell.className+=" today";const number=document.createElement("div");number.className="day-number";number.textContent=day;dayCell.appendChild(number);if(resultMap&&resultMap[dateKey]){const mark=document.createElement("a");mark.href="calendar-result.html?date="+encodeURIComponent(dateKey);mark.title=dateKey+" の回答結果を見る";if(resultMap[dateKey]==="correct"){mark.className="day-mark correct";mark.textContent="○"}else if(resultMap[dateKey]==="incorrect"){mark.className="day-mark incorrect";mark.textContent="×"}dayCell.appendChild(mark)}grid.appendChild(dayCell)}}async function loadCalendarResults(){const status=document.getElementById("calendarStatus");if(!currentUser){status.textContent="ログイン確認後に記録を読み込みます。";renderCalendarSkeleton({});return}try{status.textContent="回答記録を読み込み中...";const q=query(collection(db,"quizResults"),where("uid","==",currentUser.uid));const snapshot=await getDocs(q);const resultMap={};const monthPrefix=calendarYear+"-"+pad2(calendarMonth+1)+"-";snapshot.forEach(function(docSnap){const data=docSnap.data();if(data&&data.date&&String(data.date).indexOf(monthPrefix)===0)resultMap[data.date]=data.result||""});renderCalendarSkeleton(resultMap);status.textContent="回答記録を表示しています。○または×をクリックすると、その日の結果を確認できます。"}catch(error){console.error(error);renderCalendarSkeleton({});status.textContent="回答記録の読み込みに失敗しました。Firestoreのルールを確認してください。"}}document.getElementById("prevMonthBtn").addEventListener("click",function(){calendarMonth--;if(calendarMonth<0){calendarMonth=11;calendarYear--}loadCalendarResults()});document.getElementById("nextMonthBtn").addEventListener("click",function(){calendarMonth++;if(calendarMonth>11){calendarMonth=0;calendarYear++}loadCalendarResults()});onAuthStateChanged(auth,async function(user){if(!user){location.href="login.html";return}currentUser=user;await loadUserRole(user);loadCalendarResults()});document.getElementById("logoutBtn").addEventListener("click",async function(){try{await signOut(auth);location.href="login.html"}catch(error){console.error(error);alert("ログアウトに失敗しました。")}});setAdminMenuVisible("user");renderCalendarSkeleton({});
