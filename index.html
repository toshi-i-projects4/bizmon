<script>
(function(){var statusEl=document.getElementById('almanacStatus'),listEl=document.getElementById('almanacList'),descText=document.getElementById('almanacDescriptionText');var defaultDescription='暦情報の項目名や内容にカーソルを合わせると、読み仮名と意味が表示されます。';var labelMap={other:'たとえば',holiday:'祝日',rokuyo:'六曜',gosekku:'五節句',senjitsu:'選日',nijushisekki:'二十四節気',shichijunikou:'七十二候',nikkanshi:'日干支',tsukikanshi:'月干支',nenkanshi:'年干支'};if(!statusEl||!listEl)return;function parseCsv(text){var rows=[],row=[],cur='',q=false;for(var i=0;i<text.length;i++){var ch=text.charAt(i),nx=text.charAt(i+1);if(ch==='"'){if(q&&nx==='"'){cur+='"';i++;}else q=!q;}else if(ch===','&&!q){row.push(cur);cur='';}else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&nx==='\n')i++;row.push(cur);if(row.some(function(v){return String(v).trim()!=='';}))rows.push(row);row=[];cur='';}else cur+=ch;}row.push(cur);if(row.some(function(v){return String(v).trim()!=='';}))rows.push(row);return rows;}function normalizeDateKey(value){var s=String(value||'').trim().replace(/^\uFEFF/,'');var m=s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);return m?m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0'):s;}function fallbackToday(){listEl.innerHTML='';statusEl.textContent='本日の暦情報が見つかりません。almanac.csvの日付形式または本日分のデータを確認してください。';if(descText)descText.textContent=defaultDescription;}function renderItems(items){listEl.innerHTML='';items.forEach(function(item){var box=document.createElement('div');box.className='almanac-item';box.innerHTML='<div class="almanac-line"><span class="almanac-item-title">'+item.label+'</span><span class="almanac-colon">：</span><span class="almanac-item-text">'+String(item.value||'')+'</span></div>';listEl.appendChild(box);});statusEl.textContent='';if(descText)descText.textContent=defaultDescription;}function loadText(file,success,fail){var xhr=new XMLHttpRequest();xhr.open('GET',file+'?v='+Date.now(),true);xhr.overrideMimeType('text/plain; charset=UTF-8');xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status===200||xhr.status===0)success(xhr.responseText||'');else if(fail)fail(new Error(file+' status '+xhr.status));};xhr.onerror=function(){if(fail)fail(new Error('network: '+file));};xhr.send();}var now=new Date(),todayKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');loadText('almanac.csv',function(t){try{if(t&&t.charCodeAt(0)===65279)t=t.substring(1);var rows=parseCsv(t);if(rows.length<2){fallbackToday();return;}var header=rows[0].map(function(v){return String(v||'').replace(/^\uFEFF/,'').trim().toLowerCase();}),dateIndex=header.indexOf('date');if(dateIndex<0){fallbackToday();return;}var row=null;for(var i=1;i<rows.length;i++){if(normalizeDateKey(rows[i][dateIndex])===todayKey){row=rows[i];break;}}if(!row){fallbackToday();return;}var items=[];Object.keys(labelMap).forEach(function(k){var idx=header.indexOf(k);if(idx>=0){var value=String(row[idx]||'').trim();if(value&&value.toLowerCase()!=='nan')items.push({label:labelMap[k],value:value});}});renderItems(items);}catch(e){console.error(e);fallbackToday();}},function(){fallbackToday();});})();
</script>
