enter;justify-content:space-between;gap:10px;margin-bottom:6px}.calendar-title{font-size:18px;font-weight:bold;color:#111827;text-align:center;flex:1}.calendar-nav-btn{border:none;border-radius:9px;background:#2563eb;color:white;padding:7px 10px;cursor:pointer;font-size:12px}.calendar-status{font-size:12px;color:#6b7280;margin-bottom:6px;white-space:pre-wrap}.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}.calendar-weekday{text-align:center;font-size:12px;font-weight:bold;color:#4b5563;padding:3px 0}.calendar-day{min-height:46px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:4px;box-sizing:border-box;position:relative}.calendar-day.empty{background:transparent;border:none}.calendar-day.today{border:2px solid #2563eb}.day-number{font-size:12px;color:#374151;font-weight:bold}.day-mark{position:absolute;right:6px;bottom:4px;font-size:20px;font-weight:bold;line-height:1}.day-mark.correct{color:#16a34a}.day-mark.incorrect{color:#dc2626}.calendar-legend{display:flex;gap:12px;align-items:center;font-size:12px;color:#4b5563;margin-top:6px}.legend-correct{color:#16a34a;font-weight:bold}.legend-incorrect{color:#dc2626;font-weight:bold}@media(max-width:1000px){body{padding-top:8px}.top-bar{grid-template-columns:1fr;row-gap:10px;justify-items:center;min-height:auto}.layout{flex-direction:column;margin-top:10px}.left-sidebar,.main-content,.right-column,.right-sidebar{width:100%}.main-content{margin-top:0}.page-logo{width:140px}.greeting-message{font-size:28px}.today-date{justify-self:center}.calendar-day{min-height:44px}}

<script>
(function(){try{var now=new Date();var year=now.getFullYear();var month=now.getMonth()+1;var day=now.getDate();var hour=now.getHours();var reiwaYear=year-2018;var reiwaText=reiwaYear===1?"令和元年":"令和"+reiwaYear+"年";var topEl=document.querySelector("#todayDate .date-top");var bottomEl=document.querySelector("#todayDate .date-bottom");var greetingEl=document.getElementById("greetingMessage");var message="";if(hour>=5&&hour<=10)message="おはようございます";else if(hour>=11&&hour<=15)message="こんにちは";else if(hour>=16&&hour<=17)message="おつかれさまです";else if(hour>=18&&hour<=21)message="こんばんは";else message="おつかれさまです";if(topEl)topEl.textContent=year+"年（"+reiwaText+"）";if(bottomEl)bottomEl.textContent=month+"月"+day+"日";if(greetingEl)greetingEl.textContent=message}catch(error){console.error(error)}})();
</script>
<script>
(function(){var statusEl=document.getElementById("almanacStatus");var listEl=document.getElementById("almanacList");var titleEl=document.getElementById("almanacTitle");if(!statusEl||!listEl||!titleEl)return;statusEl.textContent="CSV確認中...";function parseCsvLine(line){var result=[];var current="";var inQuotes=false;for(var i=0;i<line.length;i++){var ch=line.charAt(i);if(ch==='"'){if(inQuotes&&line.charAt(i+1)==='"'){current+='"';i++}else{inQuotes=!inQuotes}}else if(ch===","&&!inQuotes){result.push(current);current=""}else{current+=ch}}result.push(current);return result}function renderItems(items){titleEl.style.display="";statusEl.textContent="";var html="";for(var i=0;i<items.length;i++){html+='<div class="almanac-item"><div class="almanac-item-title">'+items[i].label+'</div><div class="almanac-item-text">'+items[i].value+'</div></div>'}listEl.innerHTML=html}var now=new Date();var y=now.getFullYear();var m=String(now.getMonth()+1).padStart(2,"0");var d=String(now.getDate()).padStart(2,"0");var todayKey=y+"-"+m+"-"+d;var labelMap={holiday:"祝日",rokuyo:"六曜",gosekku:"五節句",senjitsu:"選日",nijushisekki:"二十四節気",shichijunikou:"七十二候",nikkanshi:"日干支",tsukikanshi:"月干支",nenkanshi:"年干支",other:"その他"};var xhr=new XMLHttpRequest();xhr.open("GET","almanac.csv?v="+new Date().getTime(),true);xhr.overrideMimeType("text/plain; charset=UTF-8");xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status!==200){statusEl.textContent="almanac.csv の取得に失敗しました。HTTP status="+xhr.status;return}try{var text=xhr.responseText||"";if(text.length>0&&text.charCodeAt(0)===65279)text=text.substring(1);text=text.split(String.fromCharCode(13)).join("");var rawLines=text.split(String.fromCharCode(10));var lines=[];for(var i=0;i<rawLines.length;i++){if(rawLines[i]&&rawLines[i].trim()!=="")lines.push(rawLines[i])}if(lines.length<=1){statusEl.textContent="almanac.csv にデータが入っていません。";return}var headerRaw=parseCsvLine(lines[0]);var header=[];for(var h=0;h<headerRaw.length;h++)header.push(headerRaw[h].trim().toLowerCase());var dateIndex=header.indexOf("date");if(dateIndex===-1){statusEl.textContent="almanac.csv の1行目に date 列が必要です。";return}var row=null;for(var r=1;r<lines.length;r++){var cols=parseCsvLine(lines[r]);if(String(cols[dateIndex]||"").trim()===todayKey){row=cols;break}}if(!row){statusEl.textContent="本日の暦情報が見つかりません。対象日："+todayKey;listEl.innerHTML="";return}var items=[];var keys=Object.keys(labelMap);for(var k=0;k<keys.length;k++){var key=keys[k];var index=header.indexOf(key);if(index!==-1){var value=String(row[index]||"").trim();if(value&&value.toLowerCase()!=="nan")items.push({label:labelMap[key],value:value})}}if(items.length===0){titleEl.style.display="none";statusEl.textContent="";listEl.innerHTML="";return}renderItems(items)}catch(error){console.error(error);statusEl.textContent="almanac.csv の解析中にエラーが発生しました。"}};xhr.onerror=function(){statusEl.textContent="almanac.csv の通信に失敗しました。"};xhr.send()})();
</script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";import{getFirestore,collection,query,where,getDocs}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";const firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",projectId:"bizmon-31ffc"};const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);let currentUser=null;let calendarYear=new Date().getFullYear();let calendarMonth=new Date().getMonth();function pad2(num){return String(num).padStart(2,"0")}function toDateKey(year,monthIndex,day){return year+"-"+pad2(monthIndex+1)+"-"+pad2(day)}function normalizeResult(value){const v=String(value==null?"":value).trim().toLowerCase();if(value===true||v==="true"||v==="correct"||v==="ok"||v==="success"||v==="right"||v==="seikai"||v==="正解"||v==="○"||v==="〇")return "correct";if(value===false||v==="false"||v==="incorrect"||v==="wrong"||v==="ng"||v==="fuseikai"||v==="不正解"||v==="×"||v==="x")return "incorrect";return ""}function renderCalendarSkeleton(resultMap){const grid=document.getElementById("calendarGrid");const title=document.getElementById("calendarTitle");grid.innerHTML="";title.textContent=calendarYear+"年"+(calendarMonth+1)+"月";const weekdays=["日","月","火","水","木","金","土"];weekdays.forEach(function(w){const cell=document.createElement("div");cell.className="calendar-weekday";cell.textContent=w;grid.appendChild(cell)});const firstWeekday=new Date(calendarYear,calendarMonth,1).getDay();const lastDate=new Date(calendarYear,calendarMonth+1,0).getDate();for(let i=0;i<firstWeekday;i++){const empty=document.createElement("div");empty.className="calendar-day empty";grid.appendChild(empty)}const today=new Date();const todayKey=toDateKey(today.getFullYear(),today.getMonth(),today.getDate());for(let day=1;day<=lastDate;day++){const dateKey=toDateKey(calendarYear,calendarMonth,day);const dayCell=document.createElement("div");dayCell.className="calendar-day";if(dateKey===todayKey)dayCell.className+=" today";const number=document.createElement("div");number.className="day-number";number.textContent=day;dayCell.appendChild(number);if(resultMap&&resultMap[dateKey]){const normalized=normalizeResult(resultMap[dateKey].result);if(normalized){const mark=document.createElement("div");if(normalized==="correct"){mark.className="day-mark correct";mark.textContent="○"}else if(normalized==="incorrect"){mark.className="day-mark incorrect";mark.textContent="×"}dayCell.appendChild(mark)}}grid.appendChild(dayCell)}}async function loadCalendarResults(){const status=document.getElementById("calendarStatus");if(!currentUser){status.textContent="ログイン確認後に記録を読み込みます。";renderCalendarSkeleton({});return}try{status.textContent="回答記録を読み込み中...";const q=query(collection(db,"quizResults"),where("uid","==",currentUser.uid));const snapshot=await getDocs(q);const resultMap={};const monthPrefix=calendarYear+"-"+pad2(calendarMonth+1)+"-";snapshot.forEach(function(docSnap){const data=docSnap.data();if(data&&data.date&&String(data.date).indexOf(monthPrefix)===0){const normalized=normalizeResult(data.result);if(normalized)resultMap[data.date]={result:normalized,id:docSnap.id}}});renderCalendarSkeleton(resultMap);status.textContent="回答記録を表示しています。やり直した日は最後の結果が表示されます。"}catch(error){console.error(error);renderCalendarSkeleton({});status.textContent="回答記録の読み込みに失敗しました。Firestoreのルールを確認してください。"}}document.getElementById("prevMonthBtn").addEventListener("click",function(){calendarMonth--;if(calendarMonth<0){calendarMonth=11;calendarYear--}loadCalendarResults()});document.getElementById("nextMonthBtn").addEventListener("click",function(){calendarMonth++;if(calendarMonth>11){calendarMonth=0;calendarYear++}loadCalendarResults()});onAuthStateChanged(auth,function(user){if(!user){location.href="login.html";return}currentUser=user;document.getElementById("userInfo").textContent="ログイン中："+user.email;loadCalendarResults()});document.getElementById("logoutBtn").addEventListener("click",async function(){try{await signOut(auth);location.href="login.html"}catch(error){console.error(error);alert("ログアウトに失敗しました。")}});renderCalendarSkeleton({});
</script>
