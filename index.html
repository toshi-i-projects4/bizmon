function fallbackToday(){var now=new Date(),w=['日','月','火','水','木','金','土'][now.getDay()];renderItems([{label:'たとえば',value:(now.getMonth()+1)+'月'+now.getDate()+'日（'+w+'）です。今日も1問ずつ、実務に役立つ学びを積み重ねましょう。'}]);statusEl.textContent='';}

function firstNonEmpty(){for(let i=0;i<arguments.length;i++){const v=arguments[i];if(v!==undefined&&v!==null&&String(v).trim()!=="")return String(v).trim()}return ""}
function normalizeChoice(v){return firstNonEmpty(v).toUpperCase()}
function judgeCalendarResult(data){data=data||{};if(data.isCorrect===true)return "correct";if(data.isCorrect===false)return "incorrect";const result=String(firstNonEmpty(data.result,data.resultText,data.judgement,data.judge)).toLowerCase();if(result.includes("incorrect")||result.includes("wrong")||result.includes("不正解")||result.includes("×"))return "incorrect";if(result.includes("correct")||result.includes("正解")||result.includes("○"))return "correct";const selected=normalizeChoice(data.selectedChoice||data.selectedAnswer||data.userAnswer||data.selected||data.answerText||data.userAnswerText||data.yourAnswer);const correct=normalizeChoice(data.correctChoice||data.correctAnswer||data.correct||data.rightAnswer);if(selected&&correct&&selected===correct)return "correct";return ""}
async function loadUserRole(user){try{const userDocRef=doc(db,"users",user.uid);const userDocSnap=await getDoc(userDocRef);currentUserData=userDocSnap.exists()?userDocSnap.data():{};currentRole=currentUserData.role||"user";setAdminMenuVisible(currentRole);setApplicantMenuVisible(currentRole==="admin"&&currentUserData.isApplicant===true);let companyText="";if(currentUserData.companyId){try{const companySnap=await getDoc(doc(db,"companies",currentUserData.companyId));if(companySnap.exists()){currentCompanyData=companySnap.data();companyText="<br>企業："+(currentCompanyData.companyName||currentUserData.companyId);if(currentCompanyData.termsAccepted!==true||currentCompanyData.serviceEnabled!==true){if(currentUserData.isApplicant===true){setServiceWarning('この企業は利用規約への同意または利用開始設定が未完了です。<br><a href="terms-agreement.html">利用規約ページ</a>から確認してください。')}else{setServiceWarning('この企業は利用規約への同意または利用開始設定が未完了です。企業の申込者または管理者にご確認ください。')}}else{setServiceWarning("")}}}catch(e){console.warn("company取得エラー",e)}}document.getElementById("userInfo").innerHTML="ログイン中："+user.email+"<br>権限："+(currentRole==="admin"?"管理者":"一般ユーザー")+companyText}catch(error){console.error("role取得エラー:",error);currentRole="user";setAdminMenuVisible("user");setApplicantMenuVisible(false);document.getElementById("userInfo").innerHTML="ログイン中："+user.email+"<br>権限：一般ユーザー<br>※権限確認に失敗しました。"}}
function renderCalendarSkeleton(resultMap){const grid=document.getElementById("calendarGrid");const title=document.getElementById("calendarTitle");grid.innerHTML="";title.textContent=calendarYear+"年"+(calendarMonth+1)+"月";["日","月","火","水","木","金","土"].forEach(function(w){const cell=document.createElement("div");cell.className="calendar-weekday";cell.textContent=w;grid.appendChild(cell)});const firstWeekday=new Date(calendarYear,calendarMonth,1).getDay();const lastDate=new Date(calendarYear,calendarMonth+1,0).getDate();for(let i=0;i<firstWeekday;i++){const empty=document.createElement("div");empty.className="calendar-day empty";grid.appendChild(empty)}const today=new Date();const todayKey=toDateKey(today.getFullYear(),today.getMonth(),today.getDate());for(let day=1;day<=lastDate;day++){const dateKey=toDateKey(calendarYear,calendarMonth,day);const dayCell=document.createElement("div");dayCell.className="calendar-day";if(dateKey===todayKey)dayCell.className+=" today";const number=document.createElement("div");number.className="day-number";number.textContent=day;dayCell.appendChild(number);if(resultMap&&resultMap[dateKey]){const mark=document.createElement("a");mark.href="calendar-result.html?date="+encodeURIComponent(dateKey);mark.title=dateKey+" の回答結果を見る";if(resultMap[dateKey]==="correct"){mark.className="day-mark correct";mark.textContent="○";dayCell.appendChild(mark)}else if(resultMap[dateKey]==="incorrect"){mark.className="day-mark incorrect";mark.textContent="×";dayCell.appendChild(mark)}}grid.appendChild(dayCell)}}async function loadCalendarResults(){const status=document.getElementById("calendarStatus");if(!currentUser){status.textContent="ログイン確認後に記録を読み込みます。";renderCalendarSkeleton({});return}try{status.textContent="回答記録を読み込み中...";const q=query(collection(db,"quizResults"),where("uid","==",currentUser.uid));const snapshot=await getDocs(q);const resultMap={};const monthPrefix=calendarYear+"-"+pad2(calendarMonth+1)+"-";snapshot.forEach(function(docSnap){const data=docSnap.data()||{};const key=firstNonEmpty(data.dateKey,data.date);if(data&&key&&String(key).indexOf(monthPrefix)===0){const judged=judgeCalendarResult(data);if(judged)resultMap[key]=judged}});renderCalendarSkeleton(resultMap);status.textContent="回答記録を表示しています。○または×をクリックすると、その日の結果を確認できます。"}catch(error){console.error(error);renderCalendarSkeleton({});status.textContent="回答記録の読み込みに失敗しました。Firestoreのルールを確認してください。"}}document.getElementById("prevMonthBtn").addEventListener("click",function(){calendarMonth--;if(calendarMonth<0){calendarMonth=11;calendarYear--}loadCalendarResults()});document.getElementById("nextMonthBtn").addEventListener("click",function(){calendarMonth++;if(calendarMonth>11){calendarMonth=0;calendarYear++}loadCalendarResults()});const quizLink=document.getElementById("quizLink");if(quizLink){quizLink.addEventListener("click",function(e){e.preventDefault();window.location.href="question.html";});}onAuthStateChanged(auth,async function(user){if(!user){location.href="login.html";return}currentUser=user;await loadUserRole(user);loadCalendarResults()});document.getElementById("logoutBtn").addEventListener("click",async function(){try{await signOut(auth);location.href="login.html"}catch(error){console.error(error);alert("ログアウトに失敗しました。")}});setAdminMenuVisible("user");setApplicantMenuVisible(false);renderCalendarSkeleton({});
</script>
</body>
