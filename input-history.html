<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学習履歴・傾向分析</title>
<style>
:root{--blue:#2563eb;--blue2:#1d4ed8;--bg:#eef2f7;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--green:#16a34a;--red:#dc2626}*{box-sizing:border-box}body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:var(--bg);color:var(--text);padding:24px}.wrap{max-width:1280px;margin:24px auto;background:#fff;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:28px}.header{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px}h1{margin:0;font-size:28px}.top-link,.bottom-link{color:var(--blue);text-decoration:none;font-weight:bold;font-size:14px}.bottom-link{display:inline-block;margin-top:22px}.status{display:none;background:#f9fafb;border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:16px;line-height:1.7;white-space:pre-wrap}.status.error{display:block;color:var(--red)}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;align-items:end;background:#f9fafb;border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}.control-item label{display:block;font-size:12px;color:var(--muted);font-weight:bold;margin-bottom:5px}select{width:100%;border:1px solid #d1d5db;border-radius:10px;padding:10px 12px;font-size:14px;background:#fff}.btn-row{display:flex;gap:10px;flex-wrap:wrap}.btn{border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:bold;cursor:pointer;background:var(--blue);color:#fff;min-height:40px}.btn:hover{background:var(--blue2)}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin:16px 0}.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}.card-label{font-size:12px;color:var(--muted);font-weight:bold;margin-bottom:5px}.card-value{font-size:28px;font-weight:900}.card-sub{font-size:12px;color:var(--muted);margin-top:4px}.panel{background:#fff;border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-top:16px}.panel-title{font-size:18px;font-weight:bold;margin:0 0 12px}.bar-row{display:grid;grid-template-columns:minmax(130px,260px) 1fr 74px;gap:10px;align-items:center;margin:10px 0}.bar-label{font-weight:bold;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.bar-track{height:18px;background:#e5e7eb;border-radius:999px;overflow:hidden;display:flex}.bar-correct{background:var(--green)}.bar-incorrect{background:var(--red)}.bar-rate{text-align:right;font-size:13px;color:#374151;font-weight:bold}.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#374151;margin:4px 0 12px}.legend-item{display:flex;align-items:center;gap:6px}.dot{width:12px;height:12px;border-radius:3px;display:inline-block}.dot.correct{background:var(--green)}.dot.incorrect{background:var(--red)}.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:12px;margin-top:12px;max-height:620px}table{width:100%;border-collapse:collapse;min-width:1280px;background:#fff}th,td{border-bottom:1px solid var(--border);padding:10px 12px;text-align:left;vertical-align:top;font-size:13px}th{background:#f3f4f6;font-weight:bold;color:#374151;position:sticky;top:0;z-index:1}.col-date,.col-cat,.col-id{white-space:nowrap}.question-cell{min-width:260px;white-space:normal;line-height:1.6}.choices-cell{min-width:260px;white-space:pre-wrap;line-height:1.6}.answer-cell{min-width:80px;white-space:normal}.exp-cell{min-width:320px;white-space:normal;line-height:1.6}.badge{display:inline-block;border-radius:999px;padding:4px 10px;font-weight:bold;font-size:13px;white-space:nowrap}.badge.ok{background:#dcfce7;color:#166534}.badge.ng{background:#fee2e2;color:#991b1b}.badge.none{background:#f3f4f6;color:#6b7280}.empty{text-align:center;color:var(--muted);padding:24px}.small{font-size:12px;color:var(--muted);line-height:1.7}.page-loading{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#eef2f7;color:#1f2937;font-weight:bold}.page-loading.hidden{display:none!important}.loading-box{display:flex;flex-direction:column;align-items:center;gap:12px;background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:24px 28px;box-shadow:0 4px 12px rgba(0,0,0,.08)}.loading-spinner{width:42px;height:42px;border:5px solid #dbeafe;border-top-color:#2563eb;border-radius:50%;animation:spin .9s linear infinite}.loading-text{font-size:14px;color:#374151}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:640px){body{padding:14px}.header{align-items:flex-start}h1{font-size:24px}.btn{width:100%}.btn-row{display:grid}.card-value{font-size:24px}.bar-row{grid-template-columns:1fr}.bar-rate{text-align:left}}
</style>
</head>
<body>
<div id="pageLoading" class="page-loading"><div class="loading-box"><div class="loading-spinner"></div><div id="loadingText" class="loading-text">学習履歴を読み込み中...</div></div></div>
<script>(function(){function h(){var l=document.getElementById('pageLoading');if(l){l.classList.add('hidden');l.style.display='none'}}function s(t){var l=document.getElementById('pageLoading'),x=document.getElementById('loadingText');if(x&&t)x.textContent=t;if(l){l.classList.remove('hidden');l.style.display='flex'}}window.bizmonHideHistoryLoading=h;window.bizmonShowHistoryLoading=s;setTimeout(function(){var l=document.getElementById('pageLoading');if(l&&!l.classList.contains('hidden'))h()},5000);window.addEventListener('error',h);window.addEventListener('unhandledrejection',h)})();</script>
<div class="wrap">
  <div class="header"><h1>学習履歴・傾向分析</h1><a class="top-link" href="index.html">← マイページへ戻る</a></div>
  <div id="status" class="status"></div>
  <div class="controls"><div class="control-item"><label for="periodPreset">期間</label><select id="periodPreset"><option value="thisMonth" selected>今月</option><option value="prevMonth">前月</option><option value="thisYear">今年</option><option value="all">全期間</option></select></div><div class="control-item"><label for="category1Filter">大項目</label><select id="category1Filter"><option value="all">すべて</option></select></div><div class="control-item"><label>&nbsp;</label><div class="btn-row"><button class="btn" id="reloadBtn" type="button">再読み込み</button></div></div></div>
  <div class="cards"><div class="card"><div class="card-label">回答数</div><div class="card-value" id="totalAnswers">0</div><div class="card-sub">期間内の回答</div></div><div class="card"><div class="card-label">正解数</div><div class="card-value" id="correctAnswers">0</div><div class="card-sub">○</div></div><div class="card"><div class="card-label">不正解数</div><div class="card-value" id="incorrectAnswers">0</div><div class="card-sub">×</div></div><div class="card"><div class="card-label">正答率</div><div class="card-value" id="correctRate">0%</div><div class="card-sub">回答ベース</div></div></div>
  <div class="panel"><p class="panel-title">大項目ごとの傾向</p><div class="legend"><span class="legend-item"><span class="dot correct"></span>正解</span><span class="legend-item"><span class="dot incorrect"></span>不正解</span></div><div id="category1Bars"></div></div>
  <div class="panel"><p class="panel-title">日別履歴</p><div class="table-wrap"><table><thead><tr><th>日付</th><th>正誤</th><th>大項目</th><th>問題</th><th>選択肢</th><th>回答</th><th>解答</th><th>解説</th><th>問題ID</th></tr></thead><tbody id="historyBody"><tr><td colspan="9" class="empty">読み込み中です。</td></tr></tbody></table></div><p class="small">※未回答日の正誤は「-」で表示しています。</p></div>
  <a class="bottom-link" href="index.html">← マイページへ戻る</a>
</div>
<script type="module" onerror="window.bizmonHideHistoryLoading&&window.bizmonHideHistoryLoading()">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged,setPersistence,browserLocalPersistence}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,query,where,getDocs,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",databaseURL:"https://bizmon-31ffc-default-rtdb.firebaseio.com",projectId:"bizmon-31ffc",storageBucket:"bizmon-31ffc.firebasestorage.app",messagingSenderId:"535364592474",appId:"1:535364592474:web:1f60b1eb2ad804b1a28963",measurementId:"G-CE1ZDBSVM6"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);setPersistence(auth,browserLocalPersistence).catch(console.warn);
let currentUser=null,currentUserData=null,allResults=[],allAssignments=[];const $=id=>document.getElementById(id);
function hideLoading(){if(window.bizmonHideHistoryLoading)window.bizmonHideHistoryLoading()}function showLoading(t){if(window.bizmonShowHistoryLoading)window.bizmonShowHistoryLoading(t||'学習履歴を読み込み中...')}function setStatus(msg,type){const e=$('status');if(!e)return;e.textContent=msg||'';e.className='status '+(type||'');if(type==='error'){e.style.display='block';hideLoading()}else e.style.display='none'}
function escapeHtml(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}function pad2(n){return String(n).padStart(2,'0')}function dateKey(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())}function todayKey(){return dateKey(new Date())}function parseDate(s){const p=String(s||'').split('-').map(Number);return new Date(p[0],p[1]-1,p[2])}function addDays(d,n){const x=new Date(d.getFullYear(),d.getMonth(),d.getDate());x.setDate(x.getDate()+n);return x}function isValidDateKey(s){return /^\d{4}-\d{2}-\d{2}$/.test(String(s||''))}function firstNonEmpty(){for(let i=0;i<arguments.length;i++){const v=arguments[i];if(v!==undefined&&v!==null&&String(v).trim()!=='')return String(v).trim()}return''}
function category1OrderList(){return ['コミュニケーション・ビジネススキル','読解力・思考力','キャリア・自己管理','IT・デジタル','情報管理・セキュリティ','データ分析・活用','プロジェクト管理','業務改善・品質管理','経営・戦略','顧客理解・マーケティング','会計・財務・税務','税金・年末調整','社会保険','勤怠管理','労務・雇用','法務・コンプライアンス','組織・マネジメント','リスク管理・危機対応','サステナビリティ・ESG','グローバル・ダイバーシティ','心理・行動']}function category1OrderValue(n){const s=String(n||'').trim(),list=category1OrderList();if(!s||s==='-'||s==='未分類')return 9999;const i=list.indexOf(s);return i>=0?i:9000}function sortCategory1Names(a,b){const oa=category1OrderValue(a),ob=category1OrderValue(b);return oa!==ob?oa-ob:String(a||'').localeCompare(String(b||''),'ja')}
function periodRange(){const p=$('periodPreset').value,d=new Date();if(p==='thisMonth')return{start:dateKey(new Date(d.getFullYear(),d.getMonth(),1)),end:todayKey()};if(p==='prevMonth')return{start:dateKey(new Date(d.getFullYear(),d.getMonth()-1,1)),end:dateKey(new Date(d.getFullYear(),d.getMonth(),0))};if(p==='thisYear')return{start:d.getFullYear()+'-01-01',end:todayKey()};const dates=[...allResults.map(r=>r.dateKey),...allAssignments.map(a=>a.dateKey)].filter(isValidDateKey).sort();return{start:dates[0]||todayKey(),end:todayKey()}}
async function loadUserData(user){const snap=await getDoc(doc(db,'users',user.uid));if(!snap.exists)throw new Error('users/'+user.uid+' が見つかりません。');return snap.data()||{}}function pick(d,keys){for(const k of keys){if(d&&d[k]!=null&&String(d[k]).trim()!=='')return String(d[k]).trim()}return''}
function normalizeCorrect(d){if(d.isCorrect===true)return true;if(d.isCorrect===false)return false;const r=String(pick(d,['result','resultText','judgement','judge'])).toLowerCase();if(r.includes('incorrect')||r.includes('wrong')||r.includes('不正解')||r.includes('×'))return false;if(r.includes('correct')||r.includes('正解')||r.includes('○'))return true;const s=pick(d,['selectedChoice','selectedAnswer','userAnswer']).toUpperCase(),c=pick(d,['correctChoice','correctAnswer','answer']).toUpperCase();return !!(s&&c&&s===c)}
function normalizeResult(d,id){return{id,source:'quizResults',answered:true,uid:d.uid||'',dateKey:pick(d,['dateKey','date']),questionId:pick(d,['questionId','id']),category1:pick(d,['category1'])||'-',question:pick(d,['questionText','question','quizQuestion','title','text','q'])||'-',choiceA:pick(d,['choiceA','answerA','a']),choiceB:pick(d,['choiceB','answerB','b']),choiceC:pick(d,['choiceC','answerC','c']),selectedAnswer:pick(d,['selectedChoice','selectedAnswer','userAnswer','selected','answerText','userAnswerText','yourAnswer'])||'-',correctAnswer:pick(d,['correctChoice','correctAnswer','correct','rightAnswer','answer'])||'-',explanation:pick(d,['explanation','commentary','kaisetsu','description','comment'])||'-',isCorrect:normalizeCorrect(d)}}
function normalizeAssignment(d,id){return{id,source:'dailyQuizAssignments',answered:false,dateKey:pick(d,['dateKey','date']),questionId:pick(d,['questionId','id'])||'-',category1:pick(d,['category1'])||'-',question:pick(d,['question','questionText'])||'問題情報なし',choiceA:pick(d,['choiceA','answerA','a']),choiceB:pick(d,['choiceB','answerB','b']),choiceC:pick(d,['choiceC','answerC','c']),selectedAnswer:'-',correctAnswer:pick(d,['correctAnswer','correctChoice','answer'])||'-',explanation:pick(d,['explanation','commentary','kaisetsu'])||'-',isCorrect:null}}
async function loadQuizResults(){let snap;try{snap=await getDocs(query(collection(db,'quizResults'),where('uid','==',currentUser.uid)))}catch(e){console.warn(e);if(currentUserData.companyId)snap=await getDocs(query(collection(db,'quizResults'),where('companyId','==',currentUserData.companyId),where('uid','==',currentUser.uid)));else throw e}const map={};snap.forEach(ds=>{const r=normalizeResult(ds.data()||{},ds.id);if(isValidDateKey(r.dateKey))map[r.dateKey]=r});return Object.values(map).sort((a,b)=>String(b.dateKey).localeCompare(String(a.dateKey)))}
async function loadAssignments(){if(!currentUserData.companyId)return[];let snap;try{snap=await getDocs(query(collection(db,'dailyQuizAssignments'),where('companyId','==',currentUserData.companyId)))}catch(e){throw new Error('dailyQuizAssignments の読み込みに失敗しました。Firestoreルールまたは companyId を確認してください。\n'+(e.message||e))}const map={};snap.forEach(ds=>{const a=normalizeAssignment(ds.data()||{},ds.id);if(isValidDateKey(a.dateKey))map[a.dateKey]=a});return Object.values(map).sort((a,b)=>String(b.dateKey).localeCompare(String(a.dateKey)))}
async function loadAll(){showLoading('学習履歴を読み込み中...');setStatus('',null);currentUserData=await loadUserData(currentUser);allResults=await loadQuizResults();allAssignments=await loadAssignments();populateFilters();renderAll();setStatus('',null);hideLoading()}
function populateFilters(){const vals=[...new Set([...allResults.map(r=>r.category1),...allAssignments.map(a=>a.category1)].filter(v=>v&&v!=='-'))].sort(sortCategory1Names);const sel=$('category1Filter'),cur=sel.value;sel.innerHTML='<option value="all">すべて</option>'+vals.map(v=>'<option value="'+escapeHtml(v)+'">'+escapeHtml(v)+'</option>').join('');sel.value=vals.includes(cur)?cur:'all'}function assignmentMap(){const m={};allAssignments.forEach(a=>m[a.dateKey]=a);return m}function resultMap(){const m={};allResults.forEach(r=>m[r.dateKey]=r);return m}
function mergeRow(result,assignment,dk){if(result)return{...assignment,...result,answered:true,isCorrect:result.isCorrect,dateKey:dk,category1:result.category1&&result.category1!=='-'?result.category1:(assignment?assignment.category1:'-'),question:result.question&&result.question!=='-'?result.question:(assignment?assignment.question:'-'),choiceA:result.choiceA||assignment?.choiceA||'',choiceB:result.choiceB||assignment?.choiceB||'',choiceC:result.choiceC||assignment?.choiceC||'',selectedAnswer:result.selectedAnswer||'-',correctAnswer:result.correctAnswer&&result.correctAnswer!=='-'?result.correctAnswer:(assignment?assignment.correctAnswer:'-'),explanation:result.explanation&&result.explanation!=='-'?result.explanation:(assignment?assignment.explanation:'-'),questionId:result.questionId||assignment?.questionId||'-'};if(assignment)return{...assignment,dateKey:dk,answered:false,isCorrect:null};return{dateKey:dk,answered:false,isCorrect:null,category1:'-',question:'問題情報なし',choiceA:'',choiceB:'',choiceC:'',selectedAnswer:'-',correctAnswer:'-',explanation:'-',questionId:'-'}}
function buildDailyRows(){const range=periodRange(),c1=$('category1Filter').value,am=assignmentMap(),rm=resultMap(),rows=[];let d=parseDate(range.start),end=parseDate(range.end);if(isNaN(d)||isNaN(end)||end<d)return[];while(d<=end){const dk=dateKey(d),row=mergeRow(rm[dk],am[dk],dk);if(c1==='all'||row.category1===c1)rows.push(row);d=addDays(d,1)}return rows.sort((a,b)=>String(b.dateKey).localeCompare(String(a.dateKey)))}function answeredRowsInPeriod(){const range=periodRange(),c1=$('category1Filter').value;return allResults.filter(r=>r.dateKey>=range.start&&r.dateKey<=range.end&&(c1==='all'||r.category1===c1))}function renderAll(){const answered=answeredRowsInPeriod(),daily=buildDailyRows();renderCards(answered);renderBars(answered);renderTable(daily)}
function renderCards(rows){const total=rows.length,correct=rows.filter(r=>r.isCorrect===true).length,incorrect=rows.filter(r=>r.isCorrect===false).length,rate=total?Math.round(correct/total*1000)/10:0;$('totalAnswers').textContent=total;$('correctAnswers').textContent=correct;$('incorrectAnswers').textContent=incorrect;$('correctRate').textContent=total?rate+'%':'0%'}
function renderBars(rows){const box=$('category1Bars'),groups={};rows.forEach(r=>{const k=r.category1||'未分類';if(!groups[k])groups[k]={correct:0,incorrect:0};if(r.isCorrect)groups[k].correct++;else groups[k].incorrect++});const keys=Object.keys(groups).sort(sortCategory1Names);if(!keys.length){box.innerHTML='<div class="empty">データがありません。</div>';return}box.innerHTML=keys.map(k=>{const g=groups[k],total=Math.max(g.correct+g.incorrect,1),rate=Math.round(g.correct/total*100);return '<div class="bar-row"><div class="bar-label" title="'+escapeHtml(k)+'">'+escapeHtml(k)+'</div><div class="bar-track" title="正解 '+g.correct+' / 不正解 '+g.incorrect+'"><div class="bar-correct" style="width:'+(g.correct/total*100)+'%"></div><div class="bar-incorrect" style="width:'+(g.incorrect/total*100)+'%"></div></div><div class="bar-rate">'+rate+'%</div></div>'}).join('')}
function choicesText(r){const a=r.choiceA?'A：'+r.choiceA:'',b=r.choiceB?'B：'+r.choiceB:'',c=r.choiceC?'C：'+r.choiceC:'';return[a,b,c].filter(Boolean).join('\n')||'-'}function resultBadge(r){if(!r.answered)return'<span class="badge none">-</span>';return r.isCorrect?'<span class="badge ok">○ 正解</span>':'<span class="badge ng">× 不正解</span>'}
function renderTable(rows){const body=$('historyBody');if(!rows.length){body.innerHTML='<tr><td colspan="9" class="empty">指定条件の履歴はありません。</td></tr>';return}body.innerHTML=rows.map(r=>'<tr><td class="col-date">'+escapeHtml(r.dateKey)+'</td><td>'+resultBadge(r)+'</td><td class="col-cat">'+escapeHtml(r.category1||'-')+'</td><td class="question-cell">'+escapeHtml(r.question||'-')+'</td><td class="choices-cell">'+escapeHtml(choicesText(r))+'</td><td class="answer-cell">'+escapeHtml(r.selectedAnswer||'-')+'</td><td class="answer-cell">'+escapeHtml(r.correctAnswer||'-')+'</td><td class="exp-cell">'+escapeHtml(r.explanation||'-')+'</td><td class="col-id">'+escapeHtml(r.questionId||'-')+'</td></tr>').join('')}
['periodPreset','category1Filter'].forEach(id=>$(id).addEventListener('change',renderAll));$('reloadBtn').addEventListener('click',()=>loadAll().catch(e=>setStatus('学習履歴の読み込みに失敗しました。\n'+(e.message||e),'error')));onAuthStateChanged(auth,async user=>{if(!user){location.href='login.html';return}currentUser=user;try{await loadAll()}catch(e){console.error(e);setStatus('学習履歴の読み込みに失敗しました。\n'+(e.message||e),'error')}});
</script>
</body>
</html>
