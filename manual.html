<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ビズもん 操作マニュアル</title>
<style>
:root{--blue:#2563eb;--blue2:#1d4ed8;--bg:#eef2f7;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--card:#fff;--soft:#f9fafb;--orange:#f59e0b}
*{box-sizing:border-box}
body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:var(--bg);color:var(--text);line-height:1.85;padding:28px}

.page{max-width:1180px;margin:0 auto}

.header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px}
.back-link,.bottom-back-link{color:var(--blue);text-decoration:none;font-weight:bold;font-size:14px}
.bottom-back-link{display:inline-block;margin-top:20px}

.hero{background:linear-gradient(135deg,#2563eb,#60a5fa);color:#fff;border-radius:22px;padding:30px;margin-bottom:20px}

.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;margin:18px 0}

h1{margin:0;font-size:30px}
h2{font-size:24px;color:#1e40af;border-bottom:2px solid #dbeafe;padding-bottom:6px}

.footer{text-align:center;color:var(--muted);font-size:12px;margin-top:30px}

@media print{.header,.bottom-back-link{display:none}}
</style>
</head>
<body>

<div class="page">

<div class="header">
  <h1>ビズもん 操作マニュアル</h1>
  <a class="back-link" href="index.html">← マイページへ戻る</a>
</div>

<section class="hero">
<p>利用者向け操作手順と管理者向け運用ポイントをまとめた完全版マニュアルです。</p>
<p style="opacity:.9;font-size:13px">作成日：2026年6月22日</p>
</section>

<section class="card">
<h2>概要</h2>
<p>ビズもんは日々のクイズを通じて社員教育を行うサービスです。</p>
</section>

<section class="card">
<h2>基本操作</h2>
<ul>
<li>ログイン後、マイページを表示します</li>
<li>「本日のクイズ」から問題に回答します</li>
<li>回答後、結果と解説を確認します</li>
</ul>
</section>

<a class="bottom-back-link" href="index.html">← マイページへ戻る</a>

<div class="footer">© ビズもん 操作マニュアル</div>

</div>
</body>
</html>
