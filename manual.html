<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ビズもん 操作マニュアル</title>
<style>
:root{--blue:#2563eb;--blue2:#1d4ed8;--bg:#eef2f7;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--card:#fff;--soft:#f9fafb;--green:#16a34a;--red:#dc2626;--orange:#f59e0b}
*{box-sizing:border-box}
body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:var(--bg);color:var(--text);line-height:1.85;padding:28px}

.page{max-width:1180px;margin:0 auto}

/* 追加（ここが統一ポイント） */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:20px
}
.back-link,.bottom-back-link{
  color:var(--blue);
  text-decoration:none;
  font-weight:bold;
  font-size:14px
}
.bottom-back-link{
  display:inline-block;
  margin-top:20px
}

/* 既存 */
.hero{background:linear-gradient(135deg,#2563eb,#60a5fa);color:#fff;border-radius:22px;padding:34px;box-shadow:0 8px 20px rgba(37,99,235,.22);margin-bottom:20px}
.hero p{margin:0;opacity:.95}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.06);padding:26px;margin:18px 0}
.toc{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px}
.toc a{display:block;text-decoration:none;background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;border-radius:12px;padding:10px 12px;font-weight:bold;font-size:14px}
h1{margin:0;font-size:30px}
h2{font-size:25px;color:#1e40af;margin:10px 0 14px;border-bottom:2px solid #dbeafe;padding-bottom:8px}
h3{font-size:18px;margin:22px 0 8px;color:#111827}
.note{background:#fffbeb;border-left:5px solid var(--orange);border-radius:12px;padding:12px 14px;color:#92400e}
.info{background:#eff6ff;border-left:5px solid var(--blue);border-radius:12px;padding:12px 14px;color:#1e3a8a}
.ok{background:#f0fdf4;border-left:5px solid #22c55e;border-radius:12px;padding:12px 14px;color:#166534}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.mini{background:var(--soft);border:1px solid var(--border);border-radius:14px;padding:14px}
.mini b{display:block;color:#111827;margin-bottom:4px}
.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:12px;margin:12px 0}
table{width:100%;border-collapse:collapse;min-width:760px;background:#fff}
th,td{border-bottom:1px solid var(--border);padding:10px 12px;text-align:left;vertical-align:top;font-size:14px}
th{background:#f3f4f6;color:#374151}
.badge{display:inline-block;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:bold}
.admin{background:#dbeafe;color:#1e40af}
.small{font-size:12px;color:var(--muted)}
.footer{text-align:center;color:var(--muted);font-size:12px;margin:28px 0}

@media print{
  body{background:#fff}
  .header,.bottom-back-link{display:none}
  .hero,.card{box-shadow:none}
  .toc{display:none}
}
</style>
</head>
<body>

<div class="page">

<!-- ここ追加 -->
<div class="header">
  <h1>ビズもん 操作マニュアル</h1>
  <a class="back-link" href="index.html">← マイページへ戻る</a>
</div>

<section class="hero">
<p>利用者向け操作手順と管理者向け運用ポイントをまとめた完全版マニュアルです。</p>
<p class="small" style="color:#eaf2ff">作成日：2026年6月22日 / 対象：ビズもん各HTML画面</p>
</section>

<a href="#start">1. 利用開始・ログイン</a><a href="#mypage">2. マイページ</a><a href="#quiz">3. 今日の問題・結果</a><a href="#history">4. 学習履歴・傾向分析</a><a href="#settings">5. 各種設定</a><a href="#admin">6. 管理者機能</a><a href="#users">7. ユーザー管理</a><a href="#terms">8. 規約・プライバシー</a><a href="#trouble">9. 困ったとき</a>

</div>
</body>
</html>
