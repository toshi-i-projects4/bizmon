<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワード再設定｜ビズもん</title>
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: "Hiragino Maru Gothic ProN", "BIZ UDPGothic", "Yu Gothic UI", "Meiryo", sans-serif; background: #eef2f7; color: #111827; padding: 20px; box-sizing: border-box; }
    .card { width: 100%; max-width: 520px; background: #ffffff; border-radius: 18px; box-shadow: 0 6px 18px rgba(0,0,0,0.10); padding: 34px; box-sizing: border-box; }
    h1 { margin: 0 0 12px; text-align: center; font-size: 26px; color: #111827; }
    .lead { margin: 0 0 20px; color: #6b7280; font-size: 14px; line-height: 1.7; text-align: center; }
    .info-box { background: #eff6ff; border-left: 4px solid #2563eb; border-radius: 10px; padding: 14px 16px; color: #1e3a8a; font-size: 14px; line-height: 1.7; margin-bottom: 20px; white-space: pre-wrap; }
    .field-label { display: block; margin: 16px 0 8px; font-size: 14px; font-weight: bold; color: #374151; }
    .text-input { width: 100%; height: 46px; padding: 0 12px; border: 1px solid #d1d5db; border-radius: 10px; box-sizing: border-box; font-size: 15px; outline: none; background: #ffffff; }
    .text-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
    .password-wrap { position: relative; }
    .password-wrap .text-input { padding-right: 48px; }
    .password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 34px; height: 34px; border: none; border-radius: 8px; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #6b7280; padding: 0; }
    .password-toggle:hover { background: #f3f4f6; color: #111827; }
    .password-toggle svg { width: 22px; height: 22px; display: block; }
    .small-note { font-size: 13px; color: #6b7280; line-height: 1.6; margin-top: 6px; }
    .password-count { font-size: 13px; color: #6b7280; line-height: 1.6; margin-top: 6px; }
    .primary-btn { width: 100%; margin-top: 22px; height: 48px; border: none; border-radius: 12px; background: #2563eb; color: #ffffff; font-size: 16px; font-weight: bold; cursor: pointer; }
    .primary-btn:hover { background: #1d4ed8; }
    .primary-btn:disabled { opacity: .65; cursor: not-allowed; }
    .status-message { min-height: 22px; margin-top: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; text-align: left; word-break: break-word; }
    .status-message.error { color: #dc2626; }
    .status-message.ok { color: #166534; }
    .status-message.note { color: #374151; }
    .link-row { text-align: center; margin-top: 20px; }
    .link-row a { color: #2563eb; text-decoration: none; font-size: 14px; font-weight: bold; }
    .link-row a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>パスワード再設定</h1>
    <p class="lead">新しいパスワードを設定してください。</p>

    <div id="passwordPolicy" class="info-box"></div>
    <div id="emailInfo" class="small-note"></div>

    <label class="field-label" for="newPassword">新しいパスワード</label>
    <div class="password-wrap">
      <input id="newPassword" class="text-input" type="password" autocomplete="new-password" maxlength="128" placeholder="新しいパスワードを入力">
      <button type="button" class="password-toggle" data-target="newPassword" aria-label="パスワードを表示" title="パスワードを表示">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
    </div>
    <div id="passwordCount" class="password-count">0 / 128文字</div>

    <label class="field-label" for="confirmPassword">新しいパスワード（確認）</label>
    <div class="password-wrap">
      <input id="confirmPassword" class="text-input" type="password" autocomplete="new-password" maxlength="128" placeholder="新しいパスワードをもう一度入力">
      <button type="button" class="password-toggle" data-target="confirmPassword" aria-label="パスワードを表示" title="パスワードを表示">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path><circle cx="12" cy="12" r="3"></circle></svg>
      </button>
    </div>

    <button type="button" id="resetPasswordBtn" class="primary-btn">パスワードを再設定する</button>
    <div id="statusMessage" class="status-message note"></div>

    <div class="link-row"><a href="login.html">ログイン画面へ戻る</a></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { PASSWORD_POLICY_TEXT, validateBizmonPassword, getPasswordLengthMessage, getPasswordLengthStatus, applyPasswordCountStyle } from "./password-policy.js";

    const firebaseConfig = { apiKey: "AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus", authDomain: "bizmon-31ffc.firebaseapp.com", databaseURL: "https://bizmon-31ffc-default-rtdb.firebaseio.com", projectId: "bizmon-31ffc", storageBucket: "bizmon-31ffc.firebasestorage.app", messagingSenderId: "535364592474", appId: "1:535364592474:web:1f60b1eb2ad804b1a28963", measurementId: "G-CE1ZDBSVM6" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    auth.languageCode = "ja";

    const params = new URLSearchParams(window.location.search);
    const mode = params.get("mode");
    const oobCode = params.get("oobCode");

    const emailInfo = document.getElementById("emailInfo");
    const newPasswordEl = document.getElementById("newPassword");
    const confirmPasswordEl = document.getElementById("confirmPassword");
    const passwordCountEl = document.getElementById("passwordCount");
    const resetPasswordBtn = document.getElementById("resetPasswordBtn");
    const statusMessage = document.getElementById("statusMessage");
    document.getElementById("passwordPolicy").textContent = PASSWORD_POLICY_TEXT;
    let validResetCode = false;
    let resetCompleted = false;

    function setStatus(message, type) { statusMessage.textContent = message; statusMessage.className = "status-message " + (type || ""); }
    function updatePasswordCount() { const password = newPasswordEl.value; const status = getPasswordLengthStatus(password); passwordCountEl.textContent = getPasswordLengthMessage(password); applyPasswordCountStyle(passwordCountEl, status); }

    async function initializeResetPage() {
      if (mode !== "resetPassword" || !oobCode) { setStatus("このリンクは無効です。パスワード再設定メールを再度送信してください。", "error"); resetPasswordBtn.disabled = true; return; }
      try { const email = await verifyPasswordResetCode(auth, oobCode); validResetCode = true; emailInfo.textContent = `再設定対象：${email}`; setStatus("新しいパスワードを入力してください。", "note"); }
      catch (error) { console.error(error); validResetCode = false; setStatus("この再設定リンクは無効、または期限切れです。ログイン画面から再度メールを送信してください。", "error"); resetPasswordBtn.disabled = true; }
    }

    resetPasswordBtn.addEventListener("click", async function () {
      if (resetCompleted) return;
      if (!validResetCode || !oobCode) { setStatus("この再設定リンクは無効です。ログイン画面から再度メールを送信してください。", "error"); resetPasswordBtn.disabled = true; return; }
      const newPassword = newPasswordEl.value;
      const confirmPassword = confirmPasswordEl.value;
      setStatus("", "");
      const validationError = validateBizmonPassword(newPassword, "新しいパスワード");
      if (validationError) { setStatus(validationError, "error"); return; }
      if (newPassword !== confirmPassword) { setStatus("新しいパスワードと確認用パスワードが一致していません。", "error"); return; }
      try { resetPasswordBtn.disabled = true; resetPasswordBtn.textContent = "再設定中..."; await confirmPasswordReset(auth, oobCode, newPassword); resetCompleted = true; newPasswordEl.value = ""; confirmPasswordEl.value = ""; updatePasswordCount(); setStatus("パスワードを再設定しました。ログイン画面から新しいパスワードでログインしてください。", "ok"); resetPasswordBtn.textContent = "再設定済み"; resetPasswordBtn.disabled = true; }
      catch (error) { console.error(error); let message = "パスワードの再設定に失敗しました。時間をおいて再度お試しください。"; if (error.code === "auth/expired-action-code") message = "この再設定リンクは期限切れです。ログイン画面から再度メールを送信してください。"; if (error.code === "auth/invalid-action-code") message = "この再設定リンクは無効です。ログイン画面から再度メールを送信してください。"; if (error.code === "auth/weak-password") message = "新しいパスワードが弱すぎます。15文字以上のパスフレーズを設定してください。"; setStatus(message, "error"); resetPasswordBtn.disabled = false; resetPasswordBtn.textContent = "パスワードを再設定する"; }
    });

    newPasswordEl.addEventListener("input", updatePasswordCount);
    document.querySelectorAll(".password-toggle").forEach(function(button) { button.addEventListener("click", function() { const targetId = button.getAttribute("data-target"); const input = document.getElementById(targetId); if (!input) return; const isHidden = input.type === "password"; input.type = isHidden ? "text" : "password"; button.setAttribute("aria-label", isHidden ? "パスワードを非表示" : "パスワードを表示"); button.setAttribute("title", isHidden ? "パスワードを非表示" : "パスワードを表示"); input.focus(); }); });
    updatePasswordCount();
    initializeResetPage();
  </script>
</body>
</html>
