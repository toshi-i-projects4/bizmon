<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ビズもん カテゴリー設定</title>
<style>
body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:#eef2f7;color:#111827;padding:24px;box-sizing:border-box}
.wrap{max-width:980px;margin:30px auto;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:32px;box-sizing:border-box}
.header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}h1{margin:0}.top-link,.bottom-link{color:#2563eb;text-decoration:none;font-weight:bold;font-size:14px}.bottom-link{display:inline-block;margin-top:22px}
.status,.box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:14px;line-height:1.7;white-space:pre-wrap}.error{color:#dc2626}.ok{color:#166534}.warn{color:#92400e;background:#fffbeb;border-color:#fde68a}.sub{color:#6b7280;font-size:14px;margin:6px 0 20px}
.actions{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0}.btn{border:none;border-radius:10px;background:#2563eb;color:#fff;padding:12px 16px;font-size:15px;font-weight:bold;cursor:pointer}.btn.secondary{background:#64748b}.btn.danger{background:#dc2626}.btn:disabled{opacity:.6;cursor:not-allowed}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:14px}.cat-card{border:1px solid #e5e7eb;border-radius:12px;background:#fff;padding:14px 16px;display:flex;align-items:flex-start;gap:12px}.cat-name{font-weight:bold;font-size:16px}.cat-count{font-size:13px;color:#6b7280;margin-top:4px}.check{width:20px;height:20px;margin-top:2px}.small{font-size:13px;color:#6b7280}.table-wrap{overflow:auto;margin-top:18px}table{width:100%;border-collapse:collapse;background:#fff}th,td{border:1px solid #e5e7eb;padding:8px 10px;text-align:left;font-size:14px}th{background:#f3f4f6}.hidden{display:none}@media(max-width:640px){.header{flex-direction:column;align-items:flex-start}.wrap{padding:24px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header"><h1>ビズもん カテゴリー設定</h1><a class="top-link" href="index.html">← マイページへ戻る</a></div>
  <div class="sub">この画面では <strong>category1のみ</strong> を表示・保存します。questions.csvには category1, category2 を残します。</div>
  <div id="status" class="status">STEP0：HTML読込完了。JavaScript起動待ち...</div>
  <div class="actions">
    <button class="btn secondary" type="button" onclick="selectAll(true)">すべて選択</button>
    <button class="btn secondary" type="button" onclick="selectAll(false)">すべて解除</button>
    <button id="saveBtn" class="btn" type="button" onclick="saveSettings()">設定を保存</button>
  </div>
  <div id="categoryList" class="grid"></div>
  <details style="margin-top:22px"><summary class="small">category1/category2対応表を確認する</summary><div class="table-wrap"><table id="masterTable"><thead><tr><th>no</th><th>category1</th><th>category2</th></tr></thead><tbody></tbody></table></div></details>
  <a class="bottom-link" href="index.html">← マイページへ戻る</a>
</div>
<script>
var firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",projectId:"bizmon-31ffc"};
var auth=null,db=null,currentUser=null,currentUserData=null,currentCompanyId="",CATEGORY_MASTER=[],CATEGORY1_LIST=[];
function setStatus(msg,type){var el=document.getElementById('status');if(!el)return;el.textContent=msg;el.className='status '+(type||'');}
function addStatus(msg){var el=document.getElementById('status');if(!el)return;el.textContent=(el.textContent?el.textContent+'\n':'')+msg;}
function loadScript(src,label,callback){var s=document.createElement('script'),done=false;var timer=setTimeout(function(){if(done)return;done=true;callback(new Error(label+' の読込がタイムアウトしました。'));},15000);s.onload=function(){if(done)return;done=true;clearTimeout(timer);callback(null)};s.onerror=function(){if(done)return;done=true;clearTimeout(timer);callback(new Error(label+' の読込に失敗しました。'))};s.src=src.indexOf('http')===0?src:(src+'?v='+new Date().getTime());document.head.appendChild(s)}
function loadFirebase(callback){setStatus('STEP1：Firebase SDKを読み込み中...');loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js','firebase-app-compat',function(e){if(e){callback(e);return}addStatus('STEP1-1：firebase-app-compat 読込OK');loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js','firebase-auth-compat',function(e){if(e){callback(e);return}addStatus('STEP1-2：firebase-auth-compat 読込OK');loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js','firebase-firestore-compat',function(e){if(e){callback(e);return}try{if(!firebase.apps.length){firebase.initializeApp(firebaseConfig)}auth=firebase.auth();db=firebase.firestore();addStatus('STEP1-3：Firebase初期化OK');callback(null)}catch(err){callback(err)}})})})}
function requireLogin(callback){auth.onAuthStateChanged(function(user){if(!user){location.href='login.html';return}currentUser=user;callback(user)})}
/* BIZMON_COMPANY_QUIZ_SETTINGS_CATEGORY_V1: 会社別カテゴリー設定 */
function getCurrentCompanyId(callback){if(currentCompanyId){callback(null,currentCompanyId);return;}if(!currentUser){callback(new Error('ログインユーザーを確認できません。'));return;}db.collection('users').doc(currentUser.uid).get().then(function(doc){if(!doc.exists)throw new Error('users/'+currentUser.uid+' が見つかりません。');var d=doc.data()||{};currentUserData=d;currentCompanyId=firstNonEmpty(d.companyId);if(!currentCompanyId)throw new Error('users/'+currentUser.uid+' に companyId がありません。');callback(null,currentCompanyId);}).catch(function(e){callback(e);});}
function parseCsvLine(line){var out=[],cur='',q=false;for(var i=0;i<line.length;i++){var ch=line.charAt(i);if(ch==='"'){if(q&&line.charAt(i+1)==='"'){cur+='"';i++}else{q=!q}}else if(ch===','&&!q){out.push(cur);cur=''}else{cur+=ch}}out.push(cur);return out}
function firstNonEmpty(){for(var i=0;i<arguments.length;i++){var v=arguments[i];if(v!==undefined&&v!==null&&String(v).trim()!=='')return String(v).trim()}return ''}
function loadCategoryMaster(callback){var xhr=new XMLHttpRequest();xhr.open('GET','category-master.csv?v='+new Date().getTime(),true);xhr.overrideMimeType('text/plain; charset=UTF-8');xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status!==200){callback(new Error('category-master.csvを取得できません。HTTP='+xhr.status));return}try{var text=xhr.responseText||'';if(text.length>0&&text.charCodeAt(0)===65279)text=text.substring(1);var lines=text.split(/\r?\n/).filter(function(l){return l.trim()!==''});var header=parseCsvLine(lines[0]).map(function(v){return v.trim().toLowerCase()});var idx={no:header.indexOf('no'),category1:header.indexOf('category1'),category2:header.indexOf('category2')};if(idx.no<0||idx.category1<0||idx.category2<0)throw new Error('category-master.csvに no,category1,category2 列が必要です。');var rows=[],seen={};CATEGORY1_LIST=[];for(var i=1;i<lines.length;i++){var cols=parseCsvLine(lines[i]);var r={no:firstNonEmpty(cols[idx.no]),category1:firstNonEmpty(cols[idx.category1]),category2:firstNonEmpty(cols[idx.category2])};if(r.category1&&r.category2){rows.push(r);if(!seen[r.category1]){seen[r.category1]=true;CATEGORY1_LIST.push(r.category1)}}}CATEGORY_MASTER=rows;callback(null,rows)}catch(e){callback(e)}};xhr.onerror=function(){callback(new Error('category-master.csvの通信に失敗しました。'))};xhr.send()}
function countCategory2(category1){var n=0;CATEGORY_MASTER.forEach(function(r){if(r.category1===category1)n++});return n}
function renderCategoryList(activeList){var active={};(activeList||CATEGORY1_LIST).forEach(function(c){active[c]=true});var list=document.getElementById('categoryList');list.innerHTML='';CATEGORY1_LIST.forEach(function(c,i){var div=document.createElement('label');div.className='cat-card';div.innerHTML='<input class="check cat-check" type="checkbox" value="'+escapeHtml(c)+'" '+(active[c]?'checked':'')+'><div><div class="cat-name">'+escapeHtml(c)+'</div><div class="cat-count">中項目：'+countCategory2(c)+'件</div></div>';list.appendChild(div)})}
function renderMasterTable(){var tb=document.querySelector('#masterTable tbody');tb.innerHTML='';CATEGORY_MASTER.forEach(function(r){var tr=document.createElement('tr');tr.innerHTML='<td>'+escapeHtml(r.no)+'</td><td>'+escapeHtml(r.category1)+'</td><td>'+escapeHtml(r.category2)+'</td>';tb.appendChild(tr)})}
function escapeHtml(s){return String(s).replace(/[&<>'"]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]})}
function category1Of(c){if(typeof c==='string')return c.trim();return firstNonEmpty(c.category1,c.name,c.value,c.label)}
/* BIZMON_CATEGORY_NEXT_DAY_APPLY_V1: 翌日反映の保存設定を画面表示にも反映 */
function categorySettingsTodayKey(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function categorySettingsTomorrowKey(){var d=new Date();d.setDate(d.getDate()+1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function normalizeCategorySettingList(src){var arr=[];(src||[]).forEach(function(x){var c=category1Of(x);if(c&&arr.indexOf(c)<0)arr.push(c)});return arr.length?arr:CATEGORY1_LIST;}
function effectiveCategorySource(d){d=d||{};if(d.nextApplyDate&&d.nextCategories&&categorySettingsTodayKey()>=d.nextApplyDate)return d.nextCategories;if(d.activeCategories&&d.activeCategories.length)return d.activeCategories;return CATEGORY1_LIST;}
function loadSavedSettings(callback){getCurrentCompanyId(function(err,companyId){if(err){callback(err);return;}db.collection('companyQuizSettings').doc(companyId).get().then(function(doc){if(doc.exists){var d=doc.data()||{};callback(null,normalizeCategorySettingList(effectiveCategorySource(d)));return;}return db.collection('companySettings').doc('quiz').get().then(function(legacyDoc){if(!legacyDoc.exists){callback(null,CATEGORY1_LIST);return;}var d=legacyDoc.data()||{};callback(null,normalizeCategorySettingList(effectiveCategorySource(d)));});}).catch(function(e){callback(e);});});}
function selectAll(flag){document.querySelectorAll('.cat-check').forEach(function(cb){cb.checked=flag})}
function selectedCategories(){var arr=[];document.querySelectorAll('.cat-check').forEach(function(cb){if(cb.checked)arr.push(cb.value)});return arr}
function saveSettings(){var arr=selectedCategories();if(!arr.length){setStatus('少なくとも1つのcategory1を選択してください。','error');return}var btn=document.getElementById('saveBtn');btn.disabled=true;setStatus('カテゴリー設定を保存中...\n※保存した内容は翌日から出題に反映されます。');getCurrentCompanyId(function(err,companyId){if(err){setStatus('会社情報の確認に失敗しました。\n'+err.message,'error');btn.disabled=false;return;}var ref=db.collection('companyQuizSettings').doc(companyId);ref.get().then(function(doc){var d=doc.exists?(doc.data()||{}):{};var currentActive=normalizeCategorySettingList(effectiveCategorySource(d));var tomorrow=categorySettingsTomorrowKey();return ref.set({companyId:companyId,activeCategories:currentActive,nextCategories:arr,nextApplyDate:tomorrow,categoryMode:'category1',updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedBy:currentUser?currentUser.uid:''},{merge:true}).then(function(){setStatus('保存しました。\n保存先：companyQuizSettings / '+companyId+'\n反映日：'+tomorrow+' 以降\n本日中の出題カテゴリー：'+currentActive.join('、')+'\n翌日以降の出題カテゴリー：'+arr.join('、'),'ok')});}).catch(function(e){setStatus('保存に失敗しました。\n'+e.message,'error')}).finally(function(){btn.disabled=false})})}
function start(){loadCategoryMaster(function(e){if(e){setStatus(e.message,'error');return}renderMasterTable();setStatus('STEP2：保存済みカテゴリー設定を読み込み中...');loadSavedSettings(function(e,active){if(e){setStatus('保存済み設定の取得に失敗しました。全カテゴリーを表示します。\n'+e.message,'warn');active=CATEGORY1_LIST}renderCategoryList(active);setStatus('STEP3：カテゴリー設定を表示しました。\n表示対象：category1のみ\ncategory1件数：'+CATEGORY1_LIST.length+'件 / category2件数：'+CATEGORY_MASTER.length+'件','ok')})})}
loadFirebase(function(e){if(e){setStatus(e.message,'error');return}requireLogin(function(){start()})});
</script>
</body>
</html>
