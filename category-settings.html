<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出題カテゴリー設定</title>
<style>
body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:#eef2f7;color:#111827;padding:24px;box-sizing:border-box}.wrap{max-width:980px;margin:30px auto;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:32px;box-sizing:border-box}.header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}h1{margin:0}.top-link,.bottom-link{color:#2563eb;text-decoration:none;font-weight:bold;font-size:14px}.bottom-link{display:inline-block;margin-top:22px}.status,.box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:14px;line-height:1.7;white-space:pre-wrap}.status{display:none}.status.error,.status.ok,.status.warn{display:block}.error{color:#dc2626}.ok{color:#166534}.warn{color:#92400e;background:#fffbeb;border-color:#fde68a}.sub{color:#6b7280;font-size:14px;margin:6px 0 20px}.actions{display:flex;flex-wrap:wrap;gap:10px;margin:18px 0}.btn{border:none;border-radius:10px;background:#2563eb;color:#fff;padding:12px 16px;font-size:15px;font-weight:bold;cursor:pointer}.btn.secondary{background:#64748b}.btn:disabled{opacity:.6;cursor:not-allowed}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;margin-top:14px}.cat-card{border:1px solid #e5e7eb;border-radius:12px;background:#fff;padding:14px 16px;display:flex;align-items:flex-start;gap:12px}.cat-main{flex:1;min-width:0}.cat-name{font-weight:bold;font-size:16px;line-height:1.6}.cat-label{color:#374151}.cat-value{color:#111827}.cat-count-summary{display:inline-block;margin-top:6px;color:#2563eb;font-weight:bold;cursor:pointer;line-height:1.6}.cat-count-summary:hover{text-decoration:underline}.cat-detail{margin-top:8px}.cat-detail[open]{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:8px 10px}.cat-mini-table-wrap{overflow:auto;margin-top:8px}.cat-mini-table{width:100%;border-collapse:collapse;background:#fff}.cat-mini-table th,.cat-mini-table td{border:1px solid #e5e7eb;padding:6px 8px;text-align:left;font-size:13px;vertical-align:top}.cat-mini-table th{background:#f3f4f6}.check{width:20px;height:20px;margin-top:4px;flex:0 0 auto}.small{font-size:13px;color:#6b7280}table{width:100%;border-collapse:collapse;background:#fff}th,td{border:1px solid #e5e7eb;padding:8px 10px;text-align:left;font-size:14px;vertical-align:top}th{background:#f3f4f6}.hidden{display:none!important}.page-loading{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#eef2f7;color:#1f2937;font-weight:bold}.page-loading.hidden{display:none!important}.loading-box{display:flex;flex-direction:column;align-items:center;gap:12px;background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:24px 28px;box-shadow:0 4px 12px rgba(0,0,0,.08)}.loading-spinner{width:42px;height:42px;border:5px solid #dbeafe;border-top-color:#2563eb;border-radius:50%;animation:spin .9s linear infinite}.loading-text{font-size:14px;color:#374151}@keyframes spin{to{transform:rotate(360deg)}}.log-empty{padding:14px 16px;color:#6b7280;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;margin-top:12px;white-space:pre-wrap}.log-added{color:#166534;font-weight:bold}.log-removed{color:#dc2626;font-weight:bold}.log-detail{max-width:260px;line-height:1.6}.summary-title{font-weight:bold;color:#374151;cursor:pointer}.history-note{margin-top:10px;line-height:1.7}.badge{display:inline-block;border-radius:999px;background:#eef2ff;color:#3730a3;padding:2px 8px;font-size:12px;font-weight:bold;margin-left:6px}.history-scroll{margin-top:14px;max-height:278px;overflow:auto;border:1px solid #e5e7eb;border-radius:10px;background:#fff}.history-scroll table{min-width:1080px;border:0}.history-scroll th,.history-scroll td{height:32px}.history-scroll th{position:sticky;top:0;z-index:1}.blank-cell{color:#9ca3af}@media(max-width:640px){body{padding:16px}.header{flex-direction:column;align-items:flex-start}.wrap{padding:24px}.grid{grid-template-columns:1fr}th,td{font-size:13px;white-space:nowrap}.log-detail{max-width:220px;white-space:normal}.history-scroll{max-height:270px}}
</style>
</head>
<body>
<div id="pageLoading" class="page-loading"><div class="loading-box"><div class="loading-spinner"></div><div id="loadingText" class="loading-text">出題カテゴリー設定を読み込み中...</div></div></div>
<script>(function(){function h(){var l=document.getElementById('pageLoading');if(l){l.classList.add('hidden');l.style.display='none'}}function s(t){var l=document.getElementById('pageLoading'),x=document.getElementById('loadingText');if(x&&t)x.textContent=t;if(l){l.classList.remove('hidden');l.style.display='flex'}}window.bizmonHideCategoryLoading=h;window.bizmonShowCategoryLoading=s;setTimeout(function(){var l=document.getElementById('pageLoading');if(l&&!l.classList.contains('hidden'))h()},5000);window.addEventListener('error',h);window.addEventListener('unhandledrejection',h)})();</script>
<div class="wrap">
  <div class="header"><h1>出題カテゴリー設定</h1><a class="top-link" href="index.html">← マイページへ戻る</a></div>
  <div class="sub">設定を変更すると翌日のクイズから反映されます。</div>
  <div id="status" class="status"></div>
  <div class="actions"><button class="btn secondary" type="button" onclick="selectAll(true)">すべて選択</button><button class="btn secondary" type="button" onclick="selectAll(false)">すべて解除</button><button id="saveBtn" class="btn" type="button" onclick="saveSettings()" disabled title="追加・削除がある場合のみ保存できます">設定を保存</button></div>
  <div id="categoryList" class="grid"></div>
  <details style="margin-top:22px" open>
    <summary class="summary-title">変更履歴を確認する<span class="badge">最新30件</span></summary>
    <div class="small history-note">出題カテゴリー設定について、誰が、いつ、何を変更したかを確認できます。</div>
    <div id="changeLogEmpty" class="log-empty hidden">変更履歴はまだありません。</div>
    <div class="history-scroll">
      <table id="changeLogTable"><thead><tr><th>変更日時</th><th>変更者社員コード</th><th>変更者氏名</th><th>追加カテゴリー</th><th>削除カテゴリー</th><th>適用日</th></tr></thead><tbody></tbody></table>
    </div>
  </details>
  <a class="bottom-link" href="index.html">← マイページへ戻る</a>
</div>
<script>
var firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",projectId:"bizmon-31ffc"};
var auth=null,db=null,currentUser=null,currentUserData=null,currentCompanyId="",CATEGORY_MASTER=[],CATEGORY1_LIST=[],ORIGINAL_SELECTED_CATEGORIES=[];
function hideLoading(){if(window.bizmonHideCategoryLoading)window.bizmonHideCategoryLoading()}function showLoading(t){if(window.bizmonShowCategoryLoading)window.bizmonShowCategoryLoading(t||'出題カテゴリー設定を読み込み中...')}function setStatus(msg,type){var el=document.getElementById('status');if(!el)return;el.textContent=msg||'';el.className='status '+(type||'');if(type==='error'||type==='ok'||type==='warn'){el.style.display='block';hideLoading()}else{el.style.display='none'}}
function loadScript(src,label,callback){var s=document.createElement('script'),done=false;var timer=setTimeout(function(){if(done)return;done=true;callback(new Error(label+' の読込がタイムアウトしました。'));},12000);s.onload=function(){if(done)return;done=true;clearTimeout(timer);callback(null)};s.onerror=function(){if(done)return;done=true;clearTimeout(timer);callback(new Error(label+' の読込に失敗しました。'))};s.src=src;document.head.appendChild(s)}
function loadFirebase(callback){showLoading('出題カテゴリー設定を読み込み中...');loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js','firebase-app-compat',function(e){if(e){callback(e);return}loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js','firebase-auth-compat',function(e){if(e){callback(e);return}loadScript('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js','firebase-firestore-compat',function(e){if(e){callback(e);return}try{if(!firebase.apps.length){firebase.initializeApp(firebaseConfig)}auth=firebase.auth();db=firebase.firestore();callback(null)}catch(err){callback(err)}})})})}
function requireLogin(callback){auth.onAuthStateChanged(function(user){if(!user){location.href='login.html';return}currentUser=user;callback(user)})}
function getCurrentCompanyId(callback){if(currentCompanyId){callback(null,currentCompanyId);return}if(!currentUser){callback(new Error('ログインユーザーを確認できません。'));return}db.collection('users').doc(currentUser.uid).get().then(function(doc){if(!doc.exists)throw new Error('users/'+currentUser.uid+' が見つかりません。');var d=doc.data()||{};currentUserData=d;currentCompanyId=firstNonEmpty(d.companyId);if(!currentCompanyId)throw new Error('users/'+currentUser.uid+' に companyId がありません。');callback(null,currentCompanyId)}).catch(function(e){callback(e)})}
function parseCsvLine(line){var out=[],cur='',q=false;for(var i=0;i<line.length;i++){var ch=line.charAt(i);if(ch==='"'){if(q&&line.charAt(i+1)==='"'){cur+='"';i++}else{q=!q}}else if(ch===','&&!q){out.push(cur);cur=''}else{cur+=ch}}out.push(cur);return out}function firstNonEmpty(){for(var i=0;i<arguments.length;i++){var v=arguments[i];if(v!==undefined&&v!==null&&String(v).trim()!=='')return String(v).trim()}return ''}
function loadCategoryMaster(callback){showLoading('出題カテゴリー設定を読み込み中...');var xhr=new XMLHttpRequest();xhr.open('GET','category-master.csv?v=20260622',true);xhr.overrideMimeType('text/plain; charset=UTF-8');xhr.onreadystatechange=function(){if(xhr.readyState!==4)return;if(xhr.status!==200){callback(new Error('category-master.csvを取得できません。HTTP='+xhr.status));return}try{var text=xhr.responseText||'';if(text.length>0&&text.charCodeAt(0)===65279)text=text.substring(1);var lines=text.split(/\r?\n/).filter(function(l){return l.trim()!==''});var header=parseCsvLine(lines[0]).map(function(v){return v.trim().toLowerCase()});var idx={no:header.indexOf('no'),category1:header.indexOf('category1'),category2:header.indexOf('category2')};if(idx.no<0||idx.category1<0||idx.category2<0)throw new Error('category-master.csvに no,category1,category2 列が必要です。');var rows=[],seen={};CATEGORY1_LIST=[];for(var i=1;i<lines.length;i++){var cols=parseCsvLine(lines[i]);var r={no:firstNonEmpty(cols[idx.no]),category1:firstNonEmpty(cols[idx.category1]),category2:firstNonEmpty(cols[idx.category2])};if(r.category1&&r.category2){rows.push(r);if(!seen[r.category1]){seen[r.category1]=true;CATEGORY1_LIST.push(r.category1)}}}CATEGORY_MASTER=rows;callback(null,rows)}catch(e){callback(e)}};xhr.onerror=function(){callback(new Error('category-master.csvの通信に失敗しました。'))};xhr.send()}
function category2Rows(category1){return CATEGORY_MASTER.filter(function(r){return r.category1===category1})}function countCategory2(category1){return category2Rows(category1).length}
function renderCategory2Table(category1){var rows=category2Rows(category1);var html='<div class="cat-mini-table-wrap"><table class="cat-mini-table"><thead><tr><th>no</th><th>category1</th><th>category2</th></tr></thead><tbody>';rows.forEach(function(r){html+='<tr><td>'+escapeHtml(r.no)+'</td><td>'+escapeHtml(r.category1)+'</td><td>'+escapeHtml(r.category2)+'</td></tr>'});html+='</tbody></table></div>';return html}
function renderCategoryList(activeList){var active={};ORIGINAL_SELECTED_CATEGORIES=[];(activeList||CATEGORY1_LIST).forEach(function(c){if(c&&ORIGINAL_SELECTED_CATEGORIES.indexOf(c)<0)ORIGINAL_SELECTED_CATEGORIES.push(c);active[c]=true});var list=document.getElementById('categoryList');list.innerHTML='';CATEGORY1_LIST.forEach(function(c){var div=document.createElement('div');div.className='cat-card';var count=countCategory2(c);div.innerHTML='<input class="check cat-check" type="checkbox" value="'+escapeHtml(c)+'" '+(active[c]?'checked':'')+'><div class="cat-main"><div class="cat-name"><span class="cat-label">category1：</span><span class="cat-value">'+escapeHtml(c)+'</span></div><details class="cat-detail"><summary class="cat-count-summary">category2：'+count+'項目</summary>'+renderCategory2Table(c)+'</details></div>';list.appendChild(div)});document.querySelectorAll('.cat-check').forEach(function(cb){cb.addEventListener('change',updateSaveButtonState)});updateSaveButtonState()}
function escapeHtml(s){return String(s).replace(/[&<>'"]/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]})}function category1Of(c){if(typeof c==='string')return c.trim();return firstNonEmpty(c.category1,c.name,c.value,c.label)}function categorySettingsTodayKey(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function categorySettingsTomorrowKey(){var d=new Date();d.setDate(d.getDate()+1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function normalizeCategorySettingList(src){var arr=[];(src||[]).forEach(function(x){var c=category1Of(x);if(c&&arr.indexOf(c)<0)arr.push(c)});return arr.length?arr:CATEGORY1_LIST}function effectiveCategorySource(d){d=d||{};if(d.nextApplyDate&&d.nextCategories&&categorySettingsTodayKey()>=d.nextApplyDate)return d.nextCategories;if(d.activeCategories&&d.activeCategories.length)return d.activeCategories;return CATEGORY1_LIST}
function loadSavedSettings(callback){getCurrentCompanyId(function(err,companyId){if(err){callback(err);return}db.collection('companyQuizSettings').doc(companyId).get().then(function(doc){if(doc.exists){var d=doc.data()||{};var displaySource=(d.nextCategories&&d.nextCategories.length)?d.nextCategories:effectiveCategorySource(d);callback(null,normalizeCategorySettingList(displaySource));return}return db.collection('companySettings').doc('quiz').get().then(function(legacyDoc){if(!legacyDoc.exists){callback(null,CATEGORY1_LIST);return}var d=legacyDoc.data()||{};var displaySource=(d.nextCategories&&d.nextCategories.length)?d.nextCategories:effectiveCategorySource(d);callback(null,normalizeCategorySettingList(displaySource))})}).catch(function(e){callback(e)})})}
function selectAll(flag){document.querySelectorAll('.cat-check').forEach(function(cb){cb.checked=flag});updateSaveButtonState()}function selectedCategories(){var arr=[];document.querySelectorAll('.cat-check').forEach(function(cb){if(cb.checked)arr.push(cb.value)});return arr}function sameCategorySet(a,b){a=(a||[]).slice().sort();b=(b||[]).slice().sort();if(a.length!==b.length)return false;for(var i=0;i<a.length;i++){if(a[i]!==b[i])return false}return true}function hasCategoryChanges(){return !sameCategorySet(ORIGINAL_SELECTED_CATEGORIES,selectedCategories())}function updateSaveButtonState(){var btn=document.getElementById('saveBtn');if(!btn)return;var selected=selectedCategories();var changed=!sameCategorySet(ORIGINAL_SELECTED_CATEGORIES,selected);btn.disabled=(!changed||!selected.length);btn.title=!selected.length?'少なくとも1つのカテゴリーを選択してください。':(!changed?'追加・削除がないため保存は不要です。':'変更内容を保存できます。')}
function categorySettingsDiff(beforeList,afterList){beforeList=beforeList||[];afterList=afterList||[];var added=afterList.filter(function(c){return beforeList.indexOf(c)<0});var removed=beforeList.filter(function(c){return afterList.indexOf(c)<0});return {added:added,removed:removed}}function categorySettingsUserName(){if(!currentUserData)return '';return firstNonEmpty(currentUserData.name,currentUserData.displayName,currentUserData.employeeName,currentUserData.userName,currentUserData.fullName,currentUserData['氏名'],currentUserData['名前'],currentUserData['社員名'])}function categorySettingsEmployeeCode(){if(!currentUserData)return '';return firstNonEmpty(currentUserData.employeeCode,currentUserData.staffCode,currentUserData.userCode,currentUserData.employeeNo,currentUserData.staffNo,currentUserData.code,currentUserData['社員コード'],currentUserData['従業員コード'],currentUserData['社員番号'],currentUserData['従業員番号'])}
function formatCategoryLogDate(v){if(!v)return '-';var d=null;try{if(v.toDate){d=v.toDate()}else if(v instanceof Date){d=v}else{d=new Date(v)}}catch(e){d=null}if(!d||isNaN(d.getTime()))return '-';return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}function categoryListText(arr){arr=arr||[];if(!arr.length)return '-';return arr.join('、')}
function renderBlankLogRow(){return '<tr><td class="blank-cell">&nbsp;</td><td class="blank-cell">&nbsp;</td><td class="blank-cell">&nbsp;</td><td class="blank-cell">&nbsp;</td><td class="blank-cell">&nbsp;</td><td class="blank-cell">&nbsp;</td></tr>'}
function renderChangeLogs(logs){var tb=document.querySelector('#changeLogTable tbody');var empty=document.getElementById('changeLogEmpty');if(!tb)return;tb.innerHTML='';logs=logs||[];if(empty){if(logs.length){empty.classList.add('hidden')}else{empty.textContent='変更履歴はまだありません。';empty.classList.remove('hidden')}}logs.forEach(function(log){var tr=document.createElement('tr');var changerCode=firstNonEmpty(log.updatedByEmployeeCode,log.employeeCode,log.staffCode);var changerName=firstNonEmpty(log.updatedByName,log.userName,log.updatedByEmail,log.updatedBy);tr.innerHTML='<td>'+escapeHtml(formatCategoryLogDate(log.updatedAt))+'</td><td>'+escapeHtml(changerCode||'-')+'</td><td>'+escapeHtml(changerName||'-')+'</td><td class="log-added log-detail">'+escapeHtml(categoryListText(log.addedCategories))+'</td><td class="log-removed log-detail">'+escapeHtml(categoryListText(log.removedCategories))+'</td><td>'+escapeHtml(log.nextApplyDate||'-')+'</td>';tb.appendChild(tr)});for(var i=logs.length;i<5;i++){tb.insertAdjacentHTML('beforeend',renderBlankLogRow())}}
function loadChangeLogs(){getCurrentCompanyId(function(err,companyId){if(err){renderChangeLogs([]);return}db.collection('companyQuizSettings').doc(companyId).collection('changeLogs').orderBy('updatedAt','desc').limit(30).get().then(function(snapshot){var logs=[];snapshot.forEach(function(doc){logs.push(doc.data()||{})});renderChangeLogs(logs)}).catch(function(e){var empty=document.getElementById('changeLogEmpty');var tb=document.querySelector('#changeLogTable tbody');if(tb){tb.innerHTML='';for(var i=0;i<5;i++)tb.insertAdjacentHTML('beforeend',renderBlankLogRow())}if(empty){empty.textContent='変更履歴の取得に失敗しました。'+(e&&e.message?'\n'+e.message:'');empty.classList.remove('hidden')}})})}
function saveSettings(){var arr=selectedCategories();if(!arr.length){setStatus('少なくとも1つのcategory1を選択してください。','error');updateSaveButtonState();return}if(!hasCategoryChanges()){setStatus('カテゴリーの追加・削除がないため、保存は不要です。','warn');updateSaveButtonState();return}var btn=document.getElementById('saveBtn');btn.disabled=true;showLoading('出題カテゴリー設定を保存中...');setStatus('',null);getCurrentCompanyId(function(err,companyId){if(err){setStatus('会社情報の確認に失敗しました。\n'+err.message,'error');btn.disabled=false;updateSaveButtonState();return}var ref=db.collection('companyQuizSettings').doc(companyId);ref.get().then(function(doc){var d=doc.exists?(doc.data()||{}):{};var beforeCategories=normalizeCategorySettingList((d.nextCategories&&d.nextCategories.length)?d.nextCategories:effectiveCategorySource(d));var currentActive=normalizeCategorySettingList(effectiveCategorySource(d));var tomorrow=categorySettingsTomorrowKey();var diff=categorySettingsDiff(beforeCategories,arr);if(!diff.added.length&&!diff.removed.length){setStatus('カテゴリーの追加・削除がないため、保存は不要です。','warn');ORIGINAL_SELECTED_CATEGORIES=arr.slice();updateSaveButtonState();return null}var batch=db.batch();batch.set(ref,{companyId:companyId,activeCategories:currentActive,nextCategories:arr,nextApplyDate:tomorrow,categoryMode:'category1',updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedBy:currentUser?currentUser.uid:'',updatedByEmail:currentUser?currentUser.email:'',updatedByName:categorySettingsUserName(),updatedByEmployeeCode:categorySettingsEmployeeCode()},{merge:true});var logRef=ref.collection('changeLogs').doc();batch.set(logRef,{companyId:companyId,action:'updateCategorySettings',beforeCategories:beforeCategories,afterCategories:arr,addedCategories:diff.added,removedCategories:diff.removed,nextApplyDate:tomorrow,categoryMode:'category1',updatedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedBy:currentUser?currentUser.uid:'',updatedByEmail:currentUser?currentUser.email:'',updatedByName:categorySettingsUserName(),updatedByEmployeeCode:categorySettingsEmployeeCode(),page:'category-settings.html'});return batch.commit().then(function(){ORIGINAL_SELECTED_CATEGORIES=arr.slice();updateSaveButtonState();setStatus('保存しました。\n設定は翌日のクイズから反映されます。\n変更履歴も記録しました。','ok');loadChangeLogs()})}).catch(function(e){setStatus('保存に失敗しました。\n'+e.message,'error')}).finally(function(){hideLoading();updateSaveButtonState()})})}
function start(){loadCategoryMaster(function(e){if(e){setStatus(e.message,'error');return}loadSavedSettings(function(e,active){if(e){setStatus('保存済み設定の取得に失敗しました。全カテゴリーを表示します。\n'+e.message,'warn');active=CATEGORY1_LIST}renderCategoryList(active);loadChangeLogs();setStatus('',null);hideLoading()})})}
loadFirebase(function(e){if(e){setStatus(e.message,'error');return}requireLogin(function(){start()})});
</script>
</body>
</html>
