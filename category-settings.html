<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>出題カテゴリー設定</title><style>
body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:#eef2f7;color:#111827;padding:24px;box-sizing:border-box}.wrap{max-width:900px;margin:30px auto;background:#fff;border-radius:16px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:32px;box-sizing:border-box}.header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}h1{margin:0;color:#111827}.top-link,.bottom-link{display:inline-block;color:#2563eb;text-decoration:none;font-size:14px;font-weight:bold;white-space:nowrap}.bottom-link{margin-top:20px}.sub{color:#6b7280;font-size:14px;margin:6px 0 20px}.box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:14px;line-height:1.7;white-space:pre-wrap}.question-box{background:#eff6ff;border-left:4px solid #2563eb;font-size:20px;color:#1f2937}.choices{display:grid;gap:12px}.choice-btn{width:100%;border:none;border-radius:10px;background:#2563eb;color:#fff;padding:14px 16px;font-size:16px;cursor:pointer;text-align:left}.choice-btn:hover{background:#1d4ed8}.status{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:14px;color:#374151;white-space:pre-wrap;line-height:1.7}.ok{color:#166534}.error{color:#dc2626}.note{color:#374151}.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px;margin-bottom:16px}.section-title{font-size:18px;font-weight:bold;margin:0 0 12px}.cat-group{border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-bottom:12px;background:#fff}.cat-parent{font-weight:bold;color:#111827;margin-bottom:10px}.cat-children{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:8px}.cat-item{display:flex;gap:8px;align-items:center;background:#f9fafb;border:1px solid #e5e7eb;border-radius:999px;padding:8px 10px;font-size:14px}.btn-row{display:flex;justify-content:flex-end;gap:12px;flex-wrap:wrap;margin-top:18px}.primary-btn,.secondary-btn{border:none;border-radius:12px;padding:12px 22px;font-size:15px;font-weight:bold;cursor:pointer}.primary-btn{background:#2563eb;color:#fff}.secondary-btn{background:#f3f4f6;color:#111827}.info-box{background:#eff6ff;border-left:4px solid #2563eb;border-radius:10px;padding:14px 16px;color:#1e3a8a;font-size:14px;line-height:1.7;margin-bottom:18px}.warning-box{background:#fffbeb;border-left:4px solid #f59e0b;border-radius:10px;padding:14px 16px;color:#92400e;font-size:14px;line-height:1.7;margin-top:12px}@media(max-width:640px){.header{flex-direction:column;align-items:flex-start}.wrap{padding:24px}.btn-row{flex-direction:column}.primary-btn,.secondary-btn{width:100%}}
</style></head>
<body><div class="wrap"><div class="header"><h1>出題カテゴリー設定</h1><a class="top-link" href="index.html">← マイページへ戻る</a></div>
<div class="sub">企業設定でチェックしたカテゴリーだけが出題対象になります。変更内容は本日の問題には反映せず、翌日から反映します。</div>
<div class="info-box">初期状態では、全カテゴリーを出題対象として扱います。保存すると「翌日反映予定」として保存されます。</div>
<div id="status" class="status">読み込み中...</div>
<div class="card"><p class="section-title">現在有効なカテゴリー</p><div id="activeList" class="box">読み込み中...</div></div>
<div class="card"><p class="section-title">翌日反映予定のカテゴリー</p><div id="nextList" class="box">未設定</div></div>
<div class="card"><p class="section-title">出題対象にするカテゴリーを選択</p><div id="categoryArea"></div><div class="btn-row"><button class="secondary-btn" id="selectAllBtn" type="button">すべて選択</button><button class="secondary-btn" id="clearBtn" type="button">すべて解除</button><button class="primary-btn" id="saveBtn" type="button">翌日から反映する設定を保存</button></div><div class="warning-box">注意：当日の問題は途中で変わらないようにするため、設定変更は翌日から反映します。</div></div>
<a class="bottom-link" href="index.html">← マイページへ戻る</a></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",
  authDomain: "bizmon-31ffc.firebaseapp.com",
  projectId: "bizmon-31ffc"
};

const app=initializeApp(firebaseConfig);const auth=getAuth(app);const db=getFirestore(app);
const statusEl=document.getElementById('status'), area=document.getElementById('categoryArea'), activeList=document.getElementById('activeList'), nextList=document.getElementById('nextList');
let allCategories=[];let settings=null;
function parseCsvLine(line){const out=[];let cur='';let q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){cur+='"';i++}else q=!q}else if(ch===','&&!q){out.push(cur);cur=''}else cur+=ch}out.push(cur);return out}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function tomorrowKey(){const d=new Date();d.setDate(d.getDate()+1);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function keyOf(c){return c.category1+'＞'+c.category2}
function listText(list){return !list||list.length===0?'未設定':list.map(keyOf).join('
')}
async function loadCategories(){const res=await fetch('questions.csv?v='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('questions.csvを取得できません。');let text=await res.text();if(text.charCodeAt(0)===65279)text=text.slice(1);const lines=text.split(/?
/).filter(l=>l.trim()!=='');const header=parseCsvLine(lines[0]).map(v=>v.trim().toLowerCase());const idx={category1:header.indexOf('category1'),category2:header.indexOf('category2'),active:header.indexOf('active')};if(idx.category1<0||idx.category2<0)throw new Error('questions.csvにcategory1/category2列が必要です。');const map=new Map();lines.slice(1).forEach(line=>{const cols=parseCsvLine(line);const active=idx.active<0?'true':String(cols[idx.active]||'true').toLowerCase();if(active==='false')return;const c={category1:cols[idx.category1]||'',category2:cols[idx.category2]||''};if(c.category1&&c.category2)map.set(keyOf(c),c)});allCategories=Array.from(map.values()).sort((a,b)=>keyOf(a).localeCompare(keyOf(b),'ja'));}
function getActiveCategories(){if(!settings)return allCategories;const today=todayKey();if(settings.nextApplyDate&&settings.nextCategories&&today>=settings.nextApplyDate)return settings.nextCategories;return settings.activeCategories&&settings.activeCategories.length?settings.activeCategories:allCategories}
function render(){const active=getActiveCategories();activeList.textContent=listText(active);nextList.textContent=settings&&settings.nextCategories&&settings.nextCategories.length?('反映日：'+settings.nextApplyDate+'
'+listText(settings.nextCategories)):'未設定';const selected=new Set((settings&&settings.nextCategories&&settings.nextCategories.length?settings.nextCategories:active).map(keyOf));const groups={};allCategories.forEach(c=>{(groups[c.category1]||(groups[c.category1]=[])).push(c)});area.innerHTML=Object.keys(groups).sort((a,b)=>a.localeCompare(b,'ja')).map(cat1=>'<div class="cat-group"><label class="cat-parent"><input type="checkbox" class="parent-check" data-cat1="'+cat1+'"> '+cat1+'</label><div class="cat-children">'+groups[cat1].map(c=>'<label class="cat-item"><input type="checkbox" class="cat-check" data-cat1="'+c.category1+'" data-cat2="'+c.category2+'" '+(selected.has(keyOf(c))?'checked':'')+'> '+c.category2+'</label>').join('')+'</div></div>').join('');document.querySelectorAll('.parent-check').forEach(p=>{const kids=Array.from(document.querySelectorAll('.cat-check[data-cat1="'+p.dataset.cat1+'"]'));p.checked=kids.every(k=>k.checked);p.indeterminate=!p.checked&&kids.some(k=>k.checked);p.onchange=()=>{kids.forEach(k=>k.checked=p.checked);updateParents()}});document.querySelectorAll('.cat-check').forEach(c=>c.onchange=updateParents);updateParents();statusEl.textContent='カテゴリーを読み込みました。';}
function updateParents(){document.querySelectorAll('.parent-check').forEach(p=>{const kids=Array.from(document.querySelectorAll('.cat-check[data-cat1="'+p.dataset.cat1+'"]'));p.checked=kids.every(k=>k.checked);p.indeterminate=!p.checked&&kids.some(k=>k.checked)})}
function selectedCategories(){return Array.from(document.querySelectorAll('.cat-check:checked')).map(x=>({category1:x.dataset.cat1,category2:x.dataset.cat2}))}
async function loadSettings(){const snap=await getDoc(doc(db,'companySettings','quiz'));settings=snap.exists()?snap.data():null;}
document.getElementById('selectAllBtn').onclick=()=>{document.querySelectorAll('.cat-check').forEach(x=>x.checked=true);updateParents()};
document.getElementById('clearBtn').onclick=()=>{document.querySelectorAll('.cat-check').forEach(x=>x.checked=false);updateParents()};
document.getElementById('saveBtn').onclick=async()=>{const selected=selectedCategories();if(selected.length===0){statusEl.textContent='少なくとも1つのカテゴリーを選択してください。';statusEl.className='status error';return}const active=getActiveCategories();const next=tomorrowKey();await setDoc(doc(db,'companySettings','quiz'),{activeCategories:active,nextCategories:selected,nextApplyDate:next,updatedAt:serverTimestamp()},{merge:true});statusEl.textContent='設定を保存しました。変更内容は '+next+' から反映されます。';statusEl.className='status ok';await loadSettings();render();};
onAuthStateChanged(auth,async user=>{if(!user){location.href='login.html';return}try{await loadCategories();await loadSettings();render();}catch(e){console.error(e);statusEl.textContent='読み込みに失敗しました。
'+e.message;statusEl.className='status error';}});
</script></body></html>
