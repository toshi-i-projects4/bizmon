<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レポート</title>
<style>
body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:#eef2f7;color:#111827;padding:24px;box-sizing:border-box}.wrap{max-width:1400px;margin:24px auto;background:#fff;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:28px;box-sizing:border-box}.header{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px}h1{margin:0;font-size:28px}.top-link,.bottom-link{color:#2563eb;text-decoration:none;font-weight:bold;font-size:14px}.bottom-link{display:inline-block;margin-top:22px}.status,.notice{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:16px;line-height:1.7;white-space:pre-wrap}.status{display:none}.status.error{display:block}.notice{display:none}.ok{color:#166534}.error{color:#dc2626}.filter-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:14px;padding:16px;margin:16px 0}.filter-title{font-weight:bold;margin-bottom:12px;color:#374151}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;align-items:end}.control-item label{display:block;font-size:12px;color:#6b7280;font-weight:bold;margin-bottom:5px}input,select{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:10px;padding:10px 12px;font-size:14px;background:#fff}.readonly-range{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:10px;padding:10px 12px;font-size:14px;background:#f3f4f6;color:#374151;min-height:40px;display:flex;align-items:center;cursor:default}.btn-row{display:flex;gap:10px;flex-wrap:wrap}.btn{border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:bold;cursor:pointer;background:#2563eb;color:#fff;min-height:40px}.btn.secondary{background:#374151}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin:16px 0}.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}.card-label{font-size:12px;color:#6b7280;font-weight:bold;margin-bottom:5px}.card-value{font-size:28px;font-weight:900}.summary-hidden{display:none!important}.table-wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:12px;margin-top:12px;max-height:620px}table{width:100%;border-collapse:collapse;min-width:2700px;background:#fff}th,td{border-bottom:1px solid #e5e7eb;padding:10px 12px;text-align:left;vertical-align:top;font-size:13px;white-space:nowrap}th{background:#f3f4f6;font-weight:bold;color:#374151;position:sticky;top:0;z-index:1}.cell-question,.cell-choices,.cell-answer,.cell-explanation{white-space:pre-wrap;min-width:180px;max-width:340px;line-height:1.55}.cell-question{min-width:260px;max-width:420px}.cell-explanation{min-width:260px;max-width:420px}.badge{display:inline-block;border-radius:999px;padding:4px 10px;font-weight:bold;font-size:13px}.badge.ok{background:#dcfce7;color:#166534}.badge.ng{background:#fee2e2;color:#991b1b}.empty{text-align:center;color:#6b7280;padding:24px}.note{font-size:12px;color:#6b7280;line-height:1.7;margin-top:10px}.page-loading{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#eef2f7;color:#1f2937;font-weight:bold}.page-loading.hidden{display:none!important}.loading-box{display:flex;flex-direction:column;align-items:center;gap:12px;background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:24px 28px;box-shadow:0 4px 12px rgba(0,0,0,.08)}.loading-spinner{width:42px;height:42px;border:5px solid #dbeafe;border-top-color:#2563eb;border-radius:50%;animation:spin .9s linear infinite}.loading-text{font-size:14px;color:#374151}@keyframes spin{to{transform:rotate(360deg)}}@media(max-width:640px){body{padding:14px}.wrap{padding:20px}.header{align-items:flex-start}h1{font-size:24px}.btn{width:100%}.btn-row{display:grid}.card-value{font-size:24px}}
</style>
</head>
<body>
<div id="pageLoading" class="page-loading"><div class="loading-box"><div class="loading-spinner"></div><div id="loadingText" class="loading-text">レポートを読み込み中...</div></div></div>
<script>
(function(){function h(){var l=document.getElementById('pageLoading');if(l){l.classList.add('hidden');l.style.display='none'}}function s(t){var l=document.getElementById('pageLoading'),x=document.getElementById('loadingText');if(x&&t)x.textContent=t;if(l){l.classList.remove('hidden');l.style.display='flex'}}window.bizmonHideReportLoading=h;window.bizmonShowReportLoading=s;setTimeout(function(){var l=document.getElementById('pageLoading');if(l&&!l.classList.contains('hidden'))h()},5000);window.addEventListener('error',h);window.addEventListener('unhandledrejection',h)})();
</script>
<div class="wrap">
  <div class="header"><h1>レポート</h1><a class="top-link" href="index.html">← マイページへ戻る</a></div>
  <div id="status" class="status"></div>
  <div class="filter-box"><div class="filter-title">表示条件</div><div class="controls"><div class="control-item"><label for="periodPreset">期間</label><select id="periodPreset"><option value="thisMonth">今月</option><option value="prevMonth">前月</option></select></div><div class="control-item"><label>対象期間</label><div class="readonly-range" id="periodRangeDisplay">-</div><input type="hidden" id="startDate"><input type="hidden" id="endDate"></div><div class="control-item"><label>&nbsp;</label><div class="btn-row"><button class="btn" id="loadBtn" type="button">表示更新</button><button class="btn secondary" id="csvBtn" type="button" disabled>CSV出力</button></div></div></div><div class="note" id="periodHelp"></div></div>
  <div class="cards summary-hidden" aria-hidden="true"><div class="card"><div class="card-label">回答数</div><div class="card-value" id="totalCount">0</div></div><div class="card"><div class="card-label">正解数</div><div class="card-value" id="correctCount">0</div></div><div class="card"><div class="card-label">不正解数</div><div class="card-value" id="incorrectCount">0</div></div><div class="card"><div class="card-label">正答率</div><div class="card-value" id="correctRate">0%</div></div></div>
  <div class="table-wrap"><table><thead><tr><th>日付</th><th>社員コード</th><th>氏名</th><th>メールアドレス</th><th>部署</th><th>役職</th><th>備考</th><th>正誤</th><th>大項目</th><th>問題</th><th>選択肢A</th><th>選択肢B</th><th>選択肢C</th><th>回答</th><th>解答</th><th>解説</th><th>問題ID</th></tr></thead><tbody id="resultBody"><tr><td colspan="17" class="empty">データを読み込み中です。</td></tr></tbody></table></div>
  <a class="bottom-link" href="index.html">← マイページへ戻る</a>
</div>
<script src="operator-mode.js"></script>
<script type="module" onerror="window.bizmonHideReportLoading&&window.bizmonHideReportLoading()">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged,setPersistence,browserLocalPersistence}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,query,where,getDocs,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import{firstNonEmpty,isCorrectQuizResult as isCorrectResult,choiceA,choiceB,choiceC,selectedAnswer,correctAnswer,buildQuizResultsCsv,downloadCsvFile}from"./bizmon-quiz-csv.js";
const firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",databaseURL:"https://bizmon-31ffc-default-rtdb.firebaseio.com",projectId:"bizmon-31ffc",storageBucket:"bizmon-31ffc.firebasestorage.app",messagingSenderId:"535364592474",appId:"1:535364592474:web:1f60b1eb2ad804b1a28963",measurementId:"G-CE1ZDBSVM6"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);setPersistence(auth,browserLocalPersistence).catch(console.warn);
let currentUser=null,currentUserData=null,currentCompanyId='',rows=[];
function $(id){let el=document.getElementById(id);if(!el){el=document.createElement('span');el.id=id;el.style.display='none';document.body.appendChild(el)}return el}
function showLoading(t){if(window.bizmonShowReportLoading)window.bizmonShowReportLoading(t||'レポートを読み込み中...')}function hideLoading(){if(window.bizmonHideReportLoading)window.bizmonHideReportLoading()}
function pad2(n){return String(n).padStart(2,'0')}function dateKey(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())}function rangeFor(p){const d=new Date();if(p==='prevMonth')return{start:dateKey(new Date(d.getFullYear(),d.getMonth()-1,1)),end:dateKey(new Date(d.getFullYear(),d.getMonth(),0))};return{start:dateKey(new Date(d.getFullYear(),d.getMonth(),1)),end:dateKey(d)}}function escapeHtml(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}function setStatus(msg,type){const e=$('status');e.textContent=msg||'';e.className='status '+(type||'');if(type==='error'){e.style.display='block';hideLoading()}else e.style.display='none'}function applyPreset(){const r=rangeFor($('periodPreset').value);$('startDate').value=r.start;$('endDate').value=r.end;$('periodRangeDisplay').textContent=r.start+' 〜 '+r.end;$('periodHelp').textContent='※レポート画面で取得できるデータは「今月」または「前月」のみです。開始日・終了日はプルダウンの選択に応じて自動的に決まり、個別に指定することはできません。'}
async function loadCurrentUser(user){const snap=await getDoc(doc(db,'users',user.uid));if(!snap.exists())throw new Error('users/'+user.uid+' が見つかりません。');const data=snap.data()||{};const hasOperatorPermission=data.role==='operator'||data.isOperator===true;const opCompanyId=window.BizmonOperatorMode?window.BizmonOperatorMode.getOverrideCompanyId():'';if(hasOperatorPermission&&opCompanyId){if(data.status&&data.status!=='active')throw new Error('無効な運営アカウントです。');const compSnap=await getDoc(doc(db,'companies',opCompanyId));if(!compSnap.exists()){window.BizmonOperatorMode&&window.BizmonOperatorMode.renderMissingCompanyNotice('指定された会社ID（'+opCompanyId+'）が見つかりません。');throw new Error('指定された会社ID（'+opCompanyId+'）が見つかりません。')}const compData=compSnap.data()||{};const merged={role:'admin',companyId:opCompanyId,companyName:compData.companyName||opCompanyId};window.BizmonOperatorMode&&window.BizmonOperatorMode.renderBanner({companyId:opCompanyId,companyName:compData.companyName||''});return merged}if(data.role==='operator'){window.BizmonOperatorMode&&window.BizmonOperatorMode.renderMissingCompanyNotice('対象企業が指定されていません。企業検索画面から入り直してください。');throw new Error('対象企業が指定されていません。企業検索画面から入り直してください。')}if(data.role!=='admin')throw new Error('このレポートは管理者のみ利用できます。現在のrole：'+(data.role||'未設定'));if(!data.companyId)throw new Error('users/'+user.uid+' に companyId がありません。');return data}
function render(){const total=rows.length,correct=rows.filter(r=>isCorrectResult(r)===true).length,incorrect=total-correct,rate=total?Math.round(correct/total*1000)/10:0;$('totalCount').textContent=total;$('correctCount').textContent=correct;$('incorrectCount').textContent=incorrect;$('correctRate').textContent=total?rate+'%':'0%';const body=$('resultBody');if(!rows.length){body.innerHTML='<tr><td colspan="17" class="empty">指定期間の回答データはありません。</td></tr>';return}body.innerHTML=rows.sort((a,b)=>String(b.dateKey||b.date||'').localeCompare(String(a.dateKey||a.date||''))||String(a.employeeCode||'').localeCompare(String(b.employeeCode||''))).map(r=>{const ok=isCorrectResult(r);return '<tr><td>'+escapeHtml(r.dateKey||r.date||'')+'</td><td>'+escapeHtml(firstNonEmpty(r.employeeCode,r.employeeNo,r.staffCode))+'</td><td>'+escapeHtml(firstNonEmpty(r.name,r.displayName))+'</td><td>'+escapeHtml(firstNonEmpty(r.email))+'</td><td>'+escapeHtml(firstNonEmpty(r.department))+'</td><td>'+escapeHtml(firstNonEmpty(r.position))+'</td><td>'+escapeHtml(firstNonEmpty(r.note))+'</td><td><span class="badge '+(ok?'ok':'ng')+'">'+(ok?'○ 正解':'× 不正解')+'</span></td><td>'+escapeHtml(firstNonEmpty(r.category1,r.largeCategory,r.mainCategory))+'</td><td class="cell-question">'+escapeHtml(firstNonEmpty(r.questionText,r.question))+'</td><td class="cell-choices">'+escapeHtml(choiceA(r))+'</td><td class="cell-choices">'+escapeHtml(choiceB(r))+'</td><td class="cell-choices">'+escapeHtml(choiceC(r))+'</td><td class="cell-answer">'+escapeHtml(selectedAnswer(r))+'</td><td class="cell-answer">'+escapeHtml(correctAnswer(r))+'</td><td class="cell-explanation">'+escapeHtml(firstNonEmpty(r.explanation,r.commentary))+'</td><td>'+escapeHtml(firstNonEmpty(r.questionId,r.id))+'</td></tr>'}).join('')}
async function loadReport(){applyPreset();const start=$('startDate').value,end=$('endDate').value;if(!currentCompanyId)return;showLoading('レポートを読み込み中...');setStatus('',null);$('loadBtn').disabled=true;$('csvBtn').disabled=true;try{const resultsQ=query(collection(db,'quizResults'),where('companyId','==',currentCompanyId),where('dateKey','>=',start),where('dateKey','<=',end));const usersQ=query(collection(db,'users'),where('companyId','==',currentCompanyId));const[resultsSnap,usersSnap]=await Promise.all([getDocs(resultsQ),getDocs(usersQ)]);const noteByUid={},noteByCode={};usersSnap.docs.forEach(d=>{const u=d.data()||{};const note=firstNonEmpty(u.note);noteByUid[d.id]=note;if(u.employeeCode)noteByCode[u.employeeCode]=note});rows=resultsSnap.docs.map(d=>{const r={id:d.id,...d.data()};r.note=firstNonEmpty(r.note,noteByUid[r.uid],noteByCode[r.employeeCode]);return r});render();$('csvBtn').disabled=rows.length===0;setStatus('',null);hideLoading()}catch(e){console.error(e);let msg='取得に失敗しました：'+(e.code||e.message||e);if(e.code==='failed-precondition'){msg+='\n\nFirestoreの複合インデックスが未作成です。Firebaseコンソールのエラー詳細に表示されるリンクから、quizResults の companyId 昇順 + dateKey 昇順 のインデックスを作成してください。'}setStatus(msg,'error');$('resultBody').innerHTML='<tr><td colspan="17" class="empty">取得に失敗しました。</td></tr>'}finally{$('loadBtn').disabled=false}}
function downloadCsv(){const csv=buildQuizResultsCsv(rows);downloadCsvFile('bizmon_report_'+currentCompanyId+'_'+$('startDate').value+'_'+$('endDate').value+'.csv',csv)}
$('periodPreset').addEventListener('change',loadReport);$('loadBtn').addEventListener('click',loadReport);$('csvBtn').addEventListener('click',downloadCsv);applyPreset();onAuthStateChanged(auth,async user=>{if(!user){location.href='login.html';return}currentUser=user;try{showLoading('レポートを読み込み中...');currentUserData=await loadCurrentUser(user);currentCompanyId=currentUserData.companyId;await loadReport()}catch(e){console.error(e);setStatus('レポートの読み込みに失敗しました。\n'+(e.message||e),'error')}});
</script>
</body>
</html>
