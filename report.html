<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レポート</title>
<style>
body{margin:0;font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif;background:#eef2f7;color:#111827;padding:24px;box-sizing:border-box}.wrap{max-width:1400px;margin:24px auto;background:#fff;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.08);padding:28px;box-sizing:border-box}.header{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px}h1{margin:0;font-size:28px}.top-link,.bottom-link{color:#2563eb;text-decoration:none;font-weight:bold;font-size:14px}.bottom-link{display:inline-block;margin-top:22px}.status,.notice{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:14px 16px;margin-bottom:16px;line-height:1.7;white-space:pre-wrap}.notice{background:#fff7ed;border-color:#fed7aa;color:#7c2d12}.ok{color:#166534}.error{color:#dc2626}.filter-box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:14px;padding:16px;margin:16px 0}.filter-title{font-weight:bold;margin-bottom:12px;color:#374151}.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;align-items:end}.control-item label{display:block;font-size:12px;color:#6b7280;font-weight:bold;margin-bottom:5px}input,select{width:100%;box-sizing:border-box;border:1px solid #d1d5db;border-radius:10px;padding:10px 12px;font-size:14px;background:#fff}.btn-row{display:flex;gap:10px;flex-wrap:wrap}.btn{border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:bold;cursor:pointer;background:#2563eb;color:#fff;min-height:40px}.btn.secondary{background:#374151}.table-wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:12px;margin-top:12px;max-height:620px}table{width:100%;border-collapse:collapse;min-width:1900px;background:#fff}th,td{border-bottom:1px solid #e5e7eb;padding:10px 12px;text-align:left;vertical-align:top;font-size:13px;white-space:nowrap}th{background:#f3f4f6;font-weight:bold;color:#374151;position:sticky;top:0;z-index:1}.cell-question,.cell-choices,.cell-answer,.cell-explanation{white-space:pre-wrap;min-width:220px;max-width:360px;line-height:1.55}.cell-explanation{min-width:260px;max-width:420px}.badge{display:inline-block;border-radius:999px;padding:4px 10px;font-weight:bold;font-size:13px}.badge.ok{background:#dcfce7;color:#166534}.badge.ng{background:#fee2e2;color:#991b1b}.empty{text-align:center;color:#6b7280;padding:24px}.note{font-size:12px;color:#6b7280;line-height:1.7;margin-top:10px}.compat-hidden{display:none!important}@media(max-width:640px){body{padding:14px}.wrap{padding:20px}.header{align-items:flex-start}h1{font-size:24px}.btn{width:100%}.btn-row{display:grid}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header"><h1>レポート</h1><a class="top-link" href="index.html">← マイページへ戻る</a></div>
  <div id="status" class="status">レポートを読み込み中...</div>
  <div class="notice"><strong>表示ルール：</strong><br>通常画面で取得できるデータは「今月」または「前月」のみです。前々月以前の詳細データ・長期間CSVは、別途出力対応の対象です。</div>
  <div class="filter-box"><div class="filter-title">表示条件</div><div class="controls"><div class="control-item"><label for="periodPreset">期間</label><select id="periodPreset"><option value="thisMonth">今月</option><option value="prevMonth">前月</option></select></div><div class="control-item"><label for="startDate">開始日</label><input id="startDate" type="date" disabled></div><div class="control-item"><label for="endDate">終了日</label><input id="endDate" type="date" disabled></div><div class="control-item"><label>&nbsp;</label><div class="btn-row"><button class="btn" id="loadBtn" type="button">表示更新</button><button class="btn secondary" id="csvBtn" type="button" disabled>CSV出力</button></div></div></div><div class="note" id="periodHelp"></div></div>

  <!-- 互換用：旧JavaScriptやブラウザキャッシュが残っていてもエラーにしないための非表示要素です。画面には表示されません。 -->
  <div class="compat-hidden" aria-hidden="true">
    <span id="totalCount">0</span>
    <span id="correctCount">0</span>
    <span id="incorrectCount">0</span>
    <span id="correctRate">0%</span>
  </div>

  <div class="table-wrap"><table><thead><tr><th>日付</th><th>社員コード</th><th>氏名</th><th>正誤</th><th>大項目</th><th>問題</th><th>選択肢</th><th>解答</th><th>解説</th><th>問題ID</th></tr></thead><tbody id="resultBody"><tr><td colspan="10" class="empty">データを読み込み中です。</td></tr></tbody></table></div>
  <a class="bottom-link" href="index.html">← マイページへ戻る</a>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,onAuthStateChanged,setPersistence,browserLocalPersistence}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,query,where,getDocs,doc,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyBMm7YmGFo4ZOdlXvsojZ-O40f8Rnf8Lus",authDomain:"bizmon-31ffc.firebaseapp.com",databaseURL:"https://bizmon-31ffc-default-rtdb.firebaseio.com",projectId:"bizmon-31ffc",storageBucket:"bizmon-31ffc.firebasestorage.app",messagingSenderId:"535364592474",appId:"1:535364592474:web:1f60b1eb2ad804b1a28963",measurementId:"G-CE1ZDBSVM6"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);setPersistence(auth,browserLocalPersistence).catch(console.warn);
let currentUser=null,currentUserData=null,currentCompanyId='',rows=[];const $=id=>document.getElementById(id);
function setText(id,v){const el=$(id);if(el)el.textContent=v;}
function setHtml(id,v){const el=$(id);if(el)el.innerHTML=v;}
function pad2(n){return String(n).padStart(2,'0')}function dateKey(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate())}function rangeFor(p){const d=new Date();if(p==='prevMonth')return{start:dateKey(new Date(d.getFullYear(),d.getMonth()-1,1)),end:dateKey(new Date(d.getFullYear(),d.getMonth(),0))};return{start:dateKey(new Date(d.getFullYear(),d.getMonth(),1)),end:dateKey(d)}}function escapeHtml(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}function setStatus(msg,type){const el=$('status');if(el){el.textContent=msg;el.className='status '+(type||'')}}function applyPreset(){const r=rangeFor($('periodPreset').value);$('startDate').value=r.start;$('endDate').value=r.end;setText('periodHelp',r.start+' ～ '+r.end+' の範囲だけをFirestoreから取得します。')}
async function loadCurrentUser(user){const snap=await getDoc(doc(db,'users',user.uid));if(!snap.exists())throw new Error('users/'+user.uid+' が見つかりません。');const data=snap.data()||{};if(data.role!=='admin')throw new Error('このレポートは管理者のみ利用できます。現在のrole：'+(data.role||'未設定'));if(!data.companyId)throw new Error('users/'+user.uid+' に companyId がありません。');return data}
function firstNonEmpty(){for(let i=0;i<arguments.length;i++){const v=arguments[i];if(v!==undefined&&v!==null&&String(v).trim()!=='')return String(v).trim()}return ''}
function normalizeChoice(v){return firstNonEmpty(v).toUpperCase()}
function isCorrectResult(r){if(r&&r.isCorrect===true)return true;if(r&&r.isCorrect===false)return false;const x=String((r&&(r.result||r.judgement||r.resultText))||'').toLowerCase();if(x.includes('incorrect')||x.includes('wrong')||x.includes('不正解')||x.includes('×'))return false;if(x.includes('correct')||x.includes('正解')||x.includes('○'))return true;const s=normalizeChoice(r&&(r.selectedChoice||r.selectedAnswer||r.userAnswer)),c=normalizeChoice(r&&(r.correctChoice||r.correctAnswer));return !!(s&&c&&s===c)}
function choiceLines(r){const a=firstNonEmpty(r.choiceA,r.a),b=firstNonEmpty(r.choiceB,r.b),c=firstNonEmpty(r.choiceC,r.c);const list=[];if(a)list.push('A：'+a);if(b)list.push('B：'+b);if(c)list.push('C：'+c);return list.join('\n')}
function answerText(r){const selected=firstNonEmpty(r.selectedChoice,r.selectedAnswer,r.userAnswer);const correct=firstNonEmpty(r.correctChoice,r.correctAnswer);return '回答：'+(selected||'未取得')+'\n正解：'+(correct||'未取得')}
function render(){const body=$('resultBody');if(!body){setStatus('画面部品 resultBody が見つかりません。report.htmlを再アップロードしてください。','error');return}if(!rows.length){body.innerHTML='<tr><td colspan="10" class="empty">指定期間の回答データはありません。</td></tr>';return}body.innerHTML=rows.sort((a,b)=>String(b.dateKey||b.date||'').localeCompare(String(a.dateKey||a.date||''))||String(a.employeeCode||'').localeCompare(String(b.employeeCode||''))).map(r=>{const ok=isCorrectResult(r);return '<tr><td>'+escapeHtml(r.dateKey||r.date||'')+'</td><td>'+escapeHtml(firstNonEmpty(r.employeeCode,r.employeeNo,r.staffCode))+'</td><td>'+escapeHtml(firstNonEmpty(r.name,r.displayName))+'</td><td><span class="badge '+(ok?'ok':'ng')+'">'+(ok?'○ 正解':'× 不正解')+'</span></td><td>'+escapeHtml(firstNonEmpty(r.category1,r.largeCategory,r.mainCategory))+'</td><td class="cell-question">'+escapeHtml(firstNonEmpty(r.questionText,r.question))+'</td><td class="cell-choices">'+escapeHtml(choiceLines(r))+'</td><td class="cell-answer">'+escapeHtml(answerText(r))+'</td><td class="cell-explanation">'+escapeHtml(firstNonEmpty(r.explanation,r.commentary))+'</td><td>'+escapeHtml(firstNonEmpty(r.questionId,r.id))+'</td></tr>'}).join('')}
async function loadReport(){applyPreset();const start=$('startDate').value,end=$('endDate').value;if(!currentCompanyId)return;setStatus('レポートを読み込み中...\n取得範囲：'+start+' ～ '+end);const loadBtn=$('loadBtn'),csvBtn=$('csvBtn');if(loadBtn)loadBtn.disabled=true;if(csvBtn)csvBtn.disabled=true;try{const q=query(collection(db,'quizResults'),where('companyId','==',currentCompanyId),where('dateKey','>=',start),where('dateKey','<=',end));const snap=await getDocs(q);rows=snap.docs.map(d=>({id:d.id,...d.data()}));render();if(csvBtn)csvBtn.disabled=rows.length===0;setStatus('レポートを読み込みました。\n取得範囲：'+start+' ～ '+end+'\n取得件数：'+rows.length+'件','ok')}catch(e){console.error(e);setStatus('取得に失敗しました：'+(e.code||e.message||e),'error');setHtml('resultBody','<tr><td colspan="10" class="empty">取得に失敗しました。</td></tr>')}finally{if(loadBtn)loadBtn.disabled=false}}
function csvCell(v){return '"'+String(v==null?'':v).replace(/"/g,'""')+'"'}function downloadCsv(){const headers=['日付','社員コード','氏名','正誤','大項目','問題','選択肢','解答','解説','問題ID'];const lines=[headers.map(csvCell).join(',')];rows.forEach(r=>{const ok=isCorrectResult(r);const vals=[r.dateKey||r.date||'',firstNonEmpty(r.employeeCode,r.employeeNo,r.staffCode),firstNonEmpty(r.name,r.displayName),ok?'正解':'不正解',firstNonEmpty(r.category1,r.largeCategory,r.mainCategory),firstNonEmpty(r.questionText,r.question),choiceLines(r),answerText(r),firstNonEmpty(r.explanation,r.commentary),firstNonEmpty(r.questionId,r.id)];lines.push(vals.map(csvCell).join(','))});const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8;'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='bizmon_report_'+currentCompanyId+'_'+$('startDate').value+'_'+$('endDate').value+'.csv';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
$('periodPreset').addEventListener('change',loadReport);$('loadBtn').addEventListener('click',loadReport);$('csvBtn').addEventListener('click',downloadCsv);applyPreset();onAuthStateChanged(auth,async user=>{if(!user){location.href='login.html';return}currentUser=user;try{currentUserData=await loadCurrentUser(user);currentCompanyId=currentUserData.companyId;await loadReport()}catch(e){console.error(e);setStatus('レポートの読み込みに失敗しました。\n'+(e.message||e),'error')}});
</script>
</body>
</html>
