async function loadWeatherInfo(){var box=document.getElementById('weatherMini'),st=null;if(!box)return;box.innerHTML='<div class="weather-mini-loading">天気予報を読み込み中...</div>';try{st=await getWeatherSetting();var tg=weatherTarget(),data=await fetchJsonWithTimeout('https://www.jma.go.jp/bosai/forecast/data/forecast/'+encodeURIComponent(st.weatherOfficeCode)+'.json',8000),f=data&&data[0],ts0=f&&f.timeSeries?f.timeSeries[0]:null,ts1=f&&f.timeSeries?f.timeSeries[1]:null,wa=findWeatherArea(ts0&&ts0.areas,st.weatherAreaCode),pa=findWeatherArea(ts1&&ts1.areas,st.weatherAreaCode),code=wa&&wa.weatherCodes&&(wa.weatherCodes[tg.index]||wa.weatherCodes[0])||'100',wt=wa&&wa.weathers&&(wa.weathers[tg.index]||wa.weathers[0])||'天気情報',pp=weatherPopList(ts1&&ts1.timeDefines,pa&&pa.pops,tg),tt=weatherTemps(data,tg);if(tt.max!=='--'&&tt.min!=='--'&&tt.max===tt.min)tt.min='-';box.innerHTML='<div class="weather-period">'+escHtml(tg.label+'（'+tg.display+'）')+'</div><div class="weather-main"><span class="weather-icon-fallback">'+escHtml(weatherIconFallback(code))+'</span><img class="weather-icon" src="https://www.jma.go.jp/bosai/forecast/img/'+escHtml(code)+'.svg" onerror="this.style.display=\'none\';this.previousElementSibling.style.display=\'flex\';"><div>'+weatherPlaceHtml(st)+'<div class="weather-text">'+escHtml(wt)+'</div></div></div><div class="weather-temp">朝の最低 <strong>'+escHtml(tt.min)+'℃</strong> / 日中の最高 <strong>'+escHtml(tt.max)+'℃</strong></div><div class="weather-pops">降水確率：'+escHtml(pp.length?pp.join(' / '):'--')+'</div><div class="weather-source">提供：気象庁</div><div class="weather-note-bottom">※天気予報は気象庁の予報区単位です。警報・注意報は市区町村単位で表示します。<br>※18時までは今日の天気を表示。18時からは明日の天気を表示</div>'}catch(e){box.innerHTML='<div class="weather-mini-error">天気予報を取得できませんでした。<br>提供：気象庁</div><div class="weather-note-bottom">※18時までは今日の天気を表示。18時からは明日の天気を表示</div>'}try{if(!st)st=await getWeatherSetting();await loadWeatherWarnings(st)}catch(e){renderWeatherWarningError('警報・注意報を取得できませんでした')}}
var WARNING_KIND_NAMES={'02':'暴風雪警報','03':'大雨警報','04':'洪水警報','05':'暴風警報','06':'大雪警報','07':'波浪警報','08':'高潮警報','09':'土砂災害警報','10':'大雨注意報','12':'大雪注意報','13':'風雪注意報','14':'雷注意報','15':'強風注意報','16':'波浪注意報','17':'融雪注意報','18':'洪水注意報','19':'高潮注意報','20':'濃霧注意報','21':'乾燥注意報','22':'なだれ注意報','23':'低温注意報','24':'霜注意報','25':'着氷注意報','26':'着雪注意報','27':'その他の注意報','29':'土砂災害注意報','32':'暴風雪特別警報','33':'大雨特別警報','34':'氾濫特別警報','35':'暴風特別警報','36':'大雪特別警報','37':'波浪特別警報','38':'高潮特別警報','39':'土砂災害特別警報','42':'暴風雪危険警報','43':'大雨危険警報','44':'氾濫危険警報','45':'暴風危険警報','46':'大雪危険警報','47':'波浪危険警報','48':'高潮危険警報','49':'土砂災害危険警報'};
function warningLevelByCode(code){code=String(code||'');if(['33','34','38','39'].indexOf(code)>=0)return 5;if(['43','44','48','49'].indexOf(code)>=0)return 4;if(['03','04','08','09'].indexOf(code)>=0)return 3;if(['10','18','19','29'].indexOf(code)>=0)return 2;if(['32','35','36','37'].indexOf(code)>=0)return 5;if(['02','05','06','07'].indexOf(code)>=0)return 3;if(['12','13','14','15','16','17','20','21','22','23','24','25','26','27'].indexOf(code)>=0)return 2;return 0}function warningLevelLabel(lv){return lv===5?'レベル5相当':lv===4?'レベル4相当':lv===3?'レベル3相当':lv===2?'レベル2相当':'情報'}function isActiveWarningStatus(st){st=String(st||'');if(!st)return false;if(st.indexOf('解除')>=0||st.indexOf('なし')>=0)return false;return true}
async function getAreaMaster(){if(window.__bizmonAreaMaster)return window.__bizmonAreaMaster;window.__bizmonAreaMaster=await fetchJsonWithTimeout('https://www.jma.go.jp/bosai/common/const/area.json',8000);return window.__bizmonAreaMaster}function collectClass20Codes(areaMaster,code){var out=[],seen={};function add(c){if(c&&!seen[c]){seen[c]=true;out.push(c)}}function rec(c){if(areaMaster.class20s&&areaMaster.class20s[c]){add(c);return}var obj=(areaMaster.class10s&&areaMaster.class10s[c])||(areaMaster.class15s&&areaMaster.class15s[c])||(areaMaster.offices&&areaMaster.offices[c]);if(obj&&Array.isArray(obj.children))obj.children.forEach(rec)}rec(String(code||''));return out}function areaName(areaMaster,code){var o=(areaMaster.class20s&&areaMaster.class20s[code])||(areaMaster.class15s&&areaMaster.class15s[code])||(areaMaster.class10s&&areaMaster.class10s[code])||(areaMaster.offices&&areaMaster.offices[code]);return o&&o.name?o.name:code}
async function getWarningReports(officeCode){var urls=['https://www.jma.go.jp/bosai/warning/data/r8/'+encodeURIComponent(officeCode)+'.json','https://www.jma.go.jp/bosai/warning/data/r8/map.json'];var last=null;for(var i=0;i<urls.length;i++){try{var d=await fetchJsonWithTimeout(urls[i],8000);return Array.isArray(d)?d:[d]}catch(e){last=e}}throw last||new Error('warning fetch failed')}function parseWarningReports(reports,targetCodes,areaMaster){var target={};targetCodes.forEach(function(c){target[String(c)]=true});var map={},latest='';(reports||[]).forEach(function(rep){if(rep&&rep.reportDatetime&&String(rep.reportDatetime)>latest)latest=String(rep.reportDatetime);var items=rep&&rep.warning&&Array.isArray(rep.warning.class20Items)?rep.warning.class20Items:[];items.forEach(function(it){var ac=String(it.areaCode||'');if(!target[ac])return;(it.kinds||[]).forEach(function(k){if(!k||!isActiveWarningStatus(k.status)||!k.code)return;var code=String(k.code).padStart(2,'0'),lv=warningLevelByCode(code),key=ac+'_'+code;map[key]={areaCode:ac,areaName:areaName(areaMaster,ac),code:code,name:WARNING_KIND_NAMES[code]||('警報・注意報コード '+code),status:String(k.status||''),level:lv,source:'warning'}})})});var arr=Object.keys(map).map(function(k){return map[k]});arr.sort(function(a,b){return b.level-a.level||a.areaName.localeCompare(b.areaName,'ja')||a.name.localeCompare(b.name,'ja')});return{items:arr,latest:latest}}
async function getFloodWarnings(st,targetCodes,areaMaster){try{var data=await fetchJsonWithTimeout('https://www.jma.go.jp/bosai/flood/data/r8/flood_xml.json',8000),target={};targetCodes.forEach(function(c){target[String(c)]=true});var arr=[];(Array.isArray(data)?data:[]).forEach(function(x){var item=x.item||{},code=String(item.code||''),lv=Number(code.charAt(0));if(!lv||lv<2)return;if(String(item.name||'').indexOf('解除')>=0||String(item.condition||'').indexOf('解除')>=0)return;var hit=false;(x.class20Codes||[]).forEach(function(c){if(target[String(c)])hit=true});if(!hit)return;arr.push({areaCode:(x.class20Codes&&x.class20Codes[0])||String(st.weatherClass20Code||st.weatherAreaCode),areaName:x.riverName||areaName(areaMaster,String(st.weatherClass20Code||st.weatherAreaCode))||'指定河川',code:code,name:item.name||'氾濫情報',status:x.infoType||'',level:Math.min(5,Math.max(2,lv)),source:'flood'})});return arr}catch(e){return []}}
function warningTargetCodes(areaMaster,st){var cityCode=firstNonEmpty(st.weatherClass20Code,st.weatherCityCode,st.cityCode,st.class20Code,st.warningClass20Code);if(cityCode){return collectClass20Codes(areaMaster,cityCode).length?collectClass20Codes(areaMaster,cityCode):[String(cityCode)]}var c=firstNonEmpty(st.weatherWarningAreaCode,st.warningAreaCode,st.weatherAreaCode);var expanded=collectClass20Codes(areaMaster,c);return expanded.length?expanded:[String(c||'')]}

function renderWeatherWarningError(msg){var el=document.getElementById('weatherWarnings');if(el)el.innerHTML='<div class="weather-warning-title">警報・注意報</div><div class="weather-warning-error">'+escHtml(msg||'警報・注意報を取得できませんでした')+'</div>'}function renderWeatherWarnings(items,latest,areaLabel){var el=document.getElementById('weatherWarnings');if(!el)return;if(!items||!items.length){el.innerHTML='<div class="weather-warning-title">警報・注意報</div><div class="weather-warning-none">'+escHtml(areaLabel||'対象地域')+'：発表中の警報・注意報はありません。</div><div class="warning-report-time">提供：気象庁</div>';return}var html='<div class="weather-warning-title">警報・注意報</div><div class="weather-warning-list">';items.forEach(function(x){html+='<span class="warning-badge warning-lv'+escHtml(x.level)+'" title="'+escHtml((x.status?x.status+' / ':'')+warningLevelLabel(x.level))+'"><span>'+escHtml(warningLevelLabel(x.level))+'</span><span class="warning-area-name">'+escHtml(x.areaName)+'</span><span>'+escHtml(x.name)+'</span></span>'});html+='</div><div class="warning-report-time">提供：気象庁'+(latest?' / '+escHtml(formatJmaDateTime(latest))+' 発表':'')+'</div>';el.innerHTML=html}function formatJmaDateTime(s){try{var d=new Date(s);if(isNaN(d.getTime()))return s;return (d.getMonth()+1)+'/'+d.getDate()+' '+pad2(d.getHours())+':'+pad2(d.getMinutes())}catch(e){return s}}

function parseCsv(txt){var rows=[],row=[],cur='',q=false;for(var i=0;i<txt.length;i++){var ch=txt.charAt(i),nx=txt.charAt(i+1);if(ch==='"'){if(q&&nx==='"'){cur+='"';i++}else q=!q}else if(ch===','&&!q){row.push(cur);cur=''}else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&nx==='\n')i++;row.push(cur);if(row.some(function(v){return String(v).trim()!==''}))rows.push(row);row=[];cur=''}else cur+=ch}row.push(cur);if(row.some(function(v){return String(v).trim()!==''}))rows.push(row);return rows}function normalizeDateKey(v){var s=String(v||'').trim().replace(/^\uFEFF/,'');var m=s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);return m?m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0'):s}function normalizeDisplayValue(v){return String(v||'').trim().replace(/[（(][^）)]*[）)]/g,'').trim()}function splitAlmanacValues(v){var s=String(v||'').trim();if(!s)return[];var a=[],c='',d=0;for(var i=0;i<s.length;i++){var ch=s.charAt(i);if(ch==='（'||ch==='('){d++;c+=ch;continue}if(ch==='）'||ch===')'){d=Math.max(0,d-1);c+=ch;continue}if(d===0&&(ch==='・'||ch==='、'||ch===','||ch==='／'||ch==='/')){if(c.trim())a.push(c.trim());c=''}else c+=ch}if(c.trim())a.push(c.trim());return a}async function loadText(file){var r=await fetch(file+'?v='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error(file+' '+r.status);return await r.text()}async function loadAlmanacDescriptions(){var map={};try{var t=await loadText('almanac_descriptions.csv');if(t&&t.charCodeAt(0)===65279)t=t.substring(1);var rows=parseCsv(t);if(rows.length>1){var h=rows[0].map(function(v){return String(v||'').trim().toLowerCase()}),ti=h.indexOf('type'),ni=h.indexOf('name'),di=h.indexOf('description');if(ti>=0&&ni>=0&&di>=0){for(var i=1;i<rows.length;i++){var type=String(rows[i][ti]||'').trim(),name=String(rows[i][ni]||'').trim(),desc=String(rows[i][di]||'').trim();if(type&&name&&desc)map[type+'|'+name]=desc}}}}catch(e){}return map}function labelWithReading(k,l){var r=ITEM_READINGS[k]||'';return r?l+'（'+r+'）':l}a
