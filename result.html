function setStatus(msg,type){var el=document.getElementById('status');if(!el)return;el.textContent=msg;el.className='status '+(type||'')}

function todayKey(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function toDateKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function detailAllowedStartKey(){var d=new Date();return toDateKey(new Date(d.getFullYear(),d.getMonth()-1,1))}
function canOpenDetail(dateKey){dateKey=String(dateKey||'');return dateKey>=detailAllowedStartKey()&&dateKey<=todayKey()}
function blockedMessage(){return 'この日の問題・解説の詳細表示期間は終了しています。\n詳細表示できるのは「前月1日以降」のデータです。\nカレンダー上の○×履歴は確認できますが、過去の問題・解説が必要な場合は管理者へお問い合わせください。'}
function requireLogin(callback){auth.onAuthStateChanged(function(user){if(!user){location.href='login.html';return}callback(user)})}
function firstNonEmpty(){for(var i=0;i<arguments.length;i++){var v=arguments[i];if(v!==undefined&&v!==null&&String(v).trim()!==''){return String(v).trim()}}return ''}
function normalizeChoice(v){return firstNonEmpty(v).toUpperCase()}
function isCorrectResult(r){if(r&&r.isCorrect===true)return true;if(r&&r.isCorrect===false)return false;var result=String((r&&(r.result||r.judgement||r.resultText))||'').toLowerCase();if(result.indexOf('incorrect')>=0||result.indexOf('wrong')>=0||result.indexOf('不正解')>=0||result.indexOf('×')>=0)return false;if(result.indexOf('correct')>=0||result.indexOf('正解')>=0||result.indexOf('○')>=0)return true;var selected=normalizeChoice(r&&(r.selectedChoice||r.selectedAnswer||r.userAnswer));var correct=normalizeChoice(r&&(r.correctChoice||r.correctAnswer));return !!(selected&&correct&&selected===correct)}
function normalizeResultForDisplay(r){r=r||{};var selectedChoice=normalizeChoice(r.selectedChoice||r.selectedAnswer||r.userAnswer);var correctChoice=normalizeChoice(r.correctChoice||r.correctAnswer);var questionText=firstNonEmpty(r.questionText,r.question);var base={isCorrect:r.isCorrect,selectedChoice:selectedChoice,correctChoice:correctChoice,result:r.result,judgement:r.judgement,resultText:r.resultText};var ok=isCorrectResult(base);return{resultId:firstNonEmpty(r.resultId),uid:firstNonEmpty(r.uid),email:firstNonEmpty(r.email),companyId:firstNonEmpty(r.companyId),companyName:firstNonEmpty(r.companyName),name:firstNonEmpty(r.name),employeeCode:firstNonEmpty(r.employeeCode),department:firstNonEmpty(r.department),position:firstNonEmpty(r.position),role:firstNonEmpty(r.role),date:firstNonEmpty(r.date,r.dateKey)||todayKey(),dateKey:firstNonEmpty(r.dateKey,r.date)||todayKey(),questionId:firstNonEmpty(r.questionId,r.id),questionText:questionText,question:questionText,choiceA:firstNonEmpty(r.choiceA,r.a),choiceB:firstNonEmpty(r.choiceB,r.b),choiceC:firstNonEmpty(r.choiceC,r.c),selectedChoice:selectedChoice,selectedAnswer:selectedChoice,userAnswer:selectedChoice,correctChoice:correctChoice,correctAnswer:correctChoice,category1:firstNonEmpty(r.category1),category2:firstNonEmpty(r.category2),explanation:firstNonEmpty(r.explanation),isCorrect:ok,resultText:ok?'正解':'不正解',result:ok?'correct':'incorrect'}}

function showResultMark(r){var hero=document.getElementById('resultHero');var mark=document.getElementById('resultBigMark');if(!mark||!hero)return;hero.className='result-hero';var ok=isCorrectResult(r);mark.textContent=ok?'○':'×';mark.className='result-big-mark '+(ok?'correct':'incorrect');setTimeout(function(){hero.className='result-hero hidden-after'},1700)}
function show(r){var n=normalizeResultForDisplay(r);if(!canOpenDetail(n.dateKey)){showBlocked(n.dateKey);return false}showResultMark(n);document.getElementById('q').textContent='問題：'+(n.questionText||'問題文なし');document.getElementById('choices').textContent='選択肢\nA：'+(n.choiceA||'')+'\nB：'+(n.choiceB||'')+'\nC：'+(n.choiceC||'');document.getElementById('ans').textContent='判定：'+n.resultText+'\nあなたの回答：'+(n.selectedChoice||'未取得')+'\n正解：'+(n.correctChoice||'未取得')+'\nカテゴリー：'+(n.category1||'')+' ＞ '+(n.category2||'');document.getElementById('exp').textContent='解説：'+(n.explanation||'解説なし');document.getElementById('content').style.display='block';window.bizmonResultDateKey=n.dateKey;if(window.bizmonResultDailyInfoLoad){setTimeout(window.bizmonResultDailyInfoLoad,100)}return true}
function readLocalResult(){try{var raw=localStorage.getItem('currentQuizResult');if(!raw)return null;return JSON.parse(raw)}catch(e){console.warn('localStorage currentQuizResult の読込に失敗しました。',e);return null}}
function saveLocalResult(r){try{localStorage.setItem('currentQuizResult',JSON.stringify(r))}catch(e){console.warn('currentQuizResult の保存に失敗しました。',e)}}
function getResultId(user,dateKey){return user.uid+'_'+dateKey}
function loadFirestoreResult(user,dateKey){var resultId=getResultId(user,dateKey);return db.collection('quizResults').doc(resultId).get().then(function(doc){if(!doc.exists)return null;var data=doc.data()||{};data.resultId=data.resultId||resultId;return data})}
function buildSaveData(user,userData,r){var n=normalizeResultForDisplay(r);var dateKey=firstNonEmpty(n.dateKey,n.date)||todayKey();var resultId=getResultId(user,dateKey);return{resultId:resultId,uid:user.uid,email:user.email||userData.email||n.email||'',companyId:userData.companyId||n.companyId||'',companyName:userData.companyName||n.companyName||'',name:userData.name||n.name||'',employeeCode:userData.employeeCode||n.employeeCode||'',department:userData.department||n.department||'',position:userData.position||n.position||'',role:userData.role||n.role||'user',date:dateKey,dateKey:dateKey,questionId:n.questionId,questionText:n.questionText,question:n.questionText,choiceA:n.choiceA,choiceB:n.choiceB,choiceC:n.choiceC,selectedChoice:n.selectedChoice,selectedAnswer:n.selectedChoice,userAnswer:n.selectedChoice,correctChoice:n.correctChoice,correctAnswer:n.correctChoice,isCorrect:n.isCorrect,result:n.result,resultText:n.resultText,category1:n.category1,category2:n.category2,explanation:n.explanation,savedFrom:'result.html_insurance',savedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()}}
function insuranceSaveIfMissing(user,r){var n=normalizeResultForDisplay(r);var dateKey=firstNonEmpty(n.dateKey,n.date)||todayKey();if(!canOpenDetail(dateKey)){return Promise.resolve({status:'blocked',resultId:getResultId(user,dateKey),message:'詳細表示期間外のため保険保存しません。'})}var resultId=getResultId(user,dateKey);return db.collection('quizResults').doc(resultId).get().then(function(existingDoc){if(existingDoc.exists){return{status:'exists',resultId:resultId,message:'既に保存済みのため、result.html では再保存しません。'}}return db.collection('users').doc(user.uid).get().then(function(userDoc){if(!userDoc.exists){throw new Error('users/'+user.uid+' が見つかりません。Firestore の users にログインユーザーを作成してください。')}var userData=userDoc.data()||{};if(!userData.companyId){throw new Error('users/'+user.uid+' に companyId がありません。')}var saveData=buildSaveData(user,userData,n);return db.collection('quizResults').doc(resultId).set(saveData,{merge:true}).then(function(){return{status:'saved',resultId:resultId,companyId:userData.companyId,employeeCode:userData.employeeCode||''}})})})}
function runResultPage(user){setStatus('STEP2：結果データを確認中...\nログインUID：'+user.uid+'\nログインメール：'+(user.email||''));var localResult=readLocalResult();var localDateKey=localResult?firstNonEmpty(localResult.dateKey,localResult.date):'';var targetDateKey=localDateKey||todayKey();if(localResult){addStatus('STEP2-1：localStorage の結果を取得しました。');addStatus('対象日：'+targetDateKey);if(!show(localResult)){return}insuranceSaveIfMissing(user,localResult).then(function(info){if(info.status==='exists'){setStatus('結果を表示しました。\n保存先確認：quizResults / '+info.resultId+'\n状態：既に保存済みのため再保存なし','ok')}else if(info.status==='blocked'){setStatus(info.message+'\n保存先確認：quizResults / '+info.resultId,'error')}else{setStatus('結果を表示しました。\n保険保存を実行しました。\n保存先：quizResults / '+info.resultId+'\n企業ID：'+info.companyId+'\n社員コード：'+(info.employeeCode||'未設定'),'ok')}}).catch(function(err){setStatus('結果は表示しましたが、保存確認または保険保存に失敗しました。\nカレンダーに反映されない場合は Firestore を確認してください。\n\nエラー内容：\n'+err.message,'error')});return}addStatus('STEP2-1：localStorage に結果がありません。Firestore から本日分を復元します。');addStatus('復元対象：quizResults / '+getResultId(user,targetDateKey));loadFirestoreResult(user,targetDateKey).then(function(firestoreResult){if(!firestoreResult){setStatus('回答結果が見つかりません。\nlocalStorage に currentQuizResult がなく、Firestore にも本日分がありませんでした。\n\n確認先：quizResults / '+getResultId(user,targetDateKey)+'\n\n今日の問題から回答してください。','error');return}saveLocalResult(firestoreResult);if(!show(firestoreResult)){return}setStatus('Firestore から結果を復元して表示しました。\n復元元：quizResults / '+getResultId(user,targetDateKey)+'\n状態：result.html では再保存なし','ok')}).catch(function(err){setStatus('Firestore からの結果復元に失敗しました。\n確認先：quizResults / '+getResultId(user,targetDateKey)+'\n\nエラー内容：\n'+err.message,'error')})}
loadFirebase(function(e){if(e){setStatus(e.message,'error');return}requireLogin(function(user){runResultPage(user)})});
</script>
