<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>解説</title>
  <style>
    body { margin:0; font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic UI","Meiryo",sans-serif; background:#eef2f7; color:#333; padding:24px; box-sizing:border-box; }
    .wrap { max-width:760px; margin:30px auto; background:#fff; border-radius:16px; box-shadow:0 4px 12px rgba(0,0,0,.08); padding:32px; box-sizing:border-box; }
    h1 { margin-top:0; color:#111827; }
    .result-box { background:#f9fafb; border:1px solid #e5e7eb; border-radius:10px; padding:14px 16px; margin-bottom:14px; line-height:1.7; white-space:pre-wrap; }
    .save-status { background:#eff6ff; border-left:4px solid #2563eb; border-radius:8px; padding:12px 14px; margin:18px 0; font-size:14px; color:#1e3a8a; white-space:pre-wrap; font-weight:bold; }
    .top-btn { margin-top:16px; padding:12px 24px; border:none; border-radius:10px; background:#111827; color:#fff; cursor:pointer; font-size:14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>結果</h1>
    <div id="question" class="result-box">結果表示準備中...</div>
    <div id="result" class="result-box"></div>
    <div id="detail" class="result-box"></div>
    <div id="explanation" class="result-box"></div>
    <div id="saveStatus" class="save-status">STEP1_EXTERNAL_CHECK：result.html は表示されています。外部JS読込確認中...</div>
    <button type="button" class="top-btn" onclick="location.href='index.html'">トップに戻る</button>
  </div>

  <script>
    window.resultStep1CheckLoaded = function () {
      var el = document.getElementById("saveStatus");
      if (el) {
        el.textContent = "STEP1_EXTERNAL_CHECK_OK：result_step1_check.js は読み込まれ、実行されました。";
      }
    };
  </script>
  <script src="result_step1_check.js?v=20260610-1"
          onload="document.getElementById('saveStatus').textContent='STEP1_EXTERNAL_CHECK_ONLOAD：外部JSファイルの読込自体は成功しました。JS内関数の実行結果を確認してください。';"
          onerror="document.getElementById('saveStatus').textContent='STEP1_EXTERNAL_CHECK_ERROR：外部JSファイルの読込に失敗しました。result_step1_check.js が同じ階層にあるか確認してください。';"></script>
</body>
</html>
