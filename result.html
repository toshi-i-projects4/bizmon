function parseCsv(text){var rows=[],row=[],cur='',q=false;for(var i=0;i<text.length;i++){var ch=text.charAt(i),nx=text.charAt(i+1);if(ch==='"'){if(q&&nx==='"'){cur+='"';i++}else q=!q}else if(ch===','&&!q){row.push(cur);cur=''}else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&nx==='\n')i++;row.push(cur);if(row.some(function(v){return String(v).trim()!==''}))rows.push(row);row=[];cur=''}else cur+=ch}row.push(cur);if(row.some(function(v){return String(v).trim()!==''}))rows.push(row);return rows}function normalizeDateKey(v){var s=String(v||'').trim().replace(/^\uFEFF/,'');var m=s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);return m?m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0'):s}function normalizeDisplayValue(v){return String(v||'').trim().replace(/[（(][^）)]*[）)]/g,'').trim()}function splitAlmanacValues(value){var s=String(value||'').trim();if(!s)return[];var arr=[],cur='',depth=0;for(var i=0;i<s.length;i++){var ch=s.charAt(i);if(ch==='（'||ch==='('){depth++;cur+=ch;continue}if(ch==='）'||ch===')'){depth=Math.max(0,depth-1);cur+=ch;continue}if(depth===0&&(ch==='・'||ch==='、'||ch===','||ch==='／'||ch==='/')){if(cur.trim())arr.push(cur.trim());cur=''}else cur+=ch}if(cur.trim())arr.push(cur.trim());return arr}async function loadText(file){var res=await fetch(file+'?v='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error(file+' '+res.status);return await res.text()}async function loadAlmanacDescriptions(){var map={};try{var t=await loadText('almanac_descriptions.csv');if(t&&t.charCodeAt(0)===65279)t=t.substring(1);var rows=parseCsv(t);if(rows.length>1){var h=rows[0].map(function(v){return String(v||'').trim().toLowerCase()}),ti=h.indexOf('type'),ni=h.indexOf('name'),di=h.indexOf('description');if(ti>=0&&ni>=0&&di>=0){for(var i=1;i<rows.length;i++){var type=String(rows[i][ti]||'').trim(),name=String(rows[i][ni]||'').trim(),desc=String(rows[i][di]||'').trim();if(type&&name&&desc)map[type+'|'+name]=desc}}}}catch(e){console.warn(e)}return map}f
